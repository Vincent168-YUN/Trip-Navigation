                                        <datalist id="cities-list">{dataHierarchy.uniqueCities.map(c => <option key={c} value={c} />)}</datalist>
                                    </div>
                                    <div className="p-3.5 flex items-center">
                                        <label className="w-24 text-[17px] text-[#1C1C1E]">Category</label>
                                        <input type="text" required list="categories-list" value={category} onChange={e => setCategory(e.target.value)} className="flex-1 bg-transparent focus:outline-none text-[17px] text-[#8E8E93]" placeholder="Select or type" />
                                        <datalist id="categories-list">{dataHierarchy.allCategories.map(c => <option key={c} value={c} />)}</datalist>
                                    </div>
                                </div>
                                
                                <div className="bg-[var(--ios-glass)] backdrop-blur-2xl rounded-[20px] shadow-[0_2px_10px_rgba(0,0,0,0.02)] border border-white/60 overflow-hidden">
                                    <div className="p-3.5 flex flex-col">
                                        <label className="text-[15px] font-medium text-[#1C1C1E] mb-2">Notes & Additional Info</label>
                                        <textarea value={comment} onChange={e => setComment(e.target.value)} rows="3" className="w-full bg-black/5 rounded-[12px] p-3 focus:outline-none text-[15px] text-[#1C1C1E] placeholder:text-[#8E8E93]" placeholder="Add comments, tips, or what to order here..."></textarea>
                                    </div>
                                </div>

                                <div className="bg-[var(--ios-glass)] backdrop-blur-2xl rounded-[20px] shadow-[0_2px_10px_rgba(0,0,0,0.02)] border border-white/60 overflow-hidden">
                                    <div className="p-3.5 border-b border-black/5 flex justify-between items-center bg-[#007AFF]/5">
                                        <span className="text-[15px] font-medium text-[#007AFF]">GPS Coordinates (Optional)</span>
                                        <div className="flex space-x-2">
                                            <button type="button" onClick={useCurrentLocation} className="text-[13px] font-semibold text-white bg-[#007AFF] px-3 py-1 rounded-full active:opacity-70">
                                                Get Current
                                            </button>
                                        </div>
                                    </div>
                                    <div className="p-3.5 border-b border-black/5 flex items-center">
                                        <label className="w-24 text-[17px] text-[#1C1C1E]">Lat</label>
                                        <input type="number" step="any" value={lat} onChange={e => setLat(e.target.value)} className="flex-1 bg-transparent focus:outline-none text-[17px] text-[#8E8E93] font-mono" placeholder="Optional" />
                                    </div>
                                    <div className="p-3.5 border-b border-black/5 flex items-center">
                                        <label className="w-24 text-[17px] text-[#1C1C1E]">Lng</label>
                                        <input type="number" step="any" value={lng} onChange={e => setLng(e.target.value)} className="flex-1 bg-transparent focus:outline-none text-[17px] text-[#8E8E93] font-mono" placeholder="Optional" />
                                    </div>
                                    <div className="p-3.5 flex flex-col">
                                        <input type="url" value={mapLink} onChange={handleMapLinkChange} className="w-full bg-transparent focus:outline-none text-[15px] text-[#8E8E93] mb-1" placeholder="Paste Maps Link (Auto-fills GPS)" />
                                    </div>
                                </div>

                                <div className="bg-[var(--ios-glass)] backdrop-blur-2xl rounded-[20px] shadow-[0_2px_10px_rgba(0,0,0,0.02)] border border-white/60 p-4">
                                    <div className="flex justify-between items-center mb-3">
                                        <span className="text-[17px] text-[#1C1C1E]">Photos</span>
                                        <label className="text-[15px] font-medium text-[#007AFF] cursor-pointer active:opacity-50">
                                            Add Photo
                                            <input type="file" multiple accept="image/*" className="hidden" onChange={handleFiles} disabled={isSaving} />
                                        </label>
                                    </div>
                                    {photos.length > 0 ? (
                                        <div className="flex overflow-x-auto space-x-3 pb-2 scrollbar-hide snap-x">
                                            {photos.map((p, i) => (
                                                <div key={i} className="relative w-20 h-20 flex-shrink-0 snap-start rounded-[14px] overflow-hidden">
                                                    <img src={p} className="w-full h-full object-cover" alt="Preview" />
                                                    <button type="button" onClick={() => removePhoto(i)} className="absolute top-1 right-1 bg-black/50 text-white w-6 h-6 rounded-full flex items-center justify-center text-[10px]"><i className="fa-solid fa-xmark"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <p className="text-[13px] text-[#8E8E93]">No photos added.</p>
                                    )}
                                </div>

                                <button type="submit" disabled={!user || isSaving} className="w-full py-3.5 bg-[#007AFF] disabled:opacity-50 text-white font-semibold text-[17px] rounded-[14px] active:scale-[0.98] transition-transform">
                                    {isSaving ? <i className="fa-solid fa-spinner fa-spin"></i> : editId ? 'Save Changes' : 'Add Location'}
                                </button>
                            </form>
                        )}

                        {/* ========================================================= */}
                        {/* MAIN VIEWS - ITINERARY PLANNER                            */}
                        {/* ========================================================= */}

                        {/* VIEW: ITINERARIES LIST */}
                        {view === 'itineraries' && (
                            <div className="pb-6">
                                {itineraries.length === 0 ? (
                                    <div className="text-center p-10 mt-10">
                                        <i className="fa-regular fa-calendar text-5xl text-[#8E8E93] mb-4 opacity-50"></i>
                                        <h3 className="text-lg font-semibold text-[#1C1C1E] mb-1">No Itineraries</h3>
                                        <p className="text-[#8E8E93] text-sm">Tap the + button to plan a day.</p>
                                    </div>
                                ) : (
                                    <div className="bg-[var(--ios-glass)] backdrop-blur-2xl rounded-[20px] overflow-hidden shadow-[0_2px_10px_rgba(0,0,0,0.02)] border border-white/60">
                                        {itineraries.map((itin, index) => (
                                            <div key={itin.id} className={`flex items-center justify-between p-3 pl-4 cursor-pointer active:bg-black/5 transition-colors ${index !== itineraries.length - 1 ? 'border-b border-black/5' : ''}`} onClick={() => { setActiveItinId(itin.id); setView('itinerary_detail'); }}>
                                                <div className="flex-1 pr-4">
                                                    <h3 className="text-[17px] font-normal text-[#1C1C1E]">{itin.title}</h3>
                                                    <p className="text-[13px] text-[#8E8E93] mt-0.5">{itin.date || 'No Date'} &bull; {(itin.items || []).length} events</p>
                                                </div>
                                                <div className="flex items-center space-x-3 shrink-0">
                                                    <button onClick={(e) => { e.stopPropagation(); deleteItinerary(itin.id); }} className="text-[#FF3B30] active:opacity-50 p-2"><i className="fa-solid fa-trash-can"></i></button>
                                                    <i className="fa-solid fa-chevron-right text-[#C7C7CC] text-sm"></i>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* VIEW: ITINERARY DETAIL (TIMESHEET) */}
                        {view === 'itinerary_detail' && (
                            <div className="pb-6">
                                {(() => {
                                    const itin = itineraries.find(i => i.id === activeItinId);
                                    if (!itin) return null;
                                    return (
                                        <>
                                            <div className="text-center mb-6 px-4">
                                                <h2 className="text-[22px] font-semibold text-[#1C1C1E]">{itin.title}</h2>
                                                {itin.date && <p className="text-[15px] text-[#8E8E93]">{itin.date}</p>}
                                                <button onClick={() => openItineraryForm(itin)} className="mt-2 text-[13px] text-[#007AFF] font-medium bg-[#007AFF]/10 px-3 py-1 rounded-full">Edit Info</button>
                                            </div>
                                            
                                            {(itin.items || []).length === 0 ? (
                                                <div className="text-center p-8 bg-[var(--ios-glass)] backdrop-blur-2xl rounded-[20px] border border-white/60">
                                                    <p className="text-[#8E8E93] text-[15px]">Timesheet is empty.</p>
                                                </div>
                                            ) : (
                                                <div className="relative before:absolute before:inset-0 before:ml-[34px] before:-translate-x-px before:h-full before:w-0.5 before:bg-[#C7C7CC]/50 space-y-4">
                                                    {(itin.items || []).map((item) => {
                                                        const loc = locations.find(l => l.id === item.locationId);
                                                        return (
                                                            <div key={item.id} className="relative z-10 flex items-start pl-4">
                                                                <div className="w-14 shrink-0 pt-1">
                                                                    <div className="text-[13px] font-bold text-[#1C1C1E]">{item.time}</div>
                                                                </div>
                                                                <div className="w-3 h-3 rounded-full border-2 border-white bg-[#007AFF] shadow-sm shrink-0 mt-1.5 ml-1 relative z-20"></div>
                                                                
                                                                <div className="ml-4 flex-1 bg-[var(--ios-glass)] backdrop-blur-2xl p-3.5 rounded-[16px] shadow-[0_2px_8px_rgba(0,0,0,0.04)] border border-white/60">
                                                                    <div className="flex justify-between items-start mb-1">
                                                                        <span className="text-[11px] font-bold text-[#8E8E93] uppercase tracking-wider">{item.label}</span>
                                                                        <div className="flex space-x-2">
                                                                            <button onClick={() => openItineraryItemForm(item)} className="text-[#8E8E93] active:opacity-50"><i className="fa-solid fa-pen text-[10px]"></i></button>
                                                                            <button onClick={() => deleteItineraryItem(item.id)} className="text-[#FF3B30] active:opacity-50"><i className="fa-solid fa-xmark text-sm"></i></button>
                                                                        </div>
                                                                    </div>
                                                                    
                                                                    {loc ? (
                                                                        <div className="flex items-center space-x-3 mt-2 active:opacity-50 cursor-pointer" onClick={() => { setLocationReturnView('itinerary_detail'); setSelectedLocId(loc.id); setView('location_detail'); }}>
                                                                            {Array.isArray(loc.photos) && loc.photos.length > 0 ? (
                                                                                <img src={loc.photos} className="w-10 h-10 rounded-[10px] object-cover" alt="Preview" />
                                                                            ) : (
                                                                                <div className="w-10 h-10 rounded-[10px] bg-black/5 flex items-center justify-center text-[#8E8E93]"><i className="fa-solid fa-map-pin"></i></div>
                                                                            )}
                                                                            <div className="flex-1">
                                                                                <p className="font-semibold text-[#1C1C1E] text-[15px] leading-tight">{loc.name}</p>
                                                                                <p className="text-[12px] text-[#8E8E93] truncate">{loc.category}</p>
                                                                            </div>
                                                                            <i className="fa-solid fa-chevron-right text-[#C7C7CC] text-[10px]"></i>
                                                                        </div>
                                                                    ) : item.locationId ? (
                                                                        <p className="text-[12px] text-[#FF3B30] italic mt-1">Location deleted</p>
                                                                    ) : null}
                                                                    
                                                                    {item.notes && <p className="text-[13px] text-[#1C1C1E] mt-2 pt-2 border-t border-black/5">{item.notes}</p>}
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            )}
                                        </>
                                    );
                                })()}
                            </div>
                        )}

                        {/* VIEW: ITINERARY DAY FORM */}
                        {view === 'itinerary_form' && (
                            <form onSubmit={handleSaveItinerary} className="bg-[var(--ios-glass)] backdrop-blur-2xl p-5 rounded-[24px] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white/60 space-y-4 pb-6">
                                {saveError && (
                                    <div className="p-3 bg-[#FF3B30]/10 text-[#FF3B30] text-[13px] rounded-[10px]">{saveError}</div>
                                )}
                                <div>
                                    <label className="block text-[13px] font-medium text-[#8E8E93] mb-1.5 uppercase ml-1">Title</label>
                                    <input type="text" required value={itinTitle} onChange={e => setItinTitle(e.target.value)} className="w-full px-4 py-3.5 ios-input focus:outline-none text-[17px]" placeholder="Day 1: Tour" />
                                </div>
                                <div>
                                    <label className="block text-[13px] font-medium text-[#8E8E93] mb-1.5 uppercase ml-1">Date</label>
                                    <input type="date" value={itinDate} onChange={e => setItinDate(e.target.value)} className="w-full px-4 py-3.5 ios-input focus:outline-none text-[17px]" />
                                </div>
                                <button type="submit" disabled={isSaving} className="w-full mt-4 py-3.5 bg-[#007AFF] disabled:opacity-50 text-white font-semibold text-[17px] rounded-[14px] active:scale-[0.98] transition-transform">
                                    {isSaving ? <i className="fa-solid fa-spinner fa-spin"></i> : 'Save Day'}
                                </button>
                            </form>
                        )}

                        {/* VIEW: SELECT LOCATION FOR ITINERARY */}
                        {view === 'itinerary_select_location' && (
                            <div className="space-y-4 pb-6">
                                <div className="relative">
                                    <i className="fa-solid fa-magnifying-glass absolute left-3.5 top-3.5 text-[#8E8E93]"></i>
                                    <input 
                                        type="text" placeholder="Search places..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)}
                                        className="w-full pl-10 pr-4 py-3 ios-input focus:outline-none text-[17px]"
                                    />
                                </div>

                                <button onClick={() => handleSelectLocationForItinerary('')} className="w-full py-3.5 bg-[#007AFF]/10 text-[#007AFF] font-medium text-[15px] rounded-[14px] active:bg-[#007AFF]/20 transition-colors">
                                    Skip Location
                                </button>
                                
                                {filteredAndGroupedLocations.sortedCategories.length === 0 ? (
                                    <div className="text-center p-8 text-[#8E8E93]">No places found.</div>
                                ) : (
                                    filteredAndGroupedLocations.sortedCategories.map(cat => (
                                        <div key={cat} className="space-y-2 pt-2">
                                            <h3 className="text-[13px] font-semibold text-[#8E8E93] uppercase tracking-wider pl-4">{cat}</h3>
                                            <div className="bg-[var(--ios-glass)] backdrop-blur-2xl rounded-[20px] overflow-hidden shadow-[0_2px_10px_rgba(0,0,0,0.02)] border border-white/60">
                                                {filteredAndGroupedLocations.grouped[cat].map((loc, index, arr) => (
                                                    <div 
                                                        key={loc.id} 
                                                        className={`flex items-center justify-between p-3 pl-4 cursor-pointer active:bg-black/5 transition-colors ${index !== arr.length - 1 ? 'border-b border-black/5' : ''}`}
                                                        onClick={() => handleSelectLocationForItinerary(loc.id)}
                                                    >
                                                        <div className="flex items-center flex-1 overflow-hidden">
                                                            {Array.isArray(loc.photos) && loc.photos.length > 0 ? (
                                                                <img src={loc.photos} className="w-10 h-10 rounded-[10px] object-cover shrink-0 mr-3" alt="" />
                                                            ) : (
                                                                <div className="w-10 h-10 rounded-[10px] bg-black/5 flex items-center justify-center text-[#8E8E93] shrink-0 mr-3"><i className="fa-solid fa-map-pin"></i></div>
                                                            )}
                                                            <div className="truncate pr-2">
                                                                <h4 className="text-[15px] font-medium text-[#1C1C1E] truncate">{loc.name}</h4>
                                                                <p className="text-[12px] text-[#8E8E93] truncate">{loc.city || 'City'}</p>
                                                            </div>
                                                        </div>
                                                        <span className="text-[12px] text-[#8E8E93] shrink-0">{formatDistance(loc.currentDistance)}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        {/* VIEW: ITINERARY ITEM FORM */}
                        {view === 'itinerary_item_form' && (
                            <form onSubmit={handleSaveItineraryItem} className="bg-[var(--ios-glass)] backdrop-blur-2xl p-5 rounded-[24px] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white/60 space-y-4 pb-6">
                                {saveError && <div className="p-3 bg-[#FF3B30]/10 text-[#FF3B30] text-[13px] rounded-[10px]">{saveError}</div>}
                                
                                <div>
                                    <div className="flex justify-between items-end mb-1.5 ml-1">
                                        <label className="block text-[13px] font-medium text-[#8E8E93] uppercase">Location</label>
                                        {!editItinItemId && <button type="button" onClick={() => setView('itinerary_select_location')} className="text-[#007AFF] text-[13px]">Change</button>}
                                    </div>
                                    <div className="w-full px-4 py-3.5 ios-input text-[17px] text-[#1C1C1E] truncate">
                                        {itinItemLocId ? (locations.find(l => l.id === itinItemLocId)?.name || 'Unknown') : 'None'}
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-3">
                                    <div>
                                        <label className="block text-[13px] font-medium text-[#8E8E93] mb-1.5 uppercase ml-1">Time</label>
                                        <input type="time" required value={itinItemTime} onChange={e => setItinItemTime(e.target.value)} className="w-full px-4 py-3.5 ios-input focus:outline-none text-[17px]" />
                                    </div>
                                    <div>
                                        <label className="block text-[13px] font-medium text-[#8E8E93] mb-1.5 uppercase ml-1">Type</label>
                                        <select value={itinItemLabel} onChange={e => setItinItemLabel(e.target.value)} className="w-full px-4 py-3.5 ios-input focus:outline-none text-[15px] appearance-none">
                                            <option value="Breakfast">Breakfast</option>
                                            <option value="Lunch">Lunch</option>
                                            <option value="Dinner">Dinner</option>
                                            <option value="Tourist Attraction">Attraction</option>
                                            <option value="Other">Other</option>
                                        </select>
                                    </div>
                                </div>
                                
                                <div>
                                    <label className="block text-[13px] font-medium text-[#8E8E93] mb-1.5 uppercase ml-1">Notes</label>
                                    <textarea value={itinItemNotes} onChange={e => setItinItemNotes(e.target.value)} rows="2" className="w-full px-4 py-3 ios-input focus:outline-none text-[17px]" placeholder="Optional" />
                                </div>
                                <button type="submit" disabled={isSaving} className="w-full mt-4 py-3.5 bg-[#007AFF] disabled:opacity-50 text-white font-semibold text-[17px] rounded-[14px] active:scale-[0.98] transition-transform">
                                    {isSaving ? <i className="fa-solid fa-spinner fa-spin"></i> : 'Save Event'}
                                </button>
                            </form>
                        )}
                    </main>

                    {/* NATIVE iOS BOTTOM TAB BAR */}
                    <div className="fixed bottom-0 left-0 right-0 z-40 bg-[var(--ios-glass)] backdrop-blur-2xl border-t border-black/5 safe-bottom">
                        <div className="max-w-3xl mx-auto flex justify-around items-center h-14">
                            <button 
                                onClick={() => setView('cities')} 
                                className={`flex flex-col items-center justify-center w-full h-full pt-1 ${activeTab === 'places' ? 'text-[#1C1C1E]' : 'text-[#999999]'}`}
                            >
                                <i className="fa-solid fa-map-location-dot text-[20px] mb-0.5"></i>
                                <span className="text-[10px] font-medium tracking-wide">Places</span>
                            </button>
                            <button 
                                onClick={() => setView('notifications')} 
                                className={`flex flex-col items-center justify-center w-full h-full pt-1 relative ${activeTab === 'notifications' ? 'text-[#1C1C1E]' : 'text-[#999999]'}`}
                            >
                                <div className="relative">
                                    <i className={unreadCount > 0 ? "fa-solid fa-bell text-[20px] mb-0.5" : "fa-regular fa-bell text-[20px] mb-0.5"}></i>
                                    {unreadCount > 0 && (
                                        <span className="absolute -top-1.5 -right-2 bg-[#FF3B30] text-white text-[10px] font-bold px-1 rounded-full min-w-[16px] text-center border-2 border-[var(--ios-glass)]">
                                            {unreadCount}
                                        </span>
                                    )}
                                </div>
                                <span className="text-[10px] font-medium tracking-wide mt-0.5">Alerts</span>
                            </button>
                            <button 
                                onClick={() => setView('itineraries')} 
                                className={`flex flex-col items-center justify-center w-full h-full pt-1 ${activeTab === 'itineraries' ? 'text-[#1C1C1E]' : 'text-[#999999]'}`}
                            >
                                <i className="fa-solid fa-calendar-day text-[20px] mb-0.5"></i>
                                <span className="text-[10px] font-medium tracking-wide">Itineraries</span>
                            </button>
                        </div>
                    </div>
                    
                    {/* CUSTOM iOS CONFIRM MODAL */}
                    {confirmDialog && (
                        <div className="fixed inset-0 z-50 bg-black/40 flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in" style={{ zIndex: 130 }}>
                            <div className="bg-[rgba(242,242,247,0.9)] backdrop-blur-3xl rounded-[14px] w-[270px] flex flex-col overflow-hidden animate-slide-in shadow-xl" style={{animationDuration: '0.2s'}}>
                                <div className="p-4 text-center">
                                    <h3 className="text-[17px] font-semibold text-[#1C1C1E] mb-1">Confirm</h3>
                                    <p className="text-[13px] text-[#1C1C1E]">{confirmDialog.message}</p>
                                </div>
                                <div className="flex border-t border-[#3C3C43]/20">
                                    <button onClick={() => setConfirmDialog(null)} className="flex-1 py-2.5 text-[17px] text-[#007AFF] font-normal border-r border-[#3C3C43]/20 active:bg-black/5 transition-colors">Cancel</button>
                                    <button onClick={() => { confirmDialog.onConfirm(); setConfirmDialog(null); }} className="flex-1 py-2.5 text-[17px] text-[#FF3B30] font-semibold active:bg-black/5 transition-colors">Delete</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
