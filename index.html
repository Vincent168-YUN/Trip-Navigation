<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- This meta tag ensures the app looks native on iOS and Android without awkward zooming -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vincent's Travelling System</title>
    
    <!-- Apple/iOS Web App settings for adding to Home Screen -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Globe_icon.svg/1024px-Globe_icon.svg.png">

    <!-- Google Fonts for Art/Editorial Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for in-browser JSX compiling -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root {
            --ios-accent: #C68E58; /* Brushed Copper / Premium Amber */
            --ios-green: #32D74B; 
            --ios-red: #FF3B30; 
            --ios-bg: #F2F4F7; /* Bright, clean off-white */
            --ios-text: #1D1D1F; /* Deep Charcoal/Titanium Black */
            --ios-gray: #8E8E93; /* Classic Apple Slate Gray */
        }
        body { 
            -webkit-tap-highlight-color: transparent; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            color-scheme: light;
        }
        
        /* iOS Safe Area paddings */
        .safe-top { padding-top: env(safe-area-inset-top, 44px); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 34px); }
        .safe-pb-nav { padding-bottom: calc(env(safe-area-inset-bottom, 34px) + 100px); }
        
        /* Hide scrollbar for photo carousel but keep functionality */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-slide-in { animation: slideIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }

        /* Art Design Font */
        .font-art { font-family: 'Playfair Display', serif; }

        /* --- PREMIUM LIGHT GLASS UI UTILITIES --- */
        
        /* Liquid Blob Animations */
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 12s infinite alternate ease-in-out; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }

        /* Light Frosted Crystal Panels */
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.04), inset 0 1px 0 rgba(255,255,255,1);
            border-radius: 28px;
        }
        
        /* Floating Light Glass Pill (Nav) */
        .glass-pill {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 12px 40px -10px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,1);
            border-radius: 9999px;
        }

        /* Light Glass Header */
        .glass-header {
            background: linear-gradient(to bottom, rgba(242, 244, 247, 0.95) 0%, rgba(242, 244, 247, 0) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
        }

        /* Light Glass Inputs */
        .glass-input {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 16px;
            transition: all 0.2s ease;
            color: #1D1D1F;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: var(--ios-accent);
            outline: none;
            box-shadow: 0 4px 16px rgba(198, 142, 88, 0.2);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo, useRef } = React;

        // --- FIREBASE SETUP ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyDUdgQdMPAUVHSIHmbfIpSEYwQNWdFM578",
                authDomain: "trip-navigation-b0f21.firebaseapp.com",
                projectId: "trip-navigation-b0f21",
                storageBucket: "trip-navigation-b0f21.firebasestorage.app",
                messagingSenderId: "841186283877",
                appId: "1:841186283877:web:7551e6f5f33dfe6d3e118c"
            };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'my-wander-tracker-app';

        // Haversine formula
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const numLat1 = parseFloat(lat1);
            const numLon1 = parseFloat(lon1);
            const numLat2 = parseFloat(lat2);
            const numLon2 = parseFloat(lon2);
            
            if (isNaN(numLat1) || isNaN(numLon1) || isNaN(numLat2) || isNaN(numLon2)) return null;
            
            const R = 6371; 
            const dLat = (numLat2 - numLat1) * (Math.PI / 180);
            const dLon = (numLon2 - numLon1) * (Math.PI / 180);
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(numLat1 * (Math.PI / 180)) * Math.cos(numLat2 * (Math.PI / 180)) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function formatDistance(distInKm) {
            if (distInKm == null || isNaN(distInKm)) return "Distance unknown";
            if (distInKm < 1) return `${Math.round(distInKm * 1000)}m`;
            return `${Number(distInKm).toFixed(1)}km`;
        }

        function formatDuration(totalMinutes) {
            if (totalMinutes == null || isNaN(totalMinutes)) return "";
            totalMinutes = Math.ceil(totalMinutes);
            if (totalMinutes < 1) return "1 min";
            if (totalMinutes < 60) return `${totalMinutes} mins`;
            const hours = Math.floor(totalMinutes / 60);
            const mins = totalMinutes % 60;
            return mins > 0 ? `${hours}h ${mins}m` : `${hours}h`;
        }

        const getDistanceColor = (distInKm) => {
            if (distInKm == null || isNaN(distInKm)) return "text-[#8E8E93]";
            if (distInKm <= 1.0) return "text-[var(--ios-green)]";
            if (distInKm <= 10.0) return "text-[#FF9500]"; // iOS Orange
            return "text-[var(--ios-red)]";
        };

        const getDistanceBgColor = (distInKm) => {
            if (distInKm == null || isNaN(distInKm)) return "bg-[#8E8E93]/10 border-[#8E8E93]/20 text-[#8E8E93]";
            if (distInKm <= 1.0) return "bg-[var(--ios-green)]/10 border-[var(--ios-green)]/20 text-[var(--ios-green)]";
            if (distInKm <= 10.0) return "bg-[#FF9500]/10 border-[#FF9500]/20 text-[#FF9500]";
            return "bg-[var(--ios-red)]/10 border-[var(--ios-red)]/20 text-[var(--ios-red)]";
        };

        const fallbackImageSrc = "data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23e5e5ea'/%3E%3Cpath d='M35 40h30v20H35z' fill='none' stroke='%238e8e93' stroke-width='2'/%3E%3Ccircle cx='50' cy='50' r='4' fill='%238e8e93'/%3E%3C/svg%3E";
        const handleImgErr = (e) => {
            e.target.onerror = null;
            e.target.src = fallbackImageSrc;
        };

        const processNoteImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX = 800; // Smaller max size for inline notes to save DB space
                        let {width, height} = img;
                        if (width > height && width > MAX) { height *= MAX / width; width = MAX; }
                        else if (height > MAX) { width *= MAX / height; height = MAX; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6)); 
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        };

        const renderHTML = (html) => {
            if (!html) return { __html: '' };
            const hasHTML = /<[a-z][\s\S]*>/i.test(html);
            return { __html: hasHTML ? html : html.replace(/\n/g, '<br>') };
        };

        const RichEditor = React.memo(({ value, onChange, placeholder, disabled }) => {
            const editorRef = React.useRef(null);
            const isEditing = React.useRef(false);

            React.useEffect(() => {
                if (editorRef.current && !isEditing.current && editorRef.current.innerHTML !== value) {
                    editorRef.current.innerHTML = value || '';
                }
            }, [value]);

            const handleInput = () => {
                if (onChange && editorRef.current) {
                    onChange(editorRef.current.innerHTML);
                }
            };

            const handleFocus = () => { isEditing.current = true; };
            const handleBlur = () => { isEditing.current = false; handleInput(); };

            const handlePaste = async (e) => {
                const clipboardData = e.clipboardData;
                if (!clipboardData) return;

                let hasImage = false;
                for (let i = 0; i < clipboardData.items.length; i++) {
                    const item = clipboardData.items[i];
                    if (item.type.indexOf('image') !== -1) {
                        hasImage = true;
                        e.preventDefault();
                        const file = item.getAsFile();
                        const processedDataUrl = await processNoteImage(file);
                        const img = `<img src="${processedDataUrl}" style="max-width:100%; border-radius:12px; margin: 8px 0; box-shadow: 0 1px 2px rgba(0,0,0,0.1);" />`;
                        document.execCommand('insertHTML', false, img);
                        handleInput();
                    }
                }
                
                if (!hasImage) {
                    e.preventDefault();
                    const text = clipboardData.getData('text/plain');
                    const htmlText = text.replace(/\n/g, '<br>');
                    document.execCommand('insertHTML', false, htmlText);
                    handleInput();
                }
            };

            const handleInsertImage = async (e) => {
                const file = e.target.files;
                if (!file) return;
                const processedDataUrl = await processNoteImage(file);
                
                if (editorRef.current) {
                    editorRef.current.focus();
                    const img = `<br><img src="${processedDataUrl}" style="max-width:100%; border-radius:12px; margin: 8px 0; box-shadow: 0 1px 2px rgba(0,0,0,0.1);" /><br>`;
                    try {
                        const inserted = document.execCommand('insertHTML', false, img);
                        if (!inserted) editorRef.current.innerHTML += img;
                    } catch(err) {
                        editorRef.current.innerHTML += img;
                    }
                    handleInput();
                }
                e.target.value = null;
            };

            return (
                <div>
                    <div className="flex justify-between items-center mb-2">
                        <label className="block text-[12px] font-bold text-[#8E8E93] uppercase tracking-wide ml-1">Notes</label>
                        <label className={`text-[11px] font-bold bg-black/5 text-[#1D1D1F] px-2.5 py-1.5 rounded-md cursor-pointer active:scale-95 transition-transform ${disabled ? 'opacity-50 pointer-events-none' : ''}`}>
                            <i className="fa-solid fa-image mr-1"></i> Insert Photo
                            <input type="file" accept="image/*" className="hidden" onChange={handleInsertImage} disabled={disabled} />
                        </label>
                    </div>
                    <div
                        ref={editorRef}
                        contentEditable={!disabled}
                        onInput={handleInput}
                        onFocus={handleFocus}
                        onBlur={handleBlur}
                        onPaste={handlePaste}
                        className={`w-full glass-input p-4 text-[15px] font-medium min-h-[120px] outline-none bg-white/50 cursor-text empty:before:content-[attr(data-placeholder)] empty:before:text-[#8E8E93]/50 ${disabled ? 'opacity-50 pointer-events-none' : ''}`}
                        data-placeholder={placeholder}
                        style={{ whiteSpace: 'pre-wrap' }}
                    />
                </div>
            );
        });

        function App() {
            // --- STATE ---
            const [user, setUser] = useState(null);
            const [authError, setAuthError] = useState('');
            const [liveLocation, setLiveLocation] = useState(null);
            const [gpsAccuracy, setGpsAccuracy] = useState(null);
            const [geoError, setGeoError] = useState('');
            const [locations, setLocations] = useState([]);
            
            // Stores actual road distances and driving durations
            const [realRoutes, setRealRoutes] = useState({}); 
            
            // Itinerary State
            const [itineraries, setItineraries] = useState([]);
            const [activeItinId, setActiveItinId] = useState(null);
            
            // Itinerary Form State
            const [itinTitle, setItinTitle] = useState('');
            const [itinDate, setItinDate] = useState('');
            
            // Itinerary Item Form State
            const [editItinItemId, setEditItinItemId] = useState(null);
            const [itinItemTime, setItinItemTime] = useState('');
            const [itinItemLabel, setItinItemLabel] = useState('Tourist Attraction');
            const [itinItemLocId, setItinItemLocId] = useState('');
            const [itinItemNotes, setItinItemNotes] = useState('');
            
            // Split Bill Calculator State
            const [splitBillItem, setSplitBillItem] = useState(null);
            const [tempBillTotal, setTempBillTotal] = useState('');
            const [tempBillSplit, setTempBillSplit] = useState(1);
            
            // Search State
            const [searchQuery, setSearchQuery] = useState('');
            
            // Route Calculator State
            const [routePoints, setRoutePoints] = useState([]);
            const [routeCalculations, setRouteCalculations] = useState([]);

            // New Location Form Search State
            const [formSearchQuery, setFormSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [isSearching, setIsSearching] = useState(false);

            // Navigation & UI State
            const [view, setView] = useState('cities'); 
            const [activeCity, setActiveCity] = useState(null);
            const [activeCategory, setActiveCategory] = useState(null);
            const [selectedLocId, setSelectedLocId] = useState(null);
            const [previousView, setPreviousView] = useState('cities');
            const [locationReturnView, setLocationReturnView] = useState('category_list');
            
            // Derived active bottom tab
            const activeTab = view === 'notifications' ? 'notifications' : (view.includes('itinerar') ? 'itineraries' : (view.includes('route') ? 'route' : 'places'));

            // In-App Notification State
            const [notifications, setNotifications] = useState([]);
            const alertedLocsRef = useRef(new Set());
            
            // Photo Viewer State
            const [fullScreenPhoto, setFullScreenPhoto] = useState(null); 
            const fullScreenScrollRef = useRef(null);
            
            // Confirm Modal State
            const [confirmDialog, setConfirmDialog] = useState(null);
            
            // Form State
            const [editId, setEditId] = useState(null);
            const [name, setName] = useState('');
            const [comment, setComment] = useState('');
            
            const [editingCityName, setEditingCityName] = useState(null); 
            const [newCityName, setNewCityName] = useState(''); 
            const [cityPhotos, setCityPhotos] = useState([]); 
            
            const [city, setCity] = useState('');
            const [category, setCategory] = useState('');
            const [lat, setLat] = useState('');
            const [lng, setLng] = useState('');
            const [mapLink, setMapLink] = useState('');
            const [photos, setPhotos] = useState([]); 
            const [saveError, setSaveError] = useState('');
            const [isSaving, setIsSaving] = useState(false);
            
            // Detail View State
            const [showCoords, setShowCoords] = useState(false);

            // --- EFFECTS ---
            // 1. Authenticate
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {
                        setAuthError(err.message);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // 2. Fetch Data
            useEffect(() => {
                if (!user) return;
                const locationsRef = collection(db, 'artifacts', appId, 'public', 'data', 'locations');
                const unsubLocs = onSnapshot(locationsRef, (snapshot) => {
                    const fetchedLocations = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        let docPhotos = data.photos || [];
                        if (!data.photos && data.media && data.mediaType === 'image') {
                            docPhotos = [data.media];
                        }
                        
                        // Strict validation to completely eliminate corrupted data 
                        if (!Array.isArray(docPhotos)) {
                            docPhotos = typeof docPhotos === 'string' ? [docPhotos] : [];
                        }
                        docPhotos = docPhotos.filter(p => typeof p === 'string' && (p.startsWith('data:image/') || p.startsWith('http')));

                        fetchedLocations.push({ id: doc.id, ...data, photos: docPhotos });
                    });
                    setLocations(fetchedLocations);
                }, (error) => { console.error("Error fetching locations: ", error); });

                const itinerariesRef = collection(db, 'artifacts', appId, 'public', 'data', 'itineraries');
                const unsubItins = onSnapshot(itinerariesRef, (snapshot) => {
                    const fetchedItins = [];
                    snapshot.forEach(doc => {
                        fetchedItins.push({ id: doc.id, ...doc.data() });
                    });
                    fetchedItins.sort((a, b) => a.timestamp - b.timestamp);
                    setItineraries(fetchedItins);
                }, (error) => { console.error("Error fetching itineraries: ", error); });

                return () => { unsubLocs(); unsubItins(); };
            }, [user]);

            // 3. Track GPS
            useEffect(() => {
                if (!("geolocation" in navigator)) {
                    setGeoError("GPS not supported.");
                    return;
                }
                const watchId = navigator.geolocation.watchPosition(
                    (pos) => { 
                        setLiveLocation({ lat: pos.coords.latitude, lng: pos.coords.longitude }); 
                        setGpsAccuracy(pos.coords.accuracy);
                        setGeoError(''); 
                    },
                    (err) => { setGeoError("Using Mock Location"); setLiveLocation({ lat: 11.5564, lng: 104.9282 }); setGpsAccuracy(null); },
                    { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
                );
                return () => navigator.geolocation.clearWatch(watchId);
            }, []);

            // 4. Live Place Autocomplete Search
            useEffect(() => {
                const delayDebounceFn = setTimeout(() => {
                    if (formSearchQuery.trim().length > 2) {
                        setIsSearching(true);
                        
                        let url = `https://photon.komoot.io/api/?q=${encodeURIComponent(formSearchQuery)}&limit=6`;
                        if (liveLocation && liveLocation.lat && liveLocation.lng) {
                            url += `&lat=${liveLocation.lat}&lon=${liveLocation.lng}`;
                        }

                        fetch(url)
                            .then(res => res.json())
                            .then(data => {
                                setSearchResults(data.features || []);
                                setIsSearching(false);
                            })
                            .catch(err => {
                                console.error("Search error:", err);
                                setIsSearching(false);
                            });
                    } else {
                        searchResults.length > 0 && setSearchResults([]);
                    }
                }, 500);
                return () => clearTimeout(delayDebounceFn);
            }, [formSearchQuery, liveLocation]);

            // 5. Live Bulk Real Routing (OSRM Table API)
            useEffect(() => {
                if (!liveLocation || locations.length === 0) return;

                const validLocs = locations.filter(l => l.lat != null && l.lng != null && !l.isCityMarker);
                if (validLocs.length === 0) return;

                // Max 100 coordinates allowed by OSRM bulk API (1 source + 99 destinations)
                const locsToFetch = validLocs.slice(0, 99); 
                const coords = [
                    `${liveLocation.lng},${liveLocation.lat}`,
                    ...locsToFetch.map(l => `${l.lng},${l.lat}`)
                ].join(';');

                const fetchMatrix = async () => {
                    try {
                        const res = await fetch(`https://router.project-osrm.org/table/v1/driving/${coords}?sources=0&annotations=duration,distance`);
                        const data = await res.json();
                        
                        if (data.code === 'Ok' && data.durations && data.distances) {
                            const newRoutes = {};
                            const durations = data.durations;
                            const distances = data.distances;
                            
                            locsToFetch.forEach((loc, index) => {
                                const durationSec = durations[index + 1];
                                const distanceMet = distances[index + 1];
                                if (durationSec != null && distanceMet != null) {
                                    newRoutes[loc.id] = {
                                        distance: distanceMet / 1000, 
                                        duration: durationSec / 60
                                    };
                                }
                            });
                            setRealRoutes(newRoutes);
                        }
                    } catch (e) {
                        console.error("OSRM routing fetch error:", e);
                    }
                };

                const timeoutId = setTimeout(fetchMatrix, 2500);
                return () => clearTimeout(timeoutId);
            }, [liveLocation, locations]);

            // 6. Route Calculator Logic (A to B to C...)
            useEffect(() => {
                if (routePoints.length < 2) {
                    setRouteCalculations([]);
                    return;
                }
                let isCancelled = false;
                
                const fallbackCalc = () => {
                    if (isCancelled) return;
                    const calcs = [];
                    for (let i = 0; i < routePoints.length - 1; i++) {
                        const dist = calculateDistance(routePoints[i].lat, routePoints[i].lng, routePoints[i+1].lat, routePoints[i+1].lng);
                        calcs.push({ distance: dist, duration: dist ? dist * 3.5 : null, isReal: false });
                    }
                    setRouteCalculations(calcs);
                };

                const fetchRoute = async () => {
                    const coords = routePoints.map(p => `${p.lng},${p.lat}`).join(';');
                    try {
                        const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${coords}?overview=false`);
                        const data = await res.json();
                        if (isCancelled) return;
                        
                        if (data.code === 'Ok' && data.routes && data.routes.length > 0) {

                if (!input) return false;
                
                const exactPinMatch = input.match(/!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/);
                const atMatch = input.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
                const queryMatch = input.match(/[?&](?:q|ll)=([-+]?\d+\.\d+),([-+]?\d+\.\d+)/);
                const placeMatch = input.match(/place\/.*@(-?\d+\.\d+),(-?\d+\.\d+)/) || input.match(/place\/[^\/]+\/([-+]?\d+\.\d+),([-+]?\d+\.\d+)/);
                
                const rawMatch = input.match(/([-+]?\d{1,2}\.\d+)[^\d-]+([-+]?\d{1,3}\.\d+)/);

                const match = exactPinMatch || atMatch || queryMatch || placeMatch || rawMatch;
                
                if (match && match.length >= 3) {

                            const canvas = document.createElement('canvas');
                            const MAX = 2048; let {width, height} = img;
                            if (width > height && width > MAX) { height *= MAX / width; width = MAX; }
                            else if (height > MAX) { width *= MAX / height; height = MAX; }
                            canvas.width = width; canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            resolve(canvas.toDataURL('image/jpeg', 0.85)); 
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });

                    let dur = null;
                    let isReal = false;
                    
                    if (refLoc && refLoc.lat != null && refLoc.lng != null && loc.lat != null && loc.lng != null) {
                        if (refLoc === liveLocation && realRoutes[loc.id]) {
                            dist = realRoutes[loc.id].distance;
                            dur = realRoutes[loc.id].duration;
                            isReal = true;
                        } else {
                            dist = calculateDistance(refLoc.lat, refLoc.lng, loc.lat, loc.lng);
                            dur = dist ? dist * 3.5 : null; // Estimate ~3.5 mins per km for straight-line fallback
                        }
                    }
                    return { ...loc, currentDistance: dist, currentDuration: dur, isRealRoute: isReal };
                });

                const term = searchQuery.toLowerCase();
                const filtered = list.filter(loc => 
                    (loc.name || '').toLowerCase().includes(term) || 
                    (loc.category || '').toLowerCase().includes(term) || 
                    (loc.city || '').toLowerCase().includes(term)
                );

                const grouped = {};
                filtered.forEach(loc => {
                    const cat = loc.category || 'Uncategorized';
                    if (!grouped[cat]) grouped[cat] = [];
                    grouped[cat].push(loc);
                });

                // Sort items inside each category by distance
                Object.keys(grouped).forEach(cat => {
                    grouped[cat].sort((a, b) => (a.currentDistance != null ? a.currentDistance : 99999) - (b.currentDistance != null ? b.currentDistance : 99999));
                });

                // Sort categories based on the closest item within them
                const sortedCategories = Object.keys(grouped).sort((catA, catB) => {
                    const minDistA = grouped[catA].currentDistance != null ? grouped[catA].currentDistance : 99999;
                    const minDistB = grouped[catB].currentDistance != null ? grouped[catB].currentDistance : 99999;
                    return minDistA - minDistB;
                });

                return { grouped, sortedCategories, refLocName };
            }, [locations, liveLocation, realRoutes, routePoints, searchQuery]);
            
            const locDetail = view === 'location_detail' && selectedLocId ? locations.find(l => l.id === selectedLocId) : null;
                
            useEffect(() => { if (view === 'location_detail' && selectedLocId && !locDetail && locations.length > 0) handleBack(); }, [locations, locDetail, view, selectedLocId]);
            
            // Reset coordinate toggle when opening a new location
            useEffect(() => { setShowCoords(false); }, [selectedLocId]);

            // HELPER: iOS Native Header Title
            const getHeaderTitle = () => {
                if (view === 'cities') return ""; 
                if (view === 'city_form') return editingCityName ? 'Edit City' : 'Add City';
                if (view === 'categories') return activeCity;
                if (view === 'category_list') return activeCategory;
                if (view === 'location_detail') return 'Details';
                if (view === 'notifications') return 'Radar';
                if (view === 'itineraries') return 'Itineraries';
                if (view === 'itinerary_detail') return 'Timesheet';
                if (view === 'itinerary_form') return editId ? 'Edit Day' : 'Plan a Day';
                if (view === 'itinerary_select_location') return 'Select Location';
                if (view === 'split_bill') return 'Split Bill';
                if (view === 'route_calculator') return 'Distance Calculator';
                if (view === 'route_select_location') return 'Select Stop';
                if (editId || editItinItemId) return 'Edit Item';
                return 'Create Item';
            };

            const canShowAddButton = ['cities', 'categories', 'category_list', 'itineraries', 'itinerary_detail'].includes(view);
            const unreadCount = notifications.filter(n => !n.read).length;

            // --- RENDER VIEWS ---
            return (
                <div className="min-h-screen relative flex flex-col selection:bg-[var(--ios-accent)]/20">
                    
                    {/* LIQUID GRADIENT BACKGROUND - BRIGHT PREMIUM */}
                    <div className="fixed inset-0 z-[-1] overflow-hidden bg-[var(--ios-bg)]">
                        <div className="absolute top-[-10%] left-[-10%] w-[60vw] h-[60vw] rounded-full bg-gradient-to-tr from-[#C68E58]/30 to-transparent filter blur-[80px] animate-blob"></div>
                        <div className="absolute top-[20%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-gradient-to-bl from-slate-400/30 to-transparent filter blur-[80px] animate-blob animation-delay-2000"></div>
                        <div className="absolute bottom-[-10%] left-[10%] w-[60vw] h-[60vw] rounded-full bg-gradient-to-tr from-stone-400/30 to-transparent filter blur-[80px] animate-blob animation-delay-4000"></div>
                    </div>

                    {/* FULL SCREEN PHOTO VIEWER PAGE (Always dark for media viewing) */}
                    {view === 'photo_viewer' && fullScreenPhoto && (
                        <div className="fixed inset-0 z-50 bg-black/95 backdrop-blur-3xl flex flex-col animate-slide-in" style={{ zIndex: 120 }}>
                            {/* Overlay Header with distinctly visible Back Button */}
                            <div className="absolute top-0 left-0 right-0 z-50 flex items-center px-4 pt-[calc(env(safe-area-inset-top,44px)+16px)] pb-6 bg-gradient-to-b from-black/80 to-transparent pointer-events-none">
                                <button onClick={handleBack} className="text-white px-6 py-3 rounded-full bg-black/40 hover:bg-black/60 border border-white/30 backdrop-blur-xl flex items-center transition-all pointer-events-auto active:scale-95 shadow-2xl">
                                    <i className="fa-solid fa-chevron-left text-[18px] mr-2.5"></i>
                                    <span className="text-[17px] font-bold tracking-wide">Back</span>
                                </button>
                            </div>
                            
                            {/* Scrollable Photos */}
                            <div ref={fullScreenScrollRef} className="absolute inset-0 w-full h-full flex overflow-x-auto snap-x snap-mandatory scrollbar-hide items-center z-0">
                                {fullScreenPhoto.photos.map((p, idx) => (
                                    <div key={idx} className="w-full h-full flex-shrink-0 snap-center flex items-center justify-center p-4">
                                        <img src={p} className="max-w-full max-h-[85vh] object-contain rounded-[20px] shadow-2xl" alt={`Photo ${idx + 1}`} onError={handleImgErr} />
                                    </div>
                                ))}
                            </div>
                            
                            {/* Pagination Indicator */}
                            {fullScreenPhoto.photos.length > 1 && (
                                <div className="absolute bottom-12 left-0 right-0 flex justify-center pointer-events-none safe-bottom z-50">
                                    <div className="bg-black/40 backdrop-blur-3xl border border-white/30 rounded-full px-5 py-2 text-white text-[13px] font-bold tracking-wide shadow-lg">
                                        Swipe for more
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* LIQUID GLASS HEADER - REDESIGNED FOR MAX TOUCHABILITY */}
                    <header className="fixed top-0 left-0 right-0 z-40 safe-top glass-header h-28 pointer-events-none"></header>
                    <header className="fixed top-0 left-0 right-0 z-40 safe-top h-20">
                        <div className="max-w-3xl mx-auto px-4 h-full flex items-center justify-center relative">
                            {/* Left: Back Button or GPS */}
                            <div className="absolute left-4 z-20 flex items-center">
                                {view !== 'cities' && view !== 'itineraries' && view !== 'notifications' ? (
                                    <button onClick={handleBack} className="h-12 px-5 rounded-full bg-white/80 backdrop-blur-3xl border border-white shadow-[0_4px_20px_rgba(0,0,0,0.08)] flex items-center justify-center text-[#1D1D1F] active:scale-95 transition-transform space-x-2">
                                        <i className="fa-solid fa-chevron-left text-[15px]"></i>
                                        <span className="text-[16px] font-bold tracking-wide">Back</span>
                                    </button>
                                ) : (
                                    <div className="h-12 px-5 rounded-full bg-white/80 backdrop-blur-3xl border border-white shadow-[0_4px_20px_rgba(0,0,0,0.08)] flex items-center justify-center space-x-2.5">
                                        {geoError ? (
                                            <i className="fa-solid fa-location-crosshairs text-[var(--ios-red)] text-sm" title={geoError}></i>
                                        ) : liveLocation ? (
                                            <div className="flex items-center space-x-2" title={gpsAccuracy ? `Accuracy: ±${Math.round(gpsAccuracy)}m` : 'GPS Active'}>
                                                <span className="relative flex h-2.5 w-2.5">
                                                    <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-[var(--ios-green)] opacity-75"></span>
                                                    <span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-[var(--ios-green)]"></span>
                                                </span>
                                                <span className="text-[13px] font-bold text-[#1D1D1F] tracking-wide">
                                                    {gpsAccuracy ? `±${Math.round(gpsAccuracy)}m` : 'GPS'}
                                                </span>
                                            </div>
                                        ) : <i className="fa-solid fa-spinner fa-spin text-[#8E8E93] text-sm"></i>}
                                    </div>
                                )}
                            </div>

                            {/* Center: Title */}
                            <div className="w-full text-center px-32 pointer-events-none z-10">
                                <h1 className="text-[17px] font-bold text-[#1D1D1F] tracking-wide truncate">
                                    {getHeaderTitle()}
                                </h1>
                            </div>

                            {/* Right: Add Button */}
                            <div className="absolute right-4 z-20 flex items-center">
                                {canShowAddButton && (
                                    <button 
                                        onClick={() => {
                                            if (view === 'itineraries') openItineraryForm();
                                            else if (view === 'itinerary_detail') openItineraryItemForm();
                                            else if (view === 'cities') openCityForm();
                                            else openForm();
                                        }}
                                        className="h-12 px-5 rounded-full bg-[#1D1D1F] backdrop-blur-3xl border border-[#1D1D1F] shadow-[0_8px_20px_rgba(0,0,0,0.15)] flex items-center justify-center text-white active:scale-95 transition-transform space-x-2"
                                    >
                                        <span className="text-[16px] font-bold tracking-wide">Add</span>
                                        <i className="fa-solid fa-plus text-[15px]"></i>
                                    </button>
                                )}
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 w-full max-w-3xl mx-auto px-5 safe-pb-nav pt-[env(safe-area-inset-top,44px)] mt-24 animate-slide-in relative z-10">
                        
                        {/* ========================================================= */}
                        {/* MAIN VIEWS - LOCATIONS / PLACES                           */}
                        {/* ========================================================= */}

                        {/* VIEW: NOTIFICATIONS LIST */}
                        {view === 'notifications' && (
                            <div className="pb-6 space-y-4">
                                {notifications.length === 0 ? (
                                    <div className="glass-panel flex flex-col items-center justify-center py-16 px-6 text-center mt-4">
                                        <div className="w-16 h-16 rounded-full bg-black/5 flex items-center justify-center mb-4">
                                            <i className="fa-regular fa-bell text-2xl text-[#8E8E93]"></i>
                                        </div>
                                        <h3 className="text-[18px] font-bold text-[#1D1D1F] mb-1">Clear Radar</h3>
                                        <p className="text-[#8E8E93] text-[14px] font-medium">No saved locations within 1km.</p>
                                    </div>
                                ) : (
                                    notifications.map((notif) => (
                                        <div 
                                            key={notif.id} 
                                            className={`glass-panel p-4 flex items-center justify-between cursor-pointer active:scale-[0.98] transition-transform ${!notif.read ? 'border-[var(--ios-accent)] shadow-[0_4px_20px_rgba(198,142,88,0.2)]' : ''}`}
                                            onClick={() => {
                                                setNotifications(prev => prev.map(n => n.id === notif.id ? { ...n, read: true } : n));
                                                setLocationReturnView('notifications');
                                                setSelectedLocId(notif.locId);
                                                setView('location_detail');
                                            }}
                                        >
                                            <div className="flex items-center flex-1 min-w-0">
                                                {Array.isArray(notif.photos) && notif.photos.length > 0 ? (
                                                    <img src={notif.photos} className="w-14 h-14 rounded-[16px] object-cover shrink-0 mr-4 shadow-sm border border-white/60 bg-[#e5e5ea]" alt="" onError={handleImgErr} />
                                                ) : (
                                                    <div className="w-14 h-14 rounded-[16px] bg-gradient-to-br from-[#1D1D1F] to-[#434343] flex items-center justify-center text-white shrink-0 mr-4 shadow-sm border border-white/60">
                                                        <i className="fa-solid fa-location-dot text-lg"></i>
                                                    </div>
                                                )}
                                                <div className="truncate pr-2 min-w-0 flex-1">
                                                    <div className="flex items-center space-x-2 mb-0.5">
                                                        {!notif.read && <div className="w-2 h-2 rounded-full bg-[var(--ios-accent)] shadow-sm shrink-0"></div>}
                                                        <h4 className="text-[16px] font-bold text-[#1D1D1F] truncate leading-tight">{notif.name}</h4>
                                                    </div>
                                                    <p className={`text-[13px] font-medium truncate flex items-center mt-1 ${getDistanceColor(notif.distance)}`}>
                                                        <i className={`fa-solid ${notif.isRealRoute ? 'fa-car' : 'fa-location-arrow'} text-[10px] mr-1.5 opacity-70`}></i>
                                                        Nearby &bull; {formatDistance(notif.distance)} {notif.duration !== null && `• ${notif.isRealRoute ? '' : '~'}${formatDuration(notif.duration)}`}
                                                    </p>
                                                </div>
                                            </div>
                                            <button onClick={(e) => deleteNotification(e, notif.id)} className="w-10 h-10 rounded-full bg-black/5 text-[var(--ios-red)] flex items-center justify-center active:bg-black/10 transition-colors shrink-0 ml-2">
                                                <i className="fa-solid fa-xmark text-sm"></i>
                                            </button>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        {/* VIEW: CITIES */}
                        {view === 'cities' && (
                            <div className="pb-6">
                                <div className="pt-4 pb-8 px-2">
                                    <h1 className="text-[44px] font-bold font-art leading-[1.05] text-[#1D1D1F] tracking-tight">
                                        Vincent's<br/><span className="text-[#8E8E93] italic font-normal opacity-80">Travelling</span><br/>System
                                    </h1>
                                </div>
                                
                                <div className="space-y-4">
                                    {dataHierarchy.uniqueCities.length === 0 ? (
                                        <div className="glass-panel flex flex-col items-center justify-center py-16 px-6 text-center">
                                            <div className="w-16 h-16 rounded-full bg-black/5 flex items-center justify-center mb-4">
                                                <i className="fa-regular fa-compass text-2xl text-[#8E8E93]"></i>
                                            </div>
                                            <h3 className="text-[18px] font-bold text-[#1D1D1F] mb-1">Your Journey Begins</h3>
                                            <p className="text-[#8E8E93] font-medium text-[14px]">Tap the + icon to add your first destination.</p>
                                        </div>
                                    ) : (
                                        dataHierarchy.uniqueCities.map((cityName) => (
                                            <div key={cityName} className="glass-panel p-4 flex items-center justify-between cursor-pointer active:scale-[0.98] transition-transform">
                                                <div className="flex items-center flex-1 min-w-0" onClick={() => { setActiveCity(cityName); setView('categories'); }}>
                                                    {dataHierarchy.cities[cityName].photos && dataHierarchy.cities[cityName].photos.length > 0 ? (
                                                        <img src={dataHierarchy.cities[cityName].photos} className="w-16 h-20 rounded-[20px] object-cover shrink-0 mr-4 shadow-sm border border-white/60 bg-[#e5e5ea]" alt={cityName} onError={handleImgErr} />
                                                    ) : (
                                                        <div className="bg-black/5 w-16 h-20 rounded-[20px] flex items-center justify-center mr-4 shrink-0 shadow-inner border border-white/60">
                                                            <i className="fa-solid fa-city text-[#1D1D1F]/20 text-xl"></i>
                                                        </div>
                                                    )}
                                                    <div className="min-w-0 flex-1 pr-2">
                                                        <h3 className="text-[22px] font-art font-bold text-[#1D1D1F] mb-0.5 truncate">{cityName}</h3>
                                                        <span className="inline-flex items-center px-2 py-0.5 rounded-md bg-black/5 text-[11px] font-bold tracking-wide text-[var(--ios-accent)] uppercase">
                                                            {dataHierarchy.cities[cityName].count} Places
                                                        </span>
                                                    </div>
                                                </div>
                                                <div className="flex flex-col space-y-2 shrink-0 ml-2">
                                                    <button onClick={(e) => { e.stopPropagation(); openCityForm(cityName); }} className="w-8 h-8 rounded-full bg-black/5 text-[#8E8E93] flex items-center justify-center active:bg-black/10 transition-colors">
                                                        <i className="fa-solid fa-pen text-[10px]"></i>
                                                    </button>
                                                    <button onClick={(e) => { e.stopPropagation(); deleteCity(cityName); }} className="w-8 h-8 rounded-full bg-[var(--ios-red)]/10 text-[var(--ios-red)] flex items-center justify-center active:bg-[var(--ios-red)]/20 transition-colors">
                                                        <i className="fa-solid fa-trash text-[10px]"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        )}

                        {/* VIEW: CATEGORIES IN CITY */}
                        {view === 'categories' && activeCity && dataHierarchy.cities[activeCity] && (
                            <div className="pb-6 space-y-4">
                                <div className="px-2 mb-6">
                                    <h2 className="text-[34px] font-art font-bold text-[#1D1D1F] leading-tight tracking-tight break-words">{activeCity}</h2>
                                    <p className="text-[#8E8E93] font-bold tracking-wide uppercase text-[12px] mt-1">Curated Collections</p>
                                </div>

                                {Object.keys(dataHierarchy.cities[activeCity].categories).length === 0 ? (
                                    <div className="glass-panel flex flex-col items-center justify-center py-16 px-6 text-center">
                                        <div className="w-16 h-16 rounded-full bg-black/5 flex items-center justify-center mb-4">
                                            <i className="fa-regular fa-folder-open text-2xl text-[#8E8E93]"></i>
                                        </div>
                                        <p className="text-[#8E8E93] font-medium text-[14px]">No places in this city yet.</p>
                                    </div>
                                ) : (
                                    Object.keys(dataHierarchy.cities[activeCity].categories).sort().map((catName) => {
                                        const categoryPlaces = dataHierarchy.cities[activeCity].categories[catName];
                                        
                                        // Find the closest location in this category that has at least one photo
                                        const placeWithPhoto = categoryPlaces.find(loc => Array.isArray(loc.photos) && loc.photos.length > 0);
                                        const coverPhoto = placeWithPhoto ? placeWithPhoto.photos : null;

                                        // Smart icon fallback
                                        const lowerCat = catName.toLowerCase();
                                        let iconClass = 'fa-layer-group';
                                        if (lowerCat.includes('food') || lowerCat.includes('restaurant') || lowerCat.includes('cafe')) iconClass = 'fa-utensils';
                                        else if (lowerCat.includes('hotel') || lowerCat.includes('stay') || lowerCat.includes('resort')) iconClass = 'fa-bed';
                                        else if (lowerCat.includes('shop') || lowerCat.includes('mall')) iconClass = 'fa-bag-shopping';
                                        else if (lowerCat.includes('park') || lowerCat.includes('nature')) iconClass = 'fa-tree';

                                        return (
                                            <div 
                                                key={catName}
                                                onClick={() => { setActiveCategory(catName); setView('category_list'); }}
                                                className="glass-panel p-4 flex items-center justify-between cursor-pointer active:scale-[0.98] transition-transform"
                                            >
                                                <div className="flex items-center min-w-0 flex-1">
                                                    {coverPhoto ? (
                                                        <img src={coverPhoto} alt={catName} className="w-14 h-14 rounded-[16px] object-cover shrink-0 mr-4 shadow-sm border border-white/60 bg-[#e5e5ea]" onError={handleImgErr} />
                                                    ) : (
                                                        <div className="bg-black/5 w-14 h-14 rounded-[16px] flex items-center justify-center shrink-0 mr-4 shadow-inner border border-white/60">
                                                            <i className={`fa-solid ${iconClass} text-[var(--ios-accent)] text-lg opacity-80`}></i>
                                                        </div>
                                                    )}
                                                    <div className="min-w-0 flex-1 pr-4">
                                                        <h3 className="text-[18px] font-bold text-[#1D1D1F] mb-0.5 truncate">{catName}</h3>
                                                        <p className="text-[13px] font-medium text-[#8E8E93] truncate">{categoryPlaces.length} Destinations</p>
                                                    </div>
                                                </div>
                                                <div className="w-8 h-8 rounded-full bg-black/5 flex items-center justify-center text-[#8E8E93] shrink-0">
                                                    <i className="fa-solid fa-chevron-right text-[10px]"></i>
                                                </div>
                                            </div>
                                        );
                                    })
                                )}
                            </div>
                        )}

                        {/* VIEW: CATEGORY LIST (LOCATIONS) */}
                        {view === 'category_list' && activeCity && activeCategory && dataHierarchy.cities[activeCity]?.categories[activeCategory] && (
                            <div className="space-y-5 pb-6">
                                <div className="px-2 mb-6">
                                    <h2 className="text-[34px] font-art font-bold text-[#1D1D1F] leading-tight tracking-tight break-words">{activeCategory}</h2>
                                    <p className="text-[#8E8E93] font-bold tracking-wide uppercase text-[12px] mt-1 break-words">{activeCity}</p>
                                </div>

                                {dataHierarchy.cities[activeCity].categories[activeCategory].map(loc => (
                                    <div 
                                        key={loc.id} 
                                        className="glass-panel p-2 flex flex-col cursor-pointer active:scale-[0.98] transition-transform"
                                        onClick={() => { setLocationReturnView('category_list'); setSelectedLocId(loc.id); setView('location_detail'); }}
                                    >
                                        {Array.isArray(loc.photos) && loc.photos.length > 0 ? (
                                            <div className="relative w-full h-52 rounded-[22px] overflow-hidden mb-3 border border-white/60 bg-[#e5e5ea]">
                                                <div className="flex w-full h-full overflow-x-auto snap-x snap-mandatory scrollbar-hide">
                                                    {loc.photos.map((p, idx) => (
                                                        <img key={idx} src={p} alt="Location" className="w-full h-full object-cover shrink-0 snap-center bg-[#e5e5ea]" onError={handleImgErr} />
                                                    ))}
                                                </div>
                                                {loc.photos.length > 1 && (
                                                    <div className="absolute bottom-3 left-0 right-0 flex justify-center space-x-1.5 pointer-events-none bg-gradient-to-t from-black/50 to-transparent pt-6 pb-1">
                                                        {loc.photos.map((_, i) => (<div key={i} className="w-1.5 h-1.5 rounded-full bg-white shadow-sm" />))}
                                                    </div>
                                                )}
                                            </div>
                                        ) : (
                                            <div className="h-20 w-full rounded-[22px] bg-black/5 flex items-center justify-center text-[#8E8E93] mb-3 shadow-inner border border-white/60">
                                                <i className="fa-solid fa-camera-retro text-xl opacity-40"></i>
                                            </div>
                                        )}

                                        <div className="px-3 pb-2 flex items-start justify-between min-w-0">
                                            <div className="pr-4 min-w-0 flex-1">
                                                <h4 className="text-[18px] font-bold text-[#1D1D1F] leading-tight mb-1 truncate">{loc.name}</h4>
                                                <p className={`text-[13px] font-bold tracking-wide flex items-center truncate ${getDistanceColor(loc.currentDistance)}`}>
                                                    <i className={`fa-solid ${loc.isRealRoute ? 'fa-car' : 'fa-location-arrow'} text-[10px] mr-1.5 shrink-0`}></i>
                                                    <span className="truncate">{formatDistance(loc.currentDistance)} {loc.currentDuration !== null && `• ${loc.isRealRoute ? '' : '~'}${formatDuration(loc.currentDuration)}`}</span>
                                                </p>
                                            </div>
                                            <button onClick={(e) => { e.stopPropagation(); openForm(loc); }} className="w-9 h-9 shrink-0 rounded-full bg-black/5 text-[#1D1D1F] flex items-center justify-center active:bg-black/10 transition-colors ml-2">
                                                <i className="fa-solid fa-pen text-[11px]"></i>
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* VIEW: LOCATION DETAIL */}
                        {view === 'location_detail' && locDetail && (
                            <div className="pb-6 space-y-4">
                                <div className="glass-panel p-2 flex flex-col">
                                    {Array.isArray(locDetail.photos) && locDetail.photos.length > 0 ? (
                                        <div className="relative w-full h-72 rounded-[22px] overflow-hidden mb-4 border border-white/60 bg-[#e5e5ea]">
                                            <div className="flex w-full h-full overflow-x-auto snap-x snap-mandatory scrollbar-hide">
                                                {locDetail.photos.map((p, idx) => (
                                                    <img 
                                                        key={idx} src={p} alt="Detail" 
                                                        className="w-full h-full object-cover shrink-0 snap-center active:opacity-90 transition-opacity cursor-pointer bg-[#e5e5ea]" 
                                                        onClick={() => { setPreviousView(view); setView('photo_viewer'); setFullScreenPhoto({ photos: locDetail.photos, index: idx }); }} 
                                                        onError={handleImgErr}
                                                    />
                                                ))}
                                            </div>
                                            {locDetail.photos.length > 1 && (
                                                <div className="absolute bottom-4 left-0 right-0 flex justify-center space-x-1.5 pointer-events-none bg-gradient-to-t from-black/50 to-transparent pt-6 pb-1">
                                                    {locDetail.photos.map((_, i) => (<div key={i} className="w-1.5 h-1.5 rounded-full bg-white shadow-sm" />))}
                                                </div>
                                            )}
                                        </div>
                                    ) : (
                                        <div className="h-32 w-full rounded-[22px] bg-black/5 flex items-center justify-center text-[#8E8E93] mb-4 shadow-inner border border-white/60">
                                            <i className="fa-solid fa-camera-retro text-2xl opacity-40"></i>
                                        </div>
                                    )}
                                    
                                    <div className="px-3 pb-2">
                                        <div className="flex justify-between items-start mb-4">
                                            <div className="min-w-0 flex-1">
                                                <h2 className="text-[28px] font-art font-bold text-[#1D1D1F] leading-tight tracking-tight mb-2 break-words">{locDetail.name}</h2>
                                                <div className="flex items-center space-x-2 flex-wrap gap-y-2">
                                                    <span className="inline-flex items-center px-2 py-0.5 rounded-md bg-black/5 text-[11px] font-bold tracking-wide text-[#1D1D1F] uppercase truncate max-w-full">
                                                        {locDetail.category || 'Uncategorized'}
                                                    </span>
                                                    {(() => {
                                                        const routeInfo = getRouteInfo(locDetail);
                                                        if (routeInfo.dist === null) return null;
                                                        return (
                                                            <span className={`inline-flex items-center px-2 py-0.5 rounded-md text-[11px] font-bold tracking-wide uppercase border truncate max-w-full ${getDistanceBgColor(routeInfo.dist)}`}>
                                                                <i className={`fa-solid ${routeInfo.isReal ? 'fa-car' : 'fa-location-arrow'} text-[9px] mr-1 shrink-0`}></i>
                                                                <span className="truncate">{formatDistance(routeInfo.dist)} {routeInfo.dur !== null && `• ${routeInfo.isReal ? '' : '~'}${formatDuration(routeInfo.dur)}`}</span>
                                                            </span>
                                                        );
                                                    })()}
                                                </div>
                                            </div>
                                            <button onClick={() => openForm(locDetail)} className="w-10 h-10 shrink-0 rounded-full bg-black/5 text-[#1D1D1F] flex items-center justify-center active:bg-black/10 transition-colors ml-4 mt-1">
                                                <i className="fa-solid fa-pen text-[12px]"></i>
                                            </button>
                                        </div>
                                        
                                        {(() => {
                                            const mapsUrl = locDetail.mapLink || (locDetail.lat != null && locDetail.lng != null ? `https://www.google.com/maps/search/?api=1&query=${locDetail.lat},${locDetail.lng}` : null);
                                            if (!mapsUrl) return null;
                                            return (
                                                <a href={mapsUrl} target="_blank" rel="noopener noreferrer" className="flex items-center justify-center w-full bg-[#1D1D1F] text-white py-3.5 rounded-[16px] font-semibold text-[16px] active:scale-[0.98] transition-transform mb-5 shadow-lg shadow-black/10">
                                                    Open in Maps <i className="fa-solid fa-arrow-up-right-from-square ml-2 text-[12px] opacity-70"></i>
                                                </a>
                                            );
                                        })()}
                                        
                                        {locDetail.comment && (
                                            <div className="mb-5 p-4 rounded-[16px] bg-black/5 border border-black/5 shadow-inner">
                                                <div 
                                                    className="text-[15px] font-medium text-[#1D1D1F] leading-relaxed break-words [&>img]:max-w-full [&>img]:rounded-[12px] [&>img]:my-3 [&>img]:shadow-sm" 
                                                    dangerouslySetInnerHTML={renderHTML(locDetail.comment)} 
                                                />
                                            </div>
                                        )}

                                        <div className="text-center pt-2">
                                            <button onClick={() => setShowCoords(!showCoords)} className="text-[13px] text-[#8E8E93] font-bold tracking-wide active:opacity-50 flex items-center justify-center mx-auto transition-opacity">
                                                {showCoords ? 'HIDE COORDINATES' : 'SHOW COORDINATES'}
                                                <i className={`fa-solid fa-chevron-${showCoords ? 'up' : 'down'} ml-1.5 text-[10px]`}></i>
                                            </button>
                                            
                                            {showCoords && (
                                                <div className="mt-4 p-4 rounded-[16px] bg-black/5 border border-black/5 shadow-inner flex justify-between items-center text-[13px] font-mono text-[#8E8E93] text-left">
                                                    <div className="min-w-0">
                                                        <div className="mb-1 truncate"><span className="text-[#1D1D1F] font-bold mr-2">LAT</span> {locDetail.lat != null ? Number(locDetail.lat).toFixed(6) : '—'}</div>
                                                        <div className="truncate"><span className="text-[#1D1D1F] font-bold mr-2">LNG</span> {locDetail.lng != null ? Number(locDetail.lng).toFixed(6) : '—'}</div>
                                                    </div>
                                                    <i className="fa-solid fa-satellite-dish text-[#1D1D1F] text-xl opacity-20 shrink-0 ml-3"></i>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                <div className="text-center pt-2 pb-6">
                                    <button onClick={() => deleteLocation(locDetail.id, true)} className="text-[var(--ios-red)] text-[15px] font-bold active:opacity-50 bg-[var(--ios-red)]/10 px-5 py-2.5 rounded-full transition-colors border border-[var(--ios-red)]/20">
                                        Delete Location
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* VIEW: ADD OR EDIT CITY FORM */}
                        {view === 'city_form' && (
                            <form onSubmit={handleSaveCity} className="space-y-5 pb-6">
                                <div className="px-2 mb-4">
                                    <h2 className="text-[34px] font-art font-bold text-[#1D1D1F] leading-tight tracking-tight">{editingCityName ? 'Edit City' : 'New City'}</h2>
                                </div>

                                {saveError && (
                                    <div className="p-3 bg-[var(--ios-red)]/10 text-[var(--ios-red)] text-[13px] font-medium rounded-[16px] border border-[var(--ios-red)]/20 flex items-center">
                                        <i className="fa-solid fa-circle-exclamation mr-2"></i>{saveError}
                                    </div>
                                )}
                                
                                <div className="glass-panel p-5 space-y-5">
                                    <div>
                                        <label className="block text-[12px] font-bold text-[#8E8E93] mb-2 uppercase tracking-wide ml-1">City Name</label>
                                        <input type="text" required value={newCityName} onChange={e => setNewCityName(e.target.value)} className="w-full px-4 py-3.5 glass-input text-[16px] font-medium placeholder-[#8E8E93]/50 bg-white/50" placeholder="Tokyo, Japan" autoFocus />
                                    </div>
                                </div>

                                <div className="glass-panel p-5">
                                    <div className="flex justify-between items-center mb-4">
                                        <span className="text-[14px] font-bold text-[#8E8E93] uppercase tracking-wide ml-1">Cover Photo</span>
                                        <label className="text-[13px] font-bold bg-[#1D1D1F] text-white px-3 py-1.5 rounded-full cursor-pointer active:scale-95 transition-transform shadow-md">
                                            <i className="fa-solid fa-plus mr-1"></i> Add
                                            <input type="file" accept="image/*" className="hidden" onChange={handleCityFiles} disabled={isSaving} />
                                        </label>
                                    </div>
                                    {cityPhotos.length > 0 ? (
                                        <div className="flex overflow-x-auto space-x-3 pb-2 scrollbar-hide snap-x">
                                            {cityPhotos.map((p, i) => (
                                                <div key={i} className="relative w-24 h-24 flex-shrink-0 snap-start rounded-[16px] overflow-hidden border border-white/60 shadow-sm">
                                                    <img src={p} className="w-full h-full object-cover" alt="Preview" onError={handleImgErr} />
                                                    <button type="button" onClick={() => removeCityPhoto(i)} className="absolute top-1.5 right-1.5 bg-black/60 backdrop-blur-md text-white w-6 h-6 rounded-full flex items-center justify-center text-[10px]"><i className="fa-solid fa-xmark"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="h-24 w-full rounded-[16px] bg-black/5 flex items-center justify-center text-[#8E8E93] shadow-inner border border-black/5">
                                            <i className="fa-solid fa-image text-xl opacity-40"></i>
                                        </div>
                                    )}
                                </div>

                                <button type="submit" disabled={isSaving || !newCityName.trim()} className="w-full py-4 bg-[#1D1D1F] disabled:bg-[#1D1D1F]/50 text-white font-bold tracking-wide text-[16px] rounded-[18px] active:scale-[0.98] transition-all mt-4 shadow-lg shadow-black/10">
                                    {isSaving ? <i className="fa-solid fa-spinner fa-spin"></i> : editingCityName ? 'Update City' : 'Create City'}
                                </button>
                            </form>
                        )}

                        {/* VIEW: ADD / EDIT LOCATION FORM */}
                        {view === 'form' && (
                            <form onSubmit={handleSaveLocation} className="space-y-5 pb-6">
                                <div className="px-2 mb-4">
                                    <h2 className="text-[34px] font-art font-bold text-[#1D1D1F] leading-tight tracking-tight">{editId ? 'Edit Place' : 'New Place'}</h2>
                                </div>

                                {saveError && (
                                    <div className="p-3 bg-[var(--ios-red)]/10 text-[var(--ios-red)] text-[13px] font-medium rounded-[16px] border border-[var(--ios-red)]/20 flex items-center">
                                        <i className="fa-solid fa-circle-exclamation mr-2"></i>{saveError}
                                    </div>
                                )}
                                
                                {/* LIVE AUTOCOMPLETE SEARCH BAR */}
                                {!editId && (
                                    <div className="relative z-50">
                                        <div className="glass-panel p-1.5">
                                            <div className="relative flex items-center glass-input px-3 py-3 bg-white/50">
                                                <i className="fa-solid fa-magnifying-glass text-[#8E8E93] mr-2.5 shrink-0"></i>
                                                <input 
                                                    type="text" 
                                                    placeholder="Search to auto-fill..." 
                                                    value={formSearchQuery} 
                                                    onChange={(e) => setFormSearchQuery(e.target.value)}
                                                    className="flex-1 bg-transparent focus:outline-none text-[16px] font-medium placeholder-[#8E8E93]/60 min-w-0"
                                                />
                                                {isSearching && <i className="fa-solid fa-spinner fa-spin text-[var(--ios-accent)] ml-2 shrink-0"></i>}
                                            </div>
                                        </div>
                                        
                                        {searchResults.length > 0 && (
                                            <div className="absolute top-[calc(100%+8px)] left-0 right-0 glass-panel overflow-hidden max-h-64 overflow-y-auto z-50 shadow-2xl border-white/80">
