<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vincent's Travelling System</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Globe_icon.svg/1024px-Globe_icon.svg.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root {
            --ios-accent: #C68E58;
            --ios-green: #32D74B; 
            --ios-red: #FF3B30; 
            --ios-bg: #F2F4F7;
            --ios-text: #1D1D1F;
            --ios-gray: #8E8E93;
        }
        body { 
            -webkit-tap-highlight-color: transparent; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            color-scheme: light;
            overflow-x: hidden;
        }
        
        .safe-top { padding-top: env(safe-area-inset-top, 44px); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 34px); }
        .safe-pb-nav { padding-bottom: calc(env(safe-area-inset-bottom, 34px) + 100px); }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-slide-in { animation: slideIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .font-art { font-family: 'Playfair Display', serif; }

        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 12s infinite alternate ease-in-out; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.04), inset 0 1px 0 rgba(255,255,255,1);
            border-radius: 28px;
        }
        
        .glass-pill {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 12px 40px -10px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,1);
            border-radius: 9999px;
        }

        .glass-header {
            background: linear-gradient(to bottom, rgba(242, 244, 247, 0.95) 0%, rgba(242, 244, 247, 0) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 16px;
            transition: all 0.2s ease;
            color: #1D1D1F;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: var(--ios-accent);
            outline: none;
            box-shadow: 0 4px 16px rgba(198, 142, 88, 0.2);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'travel-system-v2';

        // --- HELPERS ---
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const numLat1 = parseFloat(lat1), numLon1 = parseFloat(lon1), numLat2 = parseFloat(lat2), numLon2 = parseFloat(lon2);
            if (isNaN(numLat1) || isNaN(numLon1) || isNaN(numLat2) || isNaN(numLon2)) return null;
            const R = 6371; 
            const dLat = (numLat2 - numLat1) * (Math.PI / 180), dLon = (numLon2 - numLon1) * (Math.PI / 180);
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(numLat1 * (Math.PI / 180)) * Math.cos(numLat2 * (Math.PI / 180)) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function formatDistance(distInKm) {
            if (distInKm == null || isNaN(distInKm)) return "—";
            return distInKm < 1 ? `${Math.round(distInKm * 1000)}m` : `${Number(distInKm).toFixed(1)}km`;
        }

        function formatDuration(totalMinutes) {
            if (totalMinutes == null || isNaN(totalMinutes)) return "";
            totalMinutes = Math.ceil(totalMinutes);
            if (totalMinutes < 60) return `${totalMinutes} min`;
            return `${Math.floor(totalMinutes / 60)}h ${totalMinutes % 60}m`;
        }

        const getDistanceColor = (distInKm) => {
            if (distInKm == null || isNaN(distInKm)) return "text-[#8E8E93]";
            return distInKm <= 1.0 ? "text-[var(--ios-green)]" : distInKm <= 10.0 ? "text-[#FF9500]" : "text-[var(--ios-red)]";
        };

        function App() {
            const [user, setUser] = useState(null);
            const [liveLocation, setLiveLocation] = useState(null);
            const [gpsAccuracy, setGpsAccuracy] = useState(null);
            const [geoError, setGeoError] = useState('');
            
            const [trips, setTrips] = useState([]);
            const [locations, setLocations] = useState([]);
            const [itineraries, setItineraries] = useState([]);
            const [realRoutes, setRealRoutes] = useState({});

            const [view, setView] = useState('trips'); 
            const [activeTripId, setActiveTripId] = useState(null);
            const [activeCity, setActiveCity] = useState(null);
            const [activeCategory, setActiveCategory] = useState(null);
            const [selectedLocId, setSelectedLocId] = useState(null);
            const [activeItinId, setActiveItinId] = useState(null);
            const [previousView, setPreviousView] = useState('trips');

            const [tripName, setTripName] = useState('');
            const [tripDates, setTripDates] = useState('');
            const [tripPhotos, setTripPhotos] = useState([]);
            
            const [name, setName] = useState('');
            const [city, setCity] = useState('');
            const [category, setCategory] = useState('');
            const [lat, setLat] = useState('');
            const [lng, setLng] = useState('');
            const [quickPaste, setQuickPaste] = useState('');
            const [comment, setComment] = useState('');
            const [photos, setPhotos] = useState([]);
            
            const [itinTitle, setItinTitle] = useState('');
            const [itinDate, setItinDate] = useState('');
            
            const [notifications, setNotifications] = useState([]);
            const [editId, setEditId] = useState(null);
            const [saveError, setSaveError] = useState('');
            const [isSaving, setIsSaving] = useState(false);
            const [confirmDialog, setConfirmDialog] = useState(null);

            const activeTab = view === 'notifications' ? 'notifications' : (view.includes('itinerar') ? 'itineraries' : 'places');

            // --- FIREBASE SYNC ---
            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else { await signInAnonymously(auth); }
                };
                initAuth();
                return onAuthStateChanged(auth, setUser);
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubTrips = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'trips'), (s) => {
                    setTrips(s.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.timestamp - a.timestamp));
                });
                const unsubLocs = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'locations'), (s) => {
                    setLocations(s.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                const unsubItins = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'itineraries'), (s) => {
                    setItineraries(s.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => a.timestamp - b.timestamp));
                });
                return () => { unsubTrips(); unsubLocs(); unsubItins(); };
            }, [user]);

            // GPS Logic
            useEffect(() => {
                if (!("geolocation" in navigator)) return;
                const wid = navigator.geolocation.watchPosition(
                    p => { setLiveLocation({ lat: p.coords.latitude, lng: p.coords.longitude }); setGpsAccuracy(p.coords.accuracy); },
                    e => { setGeoError('Using Mock Location'); setLiveLocation({ lat: 11.5564, lng: 104.9282 }); },
                    { enableHighAccuracy: true, maximumAge: 5000 }
                );
                return () => navigator.geolocation.clearWatch(wid);
            }, []);

            // --- OSRM ROUTING ---
            useEffect(() => {
                if (!liveLocation || locations.length === 0) return;
                const relevantLocs = locations.filter(l => !l.isCityMarker && l.lat != null && l.lng != null).slice(0, 99);
                if (relevantLocs.length === 0) return;
                const fetchRouting = async () => {
                    try {
                        const coords = [`${liveLocation.lng},${liveLocation.lat}`, ...relevantLocs.map(l => `${l.lng},${l.lat}`)].join(';');
                        const res = await fetch(`https://router.project-osrm.org/table/v1/driving/${coords}?sources=0&annotations=duration,distance`);
                        const data = await res.json();
                        if (data.code === 'Ok' && data.distances && data.durations) {
                            const newRoutes = {};
                            relevantLocs.forEach((l, i) => {
                                // Result is a matrix, sources=0 means we look at the first array of distances
                                newRoutes[l.id] = { 
                                    distance: data.distances[i+1]/1000, 
                                    duration: data.durations[i+1]/60 
                                };
                            });
                            setRealRoutes(newRoutes);
                        }
                    } catch (e) { console.error(e); }
                };
                const tid = setTimeout(fetchRouting, 3000);
                return () => clearTimeout(tid);
            }, [liveLocation, locations]);

            // --- DATA DERIVATION ---
            const activeTrip = useMemo(() => trips.find(t => t.id === activeTripId), [trips, activeTripId]);
            
            const currentTripData = useMemo(() => {
                if (!activeTripId) return { cities: {}, uniqueCities: [], itineraries: [] };
                const filteredLocs = locations.filter(l => l.tripId === activeTripId);
                const filteredItins = itineraries.filter(i => i.tripId === activeTripId);
                
                const cities = {};
                filteredLocs.forEach(loc => {
                    if (loc.isCityMarker) return;
                    const c = loc.city || 'Uncategorized';
                    if (!cities[c]) cities[c] = { count: 0, categories: {} };
                    const cat = loc.category || 'Other';
                    if (!cities[c].categories[cat]) cities[c].categories[cat] = [];
                    
                    const route = realRoutes[loc.id] || { distance: liveLocation ? calculateDistance(liveLocation.lat, liveLocation.lng, loc.lat, loc.lng) : null, duration: null };
                    cities[c].categories[cat].push({ ...loc, ...route });
                    cities[c].count++;
                });
                
                return { cities, uniqueCities: Object.keys(cities).sort(), itineraries: filteredItins };
            }, [activeTripId, locations, itineraries, liveLocation, realRoutes]);

            // --- ACTIONS ---
            const handleBack = () => {
                if (view === 'trip_dashboard') setView('trips');
                else if (view === 'categories') setView('trip_dashboard');
                else if (view === 'category_list') setView('categories');
                else if (view === 'location_detail') setView(previousView);
                else if (view === 'itinerary_detail') setView('trip_dashboard');
                else setView(previousView);
            };

            const processImage = (file) => new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if (w > 1200) { h *= 1200/w; w = 1200; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.8));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });

            const handleQuickPasteInput = (val) => {
                setQuickPaste(val);
                // Regex matches (lat, lng) or just lat, lng. Captures negative numbers and decimals.
                const regex = /(-?\d+\.\d+)\s*,\s*(-?\d+\.\d+)/;
                const match = val.match(regex);
                if (match) {
                    setLat(match);
                    setLng(match);
                }
            };

            const saveTrip = async (e) => {
                e.preventDefault(); setIsSaving(true);
                try {
                    const id = editId || Date.now().toString();
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'trips', id), {
                        name: tripName, dates: tripDates, photos: tripPhotos, timestamp: Date.now()
                    }, { merge: true });
                    setView('trips'); setEditId(null); setTripName(''); setTripDates(''); setTripPhotos([]);
                } catch (err) { setSaveError(err.message); } finally { setIsSaving(false); }
            };

            const saveLocation = async (e) => {
                e.preventDefault(); setIsSaving(true);
                try {
                    const id = editId || Date.now().toString();
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', id), {
                        tripId: activeTripId, name, city, category, lat: parseFloat(lat), lng: parseFloat(lng), comment, photos, timestamp: Date.now()
                    }, { merge: true });
                    setView('category_list'); setEditId(null); setQuickPaste('');
                } catch (err) { setSaveError(err.message); } finally { setIsSaving(false); }
            };

            const saveItinerary = async (e) => {
                e.preventDefault(); setIsSaving(true);
                try {
                    const id = editId || Date.now().toString();
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'itineraries', id), {
                        tripId: activeTripId, title: itinTitle, date: itinDate, items: [], timestamp: Date.now()
                    }, { merge: true });
                    setView('trip_dashboard'); setEditId(null);
                } catch (err) { setSaveError(err.message); } finally { setIsSaving(false); }
            };

            const deleteItem = (coll, id) => {
                setConfirmDialog({ 
                    message: `Delete this ${coll.slice(0,-1)}?`, 
                    onConfirm: async () => { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', coll, id)); }
                });
            };

            // --- SUB-COMPONENTS ---
            const TripCard = ({ trip }) => (
                <div onClick={() => { setActiveTripId(trip.id); setView('trip_dashboard'); }} className="glass-panel overflow-hidden active:scale-[0.98] transition-transform cursor-pointer relative group">
                    <div className="h-40 w-full bg-slate-200">
                        {trip.photos?.length > 0 ? (
                            <img src={trip.photos} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" alt="" />
                        ) : <div className="w-full h-full flex items-center justify-center text-slate-400"><i className="fa-solid fa-earth-americas text-4xl"></i></div>}
                    </div>
                    <div className="p-5 flex justify-between items-center bg-white/40">
                        <div>
                            <h3 className="text-xl font-art font-bold text-[#1D1D1F]">{trip.name}</h3>
                            <p className="text-xs font-bold text-[#8E8E93] uppercase tracking-widest mt-1">{trip.dates || 'Upcoming'}</p>
                        </div>
                        <button onClick={(e) => { e.stopPropagation(); setEditId(trip.id); setTripName(trip.name); setTripDates(trip.dates); setTripPhotos(trip.photos); setView('trip_form'); }} className="w-10 h-10 rounded-full bg-black/5 text-slate-400 flex items-center justify-center hover:bg-black/10"><i className="fa-solid fa-pen text-xs"></i></button>
                    </div>
                </div>
            );

            // --- MAIN RENDER ---
            return (
                <div className="min-h-screen flex flex-col relative selection:bg-[var(--ios-accent)]/20">
                    <div className="fixed inset-0 z-[-1] bg-[var(--ios-bg)] overflow-hidden">
                        <div className="absolute top-[-10%] left-[-10%] w-[70vw] h-[70vw] bg-gradient-to-tr from-[#C68E58]/20 to-transparent blur-[100px] animate-blob"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] bg-gradient-to-bl from-slate-400/20 to-transparent blur-[100px] animate-blob" style={{animationDelay: '4s'}}></div>
                    </div>

                    <header className="fixed top-0 left-0 right-0 z-40 safe-top glass-header h-20">
                        <div className="max-w-3xl mx-auto px-5 h-full flex items-center justify-between">
                            {view !== 'trips' ? (
                                <button onClick={handleBack} className="h-11 px-4 rounded-full bg-white/80 border border-white shadow-sm flex items-center justify-center text-[#1D1D1F] active:scale-95 transition-all"><i className="fa-solid fa-chevron-left mr-2"></i> <span className="font-bold">Back</span></button>
                            ) : <div></div>}
                            
                            <h1 className="text-[17px] font-bold tracking-tight truncate max-w-[50%]">
                                {view === 'trips' ? 'My Adventures' : activeTrip?.name}
                            </h1>

                            <button onClick={() => {
                                if (view === 'trips') { setEditId(null); setTripName(''); setTripDates(''); setTripPhotos([]); setView('trip_form'); }
                                else if (view === 'trip_dashboard' || view === 'categories' || view === 'category_list') { setEditId(null); setName(''); setCity(activeCity || ''); setCategory(activeCategory || ''); setLat(''); setLng(''); setComment(''); setPhotos([]); setQuickPaste(''); setView('loc_form'); }
                            }} className="h-11 px-4 rounded-full bg-[#1D1D1F] text-white shadow-lg flex items-center justify-center active:scale-95 transition-all">
                                <span className="font-bold mr-1.5">Add</span> <i className="fa-solid fa-plus text-xs"></i>
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 w-full max-w-3xl mx-auto px-5 safe-pb-nav mt-24 animate-slide-in relative">
                        
                        {/* VIEW: TRIPS LIST */}
                        {view === 'trips' && (
                            <div className="space-y-6 pb-10">
                                <div className="px-1 py-4">
                                    <h2 className="text-5xl font-art font-bold leading-tight text-[#1D1D1F]">Vincent's<br/><span className="text-[#8E8E93] italic font-normal">Travel</span> System</h2>
                                </div>
                                {trips.length === 0 ? (
                                    <div className="glass-panel p-16 text-center text-[#8E8E93]"><i className="fa-regular fa-compass text-4xl mb-4 block"></i> No trips yet. Create one!</div>
                                ) : trips.map(t => <TripCard key={t.id} trip={t} />)}
                            </div>
                        )}

                        {/* VIEW: TRIP DASHBOARD */}
                        {view === 'trip_dashboard' && (
                            <div className="space-y-8 pb-10">
                                <div className="px-1">
                                    <h2 className="text-3xl font-art font-bold">{activeTrip?.name}</h2>
                                    <p className="text-xs font-bold text-[#8E8E93] uppercase tracking-widest mt-1">{activeTrip?.dates}</p>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => setView('categories')} className="glass-panel p-6 text-center flex flex-col items-center group active:scale-95 transition-all">
                                        <div className="w-14 h-14 rounded-full bg-[var(--ios-accent)]/10 text-[var(--ios-accent)] flex items-center justify-center text-xl mb-3 shadow-inner"><i className="fa-solid fa-map-location-dot"></i></div>
                                        <span className="font-bold text-[#1D1D1F]">Destinations</span>
                                        <span className="text-[10px] font-bold text-[#8E8E93] uppercase mt-1">{currentTripData.uniqueCities.length} Cities</span>
                                    </button>
                                    <button onClick={() => setView('itineraries')} className="glass-panel p-6 text-center flex flex-col items-center group active:scale-95 transition-all">
                                        <div className="w-14 h-14 rounded-full bg-slate-100 text-slate-500 flex items-center justify-center text-xl mb-3 shadow-inner"><i className="fa-solid fa-calendar-day"></i></div>
                                        <span className="font-bold text-[#1D1D1F]">Itinerary</span>
                                        <span className="text-[10px] font-bold text-[#8E8E93] uppercase mt-1">{currentTripData.itineraries.length} Days</span>
                                    </button>
                                </div>

                                <div className="space-y-4">
                                    <h3 className="text-xs font-bold text-[#8E8E93] uppercase tracking-widest px-1">Recent Locations</h3>
                                    {currentTripData.uniqueCities.slice(0,3).map(c => (
                                        <div key={c} onClick={() => { setActiveCity(c); setView('categories'); }} className="glass-panel p-4 flex items-center justify-between cursor-pointer active:bg-white/50 transition-colors">
                                            <div className="flex items-center">
                                                <div className="w-12 h-12 rounded-2xl bg-black/5 flex items-center justify-center text-slate-400 mr-4"><i className="fa-solid fa-city"></i></div>
                                                <div>
                                                    <h4 className="font-art font-bold text-lg">{c}</h4>
                                                    <p className="text-[10px] font-bold text-[#8E8E93] uppercase">{currentTripData.cities[c].count} places</p>
                                                </div>
                                            </div>
                                            <i className="fa-solid fa-chevron-right text-xs text-slate-300"></i>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* VIEW: CATEGORIES */}
                        {view === 'categories' && (
                            <div className="space-y-4">
                                <div className="px-1 mb-6">
                                    <h2 className="text-3xl font-art font-bold">{activeCity}</h2>
                                    <p className="text-xs font-bold text-[#8E8E93] uppercase tracking-widest mt-1">Explore Collections</p>
                                </div>
                                {Object.keys(currentTripData.cities[activeCity]?.categories || {}).map(cat => (
                                    <div key={cat} onClick={() => { setActiveCategory(cat); setView('category_list'); }} className="glass-panel p-5 flex items-center justify-between cursor-pointer active:scale-[0.98] transition-transform">
                                        <div className="flex items-center">
                                            <div className="w-12 h-12 rounded-2xl bg-[var(--ios-accent)]/10 text-[var(--ios-accent)] flex items-center justify-center mr-4"><i className="fa-solid fa-layer-group"></i></div>
                                            <div>
                                                <h4 className="font-bold text-[#1D1D1F]">{cat}</h4>
                                                <p className="text-xs text-[#8E8E93]">{currentTripData.cities[activeCity].categories[cat].length} Places</p>
                                            </div>
                                        </div>
                                        <i className="fa-solid fa-chevron-right text-xs text-slate-300"></i>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* VIEW: CATEGORY LIST (PLACES) */}
                        {view === 'category_list' && (
                            <div className="space-y-5">
                                <div className="px-1 mb-6">
                                    <h2 className="text-3xl font-art font-bold">{activeCategory}</h2>
                                    <p className="text-xs font-bold text-[#8E8E93] uppercase tracking-widest mt-1">{activeCity}</p>
                                </div>
                                {currentTripData.cities[activeCity]?.categories[activeCategory]?.map(loc => (
                                    <div key={loc.id} onClick={() => { setSelectedLocId(loc.id); setPreviousView('category_list'); setView('location_detail'); }} className="glass-panel p-2 flex flex-col group cursor-pointer active:scale-[0.99] transition-all">
                                        {loc.photos?.length > 0 && <img src={loc.photos} className="h-44 w-full object-cover rounded-[22px] mb-3" />}
                                        <div className="px-3 pb-3 flex justify-between items-end">
                                            <div>
                                                <h4 className="text-lg font-bold text-[#1D1D1F]">{loc.name}</h4>
                                                <p className={`text-[11px] font-bold tracking-widest uppercase flex items-center mt-1 ${getDistanceColor(loc.distance)}`}>
                                                    <i className="fa-solid fa-location-arrow mr-1.5 text-[9px]"></i> {formatDistance(loc.distance)}
                                                </p>
                                            </div>
                                            <button onClick={(e) => { e.stopPropagation(); setEditId(loc.id); setName(loc.name); setCity(loc.city); setCategory(loc.category); setLat(loc.lat); setLng(loc.lng); setComment(loc.comment); setPhotos(loc.photos); setView('loc_form'); }} className="w-10 h-10 rounded-full bg-black/5 text-slate-400 flex items-center justify-center hover:bg-black/10"><i className="fa-solid fa-pen text-xs"></i></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* VIEW: TRIP FORM */}
                        {view === 'trip_form' && (
                            <form onSubmit={saveTrip} className="space-y-6">
                                <h2 className="text-3xl font-art font-bold">{editId ? 'Edit Trip' : 'Start New Trip'}</h2>
                                <div className="glass-panel p-5 space-y-4">
                                    <input value={tripName} onChange={e=>setTripName(e.target.value)} required placeholder="Trip Name (e.g. Japan Spring)" className="w-full glass-input p-4 font-bold" />
                                    <input value={tripDates} onChange={e=>setTripDates(e.target.value)} placeholder="Dates (e.g. April 2024)" className="w-full glass-input p-4" />
                                    <div className="flex flex-col items-center justify-center p-8 border-2 border-dashed border-slate-300 rounded-3xl bg-white/30">
                                        <label className="cursor-pointer text-center">
                                            <i className="fa-solid fa-camera text-3xl text-slate-400 mb-2"></i>
                                            <p className="text-xs font-bold text-slate-500 uppercase tracking-widest">Cover Photo</p>
                                            <input type="file" className="hidden" onChange={async e => {
                                                const f = e.target.files; if(f) setTripPhotos([await processImage(f)]);
                                            }} />
                                        </label>
                                        {tripPhotos.length > 0 && <img src={tripPhotos} className="mt-4 h-20 w-32 object-cover rounded-xl" />}
                                    </div>
                                </div>
                                <button type="submit" className="w-full py-4 bg-[#1D1D1F] text-white font-bold rounded-2xl shadow-xl">{isSaving ? 'Saving...' : 'Save Adventure'}</button>
                            </form>
                        )}

                        {/* VIEW: LOCATION FORM */}
                        {view === 'loc_form' && (
                            <form onSubmit={saveLocation} className="space-y-5">
                                <h2 className="text-3xl font-art font-bold">{editId ? 'Edit Place' : 'New Place'}</h2>
                                <div className="glass-panel p-5 space-y-3">
                                    <input value={name} onChange={e=>setName(e.target.value)} required placeholder="Name of place" className="w-full glass-input p-4 font-bold" />
                                    <div className="grid grid-cols-2 gap-3">
                                        <input value={city} onChange={e=>setCity(e.target.value)} required placeholder="City" className="glass-input p-4" />
                                        <input value={category} onChange={e=>setCategory(e.target.value)} required placeholder="Category" className="glass-input p-4" />
                                    </div>
                                    
                                    {/* COORDINATES GRID */}
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="text-[10px] font-bold text-[#8E8E93] uppercase ml-1">Latitude</label>
                                            <input value={lat} onChange={e=>setLat(e.target.value)} placeholder="0.0000" className="w-full glass-input p-4 text-xs font-mono" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-[#8E8E93] uppercase ml-1">Longitude</label>
                                            <input value={lng} onChange={e=>setLng(e.target.value)} placeholder="0.0000" className="w-full glass-input p-4 text-xs font-mono" />
                                        </div>
                                    </div>

                                    {/* QUICK PASTE BOX */}
                                    <div className="pt-1">
                                        <label className="text-[10px] font-bold text-[var(--ios-accent)] uppercase ml-1">Quick Paste (lat, lng)</label>
                                        <div className="relative">
                                            <input 
                                                value={quickPaste} 
                                                onChange={e=>handleQuickPasteInput(e.target.value)} 
                                                placeholder="Example: (11.54198, 104.91188)" 
                                                className="w-full glass-input p-4 text-xs font-mono border-[var(--ios-accent)]/30 pr-10" 
                                            />
                                            {quickPaste && <i className="fa-solid fa-check text-[var(--ios-green)] absolute right-4 top-1/2 -translate-y-1/2"></i>}
                                        </div>
                                    </div>

                                    <textarea value={comment} onChange={e=>setComment(e.target.value)} placeholder="Notes, tips, vibes..." className="w-full glass-input p-4 h-24" />
                                    
                                    <div className="flex items-center justify-between">
                                        <button type="button" onClick={() => { if(liveLocation) { setLat(liveLocation.lat); setLng(liveLocation.lng); } }} className="text-xs font-bold text-[var(--ios-accent)] uppercase tracking-widest bg-white/50 px-4 py-2 rounded-full border">Use My GPS</button>
                                        <label className="text-xs font-bold text-slate-500 uppercase tracking-widest cursor-pointer bg-white/50 px-4 py-2 rounded-full border">Add Photos <input type="file" multiple className="hidden" onChange={async e => {
                                            const files = Array.from(e.target.files);
                                            const processed = await Promise.all(files.map(processImage));
                                            setPhotos([...photos, ...processed]);
                                        }} /></label>
                                    </div>
                                    <div className="flex space-x-2 overflow-x-auto pb-2 scrollbar-hide">
                                        {photos.map((p, i) => <img key={i} src={p} className="h-16 w-16 object-cover rounded-lg shrink-0" />)}
                                    </div>
                                </div>
                                <button type="submit" className="w-full py-4 bg-[#1D1D1F] text-white font-bold rounded-2xl shadow-xl">{isSaving ? 'Saving...' : 'Pin to Trip'}</button>
                            </form>
                        )}
                        
                        {/* VIEW: LOCATION DETAIL */}
                        {view === 'location_detail' && (
                            <div className="space-y-6 pb-10">
                                {(() => {
                                    const loc = locations.find(l => l.id === selectedLocId);
                                    if (!loc) return null;
                                    return (
                                        <>
                                            <div className="glass-panel overflow-hidden p-2">
                                                {loc.photos?.length > 0 ? (
                                                    <img src={loc.photos} className="h-72 w-full object-cover rounded-[22px]" />
                                                ) : <div className="h-40 bg-slate-100 rounded-[22px] flex items-center justify-center text-slate-300"><i className="fa-solid fa-camera text-3xl"></i></div>}
                                                <div className="p-4">
                                                    <h2 className="text-3xl font-art font-bold mb-2">{loc.name}</h2>
                                                    <div className="flex space-x-2 mb-4">
                                                        <span className="text-[10px] font-bold bg-black/5 px-2 py-1 rounded-md uppercase tracking-wider">{loc.city}</span>
                                                        <span className="text-[10px] font-bold bg-black/5 px-2 py-1 rounded-md uppercase tracking-wider">{loc.category}</span>
                                                    </div>
                                                    {loc.comment && <p className="bg-black/5 p-4 rounded-2xl text-sm leading-relaxed mb-6">{loc.comment}</p>}
                                                    <a href={`https://www.google.com/maps/dir/?api=1&destination=${loc.lat},${loc.lng}`} target="_blank" className="w-full flex items-center justify-center py-4 bg-[#1D1D1F] text-white rounded-2xl font-bold active:scale-95 transition-all">Navigate to Place <i className="fa-solid fa-location-arrow ml-2 text-xs"></i></a>
                                                </div>
                                            </div>
                                            <button onClick={() => deleteItem('locations', loc.id)} className="w-full text-[var(--ios-red)] font-bold text-sm bg-[var(--ios-red)]/10 py-3 rounded-2xl border border-[var(--ios-red)]/20">Remove Location</button>
                                        </>
                                    );
                                })()}
                            </div>
                        )}
                    </main>

                    <div className="fixed bottom-6 left-6 right-6 z-40 safe-bottom pointer-events-none flex justify-center">
                        <div className="glass-pill w-full max-w-[400px] h-16 flex justify-around items-center px-2 pointer-events-auto">
                            <button onClick={() => setView('trip_dashboard')} className={`flex flex-col items-center justify-center w-full h-full rounded-full ${view === 'trip_dashboard' ? 'text-[#1D1D1F]' : 'text-[#8E8E93]'}`}>
                                <i className="fa-solid fa-home text-[18px] mb-1"></i><span className="text-[9px] font-bold uppercase">Home</span>
                            </button>
                            <button onClick={() => setView('trips')} className={`flex flex-col items-center justify-center w-full h-full rounded-full ${view === 'trips' ? 'text-[#1D1D1F]' : 'text-[#8E8E93]'}`}>
                                <i className="fa-solid fa-plane-departure text-[18px] mb-1"></i><span className="text-[9px] font-bold uppercase">Trips</span>
                            </button>
                            <button onClick={() => setView('notifications')} className={`flex flex-col items-center justify-center w-full h-full rounded-full ${view === 'notifications' ? 'text-[#1D1D1F]' : 'text-[#8E8E93]'}`}>
                                <i className="fa-solid fa-bell text-[18px] mb-1"></i><span className="text-[9px] font-bold uppercase">Radar</span>
                            </button>
                        </div>
                    </div>

                    {confirmDialog && (
                        <div className="fixed inset-0 z- bg-black/20 backdrop-blur-md flex items-center justify-center p-6">
                            <div className="bg-white/95 rounded-[28px] w-full max-w-[280px] overflow-hidden shadow-2xl border border-white">
                                <div className="p-6 text-center">
                                    <h3 className="font-bold text-lg mb-2">Are you sure?</h3>
                                    <p className="text-sm text-slate-500">{confirmDialog.message}</p>
                                </div>
                                <div className="flex border-t border-black/5">
                                    <button onClick={() => setConfirmDialog(null)} className="flex-1 py-4 font-bold border-r border-black/5">Cancel</button>
                                    <button onClick={() => { confirmDialog.onConfirm(); setConfirmDialog(null); }} className="flex-1 py-4 font-bold text-[var(--ios-red)]">Delete</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
