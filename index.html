<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- This meta tag ensures the app looks native on iOS and Android without awkward zooming -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WanderTracker Live</title>
    
    <!-- Apple/iOS Web App settings for adding to Home Screen -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Globe_icon.svg/1024px-Globe_icon.svg.png">

    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Leaflet CSS & JS for Interactive Map Picker -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for in-browser JSX compiling -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        /* iOS Safe Area paddings */
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        
        /* Hide scrollbar for photo carousel but keep functionality */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-slide-in { animation: slideIn 0.2s ease-out forwards; }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo, useRef } = React;

        // --- FIREBASE SETUP ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyDUdgQdMPAUVHSIHmbfIpSEYwQNWdFM578",
                authDomain: "trip-navigation-b0f21.firebaseapp.com",
                projectId: "trip-navigation-b0f21",
                storageBucket: "trip-navigation-b0f21.firebasestorage.app",
                messagingSenderId: "841186283877",
                appId: "1:841186283877:web:7551e6f5f33dfe6d3e118c"
            };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'my-wander-tracker-app';

        // Haversine formula
        function calculateDistance(lat1, lon1, lat2, lon2) {
            if (lat1 == null || lon1 == null || lat2 == null || lon2 == null) return null;
            const R = 6371; 
            const dLat = (lat2 - lat1) * (Math.PI / 180);
            const dLon = (lon2 - lon1) * (Math.PI / 180);
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * (Math.PI / 180)) * Math.cos(lat2 * (Math.PI / 180)) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function formatDistance(distInKm) {
            if (distInKm == null || isNaN(distInKm)) return "Distance unknown";
            if (distInKm < 1) return `${Math.round(distInKm * 1000)}m away`;
            return `${Number(distInKm).toFixed(1)}km away`;
        }

        function App() {
            // --- STATE ---
            const [user, setUser] = useState(null);
            const [authError, setAuthError] = useState('');
            const [liveLocation, setLiveLocation] = useState(null);
            const [geoError, setGeoError] = useState('');
            const [locations, setLocations] = useState([]);
            
            // Itinerary State
            const [itineraries, setItineraries] = useState([]);
            const [activeItinId, setActiveItinId] = useState(null);
            
            // Itinerary Form State
            const [itinTitle, setItinTitle] = useState('');
            const [itinDate, setItinDate] = useState('');
            
            // Itinerary Item (Timesheet Event) Form State
            const [editItinItemId, setEditItinItemId] = useState(null);
            const [itinItemTime, setItinItemTime] = useState('');
            const [itinItemLabel, setItinItemLabel] = useState('Tourist Attraction');
            const [itinItemLocId, setItinItemLocId] = useState('');
            const [itinItemNotes, setItinItemNotes] = useState('');
            
            // Search State for Itinerary Location Picker
            const [searchQuery, setSearchQuery] = useState('');

            // Navigation & UI State
            const [view, setView] = useState('cities'); 
            const [activeCity, setActiveCity] = useState(null);
            const [activeCategory, setActiveCategory] = useState(null);
            const [selectedLocId, setSelectedLocId] = useState(null);
            const [previousView, setPreviousView] = useState('cities');
            const [locationReturnView, setLocationReturnView] = useState('category_list');
            
            // Full Screen Image Viewer State
            const [fullScreenPhoto, setFullScreenPhoto] = useState(null); // { photos: [], index: 0 }
            const fullScreenScrollRef = useRef(null);
            
            // Custom Confirm Modal State
            const [confirmDialog, setConfirmDialog] = useState(null);
            
            // Form State
            const [editId, setEditId] = useState(null);
            const [name, setName] = useState('');
            
            const [editingCityName, setEditingCityName] = useState(null); 
            const [newCityName, setNewCityName] = useState(''); 
            
            const [city, setCity] = useState('');
            const [category, setCategory] = useState('');
            const [lat, setLat] = useState('');
            const [lng, setLng] = useState('');
            const [mapLink, setMapLink] = useState('');
            const [photos, setPhotos] = useState([]); 
            const [saveError, setSaveError] = useState('');
            const [isSaving, setIsSaving] = useState(false);
            
            // Recommendation State
            const [showRecommendation, setShowRecommendation] = useState(true);

            // Nearby Alerts State
            const [nearbyAlerts, setNearbyAlerts] = useState([]);
            const [notifiedLocationIds, setNotifiedLocationIds] = useState(new Set());

            // Leaflet Map Refs
            const mapRef = useRef(null);
            const leafletMap = useRef(null);
            const leafletMarker = useRef(null);

            // --- EFFECTS ---
            // 1. Authenticate
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {
                        setAuthError(err.message);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // 2. Fetch Data
            useEffect(() => {
                if (!user) return;
                const locationsRef = collection(db, 'artifacts', appId, 'public', 'data', 'locations');
                const unsubLocs = onSnapshot(locationsRef, (snapshot) => {
                    const fetchedLocations = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        let docPhotos = data.photos || [];
                        if (!data.photos && data.media && data.mediaType === 'image') {
                            docPhotos = [data.media];
                        }
                        fetchedLocations.push({ id: doc.id, ...data, photos: docPhotos });
                    });
                    setLocations(fetchedLocations);
                }, (error) => {
                    console.error("Error fetching locations: ", error);
                });

                const itinerariesRef = collection(db, 'artifacts', appId, 'public', 'data', 'itineraries');
                const unsubItins = onSnapshot(itinerariesRef, (snapshot) => {
                    const fetchedItins = [];
                    snapshot.forEach(doc => {
                        fetchedItins.push({ id: doc.id, ...doc.data() });
                    });
                    fetchedItins.sort((a, b) => a.timestamp - b.timestamp);
                    setItineraries(fetchedItins);
                }, (error) => {
                    console.error("Error fetching itineraries: ", error);
                });

                return () => { unsubLocs(); unsubItins(); };
            }, [user]);

            // 3. Track GPS
            useEffect(() => {
                if (!("geolocation" in navigator)) {
                    setGeoError("GPS not supported.");
                    return;
                }
                const watchId = navigator.geolocation.watchPosition(
                    (pos) => { setLiveLocation({ lat: pos.coords.latitude, lng: pos.coords.longitude }); setGeoError(''); },
                    (err) => { 
                        // Removed the hardcoded mock location that was causing incorrect distances.
                        // Now properly alerts the user if location access is blocked or unavailable.
                        setGeoError("Location access denied or unavailable. Please enable GPS permissions."); 
                    },
                    { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
                );
                return () => navigator.geolocation.clearWatch(watchId);
            }, []);

            // 3.5 Check for nearby locations (within 1km)
            useEffect(() => {
                if (!liveLocation || locations.length === 0) return;

                const newAlerts = [];
                const newNotifiedIds = new Set(notifiedLocationIds);

                locations.forEach(loc => {
                    if (loc.isCityMarker || loc.lat == null || loc.lng == null) return;
                    
                    const dist = calculateDistance(liveLocation.lat, liveLocation.lng, loc.lat, loc.lng);
                    
                    // If within 1km and hasn't been notified yet in this session
                    if (dist !== null && dist <= 1.0 && !newNotifiedIds.has(loc.id)) {
                        newAlerts.push({ ...loc, currentDistance: dist });
                        newNotifiedIds.add(loc.id); // Mark as notified
                    }
                });

                if (newAlerts.length > 0) {
                    setNearbyAlerts(prev => [...prev, ...newAlerts]);
                    setNotifiedLocationIds(newNotifiedIds);
                }
            }, [liveLocation, locations]);

            // Auto-dismiss nearby alerts after 8 seconds
            useEffect(() => {
                if (nearbyAlerts.length > 0) {
                    const timer = setTimeout(() => {
                        setNearbyAlerts(prev => prev.slice(1)); // Remove the oldest alert
                    }, 8000);
                    return () => clearTimeout(timer);
                }
            }, [nearbyAlerts]);

            // 4. Auto-scroll Full Screen Image Carousel
            useEffect(() => {
                if (view === 'photo_viewer' && fullScreenPhoto && fullScreenScrollRef.current) {
                    setTimeout(() => {
                        if (fullScreenScrollRef.current) {
                            fullScreenScrollRef.current.scrollLeft = fullScreenPhoto.index * fullScreenScrollRef.current.clientWidth;
                        }
                    }, 10);
                }
            }, [view, fullScreenPhoto]);

            // 5. Manage Native Pinch-to-Zoom for Photo Viewer
            useEffect(() => {
                const meta = document.querySelector('meta[name="viewport"]');
                if (view === 'photo_viewer') {
                    meta.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover');
                } else {
                    meta.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover');
                }
            }, [view]);

            // 6. Interactive Leaflet Map Initialization
            useEffect(() => {
                if (view === 'form') {
                    // Small delay to ensure the div is fully rendered with height/width
                    const timer = setTimeout(() => {
                        if (mapRef.current && !leafletMap.current) {
                            const initLat = parseFloat(lat) || (liveLocation ? liveLocation.lat : 11.5564);
                            const initLng = parseFloat(lng) || (liveLocation ? liveLocation.lng : 104.9282);

                            leafletMap.current = L.map(mapRef.current).setView([initLat, initLng], 15);
                            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                                maxZoom: 19,
                                attribution: '© OpenStreetMap'
                            }).addTo(leafletMap.current);

                            const customIcon = L.icon({
                                iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
                                iconRetinaUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png',
                                shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
                                iconSize:,
                                iconAnchor:
                            });

                            leafletMarker.current = L.marker([initLat, initLng], {draggable: true, icon: customIcon}).addTo(leafletMap.current);
                            
                            leafletMarker.current.on('dragend', function () {
                                const position = leafletMarker.current.getLatLng();
                                setLat(position.lat.toFixed(6));
                                setLng(position.lng.toFixed(6));
                            });

                            leafletMap.current.on('click', function(event) {
                                leafletMarker.current.setLatLng(event.latlng);
                                setLat(event.latlng.lat.toFixed(6));
                                setLng(event.latlng.lng.toFixed(6));
                            });
                        }
                    }, 100);
                    return () => clearTimeout(timer);
                } else {
                    if (leafletMap.current) {
                        leafletMap.current.remove();
                        leafletMap.current = null;
                        leafletMarker.current = null;
                    }
                }
            }, [view]);

            // 7. Keep Map in Sync with Manual Input
            useEffect(() => {
                if (view === 'form' && leafletMap.current && leafletMarker.current) {
                    const pLat = parseFloat(lat);
                    const pLng = parseFloat(lng);
                    if (!isNaN(pLat) && !isNaN(pLng)) {
                        const currentLatLng = leafletMarker.current.getLatLng();
                        if (Math.abs(currentLatLng.lat - pLat) > 0.0001 || Math.abs(currentLatLng.lng - pLng) > 0.0001) {
                             leafletMarker.current.setLatLng([pLat, pLng]);
                             leafletMap.current.setView([pLat, pLng]);
                        }
                    }
                }
            }, [lat, lng, view]);

            // --- NAVIGATION HANDLERS ---
            const resetForm = () => {
                setEditId(null);
                setName('');
                setCity(activeCity || 'Ho Chi Minh City');
                setCategory(activeCategory || '');
                setLat('');
                setLng('');
                setMapLink('');
                setPhotos([]);
                setSaveError('');
            };

            const openForm = (loc = null) => {
                setPreviousView(view); 
                if (loc) {
                    setEditId(loc.id);
                    setName(loc.name || '');
                    setCity(loc.city || 'Ho Chi Minh City');
                    setCategory(loc.category || 'Uncategorized');
                    setLat(loc.lat != null ? String(loc.lat) : '');
                    setLng(loc.lng != null ? String(loc.lng) : '');
                    setMapLink(loc.mapLink || '');
                    setPhotos([...(loc.photos || [])]);
                } else {
                    resetForm();
                }
                setView('form');
            };

            const openCityForm = (cityName = null) => {
                setPreviousView(view);
                setSaveError('');
                if (cityName) {
                    setEditingCityName(cityName);
                    setNewCityName(cityName);
                } else {
                    setEditingCityName(null);
                    setNewCityName('');
                }
                setView('city_form');
            };

            const handleBack = () => {
                if (view === 'photo_viewer') {
                    setView(previousView);
                    setFullScreenPhoto(null);
                } else if (view === 'form') {
                    setView(previousView);
                } else if (view === 'city_form') {
                    setView('cities');
                } else if (view === 'location_detail') {
                    setView(locationReturnView);
                    setSelectedLocId(null);
                } else if (view === 'category_list') {
                    setView('categories');
                    setActiveCategory(null);
                } else if (view === 'categories') {
                    setView('cities');
                    setActiveCity(null);
                } else if (view === 'itinerary_detail') {
                    setView('itineraries');
                    setActiveItinId(null);
                } else if (view === 'itinerary_form') {
                    setView('itineraries');
                } else if (view === 'itinerary_select_location') {
                    setView('itinerary_detail');
                } else if (view === 'itinerary_item_form') {
                    setView(previousView === 'itinerary_select_location' ? 'itinerary_select_location' : 'itinerary_detail');
                }
            };

            const dismissNearbyAlert = (id) => {
                setNearbyAlerts(prev => prev.filter(alert => alert.id !== id));
            };

            // --- FORM HANDLERS ---
            const handleCoordinatePaste = (e) => {
                const pastedText = e.clipboardData.getData('text');
                const coordsMatch = pastedText.match(/(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)/);
                if (coordsMatch) {
                    e.preventDefault(); 
                    setLat(coordsMatch);
                    setLng(coordsMatch);
                }
            };

            const handleMapLinkChange = (e) => {
                const link = e.target.value;
                setMapLink(link);
                // Enhanced regex to catch coordinates from various Google Maps link formats
                const match = link.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/) || link.match(/query=(-?\d+\.\d+),(-?\d+\.\d+)/);
                if (match) {
                    setLat(match);
                    setLng(match);
                }
            };

            const processImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX = 2048; 
                            let {width, height} = img;
                            if (width > height && width > MAX) { height *= MAX / width; width = MAX; }
                            else if (height > MAX) { width *= MAX / height; height = MAX; }
                            canvas.width = width; canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            resolve(canvas.toDataURL('image/jpeg', 0.85)); 
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            };

            const handleFiles = async (e) => {
                const files = Array.from(e.target.files).filter(f => f.type.startsWith('image'));
                if (!files.length) return;
                setIsSaving(true);
                try {
                    const newPhotos = await Promise.all(files.map(processImage));
                    setPhotos(prev => [...prev, ...newPhotos]);
                } catch (err) {
                    setSaveError("Error processing images.");
                } finally {
                    setIsSaving(false);
                    e.target.value = null; 
                }
            };

            const removePhoto = (index) => {
                setPhotos(prev => prev.filter((_, i) => i !== index));
            };

            const useCurrentLocation = () => {
                if (liveLocation) {
                    setLat(liveLocation.lat.toFixed(6));
                    setLng(liveLocation.lng.toFixed(6));
                    setSaveError('');
                } else {
                    setSaveError("Live location not ready yet. Please ensure GPS is enabled.");
                }
            };

            const handleSaveCity = async (e) => {
                e.preventDefault();
                const trimmedCity = newCityName.trim();
                if (!trimmedCity) return;
                setIsSaving(true);
                try {
                    if (editingCityName) {
                        if (trimmedCity !== editingCityName) {
                            const locsToUpdate = locations.filter(l => (l.city || 'Ho Chi Minh City') === editingCityName);
                            const updatePromises = locsToUpdate.map(l => 
                                updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', l.id), { city: trimmedCity })
                            );
                            await Promise.all(updatePromises);
                        }
                    } else {
                        const newId = Date.now().toString();
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', newId), { 
                            isCityMarker: true, 
                            city: trimmedCity, 
                            timestamp: Date.now() 
                        });
                    }
                    setNewCityName('');
                    setEditingCityName(null);
                    setActiveCity(trimmedCity);
                    setPreviousView('cities');
                    setView('categories'); 
                } catch (err) {
                    setSaveError("Save failed: " + err.message);
                } finally {
                    setIsSaving(false);
                }
            };

            const handleSaveLocation = async (e) => {
                e.preventDefault();
                setSaveError('');
                
                const parsedLat = parseFloat(lat); 
                const parsedLng = parseFloat(lng);

                if (!name || !city || !category || isNaN(parsedLat) || isNaN(parsedLng)) {
                    setSaveError("Please provide Name, City, Category, and valid Coordinates.");
                    return;
                }

                setIsSaving(true);
                const locationData = { name, city, category, lat: parsedLat, lng: parsedLng, mapLink, photos };
                
                if (!editId) locationData.timestamp = Date.now();

                try {
                    if (editId) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', editId), locationData);
                    } else {
                        const newId = Date.now().toString();
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', newId), locationData);
                    }
                    handleBack();
                } catch (err) {
                    if (err.code === 'resource-exhausted' || err.message.includes('payload')) {
                        setSaveError("The combined size of the images is too large to save. Try using fewer photos or resizing them.");
                    } else {
                        setSaveError("Save failed: " + err.message);
                    }
                } finally {
                    setIsSaving(false);
                }
            };

            const confirmAction = (message, onConfirm) => {
                setConfirmDialog({ message, onConfirm });
            };

            const deleteCity = async (cityToDelete) => {
                confirmAction(`Delete "${cityToDelete}" and ALL places inside it?`, async () => {
                    try {
                        const locsToDelete = locations.filter(l => (l.city || 'Ho Chi Minh City') === cityToDelete);
                        const deletePromises = locsToDelete.map(l => 
                            deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', l.id))
                        );
                        await Promise.all(deletePromises);
                        if (activeCity === cityToDelete) {
                            setView('cities');
                            setActiveCity(null);
                        }
                    } catch (err) {
                        alert("Delete failed: " + err.message);
                    }
                });
            };

            const deleteLocation = async (id, isDetailView = false) => {
                confirmAction("Delete this location completely?", async () => {
                    try {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', id));
                        if (isDetailView) handleBack();
                    } catch (err) { setSaveError("Delete failed: " + err.message); }
                });
            };

            // --- ITINERARY HANDLERS ---
            const openItineraryForm = (itin = null) => {
                setPreviousView(view);
                if (itin && itin.id) {
                    setEditId(itin.id);
                    setItinTitle(itin.title || '');
                    setItinDate(itin.date || '');
                } else {
                    setEditId(null);
                    setItinTitle('');
                    setItinDate('');
                }
                setView('itinerary_form');
            };

            const handleSaveItinerary = async (e) => {
                e.preventDefault();
                setIsSaving(true);
                const data = { title: itinTitle, date: itinDate };
                let isNew = false;
                let currentItinId = editId;

                if (!editId) {
                    isNew = true;
                    data.timestamp = Date.now();
                    data.items = [];
                }
                try {
                    if (editId) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'itineraries', editId), data);
                    } else {
                        currentItinId = Date.now().toString();
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'itineraries', currentItinId), data);
                    }
                    
                    if (isNew) {
                        // Flow logic: Instantly navigate to selecting locations to add to the new itinerary
                        setActiveItinId(currentItinId);
                        setPreviousView('itinerary_detail'); // Ensure back button returns to the day's timesheet
                        setEditItinItemId(null);
                        setItinItemTime('');
                        setItinItemLabel('Tourist Attraction');
                        setItinItemLocId('');
                        setItinItemNotes('');
                        setView('itinerary_select_location');
                    } else {
                        handleBack();
                    }
                } catch (err) { alert("Save failed: " + err.message); }
                setIsSaving(false);
            };

            const openItineraryItemForm = (item = null) => {
                if (item) {
                    setPreviousView(view);
                    setEditItinItemId(item.id);
                    setItinItemTime(item.time || '');
                    setItinItemLabel(item.label || 'Tourist Attraction');
                    setItinItemLocId(item.locationId || '');
                    setItinItemNotes(item.notes || '');
                    setView('itinerary_item_form');
                } else {
                    setPreviousView(view);
                    setEditItinItemId(null);
                    setItinItemTime('');
                    setItinItemLabel('Tourist Attraction');
                    setItinItemLocId('');
                    setItinItemNotes('');
                    setSearchQuery(''); // Reset search when opening location picker
                    setView('itinerary_select_location');
                }
            };

            const handleSelectLocationForItinerary = (locId) => {
                setItinItemLocId(locId);
                setPreviousView('itinerary_select_location');
                setView('itinerary_item_form');
            };

            const handleSaveItineraryItem = async (e) => {
                e.preventDefault();
                setIsSaving(true);
                const itin = itineraries.find(i => i.id === activeItinId);
                if (!itin) return;
                
                let updatedItems = [...(itin.items || [])];
                const newItem = {
                    id: editItinItemId || Date.now().toString(),
                    time: itinItemTime,
                    label: itinItemLabel,
                    locationId: itinItemLocId,
                    notes: itinItemNotes
                };

                if (editItinItemId) {
                    updatedItems = updatedItems.map(item => item.id === editItinItemId ? newItem : item);
                } else {
                    updatedItems.push(newItem);
                }
                
                // Sort chronologically by time
                updatedItems.sort((a, b) => a.time.localeCompare(b.time));

                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'itineraries', activeItinId), { items: updatedItems });
                    setView('itinerary_detail'); // Always return back to the timesheet list after saving
                } catch (err) { setSaveError("Save failed: " + err.message); }
                setIsSaving(false);
            };

            const deleteItineraryItem = async (itemId) => {
                confirmAction("Remove this event from the timesheet?", async () => {
                    const itin = itineraries.find(i => i.id === activeItinId);
                    const updatedItems = (itin.items || []).filter(item => item.id !== itemId);
                    try {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'itineraries', activeItinId), { items: updatedItems });
                    } catch (err) { console.error("Delete failed: " + err.message); }
                });
            };

            const deleteItinerary = async (id) => {
                confirmAction("Delete this entire itinerary and its timesheet?", async () => {
                    try {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'itineraries', id));
                    } catch (err) { console.error("Delete failed: " + err.message); }
                });
            };

            // --- DATA PROCESSING ---
            const dataHierarchy = useMemo(() => {
                const cities = {};
                const allCategories = new Set();
                
                locations.forEach(loc => {
                    const cName = loc.city || 'Ho Chi Minh City';
                    if (!cities[cName]) cities[cName] = { count: 0, categories: {} };

                    // Skip empty city markers when counting locations
                    if (loc.isCityMarker) return; 

                    const catName = loc.category || 'Uncategorized';
                    allCategories.add(catName);

                    if (!cities[cName].categories[catName]) cities[cName].categories[catName] = [];

                    const dist = liveLocation ? calculateDistance(liveLocation.lat, liveLocation.lng, loc.lat, loc.lng) : null;
                    cities[cName].categories[catName].push({ ...loc, currentDistance: dist });
                    cities[cName].count++;
                });

                Object.values(cities).forEach(cityData => {
                    Object.values(cityData.categories).forEach(catList => {
                        catList.sort((a, b) => (a.currentDistance || 99999) - (b.currentDistance || 99999));
                    });
                });

                return {
                    cities,
                    uniqueCities: Object.keys(cities).sort(),
                    allCategories: Array.from(allCategories).sort()
                };
            }, [locations, liveLocation]);

            const sortedLocationsForItinerary = useMemo(() => {
                return locations
                    .filter(loc => !loc.isCityMarker) 
                    .map(loc => ({
                        ...loc,
                        currentDistance: liveLocation ? calculateDistance(liveLocation.lat, liveLocation.lng, loc.lat, loc.lng) : null
                    }))
                    .sort((a, b) => (a.currentDistance || 99999) - (b.currentDistance || 99999));
            }, [locations, liveLocation]);
            
            // Filter and Group Locations for the Itinerary Picker
            const filteredAndGroupedLocations = useMemo(() => {
                const term = searchQuery.toLowerCase();
                const filtered = sortedLocationsForItinerary.filter(loc => 
                    (loc.name || '').toLowerCase().includes(term) ||
                    (loc.category || '').toLowerCase().includes(term) ||
                    (loc.city || '').toLowerCase().includes(term)
                );

                const grouped = {};
                filtered.forEach(loc => {
                    const cat = loc.category || 'Uncategorized';
                    if (!grouped[cat]) grouped[cat] = [];
                    grouped[cat].push(loc);
                });

                return {
                    grouped,
                    sortedCategories: Object.keys(grouped).sort()
                };
            }, [sortedLocationsForItinerary, searchQuery]);

            // Find absolute closest location for recommendation
            const closestLocation = useMemo(() => {
                if (!liveLocation || sortedLocationsForItinerary.length === 0) return null;
                // Since sortedLocationsForItinerary is already sorted by distance, the first item is the closest!
                return sortedLocationsForItinerary;
            }, [sortedLocationsForItinerary, liveLocation]);
            
            const locDetail = view === 'location_detail' && selectedLocId 
                ? locations.find(l => l.id === selectedLocId) 
                : null;
                
            useEffect(() => {
                if (view === 'location_detail' && selectedLocId && !locDetail && locations.length > 0) {
                    handleBack();
                }
            }, [locations, locDetail, view, selectedLocId]);

            // --- RENDER VIEWS ---
            return (
                <div className="min-h-screen bg-slate-50 pb-20 safe-bottom relative">
                    
                    {/* FULL SCREEN PHOTO VIEWER PAGE */}
                    {view === 'photo_viewer' && fullScreenPhoto && (
                        <div className="fixed inset-0 z-50 bg-black flex flex-col animate-slide-in">
                            <div className="flex items-center px-4 py-3 h-14 safe-top border-b border-gray-800 bg-black flex-shrink-0">
                                <button 
                                    onClick={handleBack} 
                                    className="text-white hover:bg-gray-800 px-3 py-1.5 -ml-3 rounded-full flex items-center transition-colors active:bg-gray-700"
                                >
                                    <i className="fa-solid fa-arrow-left text-lg mr-2"></i>
                                    <span className="font-semibold">Back</span>
                                </button>
                                <div className="flex-1 text-center font-bold text-white/90 mr-8">
                                    Photos
                                </div>
                            </div>
                            
                            <div ref={fullScreenScrollRef} className="flex-1 w-full flex overflow-x-auto snap-x snap-mandatory scrollbar-hide">
                                {fullScreenPhoto.photos.map((p, idx) => (
                                    <div key={idx} className="w-full h-full flex-shrink-0 snap-center flex items-center justify-center">
                                        <img src={p} className="max-w-full max-h-full object-contain safe-bottom" alt={`Location photo ${idx + 1}`} />
                                    </div>
                                ))}
                            </div>
                            
                            {fullScreenPhoto.photos.length > 1 && (
                                <div className="absolute bottom-8 left-0 right-0 flex justify-center pointer-events-none safe-bottom">
                                    <div className="bg-gray-800/80 text-white/90 text-xs font-bold px-4 py-2 rounded-full backdrop-blur-md shadow-lg">
                                        <i className="fa-solid fa-arrows-left-right mr-2"></i> Swipe / Pinch to Zoom
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* NEARBY ALERTS TOAST */}
                    <div className="fixed top-16 left-0 right-0 z-50 flex flex-col items-center space-y-2 px-4 pointer-events-none">
                        {nearbyAlerts.map(alert => (
                            <div key={alert.id} className="bg-indigo-600 text-white px-4 py-3 rounded-2xl shadow-xl flex items-center justify-between w-full max-w-sm pointer-events-auto animate-slide-in border border-indigo-500">
                                <div className="flex items-center space-x-3 cursor-pointer flex-1" onClick={() => { setLocationReturnView(view); setSelectedLocId(alert.id); setView('location_detail'); dismissNearbyAlert(alert.id); }}>
                                    <div className="bg-white/20 w-10 h-10 rounded-full shrink-0 flex items-center justify-center">
                                        <i className="fa-solid fa-bell animate-bounce"></i>
                                    </div>
                                    <div>
                                        <p className="text-[10px] font-bold uppercase tracking-wider text-indigo-200">Nearby Alert ({formatDistance(alert.currentDistance)})</p>
                                        <p className="font-bold text-sm leading-tight truncate max-w-[200px]">{alert.name}</p>
                                    </div>
                                </div>
                                <button onClick={() => dismissNearbyAlert(alert.id)} className="w-8 h-8 flex items-center justify-center rounded-full bg-indigo-700/50 hover:bg-indigo-700 text-indigo-200 hover:text-white transition-colors ml-2 shrink-0 active:scale-90">
                                    <i className="fa-solid fa-xmark"></i>
                                </button>
                            </div>
                        ))}
                    </div>

                    {/* APP HEADER */}
                    <header className="bg-white shadow-sm sticky top-0 z-40 border-b border-slate-200 safe-top">
                        <div className="max-w-3xl mx-auto px-4 py-3 flex justify-between items-center h-14">
                            <div className="flex items-center space-x-3 flex-1 overflow-hidden">
                                {view !== 'cities' && view !== 'itineraries' && (
                                    <button onClick={handleBack} className="text-slate-500 hover:bg-slate-100 p-2 -ml-2 rounded-full transition-colors flex-shrink-0 active:bg-slate-200">
                                        <i className="fa-solid fa-arrow-left text-lg"></i>
                                    </button>
                                )}
                                <div className="bg-indigo-600 w-8 h-8 rounded-lg flex items-center justify-center shadow-sm flex-shrink-0">
                                    <i className="fa-solid fa-globe text-white"></i>
                                </div>
                                <h1 className="text-lg font-bold text-slate-800 truncate">
                                    {view === 'cities' ? 'WanderTracker' : 
                                     view === 'city_form' ? (editingCityName ? 'Edit City' : 'Add City') :
                                     view === 'categories' ? activeCity : 
                                     view === 'category_list' ? activeCategory : 
                                     view === 'location_detail' ? 'Details' :
                                     view === 'itineraries' ? 'Itinerary Planner' :
                                     view === 'itinerary_detail' ? 'Day Timesheet' :
                                     view === 'itinerary_form' ? (editId ? 'Edit Itinerary' : 'Plan a Day') :
                                     view === 'itinerary_select_location' ? 'Select Location' :
                                     editId || editItinItemId ? 'Edit Item' : 'Create Item'}
                                </h1>
                            </div>
                            
                            <div className="flex items-center space-x-2 pl-2 flex-shrink-0">
                                {geoError ? (
                                    <div className="bg-amber-50 px-2 py-1 rounded border border-amber-200" title={geoError}>
                                        <i className="fa-solid fa-location-crosshairs text-amber-500 text-xs"></i>
                                    </div>
                                ) : liveLocation ? (
                                    <div className="bg-emerald-50 px-2 py-1 rounded border border-emerald-100 flex items-center space-x-1">
                                        <span className="relative flex h-2 w-2">
                                            <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                            <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                                        </span>
                                    </div>
                                ) : null}
                            </div>
                        </div>
                        
                        {/* Tabs for Places / Itinerary */}
                        {(view === 'cities' || view === 'itineraries') && (
                            <div className="flex bg-white px-4 border-b border-slate-200">
                                <button onClick={() => setView('cities')} className={`flex-1 py-3 text-center font-bold text-sm border-b-2 transition-colors ${view === 'cities' ? 'text-indigo-600 border-indigo-600' : 'text-slate-400 border-transparent hover:text-slate-600'}`}>
                                    <i className="fa-solid fa-map-location-dot mr-2"></i> Places
                                </button>
                                <button onClick={() => setView('itineraries')} className={`flex-1 py-3 text-center font-bold text-sm border-b-2 transition-colors ${view === 'itineraries' ? 'text-indigo-600 border-indigo-600' : 'text-slate-400 border-transparent hover:text-slate-600'}`}>
                                    <i className="fa-solid fa-calendar-day mr-2"></i> Itineraries
                                </button>
                            </div>
                        )}
                    </header>

                    <main className="max-w-3xl mx-auto p-4 animate-slide-in">
                        
                        {/* ========================================================= */}
                        {/* MAIN VIEWS - LOCATIONS / PLACES                           */}
                        {/* ========================================================= */}

                        {/* VIEW: CITIES */}
                        {view === 'cities' && (
                            <div className="space-y-3">
                                {showRecommendation && closestLocation && closestLocation.currentDistance != null && (
                                    <div className="mb-6 bg-gradient-to-r from-teal-500 to-emerald-600 rounded-2xl p-4 shadow-md text-white relative animate-fade-in cursor-pointer hover:shadow-lg transition-shadow active:scale-[0.98]"
                                         onClick={() => { setLocationReturnView('cities'); setSelectedLocId(closestLocation.id); setView('location_detail'); }}>
                                        <button 
                                            onClick={(e) => { e.stopPropagation(); setShowRecommendation(false); }} 
                                            className="absolute top-3 right-3 w-6 h-6 flex items-center justify-center bg-white/20 hover:bg-white/30 rounded-full transition-colors"
                                        >
                                            <i className="fa-solid fa-xmark text-xs text-white"></i>
                                        </button>
                                        <div className="flex items-start">
                                            <div className="bg-white/20 p-3 rounded-xl mr-4 flex items-center justify-center shrink-0">
                                                <i className="fa-solid fa-location-crosshairs text-xl text-white"></i>
                                            </div>
                                            <div className="pr-4">
                                                <p className="text-teal-50 text-xs font-bold uppercase tracking-wider mb-0.5">Closest to You</p>
                                                <h3 className="font-bold text-lg leading-tight mb-1 text-white">{closestLocation.name}</h3>
                                                <p className="text-sm font-medium text-emerald-100">
                                                    {formatDistance(closestLocation.currentDistance)} &bull; {closestLocation.city}
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                <p className="text-sm text-slate-500 font-medium mb-4 px-1">Your Cities</p>
                                {dataHierarchy.uniqueCities.length === 0 ? (
                                    <div className="text-center p-8 bg-white rounded-2xl border border-dashed border-slate-300 mt-8">
                                        <i className="fa-regular fa-map text-3xl text-slate-300 mb-3"></i>
                                        <p className="text-slate-500 text-sm">No locations saved yet. Tap + to add one!</p>
                                    </div>
                                ) : (
                                    dataHierarchy.uniqueCities.map(cityName => (
                                        <div 
                                            key={cityName}
                                            className="w-full bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex items-center justify-between hover:border-indigo-300 transition-all group"
                                        >
                                            <div className="flex items-center flex-1 cursor-pointer active:opacity-70" onClick={() => { setActiveCity(cityName); setView('categories'); }}>
                                                <div className="bg-indigo-50 group-hover:bg-indigo-100 w-12 h-12 rounded-xl flex items-center justify-center mr-4 transition-colors">
                                                    <i className="fa-solid fa-city text-indigo-500 text-xl"></i>
                                                </div>
                                                <div>
                                                    <h3 className="font-bold text-slate-800 text-lg">{cityName}</h3>
                                                    <p className="text-sm text-slate-500 font-medium">{dataHierarchy.cities[cityName].count} Places</p>
                                                </div>
                                            </div>
                                            <div className="flex space-x-1 sm:space-x-2 pl-3 border-l border-slate-100 ml-2">
                                                <button onClick={(e) => { e.stopPropagation(); openCityForm(cityName); }} className="w-9 h-9 sm:w-10 sm:h-10 rounded-full bg-slate-50 text-slate-400 hover:text-indigo-600 hover:bg-slate-100 flex items-center justify-center transition-colors active:scale-90">
                                                    <i className="fa-solid fa-pen text-sm"></i>
                                                </button>
                                                <button onClick={(e) => { e.stopPropagation(); deleteCity(cityName); }} className="w-9 h-9 sm:w-10 sm:h-10 rounded-full bg-red-50 text-red-400 hover:text-red-600 hover:bg-red-100 flex items-center justify-center transition-colors active:scale-90">
                                                    <i className="fa-solid fa-trash text-sm"></i>
                                                </button>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        {/* VIEW: CATEGORIES IN CITY */}
                        {view === 'categories' && activeCity && dataHierarchy.cities[activeCity] && (
                            <div className="space-y-3">
                                <p className="text-sm text-slate-500 font-medium mb-4 px-1">Categories in {activeCity}</p>
                                
                                {Object.keys(dataHierarchy.cities[activeCity].categories).length === 0 ? (
                                    <div className="text-center p-8 bg-white rounded-2xl border border-dashed border-slate-300 mt-8">
                                        <i className="fa-regular fa-folder-open text-3xl text-slate-300 mb-3"></i>
                                        <p className="text-slate-500 text-sm">No places in this city yet. Tap + to add one!</p>
                                    </div>
                                ) : (
                                    Object.keys(dataHierarchy.cities[activeCity].categories).sort().map(catName => (
                                        <button 
                                            key={catName}
                                            onClick={() => { setActiveCategory(catName); setView('category_list'); }}
                                            className="w-full bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex items-center justify-between hover:border-indigo-300 active:bg-slate-50 transition-all text-left group"
                                        >
                                            <div className="flex items-center">
                                                <div className="bg-indigo-50 group-hover:bg-indigo-100 w-12 h-12 rounded-xl flex items-center justify-center mr-4 transition-colors">
                                                    <i className="fa-solid fa-folder-open text-indigo-500 text-xl"></i>
                                                </div>
                                                <div>
                                                    <h3 className="font-bold text-slate-800 text-lg">{catName}</h3>
                                                    <p className="text-sm text-slate-500 font-medium">{dataHierarchy.cities[activeCity].categories[catName].length} Places</p>
                                                </div>
                                            </div>
                                            <i className="fa-solid fa-chevron-right text-slate-300"></i>
                                        </button>
                                    ))
                                )}
                            </div>
                        )}

                        {/* VIEW: CATEGORY LIST (LOCATIONS) */}
                        {view === 'category_list' && activeCity && activeCategory && dataHierarchy.cities[activeCity]?.categories[activeCategory] && (
                            <div className="space-y-4">
                                {dataHierarchy.cities[activeCity].categories[activeCategory].map(loc => (
                                    <div 
                                        key={loc.id} 
                                        className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden cursor-pointer hover:shadow-md transition-shadow active:bg-slate-50"
                                        onClick={() => { setLocationReturnView('category_list'); setSelectedLocId(loc.id); setView('location_detail'); }}
                                    >
                                        {/* Swipeable Image Carousel (Mini) */}
                                        {Array.isArray(loc.photos) && loc.photos.length > 0 ? (
                                            <div className="relative w-full h-48 bg-slate-100 group">
                                                <div className="flex w-full h-full overflow-x-auto snap-x snap-mandatory scrollbar-hide">
                                                    {loc.photos.map((p, idx) => (
                                                        <img 
                                                            key={idx} src={p} alt={`Photo of ${loc.name}`} 
                                                            className="w-full h-full object-cover shrink-0 snap-center" 
                                                            onClick={(e) => { 
                                                                e.stopPropagation(); 
                                                                setPreviousView(view);
                                                                setView('photo_viewer');
                                                                setFullScreenPhoto({ photos: loc.photos, index: idx }); 
                                                            }} 
                                                        />
                                                    ))}
                                                </div>
                                                {/* Dots indicator */}
                                                {loc.photos.length > 1 && (
                                                    <div className="absolute bottom-2 left-0 right-0 flex justify-center space-x-1.5 pointer-events-none">
                                                        {loc.photos.map((_, i) => (
                                                            <div key={i} className="w-1.5 h-1.5 rounded-full bg-white/80 shadow-sm" />
                                                        ))}
                                                    </div>
                                                )}
                                                {/* Edit Button overlaying image */}
                                                <button onClick={(e) => { e.stopPropagation(); openForm(loc); }} className="absolute top-2 right-2 bg-black/50 backdrop-blur-sm text-white w-8 h-8 rounded-full flex items-center justify-center hover:bg-black/70 active:scale-95 z-10">
                                                    <i className="fa-solid fa-pen text-sm"></i>
                                                </button>
                                            </div>
                                        ) : (
                                            <div className="h-20 w-full bg-slate-50 border-b border-slate-100 flex items-center justify-between px-4 relative">
                                                <i className="fa-regular fa-image text-2xl text-slate-300"></i>
                                                <button onClick={(e) => { e.stopPropagation(); openForm(loc); }} className="text-slate-400 hover:text-indigo-600 bg-white shadow-sm border border-slate-200 w-8 h-8 rounded-full flex items-center justify-center active:scale-95">
                                                    <i className="fa-solid fa-pen text-sm"></i>
                                                </button>
                                            </div>
                                        )}

                                        <div className="p-4">
                                            <div className="flex justify-between items-start mb-1">
                                                <h4 className="text-lg font-bold text-slate-900">{loc.name}</h4>
                                                <button onClick={(e) => { e.stopPropagation(); deleteLocation(loc.id); }} className="text-slate-300 hover:text-red-500 p-1 active:scale-90">
                                                    <i className="fa-solid fa-trash"></i>
                                                </button>
                                            </div>
                                            
                                            <div className="flex items-center text-sm text-teal-600 font-semibold mb-3 bg-teal-50 inline-flex px-2 py-0.5 rounded">
                                                <i className="fa-solid fa-location-arrow mr-1.5 text-xs"></i>
                                                {formatDistance(loc.currentDistance)}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* VIEW: LOCATION DETAIL */}
                        {view === 'location_detail' && locDetail && (
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden pb-4">
                                {/* Carousel (Large) */}
                                {Array.isArray(locDetail.photos) && locDetail.photos.length > 0 ? (
                                    <div className="relative w-full h-72 bg-slate-100">
                                        <div className="flex w-full h-full overflow-x-auto snap-x snap-mandatory scrollbar-hide">
                                            {locDetail.photos.map((p, idx) => (
                                                <img 
                                                    key={idx} src={p} alt={`Detailed photo of ${locDetail.name}`} 
                                                    className="w-full h-full object-cover shrink-0 snap-center cursor-pointer active:opacity-90 transition-opacity" 
                                                    onClick={() => {
                                                        setPreviousView(view);
                                                        setView('photo_viewer');
                                                        setFullScreenPhoto({ photos: locDetail.photos, index: idx });
                                                    }} 
                                                />
                                            ))}
                                        </div>
                                        {/* Swipe Hints & Indicators */}
                                        {locDetail.photos.length > 1 && (
                                            <>
                                                <div className="absolute top-3 left-3 bg-black/60 text-white text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded backdrop-blur-sm pointer-events-none">
                                                    1 of {locDetail.photos.length}
                                                </div>
                                                <div className="absolute bottom-3 left-0 right-0 flex justify-center space-x-2 pointer-events-none">
                                                    {locDetail.photos.map((_, i) => (
                                                        <div key={i} className="w-2 h-2 rounded-full bg-white/80 shadow-sm" />
                                                    ))}
                                                </div>
                                            </>
                                        )}
                                    </div>
                                ) : (
                                    <div className="w-full h-32 bg-slate-50 border-b border-slate-200 flex flex-col items-center justify-center text-slate-400">
                                        <i className="fa-regular fa-image text-4xl mb-2"></i>
                                        <span className="text-sm font-medium">No photos</span>
                                    </div>
                                )}
                                
                                <div className="p-5 space-y-5">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <h2 className="text-2xl font-bold text-slate-900 mb-1 leading-tight pr-2">{locDetail.name}</h2>
                                            <span className="inline-block bg-indigo-50 text-indigo-600 text-xs font-bold px-2.5 py-1 rounded-md">{locDetail.category || 'Uncategorized'}</span>
                                        </div>
                                        <div className="flex space-x-2 flex-shrink-0">
                                            <button onClick={() => openForm(locDetail)} className="w-10 h-10 rounded-full bg-slate-50 border border-slate-200 text-slate-600 flex items-center justify-center hover:bg-slate-100 active:scale-95"><i className="fa-solid fa-pen"></i></button>
                                            <button onClick={() => deleteLocation(locDetail.id, true)} className="w-10 h-10 rounded-full bg-red-50 border border-red-100 text-red-500 flex items-center justify-center hover:bg-red-100 active:scale-95"><i className="fa-solid fa-trash"></i></button>
                                        </div>
                                    </div>
                                    
                                    {/* Distance Indicator */}
                                    <div className="flex items-center text-teal-700 font-bold bg-teal-50 px-4 py-3 rounded-xl border border-teal-100">
                                        <i className="fa-solid fa-location-arrow mr-3 text-teal-500 text-lg"></i>
                                        Currently {formatDistance(liveLocation && locDetail.lat != null && locDetail.lng != null ? calculateDistance(liveLocation.lat, liveLocation.lng, locDetail.lat, locDetail.lng) : null)}
                                    </div>

                                    {/* Info Panel */}
                                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-4">
                                        <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center space-y-2 sm:space-y-0">
                                            <span className="text-xs font-bold text-slate-500 uppercase flex items-center">
                                                <i className="fa-solid fa-map-pin mr-2 text-slate-400"></i> GPS Coordinates
                                            </span>
                                            <span className="text-sm font-mono text-slate-700 bg-white px-3 py-1.5 rounded-lg border border-slate-200 shadow-sm inline-block">
                                                {locDetail.lat != null ? Number(locDetail.lat).toFixed(6) : 'N/A'}, {locDetail.lng != null ? Number(locDetail.lng).toFixed(6) : 'N/A'}
                                            </span>
                                        </div>
                                        
                                        {locDetail.mapLink && (
                                            <div className="pt-4 border-t border-slate-200">
                                                <a href={locDetail.mapLink} target="_blank" rel="noopener noreferrer" className="w-full py-3 bg-indigo-600 text-white rounded-xl flex items-center justify-center font-bold hover:bg-indigo-700 active:scale-[0.98] transition-all shadow-md">
                                                    Open in Google Maps <i className="fa-solid fa-arrow-up-right-from-square ml-2 opacity-80"></i>
                                                </a>
                                            </div>
                                        )}
                                    </div>
                                    
                                    <p className="text-xs text-slate-400 text-center pt-2 font-medium">
                                        Saved on {new Date(locDetail.timestamp || Date.now()).toLocaleDateString()}
                                    </p>
                                </div>
                            </div>
                        )}

                        {/* VIEW: ADD OR EDIT CITY FORM */}
                        {view === 'city_form' && (
                            <form onSubmit={handleSaveCity} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                                <h2 className="text-lg font-bold text-slate-800 border-b border-slate-100 pb-2 mb-4">
                                    {editingCityName ? 'Edit City Name' : 'Add a New City'}
                                </h2>
                                {saveError && (
                                    <div className="p-3 bg-red-50 text-red-700 text-sm rounded-lg border border-red-200">
                                        <i className="fa-solid fa-triangle-exclamation mr-2"></i>{saveError}
                                    </div>
                                )}
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">City Name</label>
                                    <input type="text" required value={newCityName} onChange={e => setNewCityName(e.target.value)} className="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="e.g. Tokyo, Japan" autoFocus />
                                </div>
                                <button type="submit" disabled={isSaving || !newCityName.trim()} className="w-full mt-6 py-3.5 px-4 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white font-bold rounded-xl flex items-center justify-center transition-all shadow-md active:scale-[0.98]">
                                    {isSaving ? <i className="fa-solid fa-spinner fa-spin text-lg"></i> : <><i className="fa-solid fa-check mr-2"></i> {editingCityName ? 'Update City' : 'Create City'}</>}
                                </button>
                            </form>
                        )}

                        {/* VIEW: ADD / EDIT LOCATION FORM */}
                        {view === 'form' && (
                            <form onSubmit={handleSaveLocation} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                                {saveError && (
                                    <div className="p-3 bg-red-50 text-red-700 text-sm rounded-lg border border-red-200">
                                        <i className="fa-solid fa-triangle-exclamation mr-2"></i>{saveError}
                                    </div>
                                )}
                                
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Location Name</label>
                                    <input type="text" required value={name} onChange={e => setName(e.target.value)} className="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="e.g. Secret Beach" />
                                </div>
                                
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">City</label>
                                        <input type="text" required list="cities-list" value={city} onChange={e => setCity(e.target.value)} className="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="e.g. Ho Chi Minh City" />
                                        <datalist id="cities-list">
                                            {dataHierarchy.uniqueCities.map(c => <option key={c} value={c} />)}
                                        </datalist>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Category</label>
                                        <input type="text" required list="categories-list" value={category} onChange={e => setCategory(e.target.value)} className="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="e.g. Food" />
                                        <datalist id="categories-list">
                                            {dataHierarchy.allCategories.map(c => <option key={c} value={c} />)}
                                        </datalist>
                                    </div>
                                </div>

                                <div className="pt-2">
                                    <div className="flex justify-between items-end mb-1">
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider">Coordinates</label>
                                        <button type="button" onClick={useCurrentLocation} className="text-indigo-600 text-xs font-bold active:opacity-70 bg-indigo-50 px-2 py-1 rounded"><i className="fa-solid fa-crosshairs mr-1"></i>Current GPS</button>
                                    </div>
                                    
                                    {/* INTERACTIVE MAP PICKER */}
                                    <div className="w-full h-48 bg-slate-200 rounded-xl mb-3 border border-slate-300 overflow-hidden relative z-0" ref={mapRef}>
                                         <div className="absolute inset-0 flex items-center justify-center text-slate-400 font-medium">Loading Map...</div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4 mb-4">
                                        <div>
                                            <input type="text" onPaste={handleCoordinatePaste} required value={lat} onChange={e => setLat(e.target.value)} className="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl font-mono text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="Lat (e.g. 11.55)" />
                                        </div>
                                        <div>
                                            <input type="text" onPaste={handleCoordinatePaste} required value={lng} onChange={e => setLng(e.target.value)} className="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl font-mono text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="Lng (e.g. 104.92)" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Google Maps Link <span className="text-slate-400 font-normal lowercase">(optional)</span></label>
                                        <input type="url" value={mapLink} onChange={handleMapLinkChange} className="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="Paste link to auto-fill coordinates" />
                                    </div>
                                </div>

                                {/* Photos Section */}
                                <div className="pt-4 border-t border-slate-100">
                                    <div className="flex justify-between items-center mb-2">
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider">Photos ({photos.length})</label>
                                        <label className="text-xs font-bold text-indigo-600 bg-indigo-50 px-2 py-1 rounded cursor-pointer active:bg-indigo-100">
                                            <i className="fa-solid fa-plus mr-1"></i>Add
                                            <input type="file" multiple accept="image/*" className="hidden" onChange={handleFiles} disabled={isSaving} />
                                        </label>
                                    </div>
                                    
                                    {photos.length > 0 ? (
                                        <div className="flex overflow-x-auto space-x-3 pb-2 scrollbar-hide snap-x">
                                            {photos.map((p, i) => (
                                                <div key={i} className="relative w-24 h-24 flex-shrink-0 snap-start rounded-xl overflow-hidden border border-slate-200">
                                                    <img src={p} className="w-full h-full object-cover" alt="Uploaded preview" />
                                                    <button type="button" onClick={() => removePhoto(i)} className="absolute top-1 right-1 bg-black/60 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs active:scale-90">
                                                        <i className="fa-solid fa-xmark"></i>
                                                    </button>
                                                </div>
                                            ))}
