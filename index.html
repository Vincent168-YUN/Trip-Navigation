<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vincent's Travelling System</title>
    
    <!-- Apple/iOS Web App settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Globe_icon.svg/1024px-Globe_icon.svg.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root {
            --ios-accent: #C68E58;
            --ios-green: #32D74B; 
            --ios-red: #FF3B30; 
            --ios-bg: #F2F4F7;
            --ios-text: #1D1D1F;
            --ios-gray: #8E8E93;
        }
        body { 
            -webkit-tap-highlight-color: transparent; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            overflow-x: hidden;
        }
        
        .safe-top { padding-top: env(safe-area-inset-top, 44px); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 34px); }
        .safe-pb-nav { padding-bottom: calc(env(safe-area-inset-bottom, 34px) + 100px); }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-slide-in { animation: slideIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .font-art { font-family: 'Playfair Display', serif; }

        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 12s infinite alternate ease-in-out; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.04), inset 0 1px 0 rgba(255,255,255,1);
            border-radius: 28px;
        }
        
        .glass-pill {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 12px 40px -10px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,1);
            border-radius: 9999px;
        }

        .glass-header {
            background: linear-gradient(to bottom, rgba(242, 244, 247, 0.95) 0%, rgba(242, 244, 247, 0) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 16px;
            transition: all 0.2s ease;
            color: #1D1D1F;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: var(--ios-accent);
            outline: none;
            box-shadow: 0 4px 16px rgba(198, 142, 88, 0.2);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo, useRef } = React;

        // --- FIREBASE SETUP ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "",
                authDomain: "trip-navigation-b0f21.firebaseapp.com",
                projectId: "trip-navigation-b0f21",
                storageBucket: "trip-navigation-b0f21.firebasestorage.app",
                messagingSenderId: "841186283877",
                appId: "1:841186283877:web:7551e6f5f33dfe6d3e118c"
            };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'vincents-travel-system';

        // --- UTILS ---
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const numLat1 = parseFloat(lat1), numLon1 = parseFloat(lon1), numLat2 = parseFloat(lat2), numLon2 = parseFloat(lon2);
            if (isNaN(numLat1) || isNaN(numLon1) || isNaN(numLat2) || isNaN(numLon2)) return null;
            const R = 6371; 
            const dLat = (numLat2 - numLat1) * (Math.PI / 180);
            const dLon = (numLon2 - numLon1) * (Math.PI / 180);
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(numLat1 * (Math.PI / 180)) * Math.cos(numLat2 * (Math.PI / 180)) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function formatDistance(distInKm) {
            if (distInKm == null || isNaN(distInKm)) return "Distance unknown";
            if (distInKm < 1) return `${Math.round(distInKm * 1000)}m`;
            return `${Number(distInKm).toFixed(1)}km`;
        }

        function formatDuration(totalMinutes) {
            if (totalMinutes == null || isNaN(totalMinutes)) return "";
            totalMinutes = Math.ceil(totalMinutes);
            if (totalMinutes < 1) return "1 min";
            if (totalMinutes < 60) return `${totalMinutes} mins`;
            const hours = Math.floor(totalMinutes / 60);
            const mins = totalMinutes % 60;
            return mins > 0 ? `${hours}h ${mins}m` : `${hours}h`;
        }

        const getDistanceColor = (distInKm) => {
            if (distInKm == null || isNaN(distInKm)) return "text-[#8E8E93]";
            if (distInKm <= 1.0) return "text-[var(--ios-green)]";
            if (distInKm <= 10.0) return "text-[#FF9500]";
            return "text-[var(--ios-red)]";
        };

        const getDistanceBgColor = (distInKm) => {
            if (distInKm == null || isNaN(distInKm)) return "bg-[#8E8E93]/10 border-[#8E8E93]/20 text-[#8E8E93]";
            if (distInKm <= 1.0) return "bg-[var(--ios-green)]/10 border-[var(--ios-green)]/20 text-[var(--ios-green)]";
            if (distInKm <= 10.0) return "bg-[#FF9500]/10 border-[#FF9500]/20 text-[#FF9500]";
            return "bg-[var(--ios-red)]/10 border-[var(--ios-red)]/20 text-[var(--ios-red)]";
        };

        // --- MAIN APP ---
        function App() {
            const [user, setUser] = useState(null);
            const [liveLocation, setLiveLocation] = useState(null);
            const [gpsAccuracy, setGpsAccuracy] = useState(null);
            const [geoError, setGeoError] = useState('');
            const [locations, setLocations] = useState([]);
            const [itineraries, setItineraries] = useState([]);
            const [activeItinId, setActiveItinId] = useState(null);
            const [realRoutes, setRealRoutes] = useState({});
            
            // UI States
            const [view, setView] = useState('cities');
            const [activeCity, setActiveCity] = useState(null);
            const [activeCategory, setActiveCategory] = useState(null);
            const [selectedLocId, setSelectedLocId] = useState(null);
            const [previousView, setPreviousView] = useState('cities');
            const [locationReturnView, setLocationReturnView] = useState('category_list');
            const [notifications, setNotifications] = useState([]);
            const alertedLocsRef = useRef(new Set());
            const [fullScreenPhoto, setFullScreenPhoto] = useState(null);
            const [confirmDialog, setConfirmDialog] = useState(null);

            // Form States
            const [editId, setEditId] = useState(null);
            const [name, setName] = useState('');
            const [city, setCity] = useState('');
            const [category, setCategory] = useState('');
            const [lat, setLat] = useState('');
            const [lng, setLng] = useState('');
            const [mapLink, setMapLink] = useState('');
            const [comment, setComment] = useState('');
            const [photos, setPhotos] = useState([]);
            const [isSaving, setIsSaving] = useState(false);
            const [saveError, setSaveError] = useState('');
            const [formSearchQuery, setFormSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [isSearching, setIsSearching] = useState(false);

            // Itinerary Forms
            const [itinTitle, setItinTitle] = useState('');
            const [itinDate, setItinDate] = useState('');
            const [editItinItemId, setEditItinItemId] = useState(null);
            const [itinItemTime, setItinItemTime] = useState('');
            const [itinItemLabel, setItinItemLabel] = useState('Tourist Attraction');
            const [itinItemLocId, setItinItemLocId] = useState('');
            const [itinItemNotes, setItinItemNotes] = useState('');
            const [searchQuery, setSearchQuery] = useState('');

            // Split Bill
            const [splitBillItem, setSplitBillItem] = useState(null);
            const [tempBillTotal, setTempBillTotal] = useState('');
            const [tempBillSplit, setTempBillSplit] = useState(1);

            // Firebase Auth & Initial Fetch
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) { console.error(err); }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const pathLocs = collection(db, 'artifacts', appId, 'public', 'data', 'locations');
                const unsubLocs = onSnapshot(pathLocs, (snap) => {
                    const list = [];
                    snap.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                    setLocations(list);
                }, (err) => console.error(err));

                const pathItins = collection(db, 'artifacts', appId, 'public', 'data', 'itineraries');
                const unsubItins = onSnapshot(pathItins, (snap) => {
                    const list = [];
                    snap.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                    list.sort((a, b) => a.timestamp - b.timestamp);
                    setItineraries(list);
                }, (err) => console.error(err));

                return () => { unsubLocs(); unsubItins(); };
            }, [user]);

            // GPS Tracking
            useEffect(() => {
                if (!navigator.geolocation) return;
                const watchId = navigator.geolocation.watchPosition(
                    (pos) => {
                        setLiveLocation({ lat: pos.coords.latitude, lng: pos.coords.longitude });
                        setGpsAccuracy(pos.coords.accuracy);
                        setGeoError('');
                    },
                    (err) => {
                        setGeoError("Using Static Location");
                        setLiveLocation({ lat: 11.5564, lng: 104.9282 }); // Phnom Penh
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 5000 }
                );
                return () => navigator.geolocation.clearWatch(watchId);
            }, []);

            // Search Autocomplete
            useEffect(() => {
                const searchFn = setTimeout(() => {
                    if (formSearchQuery.length > 2) {
                        setIsSearching(true);
                        let url = `https://photon.komoot.io/api/?q=${encodeURIComponent(formSearchQuery)}&limit=5`;
                        if (liveLocation) url += `&lat=${liveLocation.lat}&lon=${liveLocation.lng}`;
                        fetch(url).then(r => r.json()).then(d => {
                            setSearchResults(d.features || []);
                            setIsSearching(false);
                        }).catch(() => setIsSearching(false));
                    } else { setSearchResults([]); }
                }, 500);
                return () => clearTimeout(searchFn);
            }, [formSearchQuery, liveLocation]);

            // --- FUNCTIONS ---
            const handleMapLinkPaste = async (input) => {
                setMapLink(input);
                if (!input) return;
                
                // 1. Check for raw pair "lat, lng"
                const rawMatch = input.match(/([-+]?\d{1,2}\.\d+)\s*,\s*([-+]?\d{1,3}\.\d+)/);
                if (rawMatch) {
                    const pLat = parseFloat(rawMatch);
                    const pLng = parseFloat(rawMatch);
                    if (pLat >= -90 && pLat <= 90 && pLng >= -180 && pLng <= 180) {
                        setLat(pLat.toFixed(6));
                        setLng(pLng.toFixed(6));
                        setSaveError('');
                        return;
                    }
                }

                // 2. Check for common Google Maps URL formats
                const exactPinMatch = input.match(/!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/);
                const atMatch = input.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
                const queryMatch = input.match(/[?&](?:q|ll)=([-+]?\d+\.\d+),([-+]?\d+\.\d+)/);
                const placeMatch = input.match(/place\/.*@(-?\d+\.\d+),(-?\d+\.\d+)/);
                
                const match = exactPinMatch || atMatch || queryMatch || placeMatch;
                if (match) {
                    setLat(parseFloat(match).toFixed(6));
                    setLng(parseFloat(match).toFixed(6));
                    setSaveError('');
                    return;
                }

                // 3. Handle short links from the App (maps.app.goo.gl, etc.)
                if (input.includes('maps.app.goo.gl') || input.includes('goo.gl/maps') || input.includes('maps.google.com')) {
                    setSaveError("Extracting GPS from Maps link...");
                    try {
                        const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(input)}`);
                        if (res.ok) {
                            const data = await res.json();
                            const expandedUrl = data.url;
                            const expMatch = expandedUrl.match(/!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/) || expandedUrl.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/) || expandedUrl.match(/[?&](?:q|ll)=([-+]?\d+\.\d+),([-+]?\d+\.\d+)/);
                            
                            if (expMatch) {
                                setLat(parseFloat(expMatch).toFixed(6));
                                setLng(parseFloat(expMatch).toFixed(6));
                                setSaveError(''); 
                                return;
                            }
                            
                            if (data.contents) {
                                const metaMatch = data.contents.match(/center=(-?\d+\.\d+)%2C(-?\d+\.\d+)/) || data.contents.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
                                if (metaMatch) {
                                    setLat(parseFloat(metaMatch).toFixed(6));
                                    setLng(parseFloat(metaMatch).toFixed(6));
                                    setSaveError('');
                                    return;
                                }
                            }
                        }
                    } catch(e) {
                        console.warn("Auto-extract failed", e);
                    }
                    setSaveError("Link saved, but couldn't auto-extract GPS. Try getting GPS manually.");
                }
            };

            const resetForm = () => {
                setEditId(null); setName(''); setCity(activeCity || ''); setCategory(activeCategory || '');
                setLat(''); setLng(''); setMapLink(''); setComment(''); setPhotos([]); setSaveError('');
            };

            const openForm = (loc = null) => {
                setPreviousView(view);
                if (loc) {
                    setEditId(loc.id); setName(loc.name || ''); setCity(loc.city || '');
                    setCategory(loc.category || ''); setLat(loc.lat || ''); setLng(loc.lng || '');
                    setMapLink(loc.mapLink || ''); setComment(loc.comment || ''); setPhotos(loc.photos || []);
                } else { resetForm(); }
                setView('form');
            };

            const handleBack = () => {
                if (view === 'form') setView(previousView);
                else if (view === 'location_detail') setView(locationReturnView);
                else if (view === 'category_list') setView('categories');
                else if (view === 'categories') setView('cities');
                else if (view === 'notifications') setView(previousView);
                else setView('cities');
            };

            const handleSaveLocation = async (e) => {
                e.preventDefault();
                if (!name || !city || !category) { setSaveError("Name, City, and Category required."); return; }
                setIsSaving(true);
                const data = { name, city, category, lat: lat ? parseFloat(lat) : null, lng: lng ? parseFloat(lng) : null, mapLink, comment, photos, timestamp: Date.now() };
                try {
                    if (editId) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', editId), data);
                    else await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', Date.now().toString()), data);
                    handleBack();
                } catch (err) { setSaveError(err.message); }
                setIsSaving(false);
            };

            const deleteLocation = (id) => {
                setConfirmDialog({ 
                    message: "Delete this place forever?", 
                    onConfirm: async () => {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', id));
                        handleBack();
                    } 
                });
            };

            // Hierarchy
            const dataHierarchy = useMemo(() => {
                const cities = {};
                locations.forEach(l => {
                    const c = l.city || 'Ho Chi Minh City';
                    if (!cities[c]) cities[c] = { count: 0, categories: {}, cover: null };
                    if (l.isCityMarker && l.photos?.length) cities[c].cover = l.photos;
                    if (!l.isCityMarker) {
                        const cat = l.category || 'Uncategorized';
                        if (!cities[c].categories[cat]) cities[c].categories[cat] = [];
                        cities[c].categories[cat].push(l);
                        cities[c].count++;
                    }
                });
                return cities;
            }, [locations]);

            const getRouteInfo = (loc) => {
                if (!liveLocation || !loc.lat || !loc.lng) return { dist: null, dur: null };
                const dist = calculateDistance(liveLocation.lat, liveLocation.lng, loc.lat, loc.lng);
                return { dist, dur: dist ? dist * 3.5 : null }; // 3.5m/km approx
            };

            const activeTab = view === 'notifications' ? 'radar' : (view.includes('itinerar') ? 'itinerary' : 'places');

            // --- RENDER ---
            return (
                <div className="min-h-screen flex flex-col relative pb-24">
                    {/* Background */}
                    <div className="fixed inset-0 z-[-1] bg-[var(--ios-bg)] overflow-hidden">
                        <div className="absolute top-[-10%] left-[-10%] w-[60vw] h-[60vw] bg-gradient-to-tr from-[#C68E58]/20 to-transparent filter blur-[80px] animate-blob"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] bg-gradient-to-bl from-slate-400/20 to-transparent filter blur-[80px] animate-blob" style={{ animationDelay: '4s' }}></div>
                    </div>

                    {/* Header */}
                    <header className="fixed top-0 left-0 right-0 z-40 safe-top glass-header h-20 px-5 flex items-center justify-between">
                        {view !== 'cities' ? (
                            <button onClick={handleBack} className="h-10 px-4 rounded-full bg-white/80 shadow-sm border border-white flex items-center font-bold">
                                <i className="fa-solid fa-chevron-left mr-2"></i> Back
                            </button>
                        ) : (
                            <div className="flex items-center space-x-2 bg-white/80 h-10 px-4 rounded-full border border-white shadow-sm">
                                <span className={`h-2.5 w-2.5 rounded-full ${liveLocation ? 'bg-green-500' : 'bg-red-500'}`}></span>
                                <span className="text-xs font-bold uppercase tracking-widest">{liveLocation ? 'GPS Online' : 'GPS Offline'}</span>
                            </div>
                        )}
                        <h1 className="text-sm font-bold tracking-widest uppercase opacity-80">
                            {view === 'cities' ? "The System" : view.replace('_', ' ')}
                        </h1>
                        <button onClick={() => openForm()} className="h-10 w-10 rounded-full bg-[#1D1D1F] text-white flex items-center justify-center shadow-lg">
                            <i className="fa-solid fa-plus"></i>
                        </button>
                    </header>

                    <main className="mt-28 px-5 max-w-3xl mx-auto w-full flex-1">
                        
                        {/* VIEW: CITIES */}
                        {view === 'cities' && (
                            <div className="animate-slide-in">
                                <div className="mb-10">
                                    <h2 className="text-[44px] font-art font-bold leading-tight">Vincent's<br/><span className="text-gray-400 italic">Travel</span><br/>Collection</h2>
                                </div>
                                <div className="space-y-4">
                                    {Object.keys(dataHierarchy).sort().map(cityName => (
                                        <div key={cityName} onClick={() => { setActiveCity(cityName); setView('categories'); }} className="glass-panel p-4 flex items-center active:scale-[0.98] transition-transform cursor-pointer">
                                            <div className="w-16 h-20 rounded-2xl bg-black/5 overflow-hidden mr-4 shrink-0 shadow-inner">
                                                {dataHierarchy[cityName].cover ? <img src={dataHierarchy[cityName].cover} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center"><i className="fa-solid fa-city opacity-20"></i></div>}
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <h3 className="text-xl font-art font-bold truncate">{cityName}</h3>
                                                <p className="text-xs font-bold text-[var(--ios-accent)] uppercase tracking-widest mt-1">{dataHierarchy[cityName].count} Places</p>
                                            </div>
                                            <i className="fa-solid fa-chevron-right text-gray-300"></i>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* VIEW: CATEGORIES */}
                        {view === 'categories' && (
                            <div className="animate-slide-in">
                                <div className="mb-8">
                                    <h2 className="text-3xl font-art font-bold">{activeCity}</h2>
                                    <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mt-1">Select a group</p>
                                </div>
                                <div className="space-y-4">
                                    {Object.keys(dataHierarchy[activeCity].categories).sort().map(cat => (
                                        <div key={cat} onClick={() => { setActiveCategory(cat); setView('category_list'); }} className="glass-panel p-5 flex items-center justify-between active:scale-[0.98] transition-transform cursor-pointer">
                                            <div>
                                                <h3 className="text-lg font-bold">{cat}</h3>
                                                <p className="text-xs text-gray-500 font-medium">{dataHierarchy[activeCity].categories[cat].length} spots</p>
                                            </div>
                                            <div className="h-10 w-10 rounded-full bg-black/5 flex items-center justify-center text-gray-400"><i className="fa-solid fa-arrow-right-long"></i></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* VIEW: CATEGORY LIST */}
                        {view === 'category_list' && (
                            <div className="animate-slide-in space-y-5">
                                <div className="mb-6">
                                    <h2 className="text-2xl font-art font-bold">{activeCategory}</h2>
                                    <p className="text-xs font-bold text-gray-400 uppercase tracking-widest">{activeCity}</p>
                                </div>
                                {dataHierarchy[activeCity].categories[activeCategory].map(loc => {
                                    const r = getRouteInfo(loc);
                                    return (
                                        <div key={loc.id} onClick={() => { setLocationReturnView('category_list'); setSelectedLocId(loc.id); setView('location_detail'); }} className="glass-panel p-2 flex flex-col active:scale-[0.98] transition-transform cursor-pointer">
                                            <div className="h-44 w-full rounded-3xl overflow-hidden bg-black/5 mb-3">
                                                {loc.photos?.length ? <img src={loc.photos} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center"><i className="fa-solid fa-image text-4xl opacity-10"></i></div>}
                                            </div>
                                            <div className="px-3 pb-2 flex justify-between items-end">
                                                <div className="min-w-0">
                                                    <h4 className="font-bold text-lg truncate">{loc.name}</h4>
                                                    <p className={`text-xs font-bold mt-1 ${getDistanceColor(r.dist)}`}>
                                                        <i className="fa-solid fa-location-arrow mr-1.5 opacity-50"></i>
                                                        {formatDistance(r.dist)}
                                                    </p>
                                                </div>
                                                <button onClick={(e) => { e.stopPropagation(); openForm(loc); }} className="h-9 w-9 rounded-full bg-black/5 flex items-center justify-center"><i className="fa-solid fa-pen text-xs"></i></button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {/* VIEW: FORM (WITH NEW PASTE FEATURE) */}
                        {view === 'form' && (
                            <form onSubmit={handleSaveLocation} className="animate-slide-in space-y-6">
                                <div>
                                    <h2 className="text-3xl font-art font-bold">{editId ? 'Refine' : 'Add'} a Spot</h2>
                                    <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mt-1">Capture the details</p>
                                </div>

                                {saveError && <div className="p-4 bg-red-100 text-red-600 rounded-2xl text-xs font-bold">{saveError}</div>}

                                {!editId && (
                                    <div className="glass-panel p-5 space-y-4">
                                        <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Search Location</label>
                                        <div className="relative">
                                            <input type="text" placeholder="Start typing place name..." value={formSearchQuery} onChange={e => setFormSearchQuery(e.target.value)} className="w-full h-14 px-5 glass-input font-bold" />
                                            {isSearching && <i className="fa-solid fa-spinner fa-spin absolute right-5 top-5 text-gray-400"></i>}
                                        </div>
                                        {searchResults.length > 0 && (
                                            <div className="bg-white/90 rounded-2xl overflow-hidden border border-gray-100 shadow-xl">
                                                {searchResults.map((r, i) => (
                                                    <div key={i} onClick={() => {
                                                        setName(r.properties.name || r.properties.street);
                                                        setCity(r.properties.city || activeCity);
                                                        setLat(r.geometry.coordinates);
                                                        setLng(r.geometry.coordinates);
                                                        setFormSearchQuery('');
                                                        setSearchResults([]);
                                                    }} className="p-3 border-b border-gray-50 flex items-center hover:bg-black/5 cursor-pointer">
                                                        <i className="fa-solid fa-location-dot mr-3 text-gray-400"></i>
                                                        <div className="min-w-0">
                                                            <p className="text-sm font-bold truncate">{r.properties.name || r.properties.street}</p>
                                                            <p className="text-[10px] text-gray-400 truncate">{r.properties.city || r.properties.state}</p>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}

                                <div className="glass-panel p-5 space-y-5">
                                    <div>
                                        <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Google Maps Link</label>
                                        <div className="mt-2 flex space-x-2">
                                            <input 
                                                type="url" 
                                                value={mapLink}
                                                placeholder="Paste Maps Link or 'Lat, Lng'" 
                                                className="flex-1 h-12 px-4 glass-input text-sm bg-[var(--ios-accent)]/5 border-[var(--ios-accent)]/20 font-medium"
                                                onChange={(e) => handleMapLinkPaste(e.target.value)}
                                            />
                                            <button 
                                                type="button" 
                                                onClick={() => {
                                                    if(liveLocation) {
                                                        setLat(liveLocation.lat.toFixed(6));
                                                        setLng(liveLocation.lng.toFixed(6));
                                                    }
                                                }}
                                                className="h-12 px-4 rounded-2xl bg-[#1D1D1F] text-white text-xs font-bold shadow-lg"
                                            >GPS</button>
                                        </div>
                                        <p className="text-[9px] text-gray-400 mt-2 italic px-1">Saves the link and automatically extracts GPS coordinates.</p>
                                    </div>

                                    <div className="h-px bg-black/5"></div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-gray-400 uppercase ml-1">Latitude</label>
                                            <input type="number" step="any" value={lat} onChange={e => setLat(e.target.value)} className="w-full h-12 px-4 glass-input font-mono text-xs" placeholder="0.000000" />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-gray-400 uppercase ml-1">Longitude</label>
                                            <input type="number" step="any" value={lng} onChange={e => setLng(e.target.value)} className="w-full h-12 px-4 glass-input font-mono text-xs" placeholder="0.000000" />
                                        </div>
                                    </div>
                                </div>

                                <div className="glass-panel p-5 space-y-4">
                                    <input type="text" placeholder="Name of place" value={name} onChange={e => setName(e.target.value)} className="w-full h-14 px-5 glass-input font-bold text-lg" required />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="text" placeholder="City" value={city} onChange={e => setCity(e.target.value)} className="w-full h-12 px-4 glass-input font-bold" required />
                                        <input type="text" placeholder="Category" value={category} onChange={e => setCategory(e.target.value)} className="w-full h-12 px-4 glass-input font-bold" required />
                                    </div>
                                    <textarea placeholder="Personal notes, vibes, or tips..." value={comment} onChange={e => setComment(e.target.value)} rows="3" className="w-full p-5 glass-input text-sm resize-none"></textarea>
                                </div>

                                <button type="submit" className="w-full h-16 bg-[#1D1D1F] text-white font-bold rounded-3xl shadow-xl active:scale-[0.98] transition-transform">
                                    {isSaving ? <i className="fa-solid fa-spinner fa-spin mr-2"></i> : null}
                                    {editId ? 'Update Place' : 'Complete Entry'}
                                </button>
                            </form>
                        )}

                        {/* VIEW: LOCATION DETAIL */}
                        {view === 'location_detail' && (
                            <div className="animate-slide-in space-y-6">
                                {(() => {
                                    const loc = locations.find(l => l.id === selectedLocId);
                                    if (!loc) return null;
                                    const r = getRouteInfo(loc);
                                    return (
                                        <>
                                            <div className="glass-panel overflow-hidden p-2">
                                                <div className="h-72 w-full rounded-[24px] bg-black/5 overflow-hidden shadow-inner mb-4">
                                                    {loc.photos?.length ? <img src={loc.photos} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center"><i className="fa-solid fa-mountain-sun text-6xl opacity-5"></i></div>}
                                                </div>
                                                <div className="px-4 pb-4">
                                                    <div className="flex justify-between items-start mb-4">
                                                        <div className="min-w-0 pr-4">
                                                            <h2 className="text-3xl font-art font-bold truncate">{loc.name}</h2>
                                                            <div className="flex items-center space-x-2 mt-2">
                                                                <span className="bg-black/5 px-2 py-1 rounded-md text-[10px] font-bold uppercase tracking-widest">{loc.category}</span>
                                                                <span className={`${getDistanceBgColor(r.dist)} px-2 py-1 rounded-md text-[10px] font-bold uppercase tracking-widest border`}>{formatDistance(r.dist)} away</span>
                                                            </div>
                                                        </div>
                                                        <button onClick={() => openForm(loc)} className="h-10 w-10 rounded-full bg-black/5 flex items-center justify-center shrink-0"><i className="fa-solid fa-pen"></i></button>
                                                    </div>
                                                    
                                                    {loc.comment && (
                                                        <div className="bg-black/5 rounded-2xl p-4 mb-6 border border-black/5">
                                                            <p className="text-sm font-medium leading-relaxed opacity-80">{loc.comment}</p>
                                                        </div>
                                                    )}

                                                    <a 
                                                        href={loc.mapLink || `https://www.google.com/maps/search/?api=1&query=${loc.lat},${loc.lng}`}
                                                        target="_blank"
                                                        className="w-full h-14 bg-[#1D1D1F] text-white flex items-center justify-center rounded-2xl font-bold shadow-lg"
                                                    >
                                                        Navigate to {loc.name} <i className="fa-solid fa-location-arrow ml-2 text-xs"></i>
                                                    </a>
                                                </div>
                                            </div>
                                            
                                            <div className="flex justify-center">
                                                <button onClick={() => deleteLocation(loc.id)} className="text-red-500 text-xs font-bold bg-red-50 px-6 py-3 rounded-full uppercase tracking-widest border border-red-100">
                                                    Remove Destination
                                                </button>
                                            </div>
                                        </>
                                    );
                                })()}
                            </div>
                        )}
                    </main>

                    {/* Bottom Nav */}
                    <nav className="fixed bottom-6 left-6 right-6 safe-bottom flex justify-center z-50">
                        <div className="glass-pill w-full max-w-sm h-16 flex items-center justify-around px-2">
                            <button onClick={() => setView('cities')} className={`flex flex-col items-center justify-center w-full h-full rounded-full transition-all ${activeTab === 'places' ? 'text-[#1D1D1F]' : 'text-gray-400'}`}>
                                <i className="fa-solid fa-map-location-dot text-lg"></i>
                                <span className="text-[8px] font-bold uppercase tracking-tighter mt-1">Exploration</span>
                            </button>
                            <button onClick={() => setView('notifications')} className={`flex flex-col items-center justify-center w-full h-full rounded-full transition-all ${activeTab === 'radar' ? 'text-[#1D1D1F]' : 'text-gray-400'}`}>
                                <i className="fa-solid fa-tower-broadcast text-lg"></i>
                                <span className="text-[8px] font-bold uppercase tracking-tighter mt-1">Radar</span>
                            </button>
                            <button onClick={() => setView('itineraries')} className={`flex flex-col items-center justify-center w-full h-full rounded-full transition-all ${activeTab === 'itinerary' ? 'text-[#1D1D1F]' : 'text-gray-400'}`}>
                                <i className="fa-solid fa-calendar-day text-lg"></i>
                                <span className="text-[8px] font-bold uppercase tracking-tighter mt-1">Planning</span>
                            </button>
                        </div>
                    </nav>

                    {/* Modals */}
                    {confirmDialog && (
                        <div className="fixed inset-0 z- bg-black/40 backdrop-blur-md flex items-center justify-center p-6 animate-fade-in">
                            <div className="bg-white/95 rounded-[32px] p-6 w-full max-w-[300px] text-center shadow-2xl">
                                <h3 className="text-lg font-bold mb-2">Confirmation</h3>
                                <p className="text-sm text-gray-500 mb-6 font-medium">{confirmDialog.message}</p>
                                <div className="flex space-x-3">
                                    <button onClick={() => setConfirmDialog(null)} className="flex-1 h-12 rounded-2xl bg-black/5 font-bold text-xs uppercase tracking-widest">Cancel</button>
                                    <button onClick={() => { confirmDialog.onConfirm(); setConfirmDialog(null); }} className="flex-1 h-12 rounded-2xl bg-red-500 text-white font-bold text-xs uppercase tracking-widest shadow-lg">Confirm</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
