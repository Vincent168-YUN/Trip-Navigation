                                        </div>
                                    ) : (
                                        <div className="bg-slate-50 border border-dashed border-slate-300 rounded-xl p-4 text-center">
                                            <p className="text-xs text-slate-400">No photos attached yet.</p>
                                        </div>
                                    )}
                                </div>

                                <button type="submit" disabled={!user || isSaving} className="w-full mt-6 py-3.5 px-4 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white font-bold rounded-xl flex items-center justify-center transition-all shadow-md active:scale-[0.98]">
                                    {isSaving ? <i className="fa-solid fa-spinner fa-spin text-lg"></i> : (
                                        <><i className="fa-solid fa-check mr-2"></i> {editId ? 'Save Changes' : 'Create Location'}</>
                                    )}
                                </button>
                            </form>
                        )}

                        {/* ========================================================= */}
                        {/* MAIN VIEWS - ITINERARY PLANNER                            */}
                        {/* ========================================================= */}

                        {/* VIEW: ITINERARIES LIST */}
                        {view === 'itineraries' && (
                            <div className="space-y-3">
                                <p className="text-sm text-slate-500 font-medium mb-4 px-1">Your Planned Days</p>
                                {itineraries.length === 0 ? (
                                    <div className="text-center p-8 bg-white rounded-2xl border border-dashed border-slate-300 mt-8">
                                        <i className="fa-solid fa-calendar-days text-3xl text-slate-300 mb-3"></i>
                                        <p className="text-slate-500 text-sm">No itineraries yet. Tap + to plan a day!</p>
                                    </div>
                                ) : (
                                    itineraries.map(itin => (
                                        <div key={itin.id} className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden cursor-pointer hover:shadow-md transition-shadow active:bg-slate-50 flex" onClick={() => { setActiveItinId(itin.id); setView('itinerary_detail'); }}>
                                            <div className="bg-indigo-600 w-3 shrink-0"></div>
                                            <div className="p-4 flex-1 flex justify-between items-center">
                                                <div>
                                                    <h3 className="font-bold text-slate-800 text-lg">{itin.title}</h3>
                                                    <p className="text-sm text-slate-500 font-medium"><i className="fa-regular fa-calendar mr-1.5"></i> {itin.date || 'No Date'}</p>
                                                </div>
                                                <div className="text-slate-400 flex items-center">
                                                    <span className="text-xs font-bold bg-slate-100 px-2 py-1 rounded-lg mr-3">{(itin.items || []).length} events</span>
                                                    <button onClick={(e) => { e.stopPropagation(); deleteItinerary(itin.id); }} className="text-slate-300 hover:text-red-500 active:scale-90 p-2"><i className="fa-solid fa-trash"></i></button>
                                                </div>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        {/* VIEW: ITINERARY DETAIL (TIMESHEET) */}
                        {view === 'itinerary_detail' && (
                            <div className="space-y-6 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-slate-300 before:to-transparent">
                                {(() => {
                                    const itin = itineraries.find(i => i.id === activeItinId);
                                    if (!itin) return null;
                                    return (
                                        <>
                                            <div className="mb-6 relative z-10 text-center flex justify-center items-center">
                                                <div className="bg-white border border-slate-200 shadow-sm rounded-xl px-5 py-3">
                                                    <h2 className="text-2xl font-bold text-slate-900">{itin.title}</h2>
                                                    {itin.date && <p className="text-sm text-slate-500 font-medium">{itin.date}</p>}
                                                </div>
                                                <button onClick={() => openItineraryForm(itin)} className="ml-3 text-slate-400 hover:text-indigo-600 bg-white border border-slate-200 shadow-sm rounded-full w-10 h-10 flex items-center justify-center">
                                                    <i className="fa-solid fa-pen"></i>
                                                </button>
                                            </div>
                                            
                                            {(itin.items || []).length === 0 ? (
                                                <div className="relative z-10 text-center p-8 bg-white/80 backdrop-blur rounded-2xl border border-dashed border-slate-300 mx-4">
                                                    <p className="text-slate-500 text-sm">Timesheet empty. Tap + to add breakfast, lunch, or an activity!</p>
                                                </div>
                                            ) : (
                                                (itin.items || []).map((item) => {
                                                    const loc = locations.find(l => l.id === item.locationId);
                                                    return (
                                                        <div key={item.id} className="relative z-10 flex items-center">
                                                            <div className="hidden md:block w-1/2 pr-8 text-right">
                                                                <div className="text-lg font-bold text-slate-800">{item.time}</div>
                                                                <div className="text-sm font-medium text-slate-500">{item.label}</div>
                                                            </div>
                                                            <div className="absolute left-0 md:left-1/2 -ml-3 w-6 h-6 rounded-full border-4 border-slate-50 bg-indigo-500 shadow-sm flex items-center justify-center"></div>
                                                            <div className="ml-10 md:ml-0 md:pl-8 w-full md:w-1/2 pb-4">
                                                                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                                                                    <div className="flex justify-between items-start mb-2">
                                                                        <div className="md:hidden">
                                                                            <span className="text-indigo-600 font-bold mr-2">{item.time}</span>
                                                                            <span className="text-xs font-bold text-slate-500 uppercase tracking-wider">{item.label}</span>
                                                                        </div>
                                                                        <div className="hidden md:block">
                                                                            <span className="text-xs font-bold text-slate-500 uppercase tracking-wider">{item.label}</span>
                                                                        </div>
                                                                        <div className="flex space-x-1">
                                                                            <button onClick={() => openItineraryItemForm(item)} className="text-slate-400 hover:text-indigo-600 p-1"><i className="fa-solid fa-pen text-xs"></i></button>
                                                                            <button onClick={() => deleteItineraryItem(item.id)} className="text-slate-400 hover:text-red-500 p-1"><i className="fa-solid fa-xmark text-xs"></i></button>
                                                                        </div>
                                                                    </div>
                                                                    
                                                                    {loc ? (
                                                                        <div className="flex items-center space-x-3 mt-2 bg-slate-50 p-2 rounded-lg border border-slate-100 cursor-pointer hover:bg-slate-100" onClick={() => { setLocationReturnView('itinerary_detail'); setSelectedLocId(loc.id); setView('location_detail'); }}>
                                                                            {Array.isArray(loc.photos) && loc.photos.length > 0 ? (
                                                                                <img src={loc.photos} className="w-12 h-12 rounded object-cover" alt="Location preview" />
                                                                            ) : (
                                                                                <div className="w-12 h-12 rounded bg-slate-200 flex items-center justify-center text-slate-400"><i className="fa-regular fa-image"></i></div>
                                                                            )}
                                                                            <div className="flex-1">
                                                                                <p className="font-bold text-slate-800 text-sm">{loc.name}</p>
                                                                                <p className="text-xs text-slate-500">{loc.city || 'Ho Chi Minh City'} &bull; {loc.category || 'Uncategorized'}</p>
                                                                            </div>
                                                                            <i className="fa-solid fa-chevron-right text-slate-300 text-xs pr-2"></i>
                                                                        </div>
                                                                    ) : item.locationId ? (
                                                                        <p className="text-sm text-red-500 italic mt-2"><i className="fa-solid fa-triangle-exclamation mr-1"></i>Location was deleted</p>
                                                                    ) : null}
                                                                    
                                                                    {item.notes && <p className="text-sm text-slate-600 mt-3 pt-3 border-t border-slate-100"><i className="fa-regular fa-note-sticky mr-1.5 text-slate-400"></i>{item.notes}</p>}
                                                                </div>
                                                            </div>
                                                        </div>
                                                    );
                                                })
                                            )}
                                        </>
                                    );
                                })()}
                            </div>
                        )}

                        {/* VIEW: ITINERARY DAY FORM */}
                        {view === 'itinerary_form' && (
                            <form onSubmit={handleSaveItinerary} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                                <h2 className="text-lg font-bold text-slate-800 border-b border-slate-100 pb-2 mb-4">Plan a Day</h2>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Itinerary Title</label>
                                    <input type="text" required value={itinTitle} onChange={e => setItinTitle(e.target.value)} className="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="e.g. Day 1: City Tour" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Date</label>
                                    <input type="date" value={itinDate} onChange={e => setItinDate(e.target.value)} className="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none" />
                                </div>
                                <button type="submit" disabled={isSaving} className="w-full mt-6 py-3.5 px-4 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white font-bold rounded-xl flex items-center justify-center transition-all shadow-md active:scale-[0.98]">
                                    {isSaving ? <i className="fa-solid fa-spinner fa-spin text-lg"></i> : <><i className="fa-solid fa-check mr-2"></i> Save Day</>}
                                </button>
                            </form>
                        )}

                        {/* VIEW: SELECT LOCATION FOR ITINERARY */}
                        {view === 'itinerary_select_location' && (
                            <div className="space-y-4">
                                <div className="sticky top-14 bg-slate-50 pt-2 pb-4 z-10 -mt-2">
                                    <div className="relative">
                                        <i className="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-slate-400"></i>
                                        <input 
                                            type="text" 
                                            placeholder="Search by name, city, or category..." 
                                            value={searchQuery}
                                            onChange={(e) => setSearchQuery(e.target.value)}
                                            className="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-xl shadow-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                                        />
                                    </div>
                                </div>

                                <button 
                                    onClick={() => handleSelectLocationForItinerary('')} 
                                    className="w-full bg-indigo-50 text-indigo-700 p-4 rounded-2xl shadow-sm border border-indigo-100 font-bold hover:bg-indigo-100 active:scale-[0.98] transition-all flex items-center justify-center mb-6"
                                >
                                    <i className="fa-solid fa-plus-circle mr-2"></i> Add Event Without Location
                                </button>
                                
                                {filteredAndGroupedLocations.sortedCategories.length === 0 ? (
                                    <div className="text-center p-8 text-slate-400">No locations found.</div>
                                ) : (
                                    filteredAndGroupedLocations.sortedCategories.map(cat => (
                                        <div key={cat} className="space-y-3 pt-2">
                                            <h3 className="text-sm font-bold text-slate-500 uppercase tracking-wider pl-2 border-b border-slate-200 pb-1">{cat}</h3>
                                            {filteredAndGroupedLocations.grouped[cat].map(loc => (
                                                <div 
                                                    key={loc.id} 
                                                    className="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 flex items-center justify-between cursor-pointer hover:border-indigo-300 active:bg-slate-50 transition-all"
                                                    onClick={() => handleSelectLocationForItinerary(loc.id)}
                                                >
                                                    <div className="flex items-center flex-1 overflow-hidden">
                                                        {Array.isArray(loc.photos) && loc.photos.length > 0 ? (
                                                            <img src={loc.photos} className="w-12 h-12 rounded-xl object-cover shrink-0 mr-4" alt="" />
                                                        ) : (
                                                            <div className="w-12 h-12 rounded-xl bg-slate-100 flex items-center justify-center text-slate-400 shrink-0 mr-4"><i className="fa-regular fa-image"></i></div>
                                                        )}
                                                        <div className="truncate pr-2">
                                                            <h4 className="font-bold text-slate-900 truncate">{loc.name}</h4>
                                                            <p className="text-xs text-slate-500 truncate">{loc.city || 'Ho Chi Minh City'} &bull; {loc.category || 'Uncategorized'}</p>
                                                        </div>
                                                    </div>
                                                    <div className="flex flex-col items-end shrink-0 pl-2 border-l border-slate-100">
                                                        <span className="text-xs font-bold text-teal-600 bg-teal-50 px-2 py-1 rounded-md mb-1">{formatDistance(loc.currentDistance)}</span>
                                                        <i className="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        {/* VIEW: ITINERARY ITEM FORM */}
                        {view === 'itinerary_item_form' && (
                            <form onSubmit={handleSaveItineraryItem} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                                <h2 className="text-lg font-bold text-slate-800 border-b border-slate-100 pb-2 mb-4">Event Details</h2>
                                
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Selected Location</label>
                                    <div className="w-full px-3 py-3 bg-slate-100 border border-slate-200 rounded-xl text-slate-700 font-medium flex items-center justify-between">
                                        <span className="truncate pr-2">
                                            {itinItemLocId ? (locations.find(l => l.id === itinItemLocId)?.name || 'Unknown Location') : 'No Location Selected'}
                                        </span>
                                        {!editItinItemId && (
                                            <button type="button" onClick={() => setView('itinerary_select_location')} className="text-indigo-600 text-xs font-bold uppercase shrink-0 hover:underline">Change</button>
                                        )}
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Time</label>
                                        <input type="time" required value={itinItemTime} onChange={e => setItinItemTime(e.target.value)} className="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Type</label>
                                        <select value={itinItemLabel} onChange={e => setItinItemLabel(e.target.value)} className="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                                            <option value="Breakfast">Breakfast</option>
                                            <option value="Lunch">Lunch</option>
                                            <option value="Dinner">Dinner</option>
                                            <option value="Tourist Attraction">Tourist Attraction</option>
                                            <option value="Other">Other</option>
                                        </select>
                                    </div>
                                </div>
                                
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Notes (Optional)</label>
                                    <textarea value={itinItemNotes} onChange={e => setItinItemNotes(e.target.value)} rows="2" className="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="e.g. Reservation under John" />
                                </div>
                                <button type="submit" disabled={isSaving} className="w-full mt-6 py-3.5 px-4 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white font-bold rounded-xl flex items-center justify-center transition-all shadow-md active:scale-[0.98]">
                                    {isSaving ? <i className="fa-solid fa-spinner fa-spin text-lg"></i> : <><i className="fa-solid fa-check mr-2"></i> Save to Timesheet</>}
                                </button>
                            </form>
                        )}
                    </main>

                    {/* FLOATING ACTION BUTTON */}
                    {!['form', 'photo_viewer', 'itinerary_form', 'itinerary_item_form', 'city_form', 'itinerary_select_location'].includes(view) && (
                        <button 
                            onClick={() => {
                                if (view === 'itineraries') openItineraryForm();
                                else if (view === 'itinerary_detail') openItineraryItemForm();
                                else if (view === 'cities') openCityForm();
                                else openForm();
                            }}
                            className="fixed bottom-6 right-6 w-14 h-14 bg-indigo-600 text-white rounded-full shadow-lg shadow-indigo-300 flex items-center justify-center text-xl z-30 hover:bg-indigo-700 transition-transform active:scale-90 safe-bottom"
                        >
                            <i className="fa-solid fa-plus"></i>
                        </button>
                    )}
                    
                    {/* CUSTOM CONFIRM MODAL */}
                    {confirmDialog && (
                        <div className="fixed inset-0 z- bg-black/50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl p-6 max-w-sm w-full shadow-xl animate-fade-in">
                                <h3 className="text-lg font-bold text-slate-900 mb-2">Confirm Action</h3>
                                <p className="text-slate-600 mb-6">{confirmDialog.message}</p>
                                <div className="flex space-x-3">
                                    <button onClick={() => setConfirmDialog(null)} className="flex-1 py-2.5 bg-slate-100 text-slate-700 font-bold rounded-xl hover:bg-slate-200 active:bg-slate-300 transition-colors">Cancel</button>
                                    <button onClick={() => { confirmDialog.onConfirm(); setConfirmDialog(null); }} className="flex-1 py-2.5 bg-red-500 text-white font-bold rounded-xl hover:bg-red-600 active:bg-red-700 transition-colors">Confirm</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
