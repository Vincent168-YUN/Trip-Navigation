<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vincent's Travelling System</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Globe_icon.svg/1024px-Globe_icon.svg.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root {
            --ios-accent: #C68E58; /* Brushed Copper / Premium Amber */
            --ios-green: #32D74B; 
            --ios-red: #FF3B30; 
            --ios-bg: #F2F4F7; /* Bright, clean off-white */
            --ios-text: #1D1D1F; /* Deep Charcoal/Titanium Black */
            --ios-gray: #8E8E93; /* Classic Apple Slate Gray */
        }
        body { 
            -webkit-tap-highlight-color: transparent; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            color-scheme: light;
        }
        
        /* iOS Safe Area paddings */
        .safe-top { padding-top: env(safe-area-inset-top, 44px); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 34px); }
        .safe-pb-nav { padding-bottom: calc(env(safe-area-inset-bottom, 34px) + 100px); }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-slide-in { animation: slideIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }

        .font-art { font-family: 'Playfair Display', serif; }

        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 12s infinite alternate ease-in-out; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.04), inset 0 1px 0 rgba(255,255,255,1);
            border-radius: 28px;
        }
        
        .glass-pill {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 12px 40px -10px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,1);
            border-radius: 9999px;
        }

        .glass-header {
            background: linear-gradient(to bottom, rgba(242, 244, 247, 0.95) 0%, rgba(242, 244, 247, 0) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 16px;
            transition: all 0.2s ease;
            color: #1D1D1F;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: var(--ios-accent);
            outline: none;
            box-shadow: 0 4px 16px rgba(198, 142, 88, 0.2);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo, useRef } = React;

        // --- FIREBASE SETUP ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyDUdgQdMPAUVHSIHmbfIpSEYwQNWdFM578",
                authDomain: "trip-navigation-b0f21.firebaseapp.com",
                projectId: "trip-navigation-b0f21",
                storageBucket: "trip-navigation-b0f21.firebasestorage.app",
                messagingSenderId: "841186283877",
                appId: "1:841186283877:web:7551e6f5f33dfe6d3e118c"
            };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'my-wander-tracker-app';

        // Haversine formula
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const numLat1 = parseFloat(lat1);
            const numLon1 = parseFloat(lon1);
            const numLat2 = parseFloat(lat2);
            const numLon2 = parseFloat(lon2);
            if (isNaN(numLat1) || isNaN(numLon1) || isNaN(numLat2) || isNaN(numLon2)) return null;
            const R = 6371; 
            const dLat = (numLat2 - numLat1) * (Math.PI / 180);
            const dLon = (numLon2 - numLon1) * (Math.PI / 180);
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(numLat1 * (Math.PI / 180)) * Math.cos(numLat2 * (Math.PI / 180)) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function formatDistance(distInKm) {
            if (distInKm == null || isNaN(distInKm)) return "Distance unknown";
            if (distInKm < 1) return `${Math.round(distInKm * 1000)}m`;
            return `${Number(distInKm).toFixed(1)}km`;
        }

        function formatDuration(totalMinutes) {
            if (totalMinutes == null || isNaN(totalMinutes)) return "";
            totalMinutes = Math.ceil(totalMinutes);
            if (totalMinutes < 1) return "1 min";
            if (totalMinutes < 60) return `${totalMinutes} mins`;
            const hours = Math.floor(totalMinutes / 60);
            const mins = totalMinutes % 60;
            return mins > 0 ? `${hours}h ${mins}m` : `${hours}h`;
        }

        const getDistanceColor = (distInKm) => {
            if (distInKm == null || isNaN(distInKm)) return "text-[#8E8E93]";
            if (distInKm <= 1.0) return "text-[var(--ios-green)]";
            if (distInKm <= 10.0) return "text-[#FF9500]"; 
            return "text-[var(--ios-red)]";
        };

        const getDistanceBgColor = (distInKm) => {
            if (distInKm == null || isNaN(distInKm)) return "bg-[#8E8E93]/10 border-[#8E8E93]/20 text-[#8E8E93]";
            if (distInKm <= 1.0) return "bg-[var(--ios-green)]/10 border-[var(--ios-green)]/20 text-[var(--ios-green)]";
            if (distInKm <= 10.0) return "bg-[#FF9500]/10 border-[#FF9500]/20 text-[#FF9500]";
            return "bg-[var(--ios-red)]/10 border-[var(--ios-red)]/20 text-[var(--ios-red)]";
        };

        function App() {
            // --- STATE ---
            const [user, setUser] = useState(null);
            const [authError, setAuthError] = useState('');
            const [liveLocation, setLiveLocation] = useState(null);
            const [gpsAccuracy, setGpsAccuracy] = useState(null);
            const [geoError, setGeoError] = useState('');
            const [locations, setLocations] = useState([]);
            const [realRoutes, setRealRoutes] = useState({}); 
            const [itineraries, setItineraries] = useState([]);
            const [activeItinId, setActiveItinId] = useState(null);
            const [itinTitle, setItinTitle] = useState('');
            const [itinDate, setItinDate] = useState('');
            const [editItinItemId, setEditItinItemId] = useState(null);
            const [itinItemTime, setItinItemTime] = useState('');
            const [itinItemLabel, setItinItemLabel] = useState('Tourist Attraction');
            const [itinItemLocId, setItinItemLocId] = useState('');
            const [itinItemNotes, setItinItemNotes] = useState('');
            const [splitBillItem, setSplitBillItem] = useState(null);
            const [tempBillTotal, setTempBillTotal] = useState('');
            const [tempBillSplit, setTempBillSplit] = useState(1);
            const [searchQuery, setSearchQuery] = useState('');
            const [formSearchQuery, setFormSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [isSearching, setIsSearching] = useState(false);
            const [view, setView] = useState('cities'); 
            const [activeCity, setActiveCity] = useState(null);
            const [activeCategory, setActiveCategory] = useState(null);
            const [selectedLocId, setSelectedLocId] = useState(null);
            const [previousView, setPreviousView] = useState('cities');
            const [locationReturnView, setLocationReturnView] = useState('category_list');
            const [notifications, setNotifications] = useState([]);
            const alertedLocsRef = useRef(new Set());
            const [fullScreenPhoto, setFullScreenPhoto] = useState(null); 
            const fullScreenScrollRef = useRef(null);
            const [confirmDialog, setConfirmDialog] = useState(null);
            const [editId, setEditId] = useState(null);
            const [name, setName] = useState('');
            const [comment, setComment] = useState('');
            const [editingCityName, setEditingCityName] = useState(null); 
            const [newCityName, setNewCityName] = useState(''); 
            const [cityPhotos, setCityPhotos] = useState([]); 
            const [city, setCity] = useState('');
            const [category, setCategory] = useState('');
            const [lat, setLat] = useState('');
            const [lng, setLng] = useState('');
            const [quickPaste, setQuickPaste] = useState(''); // NEW state for coordinate parsing box
            const [mapLink, setMapLink] = useState('');
            const [photos, setPhotos] = useState([]); 
            const [saveError, setSaveError] = useState('');
            const [isSaving, setIsSaving] = useState(false);
            const [showCoords, setShowCoords] = useState(false);

            const activeTab = view === 'notifications' ? 'notifications' : (view.includes('itinerar') ? 'itineraries' : 'places');

            // --- EFFECTS ---
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else { await signInAnonymously(auth); }
                    } catch (err) { setAuthError(err.message); }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const locationsRef = collection(db, 'artifacts', appId, 'public', 'data', 'locations');
                const unsubLocs = onSnapshot(locationsRef, (snapshot) => {
                    const fetchedLocations = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        let docPhotos = data.photos || [];
                        if (!data.photos && data.media && data.mediaType === 'image') docPhotos = [data.media];
                        fetchedLocations.push({ id: doc.id, ...data, photos: docPhotos });
                    });
                    setLocations(fetchedLocations);
                });
                const itinerariesRef = collection(db, 'artifacts', appId, 'public', 'data', 'itineraries');
                const unsubItins = onSnapshot(itinerariesRef, (snapshot) => {
                    const fetchedItins = [];
                    snapshot.forEach(doc => fetchedItins.push({ id: doc.id, ...doc.data() }));
                    fetchedItins.sort((a, b) => a.timestamp - b.timestamp);
                    setItineraries(fetchedItins);
                });
                return () => { unsubLocs(); unsubItins(); };
            }, [user]);

            useEffect(() => {
                if (!("geolocation" in navigator)) { setGeoError("GPS not supported."); return; }
                const watchId = navigator.geolocation.watchPosition(
                    (pos) => { 
                        setLiveLocation({ lat: pos.coords.latitude, lng: pos.coords.longitude }); 
                        setGpsAccuracy(pos.coords.accuracy);
                        setGeoError(''); 
                    },
                    (err) => { setGeoError("Using Mock Location"); setLiveLocation({ lat: 11.5564, lng: 104.9282 }); setGpsAccuracy(null); },
                    { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
                );
                return () => navigator.geolocation.clearWatch(watchId);
            }, []);

            useEffect(() => {
                const delayDebounceFn = setTimeout(() => {
                    if (formSearchQuery.trim().length > 2) {
                        setIsSearching(true);
                        let url = `https://photon.komoot.io/api/?q=${encodeURIComponent(formSearchQuery)}&limit=6`;
                        if (liveLocation) url += `&lat=${liveLocation.lat}&lon=${liveLocation.lng}`;
                        fetch(url)
                            .then(res => res.json())
                            .then(data => { setSearchResults(data.features || []); setIsSearching(false); })
                            .catch(() => setIsSearching(false));
                    } else { searchResults.length > 0 && setSearchResults([]); }
                }, 500);
                return () => clearTimeout(delayDebounceFn);
            }, [formSearchQuery, liveLocation]);

            useEffect(() => {
                if (!liveLocation || locations.length === 0) return;
                const validLocs = locations.filter(l => l.lat != null && l.lng != null && !l.isCityMarker);
                if (validLocs.length === 0) return;
                const fetchMatrix = async () => {
                    try {
                        const locsToFetch = validLocs.slice(0, 99); 
                        const coords = [`${liveLocation.lng},${liveLocation.lat}`, ...locsToFetch.map(l => `${l.lng},${l.lat}`)].join(';');
                        const res = await fetch(`https://router.project-osrm.org/table/v1/driving/${coords}?sources=0&annotations=duration,distance`);
                        const data = await res.json();
                        if (data.code === 'Ok' && data.durations && data.distances) {
                            const newRoutes = {};
                            locsToFetch.forEach((loc, index) => {
                                const durationSec = data.durations[index + 1];
                                const distanceMet = data.distances[index + 1];
                                if (durationSec != null && distanceMet != null) {
                                    newRoutes[loc.id] = { distance: distanceMet / 1000, duration: durationSec / 60 };
                                }
                            });
                            setRealRoutes(newRoutes);
                        }
                    } catch (e) { console.error("Routing error:", e); }
                };
                const timeoutId = setTimeout(fetchMatrix, 2500);
                return () => clearTimeout(timeoutId);
            }, [liveLocation, locations]);

            const getRouteInfo = (loc) => {
                if (realRoutes[loc.id]) return { dist: realRoutes[loc.id].distance, dur: realRoutes[loc.id].duration, isReal: true };
                if (liveLocation && loc.lat != null && loc.lng != null) {
                    const straightDist = calculateDistance(liveLocation.lat, liveLocation.lng, loc.lat, loc.lng);
                    return { dist: straightDist, dur: straightDist ? straightDist * 3.5 : null, isReal: false };
                }
                return { dist: null, dur: null, isReal: false };
            };

            const addNotification = (loc, isStartup) => {
                setNotifications(prev => {
                    if (prev.some(n => n.locId === loc.id && !n.read)) return prev;
                    return [{ id: Date.now().toString() + Math.random(), locId: loc.id, name: loc.name, distance: loc.currentDistance, duration: loc.currentDuration, isRealRoute: loc.isRealRoute, photos: loc.photos, isStartup: isStartup, timestamp: Date.now(), read: false }, ...prev];
                });
            };

            const deleteNotification = (e, id) => { e.stopPropagation(); setNotifications(prev => prev.filter(n => n.id !== id)); };

            useEffect(() => {
                if (!liveLocation || locations.length === 0) return;
                locations.forEach(loc => {
                    if (loc.isCityMarker || loc.lat == null || loc.lng == null) return;
                    const routeInfo = getRouteInfo(loc);
                    if (routeInfo.dist != null && routeInfo.dist <= 1.0) { 
                        if (!alertedLocsRef.current.has(loc.id) && !(view === 'location_detail' && selectedLocId === loc.id)) {
                            addNotification({ ...loc, currentDistance: routeInfo.dist, currentDuration: routeInfo.dur, isRealRoute: routeInfo.isReal }, false);
                            alertedLocsRef.current.add(loc.id);
                        }
                    }
                });
            }, [liveLocation, locations, view, selectedLocId, realRoutes]);

            // --- HANDLERS ---
            const handleQuickPaste = (input) => {
                setQuickPaste(input);
                const match = input.match(/(-?\d+\.\d+)\s*,\s*(-?\d+\.\d+)/);
                if (match && match.length >= 3) {
                    setLat(parseFloat(match).toFixed(6));
                    setLng(parseFloat(match).toFixed(6));
                }
            };

            const resetForm = () => {
                setEditId(null); setName(''); setCity(activeCity || 'Ho Chi Minh City'); setCategory(activeCategory || '');
                setLat(''); setLng(''); setQuickPaste(''); setMapLink(''); setPhotos([]); setComment(''); setSaveError('');
            };

            const openForm = (loc = null) => {
                setPreviousView(view); 
                if (loc) {
                    setEditId(loc.id); setName(loc.name || ''); setCity(loc.city || 'Ho Chi Minh City'); setCategory(loc.category || 'Uncategorized');
                    setLat(loc.lat != null ? loc.lat : ''); setLng(loc.lng != null ? loc.lng : ''); setMapLink(loc.mapLink || ''); setPhotos([...(loc.photos || [])]); setComment(loc.comment || '');
                    setQuickPaste('');
                } else { resetForm(); }
                setView('form');
            };

            const openCityForm = (cityName = null) => {
                setPreviousView(view); setSaveError('');
                if (cityName) { 
                    setEditingCityName(cityName); setNewCityName(cityName); 
                    const cityMarker = locations.find(l => l.isCityMarker && (l.city || 'Ho Chi Minh City') === cityName);
                    setCityPhotos(cityMarker && cityMarker.photos ? [...cityMarker.photos] : []);
                } else { 
                    setEditingCityName(null); setNewCityName(''); setCityPhotos([]); 
                }
                setView('city_form');
            };

            const handleBack = () => {
                if (view === 'photo_viewer') { setView(previousView); setFullScreenPhoto(null); } 
                else if (view === 'form') { setView(previousView); } 
                else if (view === 'city_form') { setView('cities'); } 
                else if (view === 'notifications') { setView(previousView || 'cities'); }
                else if (view === 'location_detail') { setView(locationReturnView); setSelectedLocId(null); } 
                else if (view === 'category_list') { setView('categories'); setActiveCategory(null); } 
                else if (view === 'categories') { setView('cities'); setActiveCity(null); } 
                else if (view === 'itinerary_detail') { setView('itineraries'); setActiveItinId(null); } 
                else if (view === 'itinerary_form') { setView('itineraries'); } 
                else if (view === 'itinerary_select_location') { setView('itinerary_detail'); } 
                else if (view === 'itinerary_item_form') { setView(previousView === 'itinerary_select_location' ? 'itinerary_select_location' : 'itinerary_detail'); }
                else if (view === 'split_bill') { setView('itinerary_detail'); setSplitBillItem(null); }
            };

            const handleSaveLocation = async (e) => {
                e.preventDefault(); setSaveError('');
                const parsedLat = parseFloat(lat); const parsedLng = parseFloat(lng);
                if (!name || !city || !category) { setSaveError("Please provide Name, City, and Category."); return; }
                setIsSaving(true);
                const locationData = { name, city, category, comment, lat: !isNaN(parsedLat) ? parsedLat : null, lng: !isNaN(parsedLng) ? parsedLng : null, mapLink, photos };
                if (!editId) locationData.timestamp = Date.now();
                try {
                    if (editId) { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', editId), locationData); } 
                    else { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', Date.now().toString()), locationData); }
                    handleBack();
                } catch (err) { setSaveError("Save failed: " + err.message); } finally { setIsSaving(false); }
            };

            const handleSaveCity = async (e) => {
                e.preventDefault(); const trimmedCity = newCityName.trim(); if (!trimmedCity) return;
                setIsSaving(true);
                try {
                    const cityMarker = locations.find(l => l.isCityMarker && (l.city || 'Ho Chi Minh City') === editingCityName);
                    if (editingCityName && trimmedCity !== editingCityName) {
                        const locsToUpdate = locations.filter(l => (l.city || 'Ho Chi Minh City') === editingCityName);
                        await Promise.all(locsToUpdate.map(l => updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', l.id), { city: trimmedCity })));
                    }
                    if (cityMarker) { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', cityMarker.id), { photos: cityPhotos }); }
                    else { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', Date.now().toString()), { isCityMarker: true, city: trimmedCity, photos: cityPhotos, timestamp: Date.now() }); }
                    setView('categories'); setActiveCity(trimmedCity);
                } catch (err) { setSaveError(err.message); } finally { setIsSaving(false); }
            };

            const processImage = (file) => new Promise(resolve => {
                const reader = new FileReader(); reader.onload = (e) => {
                    const img = new Image(); img.onload = () => {
                        const canvas = document.createElement('canvas'); const MAX = 2048; let {width, height} = img;
                        if (width > height && width > MAX) { height *= MAX / width; width = MAX; } else if (height > MAX) { width *= MAX / height; height = MAX; }
                        canvas.width = width; canvas.height = height; canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.85));
                    }; img.src = e.target.result;
                }; reader.readAsDataURL(file);
            });

            const handleFiles = async (e) => {
                const files = Array.from(e.target.files); if (!files.length) return;
                setIsSaving(true);
                try { const newPhotos = await Promise.all(files.map(processImage)); setPhotos(prev => [...prev, ...newPhotos]); } 
                catch { setSaveError("Processing error"); } finally { setIsSaving(false); e.target.value = null; }
            };

            const deleteLocation = async (id, isDetailView = false) => {
                setConfirmDialog({ message: "Delete this location?", onConfirm: async () => {
                    try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', id)); if (isDetailView) handleBack(); } 
                    catch (err) { setSaveError(err.message); }
                }});
            };

            const dataHierarchy = useMemo(() => {
                const cities = {}; const allCategories = new Set();
                locations.forEach(loc => {
                    const cName = loc.city || 'Ho Chi Minh City';
                    if (!cities[cName]) cities[cName] = { count: 0, categories: {}, photos: [] };
                    if (loc.isCityMarker) { if (loc.photos?.length) cities[cName].photos = loc.photos; return; }
                    const catName = loc.category || 'Uncategorized'; allCategories.add(catName);
                    if (!cities[cName].categories[catName]) cities[cName].categories[catName] = [];
                    const info = getRouteInfo(loc);
                    cities[cName].categories[catName].push({ ...loc, currentDistance: info.dist, currentDuration: info.dur, isRealRoute: info.isReal });
                    cities[cName].count++;
                });
                return { cities, uniqueCities: Object.keys(cities).sort(), allCategories: Array.from(allCategories).sort() };
            }, [locations, liveLocation, realRoutes]);

            const locDetail = view === 'location_detail' && selectedLocId ? locations.find(l => l.id === selectedLocId) : null;
            
            const getHeaderTitle = () => {
                if (view === 'cities') return ""; if (view === 'city_form') return editingCityName ? 'Edit City' : 'Add City';
                if (view === 'categories') return activeCity; if (view === 'category_list') return activeCategory;
                if (view === 'location_detail') return 'Details'; if (view === 'notifications') return 'Radar';
                if (view === 'itineraries') return 'Itineraries'; if (view === 'itinerary_detail') return 'Timesheet';
                if (editId) return 'Edit Item'; return 'Create Item';
            };

            const canShowAddButton = ['cities', 'categories', 'category_list', 'itineraries', 'itinerary_detail'].includes(view);
            const unreadCount = notifications.filter(n => !n.read).length;

            return (
                <div className="min-h-screen relative flex flex-col selection:bg-[var(--ios-accent)]/20">
                    <div className="fixed inset-0 z-[-1] overflow-hidden bg-[var(--ios-bg)]">
                        <div className="absolute top-[-10%] left-[-10%] w-[60vw] h-[60vw] rounded-full bg-gradient-to-tr from-[#C68E58]/30 to-transparent filter blur-[80px] animate-blob"></div>
                        <div className="absolute bottom-[-10%] left-[10%] w-[60vw] h-[60vw] rounded-full bg-gradient-to-tr from-stone-400/30 to-transparent filter blur-[80px] animate-blob animation-delay-4000"></div>
                    </div>

                    <header className="fixed top-0 left-0 right-0 z-40 safe-top glass-header h-28 pointer-events-none"></header>
                    <header className="fixed top-0 left-0 right-0 z-40 safe-top h-20">
                        <div className="max-w-3xl mx-auto px-4 h-full flex items-center justify-center relative">
                            <div className="absolute left-4 z-20">
                                {view !== 'cities' && view !== 'itineraries' && view !== 'notifications' ? (
                                    <button onClick={handleBack} className="h-12 px-5 rounded-full bg-white/80 border border-white shadow-sm flex items-center justify-center text-[#1D1D1F] active:scale-95 transition-transform">
                                        <i className="fa-solid fa-chevron-left mr-2"></i><span className="font-bold">Back</span>
                                    </button>
                                ) : (
                                    <div className="h-12 px-5 rounded-full bg-white/80 border border-white flex items-center justify-center space-x-2">
                                        <span className="relative flex h-2.5 w-2.5">
                                            <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-[var(--ios-green)] opacity-75"></span>
                                            <span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-[var(--ios-green)]"></span>
                                        </span>
                                        <span className="text-[13px] font-bold">{gpsAccuracy ? `±${Math.round(gpsAccuracy)}m` : 'GPS'}</span>
                                    </div>
                                )}
                            </div>
                            <h1 className="text-[17px] font-bold text-[#1D1D1F] truncate">{getHeaderTitle()}</h1>
                            <div className="absolute right-4 z-20">
                                {canShowAddButton && (
                                    <button onClick={() => view === 'cities' ? openCityForm() : openForm()} className="h-12 px-5 rounded-full bg-[#1D1D1F] text-white shadow-lg flex items-center justify-center active:scale-95 transition-transform">
                                        <span className="font-bold mr-1">Add</span><i className="fa-solid fa-plus text-xs"></i>
                                    </button>
                                )}
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 w-full max-w-3xl mx-auto px-5 safe-pb-nav mt-24 animate-slide-in relative z-10">
                        {/* VIEW: NOTIFICATIONS */}
                        {view === 'notifications' && (
                            <div className="space-y-4">
                                {notifications.length === 0 ? <div className="glass-panel py-16 text-center text-[#8E8E93]">Radar clear. No places within 1km.</div> : notifications.map(n => (
                                    <div key={n.id} onClick={() => { setSelectedLocId(n.locId); setView('location_detail'); }} className="glass-panel p-4 flex items-center justify-between cursor-pointer">
                                        <div className="flex items-center flex-1 min-w-0">
                                            <div className="w-14 h-14 rounded-[16px] bg-black/5 flex items-center justify-center mr-4">{n.photos?.length ? <img src={n.photos} className="w-full h-full object-cover rounded-[16px]" /> : <i className="fa-solid fa-location-dot"></i>}</div>
                                            <div className="truncate"><h4 className="font-bold">{n.name}</h4><p className={`text-[12px] font-medium ${getDistanceColor(n.distance)}`}>Nearby &bull; {formatDistance(n.distance)}</p></div>
                                        </div>
                                        <button onClick={(e) => deleteNotification(e, n.id)} className="w-10 h-10 text-[var(--ios-red)]"><i className="fa-solid fa-xmark"></i></button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* VIEW: CITIES */}
                        {view === 'cities' && (
                            <div className="space-y-6">
                                <div className="px-2 pb-4"><h1 className="text-[44px] font-bold font-art leading-tight text-[#1D1D1F]">Vincent's<br/><span className="text-[#8E8E93] italic font-normal">Travelling</span><br/>System</h1></div>
                                {dataHierarchy.uniqueCities.map(c => (
                                    <div key={c} onClick={() => { setActiveCity(c); setView('categories'); }} className="glass-panel p-4 flex items-center justify-between cursor-pointer active:scale-[0.98] transition-transform">
                                        <div className="flex items-center flex-1 min-w-0">
                                            <div className="w-16 h-20 rounded-[20px] bg-black/5 mr-4 flex items-center justify-center overflow-hidden">{dataHierarchy.cities[c].photos?.length ? <img src={dataHierarchy.cities[c].photos} className="w-full h-full object-cover" /> : <i className="fa-solid fa-city opacity-20"></i>}</div>
                                            <div className="min-w-0 pr-2"><h3 className="text-[22px] font-art font-bold truncate">{c}</h3><span className="text-[11px] font-bold text-[var(--ios-accent)] uppercase">{dataHierarchy.cities[c].count} Places</span></div>
                                        </div>
                                        <div className="flex flex-col space-y-2">
                                            <button onClick={(e) => { e.stopPropagation(); openCityForm(c); }} className="w-8 h-8 rounded-full bg-black/5 text-[#8E8E93]"><i className="fa-solid fa-pen text-[10px]"></i></button>
                                            <button onClick={(e) => { e.stopPropagation(); setConfirmDialog({ message: `Delete ${c}?`, onConfirm: async () => { /* delete logic */ } }); }} className="w-8 h-8 rounded-full bg-[var(--ios-red)]/10 text-[var(--ios-red)]"><i className="fa-solid fa-trash text-[10px]"></i></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* VIEW: FORM */}
                        {view === 'form' && (
                            <form onSubmit={handleSaveLocation} className="space-y-5 pb-6">
                                <h2 className="text-[34px] font-art font-bold text-[#1D1D1F] px-2">{editId ? 'Edit Place' : 'New Place'}</h2>
                                {saveError && <div className="p-3 bg-[var(--ios-red)]/10 text-[var(--ios-red)] rounded-[16px] text-sm">{saveError}</div>}
                                
                                {!editId && (
                                    <div className="glass-panel p-2">
                                        <input type="text" placeholder="Search to auto-fill..." value={formSearchQuery} onChange={e => setFormSearchQuery(e.target.value)} className="w-full glass-input p-3.5 text-sm" />
                                        {searchResults.length > 0 && <div className="mt-2 space-y-1">{searchResults.map((r, i) => <div key={i} onClick={() => handleSelectPlace(r)} className="p-3 text-sm active:bg-black/5 rounded-xl cursor-pointer">{r.properties.name}</div>)}</div>}
                                    </div>
                                )}

                                <div className="glass-panel p-2 space-y-px">
                                    <div className="p-3 flex items-center"><label className="w-24 text-xs font-bold text-[#8E8E93] uppercase">Name</label><input required value={name} onChange={e => setName(e.target.value)} className="flex-1 font-bold focus:outline-none" placeholder="Location name" /></div>
                                    <div className="h-px bg-black/5 mx-3"></div>
                                    <div className="p-3 flex items-center"><label className="w-24 text-xs font-bold text-[#8E8E93] uppercase">City</label><input required value={city} onChange={e => setCity(e.target.value)} className="flex-1 font-bold focus:outline-none" placeholder="City name" /></div>
                                    <div className="h-px bg-black/5 mx-3"></div>
                                    <div className="p-3 flex items-center"><label className="w-24 text-xs font-bold text-[#8E8E93] uppercase">Category</label><input required value={category} onChange={e => setCategory(e.target.value)} className="flex-1 font-bold focus:outline-none" placeholder="e.g. Cafe" /></div>
                                </div>

                                <div className="glass-panel p-4 space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-[10px] font-bold text-[#8E8E93] uppercase ml-1">Lat</label><input type="number" step="any" value={lat} onChange={e => setLat(e.target.value)} className="w-full glass-input p-3 text-xs font-mono" placeholder="0.000000" /></div>
                                        <div><label className="text-[10px] font-bold text-[#8E8E93] uppercase ml-1">Lng</label><input type="number" step="any" value={lng} onChange={e => setLng(e.target.value)} className="w-full glass-input p-3 text-xs font-mono" placeholder="0.000000" /></div>
                                    </div>
                                    
                                    {/* NEW: QUICK PASTE BOX */}
                                    <div>
                                        <label className="text-[10px] font-bold text-[var(--ios-accent)] uppercase ml-1">Quick Paste (lat, lng)</label>
                                        <div className="relative">
                                            <input 
                                                type="text" 
                                                value={quickPaste} 
                                                onChange={e => handleQuickPaste(e.target.value)} 
                                                className="w-full glass-input p-4 text-xs font-mono border-[var(--ios-accent)]/30 pr-10" 
                                                placeholder="Example: (11.5419, 104.9118)" 
                                            />
                                            {quickPaste && <i className="fa-solid fa-check text-[var(--ios-green)] absolute right-4 top-1/2 -translate-y-1/2"></i>}
                                        </div>
                                    </div>

                                    <div className="flex justify-between items-center px-1">
                                        <button type="button" onClick={useCurrentLocation} className="text-[11px] font-bold uppercase tracking-widest text-[#1D1D1F] bg-white border px-4 py-2 rounded-full active:scale-95 transition-transform">Use GPS</button>
                                        <label className="text-[11px] font-bold uppercase tracking-widest text-white bg-[#1D1D1F] px-4 py-2 rounded-full cursor-pointer active:scale-95 transition-transform">Add Photos<input type="file" multiple className="hidden" onChange={handleFiles} /></label>
                                    </div>
                                    
                                    <div className="flex space-x-2 overflow-x-auto scrollbar-hide">{photos.map((p, i) => <div key={i} className="relative shrink-0 w-20 h-20 rounded-xl overflow-hidden shadow-sm"><img src={p} className="w-full h-full object-cover" /><button type="button" onClick={() => setPhotos(prev => prev.filter((_, idx) => idx !== i))} className="absolute top-1 right-1 bg-black/50 text-white w-5 h-5 rounded-full text-[10px]">&times;</button></div>)}</div>
                                </div>

                                <textarea value={comment} onChange={e => setComment(e.target.value)} placeholder="Notes, tips, vibes..." className="w-full glass-panel p-4 h-24 text-sm focus:outline-none" />
                                
                                <button type="submit" disabled={isSaving} className="w-full py-4 bg-[#1D1D1F] text-white font-bold rounded-[18px] shadow-lg active:scale-[0.98] transition-all">
                                    {isSaving ? <i className="fa-solid fa-spinner fa-spin"></i> : editId ? 'Save Changes' : 'Create Place'}
                                </button>
                            </form>
                        )}
                        
                        {/* VIEW: CATEGORIES */}
                        {view === 'categories' && (
                            <div className="space-y-4">
                                <div className="px-2 mb-6"><h2 className="text-[34px] font-art font-bold leading-tight">{activeCity}</h2><p className="text-[#8E8E93] text-xs font-bold uppercase mt-1">Curated Collections</p></div>
                                {Object.keys(dataHierarchy.cities[activeCity]?.categories || {}).sort().map(cat => (
                                    <div key={cat} onClick={() => { setActiveCategory(cat); setView('category_list'); }} className="glass-panel p-4 flex items-center justify-between cursor-pointer active:scale-[0.98] transition-transform">
                                        <div className="flex items-center">
                                            <div className="w-14 h-14 rounded-2xl bg-[var(--ios-accent)]/10 text-[var(--ios-accent)] flex items-center justify-center mr-4"><i className="fa-solid fa-layer-group"></i></div>
                                            <div><h3 className="font-bold">{cat}</h3><p className="text-xs text-[#8E8E93]">{dataHierarchy.cities[activeCity].categories[cat].length} Places</p></div>
                                        </div>
                                        <i className="fa-solid fa-chevron-right text-xs text-[#8E8E93]"></i>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* VIEW: CATEGORY LIST */}
                        {view === 'category_list' && (
                            <div className="space-y-5">
                                <div className="px-2 mb-6"><h2 className="text-[34px] font-art font-bold leading-tight">{activeCategory}</h2><p className="text-[#8E8E93] text-xs font-bold uppercase mt-1">{activeCity}</p></div>
                                {dataHierarchy.cities[activeCity].categories[activeCategory].map(loc => (
                                    <div key={loc.id} onClick={() => { setSelectedLocId(loc.id); setView('location_detail'); }} className="glass-panel p-2 flex flex-col cursor-pointer active:scale-[0.98] transition-transform">
                                        {loc.photos?.length > 0 ? <img src={loc.photos} className="h-52 w-full object-cover rounded-[22px] mb-3" /> : <div className="h-20 bg-black/5 rounded-[22px] mb-3 flex items-center justify-center"><i className="fa-solid fa-camera opacity-20"></i></div>}
                                        <div className="px-3 pb-2 flex justify-between items-end">
                                            <div className="min-w-0 flex-1 pr-4">
                                                <h4 className="font-bold text-lg truncate">{loc.name}</h4>
                                                <p className={`text-[12px] font-bold flex items-center ${getDistanceColor(loc.currentDistance)}`}><i className="fa-solid fa-location-arrow text-[10px] mr-1.5"></i>{formatDistance(loc.currentDistance)}</p>
                                            </div>
                                            <button onClick={(e) => { e.stopPropagation(); openForm(loc); }} className="w-9 h-9 rounded-full bg-black/5"><i className="fa-solid fa-pen text-[11px]"></i></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* VIEW: DETAIL */}
                        {view === 'location_detail' && locDetail && (
                            <div className="space-y-6 pb-10">
                                <div className="glass-panel p-2">
                                    {locDetail.photos?.length ? <img src={locDetail.photos} className="h-72 w-full object-cover rounded-[22px] mb-4" onClick={() => { setFullScreenPhoto({ photos: locDetail.photos, index: 0 }); setPreviousView(view); setView('photo_viewer'); }} /> : <div className="h-40 bg-black/5 rounded-[22px] mb-4 flex items-center justify-center"><i className="fa-solid fa-camera opacity-10 text-3xl"></i></div>}
                                    <div className="px-4 pb-4">
                                        <h2 className="text-3xl font-art font-bold mb-2">{locDetail.name}</h2>
                                        <div className="flex space-x-2 mb-4"><span className="text-[10px] font-bold bg-black/5 px-2 py-1 rounded-md uppercase">{locDetail.category}</span></div>
                                        {locDetail.comment && <p className="bg-black/5 p-4 rounded-2xl text-sm leading-relaxed mb-6">{locDetail.comment}</p>}
                                        <a href={`https://www.google.com/maps/search/?api=1&query=${locDetail.lat},${locDetail.lng}`} target="_blank" className="w-full flex items-center justify-center py-4 bg-[#1D1D1F] text-white rounded-2xl font-bold shadow-lg shadow-black/10 active:scale-95 transition-all">Open in Maps <i className="fa-solid fa-location-arrow ml-2 text-xs"></i></a>
                                    </div>
                                </div>
                                <div className="text-center"><button onClick={() => deleteLocation(locDetail.id, true)} className="text-[var(--ios-red)] font-bold text-sm bg-[var(--ios-red)]/10 px-6 py-2.5 rounded-full border border-[var(--ios-red)]/20">Delete Location</button></div>
                            </div>
                        )}
                    </main>

                    {/* NAV TAB BAR */}
                    <div className="fixed bottom-6 left-6 right-6 z-40 safe-bottom pointer-events-none flex justify-center">
                        <div className="glass-pill w-full max-w-[400px] h-16 flex justify-around items-center px-2 pointer-events-auto shadow-2xl">
                            <button onClick={() => setView('cities')} className={`flex flex-col items-center justify-center w-full h-full rounded-full ${activeTab === 'places' ? 'text-[#1D1D1F]' : 'text-[#8E8E93]'}`}><i className="fa-solid fa-map-location-dot text-[18px] mb-1"></i><span className="text-[10px] font-bold uppercase">Places</span></button>
                            <button onClick={() => setView('notifications')} className={`flex flex-col items-center justify-center w-full h-full rounded-full relative ${activeTab === 'notifications' ? 'text-[#1D1D1F]' : 'text-[#8E8E93]'}`}><i className="fa-solid fa-bell text-[18px] mb-1"></i><span className="text-[10px] font-bold uppercase">Radar</span>{unreadCount > 0 && <span className="absolute top-2 right-4 bg-[var(--ios-red)] text-white text-[9px] px-1.5 rounded-full border border-white">{unreadCount}</span>}</button>
                            <button onClick={() => setView('itineraries')} className={`flex flex-col items-center justify-center w-full h-full rounded-full ${activeTab === 'itineraries' ? 'text-[#1D1D1F]' : 'text-[#8E8E93]'}`}><i className="fa-solid fa-calendar-day text-[18px] mb-1"></i><span className="text-[10px] font-bold uppercase">Itinerary</span></button>
                        </div>
                    </div>

                    {/* CONFIRM DIALOG */}
                    {confirmDialog && (
                        <div className="fixed inset-0 z- bg-black/20 backdrop-blur-md flex items-center justify-center p-6">
                            <div className="bg-white/95 rounded-[20px] w-[280px] overflow-hidden shadow-2xl animate-fade-in border border-white">
                                <div className="p-6 text-center"><h3 className="font-bold text-lg mb-1.5">Confirm</h3><p className="text-sm text-[#8E8E93]">{confirmDialog.message}</p></div>
                                <div className="flex border-t border-black/5">
                                    <button onClick={() => setConfirmDialog(null)} className="flex-1 py-3.5 font-bold border-r border-black/5">Cancel</button>
                                    <button onClick={() => { confirmDialog.onConfirm(); setConfirmDialog(null); }} className="flex-1 py-3.5 font-bold text-[var(--ios-red)]">Delete</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
