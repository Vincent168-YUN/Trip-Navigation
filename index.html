<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Harry Travelling Navigation</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Globe_icon.svg/1024px-Globe_icon.svg.png">

    <!-- Google Fonts for Art/Editorial Design -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root {
            --ios-accent: #007AFF;
            --ios-green: #34C759; 
            --ios-red: #FF3B30; 
            --ios-bg: #F2F2F7;
            --ios-text: #1C1C1E;
            --ios-gray: #8E8E93;
        }
        body { 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            color-scheme: light;
        }
        .font-art { font-family: 'Playfair Display', serif; }
        
        .safe-top { padding-top: env(safe-area-inset-top, 44px); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 34px); }
        .safe-pb-nav { padding-bottom: calc(env(safe-area-inset-bottom, 34px) + 100px); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-in { animation: slideIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 15s infinite alternate ease-in-out; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.05);
            border-radius: 32px;
        }
        
        .glass-pill {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 15px 50px -10px rgba(0,0,0,0.12);
            border-radius: 9999px;
        }

        .glass-header {
            background: linear-gradient(to bottom, rgba(242, 242, 247, 0.98) 0%, rgba(242, 242, 247, 0) 100%);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyDUdgQdMPAUVHSIHmbfIpSEYwQNWdFM578",
                authDomain: "trip-navigation-b0f21.firebaseapp.com",
                projectId: "trip-navigation-b0f21",
                storageBucket: "trip-navigation-b0f21.firebasestorage.app",
                messagingSenderId: "841186283877",
                appId: "1:841186283877:web:7551e6f5f33dfe6d3e118c"
            };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'my-wander-tracker-app';

        function App() {
            const [user, setUser] = useState(null);
            const [liveLocation, setLiveLocation] = useState(null);
            const [locations, setLocations] = useState([]);
            const [realRoutes, setRealRoutes] = useState({}); 
            const [view, setView] = useState('cities'); 
            const [activeCity, setActiveCity] = useState(null);
            const [activeCategory, setActiveCategory] = useState(null);
            const [selectedLocId, setSelectedLocId] = useState(null);
            const [previousView, setPreviousView] = useState('cities');
            const [isSaving, setIsSaving] = useState(false);
            const [name, setName] = useState('');
            const [city, setCity] = useState('');
            const [category, setCategory] = useState('');

            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else await signInAnonymously(auth);
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubLocs = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'locations'), (snapshot) => {
                    const fetched = [];
                    snapshot.forEach(doc => fetched.push({ id: doc.id, ...doc.data() }));
                    setLocations(fetched);
                });
                return () => unsubLocs();
            }, [user]);

            useEffect(() => {
                if (!("geolocation" in navigator)) return;
                const watchId = navigator.geolocation.watchPosition(
                    (pos) => setLiveLocation({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
                    () => setLiveLocation({ lat: 11.5564, lng: 104.9282 }),
                    { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
                );
                return () => navigator.geolocation.clearWatch(watchId);
            }, []);

            const handleSaveLocation = async (e) => {
                e.preventDefault(); setIsSaving(true);
                const lData = { name, city, category, timestamp: Date.now() };
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', Date.now().toString()), lData);
                    setView('cities');
                    setName(''); setCity(''); setCategory('');
                } catch (err) { console.error(err); } finally { setIsSaving(false); }
            };

            const dataHierarchy = useMemo(() => {
                const cities = {};
                locations.forEach(loc => {
                    const cN = loc.city || 'Unknown';
                    if (!cities[cN]) cities[cN] = { count: 0 };
                    cities[cN].count++;
                });
                return { cities, uniqueCities: Object.keys(cities).sort() };
            }, [locations]);

            const getHeaderTitle = () => {
                if (view === 'cities') return "";
                if (view === 'categories') return activeCity;
                return view.charAt(0).toUpperCase() + view.slice(1).replace('_', ' ');
            };

            const activeTab = view === 'notifications' ? 'notifications' : (view.includes('itinerar') ? 'itineraries' : 'places');

            return (
                <div className="min-h-screen relative flex flex-col selection:bg-blue-100">
                    {/* Background Blobs */}
                    <div className="fixed inset-0 z-[-1] overflow-hidden bg-[#F8F9FB]">
                        <div className="absolute top-[-15%] right-[-10%] w-[80vw] h-[80vw] rounded-full bg-blue-100/50 filter blur-[100px] animate-blob"></div>
                        <div className="absolute bottom-[-10%] left-[-20%] w-[90vw] h-[90vw] rounded-full bg-indigo-50/60 filter blur-[120px] animate-blob" style={{animationDelay: '3s'}}></div>
                    </div>

                    <header className="fixed top-0 left-0 right-0 z-40 safe-top glass-header h-20">
                        <div className="max-w-2xl mx-auto px-6 h-full flex items-center justify-between">
                            {view !== 'cities' ? (
                                <button onClick={() => setView('cities')} className="w-10 h-10 rounded-full bg-white shadow-sm border border-black/5 flex items-center justify-center active:scale-90 transition-transform">
                                    <i className="fa-solid fa-chevron-left text-[14px]"></i>
                                </button>
                            ) : <div></div>}
                            <h1 className="text-[17px] font-bold tracking-tight text-[#1D1D1F]">{getHeaderTitle()}</h1>
                            <button onClick={() => setView('form')} className="w-10 h-10 rounded-full bg-black text-white shadow-lg flex items-center justify-center active:scale-90 transition-transform">
                                <i className="fa-solid fa-plus text-[14px]"></i>
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 w-full max-w-2xl mx-auto px-6 safe-pb-nav pt-24 animate-slide-in">
                        {view === 'cities' && (
                            <div className="pb-6">
                                <div className="pt-8 pb-12">
                                    <div className="relative">
                                        <h1 className="text-[16px] font-bold tracking-[0.3em] uppercase text-blue-500 mb-2">
                                            The Voyage
                                        </h1>
                                        <div className="flex flex-col space-y-[-10px]">
                                            <span className="text-[56px] font-art font-black text-[#1D1D1F] leading-none tracking-tighter">
                                                Harry
                                            </span>
                                            <span className="text-[48px] font-art italic font-light text-[#8E8E93] leading-none tracking-tighter">
                                                Travelling
                                            </span>
                                            <span className="text-[42px] font-art font-bold text-[#1D1D1F] leading-none tracking-tighter flex items-center">
                                                Navigation
                                                <span className="ml-4 h-[3px] flex-1 bg-gradient-to-r from-blue-500 to-transparent rounded-full opacity-30"></span>
                                            </span>
                                        </div>
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    {dataHierarchy.uniqueCities.length === 0 ? (
                                        <div className="glass-panel py-24 text-center">
                                            <i className="fa-solid fa-map-location-dot text-4xl text-black/5 mb-4"></i>
                                            <p className="text-[#8E8E93] font-medium">Your world is waiting.</p>
                                        </div>
                                    ) : (
                                        dataHierarchy.uniqueCities.map((cN) => (
                                            <div key={cN} onClick={() => { setActiveCity(cN); setView('categories'); }} className="glass-panel p-5 flex items-center justify-between cursor-pointer active:scale-[0.98] transition-all group">
                                                <div className="flex items-center space-x-5">
                                                    <div className="w-14 h-14 rounded-2xl bg-white shadow-sm flex items-center justify-center text-blue-500 text-xl border border-black/5 group-hover:bg-blue-500 group-hover:text-white transition-colors">
                                                        <i className="fa-solid fa-city"></i>
                                                    </div>
                                                    <div>
                                                        <h3 className="text-[20px] font-bold text-[#1D1D1F] tracking-tight">{cN}</h3>
                                                        <p className="text-[12px] font-bold uppercase tracking-widest text-[#8E8E93]">{dataHierarchy.cities[cN].count} Locations</p>
                                                    </div>
                                                </div>
                                                <div className="w-8 h-8 rounded-full bg-black/5 flex items-center justify-center text-black/20 group-hover:text-black transition-colors">
                                                    <i className="fa-solid fa-chevron-right text-[10px]"></i>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        )}

                        {view === 'form' && (
                            <form onSubmit={handleSaveLocation} className="space-y-6">
                                <div className="pt-8 mb-6">
                                    <h2 className="text-[40px] font-art font-black text-[#1D1D1F] tracking-tighter">New Memory</h2>
                                </div>
                                <div className="glass-panel p-2 space-y-1">
                                    <div className="p-4 flex items-center">
                                        <input type="text" required value={name} onChange={e => setName(e.target.value)} className="w-full bg-transparent outline-none text-[18px] font-bold placeholder-black/20" placeholder="Place Name" />
                                    </div>
                                    <div className="h-px bg-black/5 mx-4"></div>
                                    <div className="p-4 flex items-center">
                                        <input type="text" required value={city} onChange={e => setCity(e.target.value)} className="w-full bg-transparent outline-none text-[18px] font-bold placeholder-black/20" placeholder="City" />
                                    </div>
                                    <div className="h-px bg-black/5 mx-4"></div>
                                    <div className="p-4 flex items-center">
                                        <input type="text" required value={category} onChange={e => setCategory(e.target.value)} className="w-full bg-transparent outline-none text-[18px] font-bold placeholder-black/20" placeholder="Category" />
                                    </div>
                                </div>
                                <button type="submit" disabled={isSaving} className="w-full py-5 bg-black text-white font-bold rounded-3xl shadow-xl active:scale-95 transition-transform">
                                    {isSaving ? 'Synchronizing...' : 'Save to Navigation'}
                                </button>
                            </form>
                        )}
                    </main>

                    <nav className="fixed bottom-8 left-6 right-6 z-40 safe-bottom flex justify-center">
                        <div className="glass-pill w-full max-w-[360px] h-16 flex justify-around items-center px-2">
                            <button onClick={() => setView('cities')} className={`flex flex-col items-center justify-center w-full h-full rounded-full transition-all ${activeTab === 'places' ? 'text-blue-500 scale-110' : 'text-[#8E8E93] opacity-50'}`}>
                                <i className="fa-solid fa-compass text-[20px]"></i>
                            </button>
                            <button onClick={() => setView('notifications')} className={`flex flex-col items-center justify-center w-full h-full rounded-full transition-all ${activeTab === 'notifications' ? 'text-blue-500 scale-110' : 'text-[#8E8E93] opacity-50'}`}>
                                <i className="fa-solid fa-radar text-[20px]"></i>
                            </button>
                            <button onClick={() => setView('itineraries')} className={`flex flex-col items-center justify-center w-full h-full rounded-full transition-all ${activeTab === 'itineraries' ? 'text-blue-500 scale-110' : 'text-[#8E8E93] opacity-50'}`}>
                                <i className="fa-solid fa-calendar text-[20px]"></i>
                            </button>
                        </div>
                    </nav>
                </div>
            );
        }
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
