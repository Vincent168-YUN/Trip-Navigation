<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vincent's Travelling System</title>
    
    <!-- Apple/iOS Web App settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Globe_icon.svg/1024px-Globe_icon.svg.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root {
            --ios-accent: #C68E58; 
            --ios-green: #34C759; 
            --ios-red: #FF3B30; 
            --ios-bg: #F8F9FA; 
            --ios-text: #1C1C1E; 
            --ios-gray: #8E8E93; 
        }
        
        body { 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            overflow-x: hidden;
        }

        .font-art { font-family: 'Playfair Display', serif; }

        /* Smooth iOS safe area paddings */
        .safe-top { padding-top: env(safe-area-inset-top, 20px); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .safe-pb-nav { padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 90px); }

        /* Glassmorphism Classes */
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05);
            border-radius: 24px;
        }

        .glass-pill {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 15px 35px -10px rgba(0,0,0,0.12);
            border-radius: 100px;
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(200, 200, 200, 0.2);
            border-radius: 14px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 1);
            border-color: var(--ios-accent);
            box-shadow: 0 0 0 4px rgba(198, 142, 88, 0.1);
        }

        /* Animations */
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* Liquid Background Blobs */
        .blob {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--ios-accent) 0%, transparent 70%);
            opacity: 0.15;
            filter: blur(80px);
            z-index: -1;
            pointer-events: none;
            animation: move 20s infinite alternate ease-in-out;
        }
        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo, useRef } = React;

        // --- Firebase Configuration ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "",
            authDomain: "trip-navigation-b0f21.firebaseapp.com",
            projectId: "trip-navigation-b0f21",
            storageBucket: "trip-navigation-b0f21.appspot.com",
            messagingSenderId: "841186283877",
            appId: "1:841186283877:web:7551e6f5f33dfe6d3e118c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'vincents-travel-sys';

        // --- Utility Functions ---
        function calculateDistance(lat1, lon1, lat2, lon2) {
            if (!lat1 || !lon1 || !lat2 || !lon2) return null;
            const R = 6371; 
            const dLat = (lat2 - lat1) * (Math.PI / 180);
            const dLon = (lon2 - lon1) * (Math.PI / 180);
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
        }

        function formatDistance(km) {
            if (km == null) return "Unknown";
            return km < 1 ? `${Math.round(km * 1000)}m` : `${km.toFixed(1)}km`;
        }

        function formatDuration(mins) {
            if (mins == null) return "";
            const h = Math.floor(mins / 60);
            const m = Math.round(mins % 60);
            if (h > 0) return `${h}h ${m}m`;
            return `${m || 1}m`;
        }

        function App() {
            // --- State ---
            const [user, setUser] = useState(null);
            const [view, setView] = useState('cities');
            const [prevView, setPrevView] = useState('cities');
            const [activeCity, setActiveCity] = useState(null);
            const [activeCategory, setActiveCategory] = useState(null);
            const [selectedLocId, setSelectedLocId] = useState(null);
            
            const [locations, setLocations] = useState([]);
            const [itineraries, setItineraries] = useState([]);
            const [activeItinId, setActiveItinId] = useState(null);
            
            const [liveLocation, setLiveLocation] = useState(null);
            const [realRoutes, setRealRoutes] = useState({});
            const [notifications, setNotifications] = useState([]);
            
            // Form States
            const [isSaving, setIsSaving] = useState(false);
            const [formData, setFormData] = useState({ name: '', city: '', category: '', comment: '', lat: '', lng: '', mapLink: '', photos: [] });
            const [itinFormData, setItinFormData] = useState({ title: '', date: '', items: [] });
            const [itemFormData, setItemFormData] = useState({ id: null, time: '12:00', label: 'Attraction', locationId: '', notes: '', billTotal: '', billSplit: 1 });

            // UI States
            const [showCoords, setShowCoords] = useState(false);
            const [photoViewer, setPhotoViewer] = useState(null);
            const [confirmDialog, setConfirmDialog] = useState(null);
            const alertedRefs = useRef(new Set());

            // --- Authentication & Data Fetching ---
            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                initAuth();
                return onAuthStateChanged(auth, setUser);
            }, []);

            useEffect(() => {
                if (!user) return;
                
                // Fetch Locations
                const unsubLocs = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'locations'), (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setLocations(data);
                }, (err) => console.error(err));

                // Fetch Itineraries
                const unsubItins = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'itineraries'), (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setItineraries(data.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0)));
                }, (err) => console.error(err));

                return () => { unsubLocs(); unsubItins(); };
            }, [user]);

            // --- Geolocation & Routing ---
            useEffect(() => {
                if (!navigator.geolocation) return;
                const watchId = navigator.geolocation.watchPosition(
                    (pos) => setLiveLocation({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
                    () => setLiveLocation({ lat: 11.5564, lng: 104.9282 }), // Default fallback
                    { enableHighAccuracy: true }
                );
                return () => navigator.geolocation.clearWatch(watchId);
            }, []);

            useEffect(() => {
                if (!liveLocation || locations.length === 0) return;
                const validLocs = locations.filter(l => !l.isCityMarker && l.lat && l.lng).slice(0, 50);
                if (validLocs.length === 0) return;

                const coords = [
                    `${liveLocation.lng},${liveLocation.lat}`,
                    ...validLocs.map(l => `${l.lng},${l.lat}`)
                ].join(';');

                fetch(`https://router.project-osrm.org/table/v1/driving/${coords}?sources=0&annotations=duration,distance`)
                    .then(r => r.json())
                    .then(data => {
                        if (data.code === 'Ok') {
                            const routes = {};
                            validLocs.forEach((loc, i) => {
                                routes[loc.id] = {
                                    distance: data.distances[i + 1] / 1000,
                                    duration: data.durations[i + 1] / 60
                                };
                            });
                            setRealRoutes(routes);
                        }
                    }).catch(console.error);
            }, [liveLocation, locations]);

            // Radar Alerts
            useEffect(() => {
                if (!liveLocation) return;
                locations.forEach(loc => {
                    if (loc.isCityMarker || !loc.lat) return;
                    const route = realRoutes[loc.id];
                    const dist = route ? route.distance : calculateDistance(liveLocation.lat, liveLocation.lng, loc.lat, loc.lng);
                    
                    if (dist && dist < 0.5 && !alertedRefs.current.has(loc.id)) {
                        setNotifications(prev => [{ id: Date.now(), locId: loc.id, name: loc.name, dist, time: Date.now() }, ...prev]);
                        alertedRefs.current.add(loc.id);
                    }
                });
            }, [liveLocation, realRoutes, locations]);

            // --- Handlers ---
            const handleBack = () => {
                if (view === 'location_detail') setView('category_list');
                else if (view === 'category_list') setView('categories');
                else if (view === 'categories') setView('cities');
                else if (view === 'itinerary_detail') setView('itineraries');
                else if (view === 'itinerary_item_form' || view === 'split_bill') setView('itinerary_detail');
                else setView(prevView);
            };

            const navigate = (newView) => {
                setPrevView(view);
                setView(newView);
            };

            const handleCoordQuickPaste = (val) => {
                // Regex to find two floats separated by a comma, optionally in parentheses
                const match = val.match(/(-?\d+\.\d+),\s*(-?\d+\.\d+)/);
                if (match) {
                    setFormData(prev => ({
                        ...prev,
                        lat: match,
                        lng: match
                    }));
                }
            };

            const saveLocation = async (e) => {
                e.preventDefault();
                if (!user) return;
                setIsSaving(true);
                try {
                    const docId = formData.id || Date.now().toString();
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', docId), {
                        ...formData,
                        lat: parseFloat(formData.lat) || null,
                        lng: parseFloat(formData.lng) || null,
                        timestamp: Date.now()
                    });
                    setView('cities');
                } catch (err) { alert("Save failed. Image might be too large."); }
                setIsSaving(false);
            };

            const saveItinerary = async (e) => {
                e.preventDefault();
                setIsSaving(true);
                const docId = activeItinId || Date.now().toString();
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'itineraries', docId), {
                    ...itinFormData,
                    timestamp: Date.now()
                });
                setView('itineraries');
                setIsSaving(false);
            };

            const saveItinItem = async (e) => {
                e.preventDefault();
                const itin = itineraries.find(i => i.id === activeItinId);
                const updatedItems = [...(itin.items || [])];
                const itemIndex = itemFormData.id ? updatedItems.findIndex(i => i.id === itemFormData.id) : -1;
                
                const finalItem = { ...itemFormData, id: itemFormData.id || Date.now().toString() };
                if (itemIndex > -1) updatedItems[itemIndex] = finalItem;
                else updatedItems.push(finalItem);
                
                updatedItems.sort((a, b) => a.time.localeCompare(b.time));
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'itineraries', activeItinId), { items: updatedItems });
                setView('itinerary_detail');
            };

            const processImage = (file) => {
                return new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const max = 1200;
                            let w = img.width, h = img.height;
                            if (w > h && w > max) { h *= max/w; w = max; }
                            else if (h > max) { w *= max/h; h = max; }
                            canvas.width = w; canvas.height = h;
                            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                            resolve(canvas.toDataURL('image/jpeg', 0.7));
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            };

            const handleFileSelect = async (e, type) => {
                const files = Array.from(e.target.files);
                const processed = await Promise.all(files.map(processImage));
                if (type === 'location') setFormData(prev => ({ ...prev, photos: [...prev.photos, ...processed] }));
                else if (type === 'city') setFormData(prev => ({ ...prev, cityPhotos: [...(prev.cityPhotos || []), ...processed] }));
            };

            // --- Data Derived Views ---
            const cityData = useMemo(() => {
                const map = {};
                locations.forEach(loc => {
                    const c = loc.city || 'Unknown';
                    if (!map[c]) map[c] = { count: 0, photos: [], categories: {} };
                    if (loc.isCityMarker) map[c].photos = loc.photos || [];
                    else {
                        map[c].count++;
                        const cat = loc.category || 'Uncategorized';
                        if (!map[c].categories[cat]) map[c].categories[cat] = [];
                        map[c].categories[cat].push(loc);
                    }
                });
                return map;
            }, [locations]);

            const currentItin = itineraries.find(i => i.id === activeItinId);
            const totalBudget = currentItin?.items?.reduce((sum, item) => sum + (parseFloat(item.billTotal) || 0), 0) || 0;

            // --- Component Library ---
            const Header = ({ title, showBack, rightAction }) => (
                <div className="fixed top-0 left-0 right-0 z-40 glass-pill mx-4 mt-4 h-14 flex items-center px-4 justify-between transition-all">
                    <div className="flex items-center space-x-2">
                        {showBack ? (
                            <button onClick={handleBack} className="w-9 h-9 rounded-full flex items-center justify-center active:bg-black/5">
                                <i className="fa-solid fa-chevron-left text-sm"></i>
                            </button>
                        ) : (
                            <div className="w-3 h-3 rounded-full bg-[var(--ios-green)] animate-pulse ml-2"></div>
                        )}
                        <h1 className="text-[16px] font-bold tracking-tight truncate max-w-[150px]">{title}</h1>
                    </div>
                    {rightAction}
                </div>
            );

            const Nav = () => (
                <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-40 w-[90%] max-w-[400px]">
                    <div className="glass-pill h-16 flex items-center justify-around px-2">
                        {[
                            { id: 'cities', icon: 'fa-map-pin', label: 'Places' },
                            { id: 'notifications', icon: 'fa-radar', label: 'Radar', badge: notifications.length },
                            { id: 'itineraries', icon: 'fa-calendar-alt', label: 'Plan' }
                        ].map(item => (
                            <button 
                                key={item.id} 
                                onClick={() => setView(item.id)}
                                className={`flex flex-col items-center justify-center w-full h-full rounded-[20px] transition-all ${view.includes(item.id) || (item.id === 'cities' && ['categories','category_list'].includes(view)) ? 'text-[var(--ios-accent)]' : 'text-gray-400'}`}
                            >
                                <div className="relative">
                                    <i className={`fa-solid ${item.icon} text-[20px]`}></i>
                                    {item.badge > 0 && <span className="absolute -top-1 -right-2 bg-red-500 text-white text-[8px] px-1.5 py-0.5 rounded-full">{item.badge}</span>}
                                </div>
                                <span className="text-[10px] font-bold mt-1 uppercase tracking-widest">{item.label}</span>
                            </button>
                        ))}
                    </div>
                </div>
            );

            // --- Render Logic ---
            return (
                <div className="min-h-screen pb-32">
                    <div className="blob" style={{ top: '10%', left: '10%' }}></div>
                    <div className="blob" style={{ bottom: '10%', right: '10%', animationDelay: '-10s', background: 'radial-gradient(circle, #8E8E93 0%, transparent 70%)' }}></div>

                    {/* PHOTO VIEWER MODAL */}
                    {photoViewer && (
                        <div className="fixed inset-0 z- bg-black/95 animate-fade-in flex flex-col justify-center">
                            <button onClick={() => setPhotoViewer(null)} className="absolute top-12 right-6 text-white text-2xl z-"><i className="fa-solid fa-xmark"></i></button>
                            <div className="w-full flex overflow-x-auto snap-x snap-mandatory scrollbar-hide">
                                {photoViewer.photos.map((p, i) => (
                                    <img key={i} src={p} className="w-full h-auto max-h-screen object-contain snap-center" />
                                ))}
                            </div>
                        </div>
                    )}

                    {/* MAIN NAVIGATION */}
                    <Nav />

                    <div className="max-w-xl mx-auto px-6 pt-24 animate-slide-up">
                        {/* VIEW: CITIES */}
                        {view === 'cities' && (
                            <>
                                <Header title="World Map" rightAction={<button onClick={() => { setFormData({ id: '', city: '', isCityMarker: true, photos: [] }); setView('form_city'); }} className="text-[var(--ios-accent)] font-bold text-sm px-4">Add City</button>} />
                                <div className="space-y-4">
                                    <h2 className="text-4xl font-art font-bold mt-4 mb-8">Where to,<br/><span className="text-[var(--ios-accent)]">Vincent?</span></h2>
                                    {Object.keys(cityData).sort().map(city => (
                                        <div key={city} onClick={() => { setActiveCity(city); setView('categories'); }} className="glass-panel p-4 flex items-center justify-between active:scale-[0.98] transition-transform cursor-pointer">
                                            <div className="flex items-center space-x-4">
                                                <div className="w-16 h-16 rounded-[20px] overflow-hidden bg-gray-200 border border-white">
                                                    {cityData[city].photos ? <img src={cityData[city].photos} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-gray-400"><i className="fa-solid fa-city"></i></div>}
                                                </div>
                                                <div>
                                                    <h3 className="text-xl font-bold">{city}</h3>
                                                    <p className="text-sm text-gray-500 font-medium">{cityData[city].count} saved places</p>
                                                </div>
                                            </div>
                                            <i className="fa-solid fa-chevron-right text-gray-300 mr-2"></i>
                                        </div>
                                    ))}
                                </div>
                            </>
                        )}

                        {/* VIEW: CATEGORIES */}
                        {view === 'categories' && (
                            <>
                                <Header title={activeCity} showBack />
                                <div className="space-y-4 pt-4">
                                    <h2 className="text-3xl font-art font-bold mb-6">Collections</h2>
                                    {Object.keys(cityData[activeCity]?.categories || {}).sort().map(cat => (
                                        <div key={cat} onClick={() => { setActiveCategory(cat); setView('category_list'); }} className="glass-panel p-5 flex items-center justify-between active:scale-[0.97] transition-all cursor-pointer">
                                            <div className="flex items-center space-x-4">
                                                <div className="w-12 h-12 rounded-xl bg-[var(--ios-accent)]/10 flex items-center justify-center text-[var(--ios-accent)]">
                                                    <i className="fa-solid fa-layer-group"></i>
                                                </div>
                                                <div>
                                                    <h3 className="font-bold text-lg">{cat}</h3>
                                                    <p className="text-xs text-gray-500 font-bold uppercase tracking-wider">{cityData[activeCity].categories[cat].length} Places</p>
                                                </div>
                                            </div>
                                            <i className="fa-solid fa-chevron-right text-gray-300"></i>
                                        </div>
                                    ))}
                                    <button onClick={() => { setFormData({ id: '', city: activeCity, category: '', photos: [], lat: '', lng: '' }); setView('form_loc'); }} className="w-full py-4 glass-panel border-dashed border-2 flex items-center justify-center text-gray-400 font-bold space-x-2">
                                        <i className="fa-solid fa-plus"></i> <span>Add New Place</span>
                                    </button>
                                </div>
                            </>
                        )}

                        {/* VIEW: CATEGORY LIST */}
                        {view === 'category_list' && (
                            <>
                                <Header title={activeCategory} showBack />
                                <div className="space-y-6 pt-4">
                                    {cityData[activeCity].categories[activeCategory].map(loc => {
                                        const route = realRoutes[loc.id];
                                        return (
                                            <div key={loc.id} onClick={() => { setSelectedLocId(loc.id); setView('location_detail'); }} className="glass-panel overflow-hidden group active:scale-[0.98] transition-transform">
                                                {loc.photos?. && <img src={loc.photos} className="w-full h-48 object-cover" />}
                                                <div className="p-4">
                                                    <div className="flex justify-between items-start">
                                                        <h3 className="text-xl font-bold">{loc.name}</h3>
                                                        {route && (
                                                            <div className="bg-[var(--ios-green)]/10 text-[var(--ios-green)] px-2 py-1 rounded-lg text-[10px] font-bold">
                                                                {formatDistance(route.distance)} • {formatDuration(route.duration)}
                                                            </div>
                                                        )}
                                                    </div>
                                                    <p className="text-sm text-gray-500 mt-1 line-clamp-2">{loc.comment}</p>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </>
                        )}

                        {/* VIEW: LOCATION DETAIL */}
                        {view === 'location_detail' && (
                            <>
                                {(() => {
                                    const loc = locations.find(l => l.id === selectedLocId);
                                    if (!loc) return null;
                                    const route = realRoutes[loc.id];
                                    return (
                                        <div className="space-y-6 pt-4 pb-12">
                                            <Header title="Details" showBack rightAction={
                                                <button onClick={() => { setFormData(loc); setView('form_loc'); }} className="text-[var(--ios-accent)] font-bold text-sm mr-4">Edit</button>
                                            } />
                                            {loc.photos?.length > 0 && (
                                                <div className="w-full h-72 rounded-[32px] overflow-hidden shadow-2xl relative" onClick={() => setPhotoViewer({ photos: loc.photos })}>
                                                    <img src={loc.photos} className="w-full h-full object-cover" />
                                                    {loc.photos.length > 1 && <span className="absolute bottom-4 right-4 bg-black/50 backdrop-blur-md text-white text-[10px] px-3 py-1 rounded-full">{loc.photos.length} Photos</span>}
                                                </div>
                                            )}
                                            <div className="glass-panel p-6">
                                                <h2 className="text-3xl font-art font-bold mb-2">{loc.name}</h2>
                                                <div className="flex space-x-2 mb-6">
                                                    <span className="bg-gray-100 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider">{loc.category}</span>
                                                    {route && <span className="bg-[var(--ios-green)]/10 text-[var(--ios-green)] px-3 py-1 rounded-full text-[10px] font-bold">{formatDuration(route.duration)} drive</span>}
                                                </div>
                                                {loc.comment && <p className="text-gray-700 leading-relaxed mb-8">{loc.comment}</p>}
                                                
                                                <div className="grid grid-cols-2 gap-4">
                                                    <a href={loc.mapLink || `https://www.google.com/maps/search/?api=1&query=${loc.lat},${loc.lng}`} target="_blank" className="bg-[#1D1D1F] text-white py-4 rounded-2xl flex items-center justify-center font-bold space-x-2">
                                                        <i className="fa-solid fa-directions"></i> <span>Directions</span>
                                                    </a>
                                                    <button onClick={() => setShowCoords(!showCoords)} className="bg-white border-2 border-gray-100 py-4 rounded-2xl font-bold flex items-center justify-center space-x-2">
                                                        <i className="fa-solid fa-location-dot"></i> <span>{showCoords ? 'Hide GPS' : 'Show GPS'}</span>
                                                    </button>
                                                </div>
                                                {showCoords && (
                                                    <div className="mt-4 p-4 bg-gray-50 rounded-xl font-mono text-xs text-gray-500 break-all">
                                                        Lat: {loc.lat}<br/>Lng: {loc.lng}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })()}
                            </>
                        )}

                        {/* VIEW: ITINERARIES */}
                        {view === 'itineraries' && (
                            <>
                                <Header title="Timesheets" rightAction={<button onClick={() => { setItinFormData({ title: '', date: '', items: [] }); setActiveItinId(null); setView('form_itin'); }} className="text-[var(--ios-accent)] font-bold text-sm px-4">New Day</button>} />
                                <div className="space-y-4">
                                    <h2 className="text-4xl font-art font-bold mb-8">Your Plans</h2>
                                    {itineraries.length === 0 ? (
                                        <div className="glass-panel p-12 text-center text-gray-400">No trips planned yet.</div>
                                    ) : itineraries.map(itin => (
                                        <div key={itin.id} onClick={() => { setActiveItinId(itin.id); setView('itinerary_detail'); }} className="glass-panel p-5 active:scale-[0.98] transition-transform cursor-pointer">
                                            <div className="flex justify-between items-center">
                                                <div>
                                                    <h3 className="text-xl font-bold">{itin.title}</h3>
                                                    <p className="text-sm text-gray-500">{itin.date || 'Flexible Date'} • {(itin.items || []).length} items</p>
                                                </div>
                                                <div className="text-right">
                                                    <p className="text-[var(--ios-accent)] font-bold">${(itin.items?.reduce((s, i) => s + (parseFloat(i.billTotal)||0), 0)||0).toFixed(0)}</p>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </>
                        )}

                        {/* VIEW: ITINERARY DETAIL */}
                        {view === 'itinerary_detail' && currentItin && (
                            <>
                                <Header title={currentItin.title} showBack rightAction={<button onClick={() => { setItemFormData({ id: null, time: '12:00', label: 'Attraction', locationId: '', notes: '', billTotal: '', billSplit: 1 }); setView('form_itin_item'); }} className="text-[var(--ios-accent)] font-bold text-sm px-4">Add Item</button>} />
                                <div className="space-y-8 pt-4">
                                    <div className="flex justify-between items-end mb-8">
                                        <h2 className="text-3xl font-art font-bold">{currentItin.date || 'The Big Day'}</h2>
                                        <div className="glass-panel px-4 py-2 text-center">
                                            <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Budget</p>
                                            <p className="text-xl font-bold text-[var(--ios-accent)]">${totalBudget.toFixed(2)}</p>
                                        </div>
                                    </div>

                                    <div className="relative border-l-2 border-gray-100 ml-4 space-y-8 pb-8">
                                        {(currentItin.items || []).map(item => {
                                            const loc = locations.find(l => l.id === item.locationId);
                                            return (
                                                <div key={item.id} className="relative pl-8">
                                                    <div className="absolute -left-[9px] top-1 w-4 h-4 rounded-full bg-white border-2 border-[var(--ios-accent)]"></div>
                                                    <div className="glass-panel p-5 group">
                                                        <div className="flex justify-between">
                                                            <span className="text-[10px] font-bold text-[var(--ios-accent)] uppercase tracking-tighter">{item.time} — {item.label}</span>
                                                            <div className="flex space-x-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                                                <button onClick={() => { setItemFormData(item); setView('form_itin_item'); }} className="text-gray-400 hover:text-black"><i className="fa-solid fa-pen text-xs"></i></button>
                                                                <button onClick={async () => { if(confirm("Remove?")) { const items = currentItin.items.filter(i => i.id !== item.id); await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'itineraries', activeItinId), { items }); }}} className="text-red-400"><i className="fa-solid fa-trash text-xs"></i></button>
                                                            </div>
                                                        </div>
                                                        <h4 className="text-lg font-bold mt-1">{loc?.name || item.label}</h4>
                                                        {item.notes && <p className="text-sm text-gray-500 mt-2">{item.notes}</p>}
                                                        {item.billTotal > 0 && (
                                                            <div className="mt-4 flex items-center space-x-2">
                                                                <div className="bg-gray-100 px-3 py-1 rounded-lg flex items-center space-x-2">
                                                                    <i className="fa-solid fa-wallet text-[var(--ios-accent)] text-[10px]"></i>
                                                                    <span className="text-xs font-bold">${item.billTotal} / {item.billSplit} people</span>
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </>
                        )}

                        {/* VIEW: RADAR (NOTIFICATIONS) */}
                        {view === 'notifications' && (
                            <>
                                <Header title="Nearby Radar" rightAction={<button onClick={() => setNotifications([])} className="text-gray-400 text-xs px-4">Clear</button>} />
                                <div className="space-y-4 pt-4">
                                    <h2 className="text-3xl font-art font-bold mb-6">Discovery</h2>
                                    {notifications.length === 0 ? (
                                        <div className="glass-panel p-16 text-center">
                                            <div className="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-4 text-gray-300"><i className="fa-solid fa-radar text-2xl"></i></div>
                                            <p className="text-gray-400 font-medium">Scanning for saved places...</p>
                                        </div>
                                    ) : notifications.map(n => (
                                        <div key={n.id} onClick={() => { setSelectedLocId(n.locId); setView('location_detail'); }} className="glass-panel p-5 flex items-center justify-between border-l-4 border-[var(--ios-accent)]">
                                            <div>
                                                <h3 className="font-bold text-lg">{n.name}</h3>
                                                <p className="text-sm text-[var(--ios-green)] font-bold">{formatDistance(n.dist)} away</p>
                                            </div>
                                            <i className="fa-solid fa-chevron-right text-gray-200"></i>
                                        </div>
                                    ))}
                                </div>
                            </>
                        )}

                        {/* VIEW: FORMS */}
                        {view === 'form_loc' && (
                            <form onSubmit={saveLocation} className="space-y-6 pt-4">
                                <Header title={formData.id ? "Edit Place" : "New Place"} showBack />
                                <div className="glass-panel p-6 space-y-4">
                                    <input placeholder="Name of place" className="w-full glass-input p-4 font-bold" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} required />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input placeholder="City" className="w-full glass-input p-4" value={formData.city} onChange={e => setFormData({...formData, city: e.target.value})} required />
                                        <input placeholder="Category" className="w-full glass-input p-4" value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} required />
                                    </div>
                                    <textarea placeholder="Notes, tips, memories..." className="w-full glass-input p-4 h-32" value={formData.comment} onChange={e => setFormData({...formData, comment: e.target.value})} />
                                    
                                    <div className="pt-2 border-t border-gray-100">
                                        <label className="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3 mt-2">Coordinates</label>
                                        <div className="grid grid-cols-2 gap-4">
                                            <input placeholder="Lat" className="w-full glass-input p-4 text-xs" value={formData.lat} onChange={e => setFormData({...formData, lat: e.target.value})} />
                                            <input placeholder="Lng" className="w-full glass-input p-4 text-xs" value={formData.lng} onChange={e => setFormData({...formData, lng: e.target.value})} />
                                        </div>
                                        <div className="mt-4">
                                            <label className="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Quick Paste (Lat, Lng)</label>
                                            <input 
                                                placeholder="(11.5419849, 104.9118862)" 
                                                className="w-full glass-input p-4 text-xs italic bg-amber-50/30" 
                                                onChange={e => handleCoordQuickPaste(e.target.value)}
                                            />
                                        </div>
                                    </div>
                                    
                                    <input placeholder="Google Maps Link" className="w-full glass-input p-4 text-xs" value={formData.mapLink} onChange={e => setFormData({...formData, mapLink: e.target.value})} />
                                    
                                    <div className="pt-4">
                                        <label className="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3">Photos</label>
                                        <div className="flex flex-wrap gap-2">
                                            {formData.photos?.map((p, i) => (
                                                <div key={i} className="relative w-20 h-20 rounded-xl overflow-hidden shadow-sm">
                                                    <img src={p} className="w-full h-full object-cover" />
                                                    <button type="button" onClick={() => setFormData({...formData, photos: formData.photos.filter((_, idx) => idx !== i)})} className="absolute top-1 right-1 bg-black/50 text-white w-5 h-5 rounded-full flex items-center justify-center text-[8px]"><i className="fa-solid fa-x"></i></button>
                                                </div>
                                            ))}
                                            <label className="w-20 h-20 border-2 border-dashed border-gray-200 rounded-xl flex items-center justify-center text-gray-300 cursor-pointer">
                                                <i className="fa-solid fa-plus"></i>
                                                <input type="file" multiple className="hidden" onChange={e => handleFileSelect(e, 'location')} />
                                            </label>
                                        </div>
                                    </div>
                                </div>
                                <button type="submit" disabled={isSaving} className="w-full py-5 bg-[var(--ios-accent)] text-white font-bold rounded-3xl shadow-xl shadow-amber-200 active:scale-[0.98] transition-all">
                                    {isSaving ? "Saving..." : "Pin Place"}
                                </button>
                                {formData.id && (
                                    <button type="button" onClick={async () => { if(confirm("Delete?")) { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', formData.id)); setView('cities'); }}} className="w-full py-4 text-red-500 font-bold">Delete Item</button>
                                )}
                            </form>
                        )}

                        {view === 'form_city' && (
                            <form onSubmit={saveLocation} className="space-y-6 pt-4">
                                <Header title="Add New City" showBack />
                                <div className="glass-panel p-6 space-y-4">
                                    <input placeholder="City Name (e.g. Tokyo)" className="w-full glass-input p-4 font-bold" value={formData.city} onChange={e => setFormData({...formData, city: e.target.value, isCityMarker: true})} required />
                                    <div className="pt-4">
                                        <label className="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3">City Cover Image</label>
                                        <div className="flex flex-wrap gap-2">
                                            {formData.photos?.map((p, i) => (
                                                <div key={i} className="relative w-32 h-32 rounded-2xl overflow-hidden shadow-sm">
                                                    <img src={p} className="w-full h-full object-cover" />
                                                </div>
                                            ))}
                                            <label className="w-32 h-32 border-2 border-dashed border-gray-200 rounded-2xl flex items-center justify-center text-gray-300 cursor-pointer">
                                                <i className="fa-solid fa-camera"></i>
                                                <input type="file" className="hidden" onChange={e => handleFileSelect(e, 'location')} />
                                            </label>
                                        </div>
                                    </div>
                                </div>
                                <button type="submit" className="w-full py-5 bg-[#1D1D1F] text-white font-bold rounded-3xl shadow-xl active:scale-[0.98] transition-all">Create Destination</button>
                            </form>
                        )}

                        {view === 'form_itin' && (
                            <form onSubmit={saveItinerary} className="space-y-6 pt-4">
                                <Header title="Plan Your Trip" showBack />
                                <div className="glass-panel p-6 space-y-4">
                                    <input placeholder="Trip Title (e.g. Weekend in Da Lat)" className="w-full glass-input p-4 font-bold" value={itinFormData.title} onChange={e => setItinFormData({...itinFormData, title: e.target.value})} required />
                                    <input type="date" className="w-full glass-input p-4" value={itinFormData.date} onChange={e => setItinFormData({...itinFormData, date: e.target.value})} />
                                </div>
                                <button type="submit" className="w-full py-5 bg-[var(--ios-accent)] text-white font-bold rounded-3xl shadow-xl active:scale-[0.98] transition-all">Save Trip</button>
                            </form>
                        )}

                        {view === 'form_itin_item' && (
                            <form onSubmit={saveItinItem} className="space-y-6 pt-4">
                                <Header title="Add Timesheet Item" showBack />
                                <div className="glass-panel p-6 space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="time" className="w-full glass-input p-4" value={itemFormData.time} onChange={e => setItemFormData({...itemFormData, time: e.target.value})} required />
                                        <select className="w-full glass-input p-4" value={itemFormData.label} onChange={e => setItemFormData({...itemFormData, label: e.target.value})}>
                                            <option>Breakfast</option>
                                            <option>Lunch</option>
                                            <option>Dinner</option>
                                            <option>Attraction</option>
                                            <option>Travel</option>
                                            <option>Other</option>
                                        </select>
                                    </div>
                                    <select className="w-full glass-input p-4 font-bold" value={itemFormData.locationId} onChange={e => setItemFormData({...itemFormData, locationId: e.target.value})}>
                                        <option value="">Select a saved location...</option>
                                        {locations.filter(l => !l.isCityMarker).sort((a,b) => a.name.localeCompare(b.name)).map(l => (
                                            <option key={l.id} value={l.id}>{l.name} ({l.city})</option>
                                        ))}
                                    </select>
                                    <textarea placeholder="Specific plans or reminders..." className="w-full glass-input p-4 h-24" value={itemFormData.notes} onChange={e => setItemFormData({...itemFormData, notes: e.target.value})} />
                                    
                                    <div className="pt-4 border-t border-gray-100 mt-4">
                                        <label className="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3">Expenses</label>
                                        <div className="grid grid-cols-2 gap-4">
                                            <input type="number" placeholder="Total bill ($)" className="w-full glass-input p-4" value={itemFormData.billTotal} onChange={e => setItemFormData({...itemFormData, billTotal: e.target.value})} />
                                            <input type="number" placeholder="Split (people)" className="w-full glass-input p-4" value={itemFormData.billSplit} onChange={e => setItemFormData({...itemFormData, billSplit: e.target.value})} />
                                        </div>
                                    </div>
                                </div>
                                <button type="submit" className="w-full py-5 bg-[var(--ios-accent)] text-white font-bold rounded-3xl shadow-xl active:scale-[0.98] transition-all">Add to Schedule</button>
                            </form>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
