<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WanderTracker Live</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Globe_icon.svg/1024px-Globe_icon.svg.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .bottom-nav { height: calc(64px + env(safe-area-inset-bottom)); }
        .content-area { padding-bottom: calc(80px + env(safe-area-inset-bottom)); }
        
        /* Smooth transitions for view switching */
        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans overflow-x-hidden">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo } = React;

        // --- FIREBASE SETUP ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyDUdgQdMPAUVHSIHmbfIpSEYwQNWdFM578",
                authDomain: "trip-navigation-b0f21.firebaseapp.com",
                projectId: "trip-navigation-b0f21",
                storageBucket: "trip-navigation-b0f21.firebasestorage.app",
                messagingSenderId: "841186283877",
                appId: "1:841186283877:web:7551e6f5f33dfe6d3e118c"
            };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'my-wander-tracker-app';

        function calculateDistance(lat1, lon1, lat2, lon2) {
            if (lat1 == null || lon1 == null || lat2 == null || lon2 == null) return null;
            const R = 6371;
            const dLat = (lat2 - lat1) * (Math.PI / 180);
            const dLon = (lon2 - lon1) * (Math.PI / 180);
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * (Math.PI / 180)) * Math.cos(lat2 * (Math.PI / 180)) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
        }

        function formatDistance(distInKm) {
            if (distInKm === null) return "Scanning...";
            if (distInKm < 1) return `${Math.round(distInKm * 1000)}m`;
            return `${distInKm.toFixed(1)}km`;
        }

        function App() {
            // --- NAVIGATION STATE ---
            const [view, setView] = useState('categories'); // categories, locations, detail, form
            const [selectedCategory, setSelectedCategory] = useState(null);
            const [selectedLocationId, setSelectedLocationId] = useState(null);

            // --- DATA STATE ---
            const [user, setUser] = useState(null);
            const [liveLocation, setLiveLocation] = useState(null);
            const [locations, setLocations] = useState([]);
            const [geoError, setGeoError] = useState('');

            // --- FORM STATE ---
            const [editingId, setEditingId] = useState(null);
            const [name, setName] = useState('');
            const [category, setCategory] = useState('');
            const [coordinates, setCoordinates] = useState('');
            const [mapLink, setMapLink] = useState('');
            const [mediaFile, setMediaFile] = useState(null);
            const [mediaType, setMediaType] = useState('image');
            const [saveError, setSaveError] = useState('');

            // --- EFFECTS ---
            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                initAuth();
                onAuthStateChanged(auth, setUser);
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubscribe = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'locations'), (snapshot) => {
                    const fetched = [];
                    snapshot.forEach(doc => fetched.push({ id: doc.id, ...doc.data() }));
                    setLocations(fetched);
                });
                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                const watchId = navigator.geolocation.watchPosition(
                    (pos) => setLiveLocation({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
                    (err) => {
                        setGeoError("Mock GPS Active");
                        setLiveLocation({ lat: 11.5564, lng: 104.9282 }); // Phnom Penh
                    },
                    { enableHighAccuracy: true }
                );
                return () => navigator.geolocation.clearWatch(watchId);
            }, []);

            // --- COMPUTED ---
            const groupedLocations = useMemo(() => {
                const groups = {};
                locations.forEach(loc => {
                    const catName = loc.category || 'Uncategorized';
                    if (!groups[catName]) groups[catName] = [];
                    const dist = liveLocation ? calculateDistance(liveLocation.lat, liveLocation.lng, loc.lat, loc.lng) : null;
                    groups[catName].push({ ...loc, dist });
                });
                Object.keys(groups).forEach(cat => {
                    groups[cat].sort((a, b) => (a.dist ?? Infinity) - (b.dist ?? Infinity));
                });
                return groups;
            }, [locations, liveLocation]);

            const activeLocation = useMemo(() => 
                locations.find(l => l.id === selectedLocationId), 
            [locations, selectedLocationId]);

            // --- HANDLERS ---
            const handleFileChange = (e) => {
                const file = e.target.files;
                if (!file) return;
                const isVideo = file.type.startsWith('video');
                setMediaType(isVideo ? 'video' : 'image');
                const reader = new FileReader();
                reader.onload = (event) => {
                    if (isVideo) {
                        if (file.size > 1024 * 1024) return setSaveError("Video too large (max 1MB)");
                        setMediaFile(event.target.result);
                    } else {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const scale = Math.min(1, 800 / Math.max(img.width, img.height));
                            canvas.width = img.width * scale;
                            canvas.height = img.height * scale;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            setMediaFile(canvas.toDataURL('image/jpeg', 0.6));
                        };
                        img.src = event.target.result;
                    }
                };
                reader.readAsDataURL(file);
            };

            const handleSave = async (e) => {
                e.preventDefault();
                setSaveError('');
                const match = coordinates.match(/(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)/);
                if (!name || !category || !match) return setSaveError("Check Name, Category and Coords");
                
                const data = {
                    name, category, lat: parseFloat(match), lng: parseFloat(match),
                    mapLink, media: mediaFile, mediaType, timestamp: Date.now()
                };

                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'locations', editingId || Date.now().toString());
                    editingId ? await updateDoc(docRef, data) : await setDoc(docRef, data);
                    resetForm();
                    setView('categories');
                } catch (err) { setSaveError("Save failed (likely file size)"); }
            };

            const resetForm = () => {
                setEditingId(null); setName(''); setCategory(''); setCoordinates(''); setMapLink(''); setMediaFile(null);
            };

            const openEdit = (loc) => {
                setEditingId(loc.id); setName(loc.name); setCategory(loc.category);
                setCoordinates(`${loc.lat}, ${loc.lng}`); setMapLink(loc.mapLink || '');
                setMediaFile(loc.media); setMediaType(loc.mediaType || 'image');
                setView('form');
            };

            // --- VIEWS ---
            const renderHeader = (title, showBack = false, backTarget = 'categories') => (
                <header className="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 safe-top flex items-center justify-between px-4 py-3">
                    <div className="w-10">
                        {showBack && (
                            <button onClick={() => setView(backTarget)} className="text-slate-600 active:scale-90 transition-transform">
                                <i className="fa-solid fa-chevron-left text-lg"></i>
                            </button>
                        )}
                    </div>
                    <h1 className="text-lg font-bold text-slate-800 tracking-tight">{title}</h1>
                    <div className="w-10 flex justify-end">
                        {liveLocation && <div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div>}
                    </div>
                </header>
            );

            return (
                <div className="min-h-screen">
                    {/* BOTTOM NAVIGATION */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t border-slate-200 safe-bottom bottom-nav z-50 flex justify-around items-center px-6">
                        <button onClick={() => { setView('categories'); resetForm(); }} className={`flex flex-col items-center space-y-1 ${view !== 'form' ? 'text-indigo-600' : 'text-slate-400'}`}>
                            <i className="fa-solid fa-map-location-dot text-xl"></i>
                            <span className="text-[10px] font-bold uppercase tracking-widest">Wander</span>
                        </button>
                        <button onClick={() => { setView('form'); resetForm(); }} className={`w-12 h-12 rounded-full flex items-center justify-center shadow-lg transition-all active:scale-90 -mt-6 ${view === 'form' ? 'bg-indigo-600 text-white' : 'bg-white text-slate-600 border border-slate-200'}`}>
                            <i className={`fa-solid ${editingId ? 'fa-pen' : 'fa-plus'} text-lg`}></i>
                        </button>
                        <button onClick={() => alert(`GPS: ${liveLocation?.lat.toFixed(4)}, ${liveLocation?.lng.toFixed(4)}`)} className="flex flex-col items-center space-y-1 text-slate-400">
                            <i className="fa-solid fa-satellite text-xl"></i>
                            <span className="text-[10px] font-bold uppercase tracking-widest">Status</span>
                        </button>
                    </nav>

                    {/* ROUTING */}
                    <div className="content-area overflow-x-hidden">
                        {view === 'categories' && (
                            <div className="fade-in">
                                {renderHeader("Categories")}
                                <div className="px-4 py-6 space-y-3">
                                    {Object.keys(groupedLocations).length === 0 ? (
                                        <div className="text-center py-20 text-slate-400">
                                            <i className="fa-solid fa-folder-open text-4xl mb-4 block"></i>
                                            <p className="font-bold">No locations yet</p>
                                        </div>
                                    ) : (
                                        Object.keys(groupedLocations).sort().map(cat => (
                                            <button 
                                                key={cat} 
                                                onClick={() => { setSelectedCategory(cat); setView('locations'); }}
                                                className="w-full bg-white p-4 rounded-2xl flex items-center justify-between shadow-sm border border-slate-100 active:bg-slate-50 active:scale-[0.98] transition-all"
                                            >
                                                <div className="flex items-center space-x-4">
                                                    <div className="w-12 h-12 bg-indigo-50 rounded-xl flex items-center justify-center text-indigo-600">
                                                        <i className="fa-solid fa-folder text-lg"></i>
                                                    </div>
                                                    <div className="text-left">
                                                        <h3 className="font-bold text-slate-800">{cat}</h3>
                                                        <p className="text-xs text-slate-500">{groupedLocations[cat].length} locations</p>
                                                    </div>
                                                </div>
                                                <i className="fa-solid fa-chevron-right text-slate-300 text-sm"></i>
                                            </button>
                                        ))
                                    )}
                                </div>
                            </div>
                        )}

                        {view === 'locations' && (
                            <div className="fade-in">
                                {renderHeader(selectedCategory, true, 'categories')}
                                <div className="px-4 py-6 space-y-2">
                                    {(groupedLocations[selectedCategory] || []).map(loc => (
                                        <button 
                                            key={loc.id}
                                            onClick={() => { setSelectedLocationId(loc.id); setView('detail'); }}
                                            className="w-full bg-white p-3 rounded-2xl border border-slate-100 flex items-center active:bg-slate-50 active:scale-[0.99] transition-all shadow-sm"
                                        >
                                            <div className="w-14 h-14 rounded-xl overflow-hidden bg-slate-100 mr-4 flex-shrink-0">
                                                {loc.media ? (
                                                    loc.mediaType === 'video' ? <div className="w-full h-full flex items-center justify-center bg-indigo-600 text-white"><i className="fa-solid fa-video"></i></div> : <img src={loc.media} className="w-full h-full object-cover" />
                                                ) : <div className="w-full h-full flex items-center justify-center text-slate-300"><i className="fa-solid fa-image text-sm"></i></div>}
                                            </div>
                                            <div className="flex-1 text-left min-w-0 pr-4">
                                                <h4 className="font-bold text-slate-800 truncate">{loc.name}</h4>
                                                <div className="flex items-center text-indigo-600 mt-0.5">
                                                    <i className="fa-solid fa-compass text-[10px] mr-1.5"></i>
                                                    <span className="text-[11px] font-black uppercase tracking-tight">
                                                        {liveLocation ? formatDistance(loc.dist) : 'Locating...'}
                                                    </span>
                                                </div>
                                            </div>
                                            <i className="fa-solid fa-chevron-right text-slate-200 text-sm"></i>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'detail' && activeLocation && (
                            <div className="fade-in">
                                {renderHeader(activeLocation.name, true, 'locations')}
                                <div className="relative h-72 w-full bg-slate-900 overflow-hidden">
                                    {activeLocation.media ? (
                                        activeLocation.mediaType === 'video' ? 
                                            <video src={activeLocation.media} controls className="w-full h-full object-contain" /> : 
                                            <img src={activeLocation.media} className="w-full h-full object-contain" />
                                    ) : (
                                        <div className="w-full h-full flex flex-col items-center justify-center text-slate-500">
                                            <i className="fa-solid fa-image text-4xl mb-2"></i>
                                            <span className="text-xs uppercase font-bold tracking-widest">No Media Attached</span>
                                        </div>
                                    )}
                                </div>
                                <div className="px-6 py-8">
                                    <div className="flex justify-between items-start mb-6">
                                        <div>
                                            <span className="text-[10px] font-black text-indigo-500 uppercase tracking-widest block mb-1">{activeLocation.category}</span>
                                            <h2 className="text-2xl font-black text-slate-800 leading-none">{activeLocation.name}</h2>
                                        </div>
                                        <div className="flex space-x-2">
                                            <button onClick={() => openEdit(activeLocation)} className="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center active:scale-90 transition-transform">
                                                <i className="fa-solid fa-pen"></i>
                                            </button>
                                            <button onClick={() => deleteLocation(activeLocation.id).then(() => setView('categories'))} className="w-10 h-10 bg-red-50 text-red-500 rounded-full flex items-center justify-center active:scale-90 transition-transform">
                                                <i className="fa-solid fa-trash"></i>
                                            </button>
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-3xl p-5 border border-slate-100 shadow-sm mb-6 flex items-center justify-between">
                                        <div className="flex items-center space-x-4">
                                            <div className="w-12 h-12 rounded-2xl bg-indigo-600 flex items-center justify-center text-white shadow-lg shadow-indigo-100">
                                                <i className="fa-solid fa-route"></i>
                                            </div>
                                            <div>
                                                <p className="text-[10px] text-slate-400 font-bold uppercase tracking-tight">Distance to Target</p>
                                                <p className="text-xl font-black text-indigo-600">{liveLocation ? formatDistance(activeLocation.dist) : 'Updating...'}</p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 gap-4">
                                        {activeLocation.mapLink && (
                                            <a 
                                                href={activeLocation.mapLink} target="_blank"
                                                className="w-full py-4 bg-slate-800 text-white rounded-2xl flex items-center justify-center font-bold shadow-xl shadow-slate-200 active:scale-[0.98] transition-all"
                                            >
                                                <i className="fa-solid fa-location-arrow mr-3"></i>
                                                Navigate in Google Maps
                                            </a>
                                        )}
                                        <p className="text-center font-mono text-[10px] text-slate-400 mt-4">
                                            LAT: {activeLocation.lat.toFixed(6)} • LNG: {activeLocation.lng.toFixed(6)}
                                        </p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'form' && (
                            <div className="fade-in">
                                {renderHeader(editingId ? "Edit" : "New Spot")}
                                <div className="px-6 py-8">
                                    {saveError && <div className="mb-4 p-3 bg-red-50 text-red-700 rounded-xl text-xs font-bold border border-red-100">{saveError}</div>}
                                    <form onSubmit={handleSave} className="space-y-5">
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block px-1">Name</label>
                                            <input required value={name} onChange={e => setName(e.target.value)} className="w-full bg-white border border-slate-200 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block px-1">Category</label>
                                            <input required list="cats-form" value={category} onChange={e => setCategory(e.target.value)} className="w-full bg-white border border-slate-200 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold" />
                                            <datalist id="cats-form">{Object.keys(groupedLocations).map(c => <option key={c} value={c}/>)}</datalist>
                                        </div>
                                        <div className="grid grid-cols-3 gap-2">
                                            <div className="col-span-2">
                                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block px-1">Coords (Lat, Lng)</label>
                                                <input required value={coordinates} onChange={e => setCoordinates(e.target.value)} className="w-full bg-white border border-slate-200 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-mono text-xs" />
                                            </div>
                                            <div className="pt-5">
                                                <button type="button" onClick={() => setCoordinates(`${liveLocation?.lat.toFixed(6)}, ${liveLocation?.lng.toFixed(6)}`)} className="w-full h-14 bg-indigo-50 text-indigo-600 rounded-2xl border border-indigo-100 flex items-center justify-center">
                                                    <i className="fa-solid fa-location-crosshairs text-lg"></i>
                                                </button>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block px-1">Google Maps Link (Auto-Coords)</label>
                                            <input 
                                                type="url" value={mapLink} 
                                                onChange={e => {
                                                    setMapLink(e.target.value);
                                                    const m = e.target.value.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
                                                    if(m) setCoordinates(`${m}, ${m}`);
                                                }} 
                                                className="w-full bg-white border border-slate-200 p-4 rounded-2xl outline-none font-medium text-xs text-indigo-600" 
                                            />
                                        </div>
                                        <div className="pt-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block px-1">Photo / Video</label>
                                            <input type="file" accept="image/*,video/*" onChange={handleFileChange} className="w-full text-xs text-slate-500 file:mr-4 file:py-3 file:px-6 file:rounded-2xl file:border-0 file:text-xs file:font-black file:bg-indigo-50 file:text-indigo-600" />
                                            {mediaFile && (
                                                <div className="mt-4 rounded-3xl overflow-hidden h-32 bg-slate-100 relative border border-slate-200">
                                                    {mediaType === 'video' ? <video src={mediaFile} className="w-full h-full object-cover" /> : <img src={mediaFile} className="w-full h-full object-cover" />}
                                                    <button type="button" onClick={() => setMediaFile(null)} className="absolute top-2 right-2 bg-black/50 text-white w-6 h-6 rounded-full text-[10px]"><i className="fa-solid fa-xmark"></i></button>
                                                </div>
                                            )}
                                        </div>
                                        <button type="submit" className="w-full py-4 bg-indigo-600 text-white rounded-3xl font-black text-lg shadow-xl shadow-indigo-100 active:scale-95 transition-all">
                                            {editingId ? "Update Cloud" : "Add Wander Spot"}
                                        </button>
                                    </form>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
