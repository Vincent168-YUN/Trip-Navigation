<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- This meta tag ensures the app looks native on iOS and Android without awkward zooming -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vincent's Travelling System</title>
    
    <!-- Apple/iOS Web App settings for adding to Home Screen -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Globe_icon.svg/1024px-Globe_icon.svg.png">

    <!-- Google Fonts for Art/Editorial Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for in-browser JSX compiling -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-green: #34C759;
            --ios-red: #FF3B30;
            --ios-bg: #F2F2F7;
            --ios-text: #1C1C1E;
            --ios-gray: #8E8E93;
            --ios-glass: rgba(255, 255, 255, 0.75);
        }
        body { 
            -webkit-tap-highlight-color: transparent; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
        }
        
        /* iOS Safe Area paddings */
        .safe-top { padding-top: env(safe-area-inset-top, 44px); } /* Fallback for desktop viewing */
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 34px); }
        .safe-pb-nav { padding-bottom: calc(env(safe-area-inset-bottom, 34px) + 65px); }
        
        /* Hide scrollbar for photo carousel but keep functionality */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        .animate-slide-in { animation: slideIn 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* Art Design Font */
        .font-art { font-family: 'Playfair Display', serif; }

        /* Custom Input Styling for iOS look */
        .ios-input {
            background-color: rgba(118, 118, 128, 0.08);
            border-radius: 10px;
        }
        .ios-input:focus {
            background-color: rgba(118, 118, 128, 0.12);
        }
        
        /* Subtle animated background mesh */
        .bg-mesh {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            overflow: hidden;
            background-color: #F8F8F7; /* Warm gallery white */
        }
        .orb-1 {
            position: absolute; top: -10%; left: -10%; width: 50vw; height: 50vw;
            background: rgba(210, 190, 180, 0.4); border-radius: 50%; filter: blur(60px); /* Soft clay */
        }
        .orb-2 {
            position: absolute; bottom: 10%; right: -10%; width: 60vw; height: 60vw;
            background: rgba(180, 190, 200, 0.4); border-radius: 50%; filter: blur(80px); /* Dusty slate */
        }
        .orb-3 {
            position: absolute; top: 40%; left: 30%; width: 40vw; height: 40vw;
            background: rgba(220, 215, 200, 0.5); border-radius: 50%; filter: blur(70px); /* Warm linen */
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo, useRef } = React;

        // --- FIREBASE SETUP ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyDUdgQdMPAUVHSIHmbfIpSEYwQNWdFM578",
                authDomain: "trip-navigation-b0f21.firebaseapp.com",
                projectId: "trip-navigation-b0f21",
                storageBucket: "trip-navigation-b0f21.firebasestorage.app",
                messagingSenderId: "841186283877",
                appId: "1:841186283877:web:7551e6f5f33dfe6d3e118c"
            };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'my-wander-tracker-app';

        // Haversine formula
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const numLat1 = parseFloat(lat1);
            const numLon1 = parseFloat(lon1);
            const numLat2 = parseFloat(lat2);
            const numLon2 = parseFloat(lon2);
            
            if (isNaN(numLat1) || isNaN(numLon1) || isNaN(numLat2) || isNaN(numLon2)) return null;
            
            const R = 6371; 
            const dLat = (numLat2 - numLat1) * (Math.PI / 180);
            const dLon = (numLon2 - numLon1) * (Math.PI / 180);
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(numLat1 * (Math.PI / 180)) * Math.cos(numLat2 * (Math.PI / 180)) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function formatDistance(distInKm) {
            if (distInKm == null || isNaN(distInKm)) return "Distance unknown";
            if (distInKm < 1) return `${Math.round(distInKm * 1000)}m`;
            return `${Number(distInKm).toFixed(1)}km`;
        }

        function App() {
            // --- STATE ---
            const [user, setUser] = useState(null);
            const [authError, setAuthError] = useState('');
            const [liveLocation, setLiveLocation] = useState(null);
            const [gpsAccuracy, setGpsAccuracy] = useState(null);
            const [geoError, setGeoError] = useState('');
            const [locations, setLocations] = useState([]);
            
            // Itinerary State
            const [itineraries, setItineraries] = useState([]);
            const [activeItinId, setActiveItinId] = useState(null);
            
            // Itinerary Form State
            const [itinTitle, setItinTitle] = useState('');
            const [itinDate, setItinDate] = useState('');
            
            // Itinerary Item Form State
            const [editItinItemId, setEditItinItemId] = useState(null);
            const [itinItemTime, setItinItemTime] = useState('');
            const [itinItemLabel, setItinItemLabel] = useState('Tourist Attraction');
            const [itinItemLocId, setItinItemLocId] = useState('');
            const [itinItemNotes, setItinItemNotes] = useState('');
            
            // Search State
            const [searchQuery, setSearchQuery] = useState('');
            
            // New Location Form Search State
            const [formSearchQuery, setFormSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [isSearching, setIsSearching] = useState(false);

            // Navigation & UI State
            const [view, setView] = useState('cities'); 
            const [activeCity, setActiveCity] = useState(null);
            const [activeCategory, setActiveCategory] = useState(null);
            const [selectedLocId, setSelectedLocId] = useState(null);
            const [previousView, setPreviousView] = useState('cities');
            const [locationReturnView, setLocationReturnView] = useState('category_list');
            
            // Derived active bottom tab
            const activeTab = view === 'notifications' ? 'notifications' : (view.includes('itinerar') ? 'itineraries' : 'places');

            // In-App Notification State
            const [notifications, setNotifications] = useState([]);
            const alertedLocsRef = useRef(new Set());
            const initialAlertShownRef = useRef(false);
            
            // Photo Viewer State
            const [fullScreenPhoto, setFullScreenPhoto] = useState(null); 
            const fullScreenScrollRef = useRef(null);
            
            // Confirm Modal State
            const [confirmDialog, setConfirmDialog] = useState(null);
            
            // Form State
            const [editId, setEditId] = useState(null);
            const [name, setName] = useState('');
            const [comment, setComment] = useState('');
            
            const [editingCityName, setEditingCityName] = useState(null); 
            const [newCityName, setNewCityName] = useState(''); 
            const [cityPhotos, setCityPhotos] = useState([]); // Array for custom city photos
            
            const [city, setCity] = useState('');
            const [category, setCategory] = useState('');
            const [lat, setLat] = useState('');
            const [lng, setLng] = useState('');
            const [mapLink, setMapLink] = useState('');
            const [photos, setPhotos] = useState([]); 
            const [saveError, setSaveError] = useState('');
            const [isSaving, setIsSaving] = useState(false);

            // --- EFFECTS ---
            // 1. Authenticate
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {
                        setAuthError(err.message);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // 2. Fetch Data
            useEffect(() => {
                if (!user) return;
                const locationsRef = collection(db, 'artifacts', appId, 'public', 'data', 'locations');
                const unsubLocs = onSnapshot(locationsRef, (snapshot) => {
                    const fetchedLocations = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        let docPhotos = data.photos || [];
                        if (!data.photos && data.media && data.mediaType === 'image') {
                            docPhotos = [data.media];
                        }
                        fetchedLocations.push({ id: doc.id, ...data, photos: docPhotos });
                    });
                    setLocations(fetchedLocations);
                }, (error) => { console.error("Error fetching locations: ", error); });

                const itinerariesRef = collection(db, 'artifacts', appId, 'public', 'data', 'itineraries');
                const unsubItins = onSnapshot(itinerariesRef, (snapshot) => {
                    const fetchedItins = [];
                    snapshot.forEach(doc => {
                        fetchedItins.push({ id: doc.id, ...doc.data() });
                    });
                    fetchedItins.sort((a, b) => a.timestamp - b.timestamp);
                    setItineraries(fetchedItins);
                }, (error) => { console.error("Error fetching itineraries: ", error); });

                return () => { unsubLocs(); unsubItins(); };
            }, [user]);

            // 3. Track GPS
            useEffect(() => {
                if (!("geolocation" in navigator)) {
                    setGeoError("GPS not supported.");
                    return;
                }
                const watchId = navigator.geolocation.watchPosition(
                    (pos) => { 
                        setLiveLocation({ lat: pos.coords.latitude, lng: pos.coords.longitude }); 
                        setGpsAccuracy(pos.coords.accuracy);
                        setGeoError(''); 
                    },
                    (err) => { setGeoError("Using Mock Location"); setLiveLocation({ lat: 11.5564, lng: 104.9282 }); setGpsAccuracy(null); },
                    { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
                );
                return () => navigator.geolocation.clearWatch(watchId);
            }, []);

            // 4. Live Place Autocomplete Search (Now with Location Bias!)
            useEffect(() => {
                const delayDebounceFn = setTimeout(() => {
                    if (formSearchQuery.trim().length > 2) {
                        setIsSearching(true);
                        
                        // Build the search URL. If we have live GPS, bias the results around the user!
                        let url = `https://photon.komoot.io/api/?q=${encodeURIComponent(formSearchQuery)}&limit=6`;
                        if (liveLocation && liveLocation.lat && liveLocation.lng) {
                            url += `&lat=${liveLocation.lat}&lon=${liveLocation.lng}`;
                        }

                        fetch(url)
                            .then(res => res.json())
                            .then(data => {
                                setSearchResults(data.features || []);
                                setIsSearching(false);
                            })
                            .catch(err => {
                                console.error("Search error:", err);
                                setIsSearching(false);
                            });
                    } else {
                        setSearchResults([]);
                    }
                }, 500);
                return () => clearTimeout(delayDebounceFn);
            }, [formSearchQuery, liveLocation]);

            // Helper to add In-App Notification
            const addNotification = (loc, isStartup) => {
                setNotifications(prev => {
                    // Prevent duplicate unread notifications for the same location
                    if (prev.some(n => n.locId === loc.id && !n.read)) return prev;
                    
                    return [{
                        id: Date.now().toString() + Math.random(),
                        locId: loc.id,
                        name: loc.name,
                        distance: loc.currentDistance,
                        photos: loc.photos,
                        isStartup: isStartup,
                        timestamp: Date.now(),
                        read: false
                    }, ...prev];
                });
            };

            const deleteNotification = (e, id) => {
                e.stopPropagation();
                setNotifications(prev => prev.filter(n => n.id !== id));
            };

            // Nearby Alert Checker
            useEffect(() => {
                if (!liveLocation || locations.length === 0) return;

                let closestNearby = null;
                let closestOverall = null;
                let minDistOverall = Infinity;
                let minDistNearby = 1.0; 

                locations.forEach(loc => {
                    if (loc.isCityMarker || loc.lat == null || loc.lng == null) return;
                    const dist = calculateDistance(liveLocation.lat, liveLocation.lng, loc.lat, loc.lng);
                    if (dist === null) return;

                    if (dist < minDistOverall) {
                        minDistOverall = dist;
                        closestOverall = { ...loc, currentDistance: dist };
                    }
                    
                    if (dist < 1.0) { 
                        if (!alertedLocsRef.current.has(loc.id) && !(view === 'location_detail' && selectedLocId === loc.id)) {
                            if (dist < minDistNearby) {
                                minDistNearby = dist;
                                closestNearby = { ...loc, currentDistance: dist };
                            }
                        }
                    }
                });

                if (!initialAlertShownRef.current && closestOverall) {
                    addNotification(closestOverall, true);
                    alertedLocsRef.current.add(closestOverall.id);
                    initialAlertShownRef.current = true;
                } else if (closestNearby) {
                    addNotification(closestNearby, false);
                    alertedLocsRef.current.add(closestNearby.id);
                }
            }, [liveLocation, locations, view, selectedLocId]);

            // Photo viewer scrolling
            useEffect(() => {
                if (view === 'photo_viewer' && fullScreenPhoto && fullScreenScrollRef.current) {
                    setTimeout(() => {
                        if (fullScreenScrollRef.current) {
                            fullScreenScrollRef.current.scrollLeft = fullScreenPhoto.index * fullScreenScrollRef.current.clientWidth;
                        }
                    }, 10);
                }
            }, [view, fullScreenPhoto]);

            // Pinch-to-zoom enabling
            useEffect(() => {
                const meta = document.querySelector('meta[name="viewport"]');
                if (view === 'photo_viewer') {
                    meta.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover');
                } else {
                    meta.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover');
                }
            }, [view]);

            // --- NAVIGATION HANDLERS ---
            const resetForm = () => {
                setEditId(null); setName(''); setCity(activeCity || 'Ho Chi Minh City'); setCategory(activeCategory || '');
                setLat(''); setLng(''); setMapLink(''); setPhotos([]); setComment(''); setSaveError('');
            };

            const openForm = (loc = null) => {
                setPreviousView(view); 
                if (loc) {
                    setEditId(loc.id); setName(loc.name || ''); setCity(loc.city || 'Ho Chi Minh City'); setCategory(loc.category || 'Uncategorized');
                    setLat(loc.lat != null ? loc.lat : ''); setLng(loc.lng != null ? loc.lng : ''); setMapLink(loc.mapLink || ''); setPhotos([...(loc.photos || [])]); setComment(loc.comment || '');
                } else { resetForm(); }
                setView('form');
            };

            const openCityForm = (cityName = null) => {
                setPreviousView(view); setSaveError('');
                if (cityName) { 
                    setEditingCityName(cityName); setNewCityName(cityName); 
                    const cityMarker = locations.find(l => l.isCityMarker && (l.city || 'Ho Chi Minh City') === cityName);
                    setCityPhotos(cityMarker && cityMarker.photos ? [...cityMarker.photos] : []);
                } else { 
                    setEditingCityName(null); setNewCityName(''); setCityPhotos([]); 
                }
                setView('city_form');
            };

            const handleBack = () => {
                if (view === 'photo_viewer') { setView(previousView); setFullScreenPhoto(null); } 
                else if (view === 'form') { setView(previousView); } 
                else if (view === 'city_form') { setView('cities'); } 
                else if (view === 'notifications') { setView(previousView || 'cities'); }
                else if (view === 'location_detail') { setView(locationReturnView); setSelectedLocId(null); } 
                else if (view === 'category_list') { setView('categories'); setActiveCategory(null); } 
                else if (view === 'categories') { setView('cities'); setActiveCity(null); } 
                else if (view === 'itinerary_detail') { setView('itineraries'); setActiveItinId(null); } 
                else if (view === 'itinerary_form') { setView('itineraries'); } 
                else if (view === 'itinerary_select_location') { setView('itinerary_detail'); } 
                else if (view === 'itinerary_item_form') { setView(previousView === 'itinerary_select_location' ? 'itinerary_select_location' : 'itinerary_detail'); }
            };

            // --- FORM HANDLERS ---
            const handleMapLinkChange = (e) => {
                const link = e.target.value; setMapLink(link);
                
                // Look for exact pin (!3d... !4d...) OR map center (@lat,lng) OR search query (?q=lat,lng) OR path (/place/lat,lng)
                const exactPinMatch = link.match(/!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/);
                const atMatch = link.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
                const queryMatch = link.match(/[?&]q=([-+]?\d+\.\d+),([-+]?\d+\.\d+)/) || link.match(/[?&]ll=([-+]?\d+\.\d+),([-+]?\d+\.\d+)/);
                const placeMatch = link.match(/place\/([-+]?\d+\.\d+),([-+]?\d+\.\d+)/);
                
                const match = exactPinMatch || atMatch || queryMatch || placeMatch;
                
                if (match && match.length >= 3) { 
                    setLat(parseFloat(match).toFixed(6)); 
                    setLng(parseFloat(match).toFixed(6)); 
                }
            };

            const processImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX = 2048; let {width, height} = img;
                            if (width > height && width > MAX) { height *= MAX / width; width = MAX; }
                            else if (height > MAX) { width *= MAX / height; height = MAX; }
                            canvas.width = width; canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            resolve(canvas.toDataURL('image/jpeg', 0.85)); 
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            };

            const handleFiles = async (e) => {
                const files = Array.from(e.target.files).filter(f => f.type.startsWith('image'));
                if (!files.length) return;
                setIsSaving(true);
                try {
                    const newPhotos = await Promise.all(files.map(processImage));
                    setPhotos(prev => [...prev, ...newPhotos]);
                } catch (err) { setSaveError("Error processing images."); } 
                finally { setIsSaving(false); e.target.value = null; }
            };
            const removePhoto = (index) => { setPhotos(prev => prev.filter((_, i) => i !== index)); };

            const handleCityFiles = async (e) => {
                const files = Array.from(e.target.files).filter(f => f.type.startsWith('image'));
                if (!files.length) return;
                setIsSaving(true);
                try {
                    const newPhotos = await Promise.all(files.map(processImage));
                    setCityPhotos(prev => [...prev, ...newPhotos]);
                } catch (err) { setSaveError("Error processing images."); } 
                finally { setIsSaving(false); e.target.value = null; }
            };
            const removeCityPhoto = (index) => { setCityPhotos(prev => prev.filter((_, i) => i !== index)); };

            const useCurrentLocation = () => {
                if (liveLocation && liveLocation.lat != null && liveLocation.lng != null) {
                    setLat(liveLocation.lat.toFixed(6)); setLng(liveLocation.lng.toFixed(6)); setSaveError('');
                } else {
                    setSaveError("Fetching live GPS...");
                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            setLiveLocation({ lat: pos.coords.latitude, lng: pos.coords.longitude }); setGpsAccuracy(pos.coords.accuracy);
                            setLat(pos.coords.latitude.toFixed(6)); setLng(pos.coords.longitude.toFixed(6)); setSaveError(''); setGeoError('');
                        },
                        (err) => { setSaveError("GPS Error: Could not get live location."); setLat((11.5564).toFixed(6)); setLng((104.9282).toFixed(6)); },
                        { enableHighAccuracy: true, timeout: 5000 }
                    );
                }
            };

            const handleSelectPlace = (place) => {
                const { properties, geometry } = place;
                setName(properties.name || properties.street || 'Selected Location');
                setCity(properties.city || properties.state || properties.country || activeCity || 'Ho Chi Minh City');
                setLat(geometry.coordinates.toFixed(6));
                setLng(geometry.coordinates.toFixed(6));
                setFormSearchQuery('');
                setSearchResults([]);
            };

            const handleSaveCity = async (e) => {
                e.preventDefault(); const trimmedCity = newCityName.trim(); if (!trimmedCity) return;
                setIsSaving(true);
                try {
                    if (editingCityName) {
                        const cityMarker = locations.find(l => l.isCityMarker && (l.city || 'Ho Chi Minh City') === editingCityName);

                        if (trimmedCity !== editingCityName) {
                            // Update names across all locations inside the city
                            const locsToUpdate = locations.filter(l => (l.city || 'Ho Chi Minh City') === editingCityName);
                            const updatePromises = locsToUpdate.map(l => {
                                if (l.isCityMarker) return updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', l.id), { city: trimmedCity, photos: cityPhotos });
                                return updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', l.id), { city: trimmedCity });
                            });
                            
                            // If there is no existing city profile marker, we create one now to hold the photos
                            if (!cityMarker && cityPhotos.length > 0) {
                                updatePromises.push(setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', Date.now().toString()), { isCityMarker: true, city: trimmedCity, photos: cityPhotos, timestamp: Date.now() }));
                            }
                            await Promise.all(updatePromises);
                        } else {
                            if (cityMarker) {
                                // Just update the photos if name didn't change
                                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', cityMarker.id), { photos: cityPhotos });
                            } else if (cityPhotos.length > 0) {
                                // City exists but has no profile marker yet. Create it to save the photo.
                                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', Date.now().toString()), { isCityMarker: true, city: trimmedCity, photos: cityPhotos, timestamp: Date.now() });
                            }
                        }
                    } else {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', Date.now().toString()), { isCityMarker: true, city: trimmedCity, photos: cityPhotos, timestamp: Date.now() });
                    }
                    setNewCityName(''); setEditingCityName(null); setCityPhotos([]); setActiveCity(trimmedCity); setPreviousView('cities'); setView('categories'); 
                } catch (err) { setSaveError("Save failed: " + err.message); } finally { setIsSaving(false); }
            };

            const handleSaveLocation = async (e) => {
                e.preventDefault(); setSaveError('');
                const parsedLat = parseFloat(lat); const parsedLng = parseFloat(lng);
                
                // Removed the requirement for parsedLat and parsedLng
                if (!name || !city || !category) { setSaveError("Please provide Name, City, and Category."); return; }
                
                setIsSaving(true);
                const locationData = { 
                    name, city, category, comment,
                    lat: !isNaN(parsedLat) ? parsedLat : null, 
                    lng: !isNaN(parsedLng) ? parsedLng : null, 
                    mapLink, photos 
                };
                if (!editId) locationData.timestamp = Date.now();
                try {
                    if (editId) { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', editId), locationData); } 
                    else { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', Date.now().toString()), locationData); }
                    handleBack();
                } catch (err) {
                    if (err.code === 'resource-exhausted' || err.message.includes('payload')) { setSaveError("Images too large."); } 
                    else { setSaveError("Save failed: " + err.message); }
                } finally { setIsSaving(false); }
            };

            const confirmAction = (message, onConfirm) => { setConfirmDialog({ message, onConfirm }); };
            
            const deleteCity = async (cityToDelete) => {
                confirmAction(`Delete "${cityToDelete}" and ALL places inside it?`, async () => {
                    try {
                        const locsToDelete = locations.filter(l => (l.city || 'Ho Chi Minh City') === cityToDelete);
                        await Promise.all(locsToDelete.map(l => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', l.id))));
                        if (activeCity === cityToDelete) { setView('cities'); setActiveCity(null); }
                    } catch (err) { console.error("Delete failed: ", err.message); }
                });
            };
            
            const deleteLocation = async (id, isDetailView = false) => {
                confirmAction("Delete this location completely?", async () => {
                    try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', id)); if (isDetailView) handleBack(); } 
                    catch (err) { setSaveError("Delete failed: " + err.message); }
                });
            };

            // --- ITINERARY HANDLERS ---
            const openItineraryForm = (itin = null) => {
                setPreviousView(view); setSaveError('');
                if (itin && itin.id) { setEditId(itin.id); setItinTitle(itin.title || ''); setItinDate(itin.date || ''); } 
                else { setEditId(null); setItinTitle(''); setItinDate(''); }
                setView('itinerary_form');
            };
            const handleSaveItinerary = async (e) => {
                e.preventDefault(); setIsSaving(true); setSaveError('');
                const data = { title: itinTitle, date: itinDate };
                let isNew = false; let currentItinId = editId;
                if (!editId) { isNew = true; data.timestamp = Date.now(); data.items = []; }
                try {
                    if (editId) { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'itineraries', editId), data); } 
                    else { currentItinId = Date.now().toString(); await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'itineraries', currentItinId), data); }
                    if (isNew) {
                        setActiveItinId(currentItinId); setPreviousView('itinerary_detail'); setEditItinItemId(null); setItinItemTime('');
                        setItinItemLabel('Tourist Attraction'); setItinItemLocId(''); setItinItemNotes(''); setView('itinerary_select_location');
                    } else { handleBack(); }
                } catch (err) { setSaveError("Save failed: " + err.message); }
                setIsSaving(false);
            };

            const openItineraryItemForm = (item = null) => {
                setSaveError(''); setPreviousView(view);
                if (item) {
                    setEditItinItemId(item.id); setItinItemTime(item.time || ''); setItinItemLabel(item.label || 'Tourist Attraction');
                    setItinItemLocId(item.locationId || ''); setItinItemNotes(item.notes || ''); setView('itinerary_item_form');
                } else {
                    setEditItinItemId(null); setItinItemTime(''); setItinItemLabel('Tourist Attraction'); setItinItemLocId('');
                    setItinItemNotes(''); setSearchQuery(''); setView('itinerary_select_location');
                }
            };
            const handleSelectLocationForItinerary = (locId) => { setItinItemLocId(locId); setPreviousView('itinerary_select_location'); setView('itinerary_item_form'); };
            const handleSaveItineraryItem = async (e) => {
                e.preventDefault(); setIsSaving(true); setSaveError('');
                const itin = itineraries.find(i => i.id === activeItinId); if (!itin) return;
                let updatedItems = [...(itin.items || [])];
                const newItem = { id: editItinItemId || Date.now().toString(), time: itinItemTime, label: itinItemLabel, locationId: itinItemLocId, notes: itinItemNotes };
                if (editItinItemId) { updatedItems = updatedItems.map(item => item.id === editItinItemId ? newItem : item); } 
                else { updatedItems.push(newItem); }
                updatedItems.sort((a, b) => a.time.localeCompare(b.time));
                try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'itineraries', activeItinId), { items: updatedItems }); setView('itinerary_detail'); } 
                catch (err) { setSaveError("Save failed: " + err.message); }
                setIsSaving(false);
            };
            const deleteItineraryItem = async (itemId) => {
                confirmAction("Remove this event?", async () => {
                    const itin = itineraries.find(i => i.id === activeItinId);
                    const updatedItems = (itin.items || []).filter(item => item.id !== itemId);
                    try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'itineraries', activeItinId), { items: updatedItems }); } 
                    catch (err) { console.error("Delete failed: " + err.message); }
                });
            };
            const deleteItinerary = async (id) => {
                confirmAction("Delete this entire itinerary?", async () => {
                    try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'itineraries', id)); } 
                    catch (err) { console.error("Delete failed: " + err.message); }
                });
            };

            // --- DATA PROCESSING ---
            const dataHierarchy = useMemo(() => {
                const cities = {}; const allCategories = new Set();
                locations.forEach(loc => {
                    const cName = loc.city || 'Ho Chi Minh City';
                    if (!cities[cName]) cities[cName] = { count: 0, categories: {}, photos: [] };
                    
                    if (loc.isCityMarker) {
                        if (loc.photos && loc.photos.length > 0) {
                            cities[cName].photos = loc.photos;
                        }
                        return; 
                    }
                    
                    const catName = loc.category || 'Uncategorized'; allCategories.add(catName);
                    if (!cities[cName].categories[catName]) cities[cName].categories[catName] = [];
                    const dist = liveLocation ? calculateDistance(liveLocation.lat, liveLocation.lng, loc.lat, loc.lng) : null;
                    cities[cName].categories[catName].push({ ...loc, currentDistance: dist });
                    cities[cName].count++;
                });
                Object.values(cities).forEach(cityData => { Object.values(cityData.categories).forEach(catList => { catList.sort((a, b) => (a.currentDistance || 99999) - (b.currentDistance || 99999)); }); });
                return { cities, uniqueCities: Object.keys(cities).sort(), allCategories: Array.from(allCategories).sort() };
            }, [locations, liveLocation]);

            const sortedLocationsForItinerary = useMemo(() => {
                return locations.filter(loc => !loc.isCityMarker).map(loc => ({ ...loc, currentDistance: liveLocation ? calculateDistance(liveLocation.lat, liveLocation.lng, loc.lat, loc.lng) : null }))
                    .sort((a, b) => (a.currentDistance || 99999) - (b.currentDistance || 99999));
            }, [locations, liveLocation]);
            
            const filteredAndGroupedLocations = useMemo(() => {
                const term = searchQuery.toLowerCase();
                const filtered = sortedLocationsForItinerary.filter(loc => (loc.name || '').toLowerCase().includes(term) || (loc.category || '').toLowerCase().includes(term) || (loc.city || '').toLowerCase().includes(term));
                const grouped = {};
                filtered.forEach(loc => { const cat = loc.category || 'Uncategorized'; if (!grouped[cat]) grouped[cat] = []; grouped[cat].push(loc); });
                return { grouped, sortedCategories: Object.keys(grouped).sort() };
            }, [sortedLocationsForItinerary, searchQuery]);
            
            const locDetail = view === 'location_detail' && selectedLocId ? locations.find(l => l.id === selectedLocId) : null;
                
            useEffect(() => { if (view === 'location_detail' && selectedLocId && !locDetail && locations.length > 0) handleBack(); }, [locations, locDetail, view, selectedLocId]);

            // HELPER: iOS Native Header Title
            const getHeaderTitle = () => {
                if (view === 'cities') return ""; // Empty to make room for large editorial header
                if (view === 'city_form') return editingCityName ? 'Edit City' : 'Add City';
                if (view === 'categories') return activeCity;
                if (view === 'category_list') return activeCategory;
                if (view === 'location_detail') return 'Details';
                if (view === 'notifications') return 'Notifications';
                if (view === 'itineraries') return 'Itineraries';
                if (view === 'itinerary_detail') return 'Timesheet';
                if (view === 'itinerary_form') return editId ? 'Edit Itinerary' : 'Plan a Day';
                if (view === 'itinerary_select_location') return 'Select Location';
                if (editId || editItinItemId) return 'Edit Item';
                return 'Create Item';
            };

            const canShowAddButton = ['cities', 'categories', 'category_list', 'itineraries', 'itinerary_detail'].includes(view);
            const unreadCount = notifications.filter(n => !n.read).length;

            // --- RENDER VIEWS ---
            return (
                <div className="min-h-screen relative flex flex-col">
                    
                    {/* Animated Background Mesh */}
                    <div className="bg-mesh">
                        <div className="orb-1"></div>
                        <div className="orb-2"></div>
                        <div className="orb-3"></div>
                    </div>

                    {/* FULL SCREEN PHOTO VIEWER PAGE */}
                    {view === 'photo_viewer' && fullScreenPhoto && (
                        <div className="fixed inset-0 z-50 bg-black/95 backdrop-blur-2xl flex flex-col animate-slide-in" style={{ zIndex: 120 }}>
                            <div className="flex items-center px-4 py-3 h-14 safe-top flex-shrink-0">
                                <button onClick={handleBack} className="text-white px-2 py-1.5 -ml-2 rounded-full flex items-center active:opacity-50">
                                    <i className="fa-solid fa-chevron-left text-xl mr-1.5"></i>
                                    <span className="text-[17px] font-normal">Back</span>
                                </button>
                            </div>
                            <div ref={fullScreenScrollRef} className="flex-1 w-full flex overflow-x-auto snap-x snap-mandatory scrollbar-hide items-center">
                                {fullScreenPhoto.photos.map((p, idx) => (
                                    <div key={idx} className="w-full h-full flex-shrink-0 snap-center flex items-center justify-center p-4">
                                        <img src={p} className="max-w-full max-h-[80vh] object-contain rounded-lg" alt={`Photo ${idx + 1}`} />
                                    </div>
                                ))}
                            </div>
                            {fullScreenPhoto.photos.length > 1 && (
                                <div className="absolute bottom-10 left-0 right-0 flex justify-center pointer-events-none safe-bottom">
                                    <div className="bg-[#1C1C1E]/60 backdrop-blur-xl text-white/90 text-xs font-medium px-4 py-2 rounded-full">
                                        Swipe to view more
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* NATIVE iOS HEADER */}
                    <header className="fixed top-0 left-0 right-0 z-40 bg-[var(--ios-glass)] backdrop-blur-xl border-b border-black/5 safe-top">
                        <div className="max-w-3xl mx-auto px-4 h-12 flex justify-between items-center relative">
                            {/* Left: Back Button or GPS */}
                            <div className="w-1/3 flex items-center justify-start">
                                {view !== 'cities' && view !== 'itineraries' && view !== 'notifications' ? (
                                    <button onClick={handleBack} className="text-[#1C1C1E] flex items-center -ml-2 active:opacity-50 transition-opacity">
                                        <i className="fa-solid fa-chevron-left text-xl mr-1.5"></i>
                                        <span className="text-[17px]">Back</span>
                                    </button>
                                ) : (
                                    <div className="flex items-center space-x-1.5">
                                        {geoError ? (
                                            <i className="fa-solid fa-location-crosshairs text-[#FF3B30] text-sm opacity-80" title={geoError}></i>
                                        ) : liveLocation ? (
                                            <div className="flex items-center space-x-1" title={gpsAccuracy ? `Accuracy: ±${Math.round(gpsAccuracy)}m` : 'GPS Active'}>
                                                <span className="relative flex h-2 w-2">
                                                    <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#34C759] opacity-75"></span>
                                                    <span className="relative inline-flex rounded-full h-2 w-2 bg-[#34C759]"></span>
                                                </span>
                                                <span className="text-[10px] font-medium text-[#8E8E93]">
                                                    {gpsAccuracy ? `±${Math.round(gpsAccuracy)}m` : 'GPS'}
                                                </span>
                                            </div>
                                        ) : null}
                                    </div>
                                )}
                            </div>

                            {/* Center: Title */}
                            <div className="w-1/3 text-center">
                                <h1 className="text-[17px] font-semibold text-[#1C1C1E] tracking-tight truncate">
                                    {getHeaderTitle()}
                                </h1>
                            </div>

                            {/* Right: Add Button */}
                            <div className="w-1/3 flex items-center justify-end">
                                {canShowAddButton && (
                                    <button 
                                        onClick={() => {
                                            if (view === 'itineraries') openItineraryForm();
                                            else if (view === 'itinerary_detail') openItineraryItemForm();
                                            else if (view === 'cities') openCityForm();
                                            else openForm();
                                        }}
                                        className="text-[#1C1C1E] text-2xl active:opacity-50 transition-opacity -mr-1"
                                    >
                                        <i className="fa-regular fa-square-plus font-light"></i>
                                    </button>
                                )}
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 w-full max-w-3xl mx-auto px-4 safe-pb-nav pt-[env(safe-area-inset-top,44px)] mt-16 animate-slide-in">
                        
                        {/* ========================================================= */}
                        {/* MAIN VIEWS - LOCATIONS / PLACES                           */}
                        {/* ========================================================= */}

                        {/* VIEW: NOTIFICATIONS LIST */}
                        {view === 'notifications' && (
                            <div className="pb-6">
                                {notifications.length === 0 ? (
                                    <div className="text-center p-10 mt-10">
                                        <i className="fa-regular fa-bell text-5xl text-[#8E8E93] mb-4 opacity-50"></i>
                                        <h3 className="text-lg font-semibold text-[#1C1C1E] mb-1">No Notifications</h3>
                                        <p className="text-[#8E8E93] text-sm">Alerts for nearby locations will appear here.</p>
                                    </div>
                                ) : (
                                    <div className="bg-[var(--ios-glass)] backdrop-blur-2xl rounded-[20px] overflow-hidden shadow-[0_2px_10px_rgba(0,0,0,0.02)] border border-white/60">
                                        {notifications.map((notif, index) => (
                                            <div 
                                                key={notif.id} 
                                                className={`flex items-center justify-between p-3 pl-4 cursor-pointer transition-colors ${!notif.read ? 'bg-[#007AFF]/5' : 'active:bg-black/5'} ${index !== notifications.length - 1 ? 'border-b border-black/5' : ''}`}
                                                onClick={() => {
                                                    // Mark as read
                                                    setNotifications(prev => prev.map(n => n.id === notif.id ? { ...n, read: true } : n));
                                                    setLocationReturnView('notifications');
                                                    setSelectedLocId(notif.locId);
                                                    setView('location_detail');
                                                }}
                                            >
                                                <div className="flex items-center flex-1 overflow-hidden">
                                                    {Array.isArray(notif.photos) && notif.photos.length > 0 ? (
                                                        <img src={notif.photos} className="w-12 h-12 rounded-[12px] object-cover shrink-0 mr-3 shadow-sm" alt="" />
                                                    ) : (
                                                        <div className="w-12 h-12 rounded-[12px] bg-[#007AFF] flex items-center justify-center text-white shrink-0 mr-3 shadow-sm">
                                                            <i className={notif.isStartup ? "fa-solid fa-map-pin" : "fa-solid fa-location-dot"}></i>
                                                        </div>
                                                    )}
                                                    <div className="truncate pr-2">
                                                        <h4 className="text-[15px] font-semibold text-[#1C1C1E] truncate">{notif.name}</h4>
                                                        <p className="text-[13px] text-[#8E8E93] truncate">
                                                            {notif.isStartup ? 'Closest to you' : 'Nearby'} &bull; {formatDistance(notif.distance)}
                                                        </p>
                                                    </div>
                                                </div>
                                                <div className="flex items-center shrink-0 space-x-3 pl-2">
                                                    {!notif.read && <div className="w-2.5 h-2.5 rounded-full bg-[#007AFF] shadow-sm"></div>}
                                                    <button onClick={(e) => deleteNotification(e, notif.id)} className="text-[#FF3B30] active:opacity-50 p-2">
                                                        <i className="fa-solid fa-trash-can"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* VIEW: CITIES */}
                        {view === 'cities' && (
                            <div className="pb-6">
                                <div className="pt-2 pb-8 px-2">
                                    <h1 className="text-[40px] font-bold font-art leading-[1.05] text-[#1C1C1E] tracking-tight">
                                        Vincent's<br/><span className="text-[#8E8E93] italic font-normal">Travelling</span><br/>System
                                    </h1>
                                </div>
                                {dataHierarchy.uniqueCities.length === 0 ? (
                                    <div className="text-center p-10 mt-2">
                                        <i className="fa-regular fa-map text-5xl text-[#8E8E93] mb-4 opacity-50"></i>
                                        <h3 className="text-lg font-semibold text-[#1C1C1E] mb-1">No Places Yet</h3>
                                        <p className="text-[#8E8E93] text-sm">Tap the + button to add your first city or location.</p>
                                    </div>
                                ) : (
                                    <div className="bg-[var(--ios-glass)] backdrop-blur-2xl rounded-[20px] overflow-hidden shadow-[0_2px_10px_rgba(0,0,0,0.02)] border border-white/60">
                                        {dataHierarchy.uniqueCities.map((cityName, index) => (
                                            <div key={cityName} className={`flex items-center justify-between p-3 pl-4 ${index !== dataHierarchy.uniqueCities.length - 1 ? 'border-b border-black/5' : ''}`}>
                                                <div className="flex items-center flex-1 cursor-pointer active:opacity-50 transition-opacity" onClick={() => { setActiveCity(cityName); setView('categories'); }}>
                                                    {dataHierarchy.cities[cityName].photos && dataHierarchy.cities[cityName].photos.length > 0 ? (
                                                        <img src={dataHierarchy.cities[cityName].photos} className="w-16 h-20 rounded-[12px] object-cover shrink-0 mr-4 shadow-sm" alt={cityName} />
                                                    ) : (
                                                        <div className="bg-[#1C1C1E]/5 w-16 h-20 rounded-[12px] flex items-center justify-center mr-4 shrink-0">
                                                            <i className="fa-solid fa-image text-[#1C1C1E]/20 text-xl"></i>
                                                        </div>
                                                    )}
                                                    <div>
                                                        <h3 className="text-[20px] font-art font-bold text-[#1C1C1E] mb-1">{cityName}</h3>
                                                        <p className="text-[11px] font-bold tracking-wider text-[#8E8E93] uppercase">{dataHierarchy.cities[cityName].count} Places</p>
                                                    </div>
                                                </div>
                                                <div className="flex space-x-2 shrink-0">
                                                    <button onClick={(e) => { e.stopPropagation(); openCityForm(cityName); }} className="w-8 h-8 rounded-full bg-black/5 text-[#8E8E93] flex items-center justify-center active:bg-black/10">
                                                        <i className="fa-solid fa-pen text-xs"></i>
                                                    </button>
                                                    <button onClick={(e) => { e.stopPropagation(); deleteCity(cityName); }} className="w-8 h-8 rounded-full bg-[#FF3B30]/10 text-[#FF3B30] flex items-center justify-center active:bg-[#FF3B30]/20">
                                                        <i className="fa-solid fa-trash text-xs"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* VIEW: CATEGORIES IN CITY */}
                        {view === 'categories' && activeCity && dataHierarchy.cities[activeCity] && (
                            <div className="pb-6">
                                {Object.keys(dataHierarchy.cities[activeCity].categories).length === 0 ? (
                                    <div className="text-center p-10 mt-10">
                                        <i className="fa-regular fa-folder-open text-5xl text-[#8E8E93] mb-4 opacity-50"></i>
                                        <p className="text-[#8E8E93] text-sm">No places in this city yet.</p>
                                    </div>
                                ) : (
                                    <div className="bg-[var(--ios-glass)] backdrop-blur-2xl rounded-[20px] overflow-hidden shadow-[0_2px_10px_rgba(0,0,0,0.02)] border border-white/60">
                                        {Object.keys(dataHierarchy.cities[activeCity].categories).sort().map((catName, index, arr) => (
                                            <div 
                                                key={catName}
                                                onClick={() => { setActiveCategory(catName); setView('category_list'); }}
                                                className={`flex items-center justify-between p-3 pl-4 cursor-pointer active:bg-black/5 transition-colors ${index !== arr.length - 1 ? 'border-b border-black/5' : ''}`}
                                            >
                                                <div className="flex items-center">
                                                    <div className="bg-[#007AFF]/10 w-9 h-9 rounded-lg flex items-center justify-center mr-3">
                                                        <i className="fa-solid fa-folder-open text-[#007AFF] text-sm"></i>
                                                    </div>
                                                    <div>
                                                        <h3 className="text-[17px] font-normal text-[#1C1C1E]">{catName}</h3>
                                                        <p className="text-[13px] text-[#8E8E93] mt-0.5">{dataHierarchy.cities[activeCity].categories[catName].length} Places</p>
                                                    </div>
                                                </div>
                                                <i className="fa-solid fa-chevron-right text-[#C7C7CC] text-sm pr-2"></i>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* VIEW: CATEGORY LIST (LOCATIONS) */}
                        {view === 'category_list' && activeCity && activeCategory && dataHierarchy.cities[activeCity]?.categories[activeCategory] && (
                            <div className="space-y-4 pb-6">
                                {dataHierarchy.cities[activeCity].categories[activeCategory].map(loc => (
                                    <div 
                                        key={loc.id} 
                                        className="bg-[var(--ios-glass)] backdrop-blur-2xl rounded-[24px] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white/60 overflow-hidden cursor-pointer active:scale-[0.98] transition-transform"
                                        onClick={() => { setLocationReturnView('category_list'); setSelectedLocId(loc.id); setView('location_detail'); }}
                                    >
                                        {Array.isArray(loc.photos) && loc.photos.length > 0 ? (
                                            <div className="relative w-full h-48 bg-black/5">
                                                <div className="flex w-full h-full overflow-x-auto snap-x snap-mandatory scrollbar-hide">
                                                    {loc.photos.map((p, idx) => (
                                                        <img key={idx} src={p} alt="Location" className="w-full h-full object-cover shrink-0 snap-center" />
                                                    ))}
                                                </div>
                                                {loc.photos.length > 1 && (
                                                    <div className="absolute bottom-2 left-0 right-0 flex justify-center space-x-1.5 pointer-events-none">
                                                        {loc.photos.map((_, i) => (<div key={i} className="w-1.5 h-1.5 rounded-full bg-white shadow-sm" />))}
                                                    </div>
                                                )}
                                            </div>
                                        ) : (
                                            <div className="h-16 w-full bg-black/5 flex items-center justify-center text-[#8E8E93]">
                                                <i className="fa-regular fa-image text-xl opacity-50"></i>
                                            </div>
                                        )}

                                        <div className="p-4 flex items-center justify-between">
                                            <div>
                                                <h4 className="text-[17px] font-semibold text-[#1C1C1E]">{loc.name}</h4>
                                                <p className="text-[13px] text-[#8E8E93] mt-0.5">{formatDistance(loc.currentDistance)} away</p>
                                            </div>
                                            <button onClick={(e) => { e.stopPropagation(); openForm(loc); }} className="w-8 h-8 rounded-full bg-black/5 text-[#007AFF] flex items-center justify-center active:bg-black/10">
                                                <i className="fa-solid fa-pen text-xs"></i>
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* VIEW: LOCATION DETAIL */}
                        {view === 'location_detail' && locDetail && (
                            <div className="pb-6 -mx-4 -mt-4">
                                {/* Edge-to-Edge Hero Image */}
                                {Array.isArray(locDetail.photos) && locDetail.photos.length > 0 ? (
                                    <div className="relative w-full h-80 bg-black/5">
                                        <div className="flex w-full h-full overflow-x-auto snap-x snap-mandatory scrollbar-hide">
                                            {locDetail.photos.map((p, idx) => (
                                                <img 
                                                    key={idx} src={p} alt="Detail" 
                                                    className="w-full h-full object-cover shrink-0 snap-center active:opacity-90 transition-opacity cursor-pointer" 
                                                    onClick={() => { setPreviousView(view); setView('photo_viewer'); setFullScreenPhoto({ photos: locDetail.photos, index: idx }); }} 
                                                />
                                            ))}
                                        </div>
                                        {locDetail.photos.length > 1 && (
                                            <div className="absolute bottom-8 left-0 right-0 flex justify-center space-x-1.5 pointer-events-none">
                                                {locDetail.photos.map((_, i) => (<div key={i} className="w-1.5 h-1.5 rounded-full bg-white shadow-sm" />))}
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="w-full h-40 bg-black/5 flex items-center justify-center text-[#8E8E93]">
                                        <i className="fa-regular fa-image text-3xl opacity-50"></i>
                                    </div>
                                )}
                                
                                {/* Content Sheet */}
                                <div className="relative z-10 bg-[var(--ios-bg)] rounded-t-[32px] -mt-6 pt-6 px-4 min-h-[50vh]">
                                    <div className="flex justify-between items-start mb-6">
                                        <div>
                                            <h2 className="text-[32px] font-art font-bold text-[#1C1C1E] leading-tight tracking-tight mb-1">{locDetail.name}</h2>
                                            <span className="text-[13px] tracking-widest uppercase font-semibold text-[#8E8E93]">{locDetail.category || 'Uncategorized'}</span>
                                        </div>
                                        <div className="flex space-x-2 shrink-0">
                                            <button onClick={() => openForm(locDetail)} className="w-9 h-9 rounded-full bg-black/5 text-[#1C1C1E] flex items-center justify-center active:bg-black/10"><i className="fa-solid fa-pen text-sm"></i></button>
                                        </div>
                                    </div>
                                    
                                    <div className="bg-[var(--ios-glass)] backdrop-blur-2xl rounded-[20px] shadow-[0_2px_10px_rgba(0,0,0,0.02)] border border-white/60 p-4 mb-4">
                                        <div className="flex items-center text-[#1C1C1E] mb-1">
                                            <i className="fa-solid fa-location-arrow text-[#007AFF] w-6"></i>
                                            <span className="text-[17px] font-medium">{formatDistance(liveLocation && locDetail.lat != null && locDetail.lng != null ? calculateDistance(liveLocation.lat, liveLocation.lng, locDetail.lat, locDetail.lng) : null)} away</span>
                                        </div>
                                        <p className="text-[13px] text-[#8E8E93] ml-6">Straight-line distance</p>
                                    </div>

                                    {locDetail.comment && (
                                        <div className="bg-[var(--ios-glass)] backdrop-blur-2xl rounded-[20px] shadow-[0_2px_10px_rgba(0,0,0,0.02)] border border-white/60 p-4 mb-4">
                                            <h3 className="text-[15px] font-medium text-[#1C1C1E] mb-1.5">Notes</h3>
                                            <p className="text-[15px] text-[#8E8E93] leading-relaxed whitespace-pre-wrap">{locDetail.comment}</p>
                                        </div>
                                    )}

                                    <div className="bg-[var(--ios-glass)] backdrop-blur-2xl rounded-[20px] shadow-[0_2px_10px_rgba(0,0,0,0.02)] border border-white/60 overflow-hidden mb-8">
                                        <div className="p-4 border-b border-black/5 flex justify-between items-center">
                                            <span className="text-[15px] text-[#1C1C1E]">Coordinates</span>
                                            <span className="text-[15px] text-[#8E8E93] font-mono">
                                                {locDetail.lat != null ? Number(locDetail.lat).toFixed(5) : 'N/A'}, {locDetail.lng != null ? Number(locDetail.lng).toFixed(5) : 'N/A'}
                                            </span>
                                        </div>
                                        {locDetail.mapLink && (
                                            <a href={locDetail.mapLink} target="_blank" rel="noopener noreferrer" className="block p-4 text-center text-[#007AFF] text-[17px] font-medium active:bg-black/5 transition-colors">
                                                Open in Maps
                                            </a>
                                        )}
                                    </div>

                                    <div className="text-center pb-8">
                                        <button onClick={() => deleteLocation(locDetail.id, true)} className="text-[#FF3B30] text-[15px] font-medium active:opacity-50">
                                            Delete Location
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* VIEW: ADD OR EDIT CITY FORM */}
                        {view === 'city_form' && (
                            <form onSubmit={handleSaveCity} className="space-y-4 pb-6">
                                {saveError && (
                                    <div className="p-3 bg-[#FF3B30]/10 text-[#FF3B30] text-[13px] rounded-[10px]">
                                        <i className="fa-solid fa-circle-exclamation mr-1.5"></i>{saveError}
                                    </div>
                                )}
                                
                                <div className="bg-[var(--ios-glass)] backdrop-blur-2xl p-5 rounded-[24px] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white/60 space-y-5">
                                    <div>
                                        <label className="block text-[13px] font-medium text-[#8E8E93] mb-1.5 uppercase ml-1">City Name</label>
                                        <input type="text" required value={newCityName} onChange={e => setNewCityName(e.target.value)} className="w-full px-4 py-3.5 ios-input focus:outline-none text-[17px]" placeholder="Tokyo, Japan" autoFocus />
                                    </div>
                                </div>

                                <div className="bg-[var(--ios-glass)] backdrop-blur-2xl rounded-[20px] shadow-[0_2px_10px_rgba(0,0,0,0.02)] border border-white/60 p-4">
                                    <div className="flex justify-between items-center mb-3">
                                        <span className="text-[17px] text-[#1C1C1E]">City Photo</span>
                                        <label className="text-[15px] font-medium text-[#007AFF] cursor-pointer active:opacity-50">
                                            Add Photo
                                            <input type="file" accept="image/*" className="hidden" onChange={handleCityFiles} disabled={isSaving} />
                                        </label>
                                    </div>
                                    {cityPhotos.length > 0 ? (
                                        <div className="flex overflow-x-auto space-x-3 pb-2 scrollbar-hide snap-x">
                                            {cityPhotos.map((p, i) => (
                                                <div key={i} className="relative w-20 h-20 flex-shrink-0 snap-start rounded-[14px] overflow-hidden border border-black/5">
                                                    <img src={p} className="w-full h-full object-cover" alt="Preview" />
                                                    <button type="button" onClick={() => removeCityPhoto(i)} className="absolute top-1 right-1 bg-black/50 text-white w-6 h-6 rounded-full flex items-center justify-center text-[10px]"><i className="fa-solid fa-xmark"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <p className="text-[13px] text-[#8E8E93]">No photos added.</p>
                                    )}
                                </div>

                                <button type="submit" disabled={isSaving || !newCityName.trim()} className="w-full py-3.5 bg-[#007AFF] disabled:opacity-50 text-white font-semibold text-[17px] rounded-[14px] active:scale-[0.98] transition-transform mt-4">
                                    {isSaving ? <i className="fa-solid fa-spinner fa-spin"></i> : editingCityName ? 'Update' : 'Add City'}
                                </button>
                            </form>
                        )}

                        {/* VIEW: ADD / EDIT LOCATION FORM */}
                        {view === 'form' && (
                            <form onSubmit={handleSaveLocation} className="space-y-4 pb-6">
                                {saveError && (
                                    <div className="p-3 bg-[#FF3B30]/10 text-[#FF3B30] text-[13px] rounded-[10px]">
                                        <i className="fa-solid fa-circle-exclamation mr-1.5"></i>{saveError}
                                    </div>
                                )}
                                
                                {/* LIVE AUTOCOMPLETE SEARCH BAR */}
                                {!editId && (
                                    <div className="relative z-50">
                                        <div className="bg-[var(--ios-glass)] backdrop-blur-2xl rounded-[20px] shadow-[0_2px_10px_rgba(0,0,0,0.02)] border border-white/60 p-2">
                                            <div className="relative flex items-center bg-black/5 rounded-[12px] px-3 py-2.5">
                                                <i className="fa-solid fa-magnifying-glass text-[#8E8E93] mr-2"></i>
                                                <input 
                                                    type="text" 
                                                    placeholder="Search to auto-fill (e.g. BBRAND)" 
                                                    value={formSearchQuery} 
                                                    onChange={(e) => setFormSearchQuery(e.target.value)}
                                                    className="flex-1 bg-transparent focus:outline-none text-[17px] text-[#1C1C1E]"
                                                />
                                                {isSearching && <i className="fa-solid fa-spinner fa-spin text-[#8E8E93]"></i>}
                                            </div>
                                        </div>
                                        
                                        {searchResults.length > 0 && (
                                            <div className="absolute top-[calc(100%+8px)] left-0 right-0 bg-[rgba(242,242,247,0.95)] backdrop-blur-3xl rounded-[20px] shadow-lg border border-black/5 overflow-hidden max-h-64 overflow-y-auto">
                                                {searchResults.map((result, idx) => (
                                                    <div 
                                                        key={idx} 
                                                        className={`p-3 pl-4 cursor-pointer active:bg-black/10 flex items-center ${idx !== searchResults.length - 1 ? 'border-b border-black/5' : ''}`}
                                                        onClick={() => handleSelectPlace(result)}
                                                    >
                                                        <div className="bg-[#007AFF] w-8 h-8 rounded-full flex items-center justify-center text-white shrink-0 mr-3">
                                                            <i className="fa-solid fa-location-dot text-sm"></i>
                                                        </div>
                                                        <div className="truncate">
                                                            <h4 className="text-[15px] font-medium text-[#1C1C1E] truncate">{result.properties.name || result.properties.street || 'Unknown'}</h4>
                                                            <p className="text-[12px] text-[#8E8E93] truncate">
                                                                {[result.properties.street, result.properties.city, result.properties.state, result.properties.country].filter(Boolean).join(', ')}
                                                            </p>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}
                                
                                <div className="bg-[var(--ios-glass)] backdrop-blur-2xl rounded-[20px] shadow-[0_2px_10px_rgba(0,0,0,0.02)] border border-white/60 overflow-hidden">
                                    <div className="p-3.5 border-b border-black/5 flex items-center">
                                        <label className="w-24 text-[17px] text-[#1C1C1E]">Name</label>
                                        <input type="text" required value={name} onChange={e => setName(e.target.value)} className="flex-1 bg-transparent focus:outline-none text-[17px] text-[#8E8E93]" placeholder="Location name" />
                                    </div>
                                    <div className="p-3.5 border-b border-black/5 flex items-center">
                                        <label className="w-24 text-[17px] text-[#1C1C1E]">City</label>
                                        <input type="text" required list="cities-list" value={city} onChange={e => setCity(e.target.value)} className="flex-1 bg-transparent focus:outline-none text-[17px] text-[#8E8E93]" placeholder="Select or type" />
