                                                {searchResults.map((result, idx) => (
                                                    <div 
                                                        key={idx} 
                                                        className={`p-3 pl-4 cursor-pointer active:bg-black/5 flex items-center transition-colors ${idx !== searchResults.length - 1 ? 'border-b border-black/5' : ''}`}
                                                        onClick={() => handleSelectPlace(result)}
                                                    >
                                                        <div className="bg-[#1D1D1F] w-9 h-9 rounded-[10px] flex items-center justify-center text-white shrink-0 mr-3 shadow-md">
                                                            <i className="fa-solid fa-location-dot text-[13px]"></i>
                                                        </div>
                                                        <div className="truncate min-w-0 flex-1">
                                                            <h4 className="text-[15px] font-bold text-[#1D1D1F] truncate">{result.properties.name || result.properties.street || 'Unknown'}</h4>
                                                            <p className="text-[12px] font-medium text-[#8E8E93] truncate mt-0.5">
                                                                {[result.properties.street, result.properties.city, result.properties.state, result.properties.country].filter(Boolean).join(', ')}
                                                            </p>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}
                                
                                <div className="glass-panel p-2 flex flex-col space-y-1">
                                    <div className="p-3 flex items-center">
                                        <label className="w-24 shrink-0 text-[14px] font-bold text-[#8E8E93] uppercase">Name</label>
                                        <input type="text" required value={name} onChange={e => setName(e.target.value)} className="flex-1 min-w-0 bg-transparent focus:outline-none text-[16px] placeholder-[#8E8E93]/40 font-bold text-[#1D1D1F]" placeholder="Location name" />
                                    </div>
                                    <div className="h-px bg-black/5 mx-3"></div>
                                    <div className="p-3 flex items-center">
                                        <label className="w-24 shrink-0 text-[14px] font-bold text-[#8E8E93] uppercase">City</label>
                                        <input type="text" required list="cities-list" value={city} onChange={e => setCity(e.target.value)} className="flex-1 min-w-0 bg-transparent focus:outline-none text-[16px] placeholder-[#8E8E93]/40 font-bold text-[#1D1D1F]" placeholder="Select or type" />
                                        <datalist id="cities-list">{dataHierarchy.uniqueCities.map(c => <option key={c} value={c} />)}</datalist>
                                    </div>
                                    <div className="h-px bg-black/5 mx-3"></div>
                                    <div className="p-3 flex items-center">
                                        <label className="w-24 shrink-0 text-[14px] font-bold text-[#8E8E93] uppercase">Category</label>
                                        <input type="text" required list="categories-list" value={category} onChange={e => setCategory(e.target.value)} className="flex-1 min-w-0 bg-transparent focus:outline-none text-[16px] placeholder-[#8E8E93]/40 font-bold text-[#1D1D1F]" placeholder="Select or type" />
                                        <datalist id="categories-list">{dataHierarchy.allCategories.map(c => <option key={c} value={c} />)}</datalist>
                                    </div>
                                </div>
                                
                                <div className="glass-panel p-4">
                                    <RichEditor 
                                        value={comment} 
                                        onChange={setComment} 
                                        placeholder="Tips, what to order, vibes... (Paste images directly here!)" 
                                        disabled={isSaving} 
                                    />
                                </div>

                                <div className="glass-panel p-2 flex flex-col space-y-1">
                                    <div className="p-3 flex justify-between items-center">
                                        <span className="text-[14px] font-bold text-[#8E8E93] uppercase tracking-wide">Coordinates</span>
                                        <button type="button" onClick={useCurrentLocation} className="text-[12px] font-bold tracking-wide uppercase bg-[#1D1D1F] text-white px-3 py-1.5 rounded-full active:scale-95 transition-transform shadow-md shrink-0 ml-2">
                                            Get GPS
                                        </button>
                                    </div>
                                    <div className="h-px bg-black/5 mx-3"></div>

                                    {/* PASTE COORDINATES COMPONENT */}
                                    <div className="p-3">
                                        <label className="block text-[12px] font-bold text-[#8E8E93] mb-2 uppercase tracking-wide ml-1">Paste Coordinates</label>
                                        <input
                                            type="text"
                                            placeholder="e.g. 11.5419849, 104.9118862"
                                            className="w-full glass-input px-3 py-2.5 text-[14px] font-medium placeholder-[#8E8E93]/50 bg-white/50"
                                            onChange={(e) => {
                                                const value = e.target.value.trim();
                                                // Find any floating point numbers hidden in the pasted text
                                                const numbers = value.match(/[-+]?\d+\.\d+/g);
                                                
                                                if (numbers && numbers.length >= 2) {
                                                    const num1 = parseFloat(numbers);
                                                    const num2 = parseFloat(numbers);

                                                    const isValidLat = (val) => val >= -90 && val <= 90;
                                                    const isValidLng = (val) => val >= -180 && val <= 180;

                                                    // Standard format: Lat, Lng
                                                    if (isValidLat(num1) && isValidLng(num2)) {
                                                        setLat(num1.toFixed(6));
                                                        setLng(num2.toFixed(6));
                                                    } 
                                                    // Smart fallback: If they pasted Lng, Lat by mistake, flip them automatically
                                                    else if (isValidLat(num2) && isValidLng(num1)) {
                                                        setLat(num2.toFixed(6));
                                                        setLng(num1.toFixed(6));
                                                    }
                                                }
                                            }}
                                        />
                                    </div>
                                    <div className="h-px bg-black/5 mx-3"></div>

                                    <div className="p-3 flex items-center">
                                        <label className="w-20 shrink-0 text-[14px] font-bold text-[#1D1D1F]">Lat</label>
                                        <input type="number" step="any" value={lat} onChange={e => setLat(e.target.value)} className="flex-1 min-w-0 bg-transparent focus:outline-none text-[16px] font-mono font-medium placeholder-[#8E8E93]/30 text-[#1D1D1F]" placeholder="Optional" />
                                    </div>
                                    <div className="h-px bg-black/5 mx-3"></div>
                                    <div className="p-3 flex items-center">
                                        <label className="w-20 shrink-0 text-[14px] font-bold text-[#1D1D1F]">Lng</label>
                                        <input type="number" step="any" value={lng} onChange={e => setLng(e.target.value)} className="flex-1 min-w-0 bg-transparent focus:outline-none text-[16px] font-mono font-medium placeholder-[#8E8E93]/30 text-[#1D1D1F]" placeholder="Optional" />
                                    </div>
                                    <div className="h-px bg-black/5 mx-3"></div>
                                    <div className="p-3">
                                        <input type="text" value={mapLink} onChange={handleMapLinkChange} className="w-full glass-input px-3 py-2.5 text-[14px] font-medium placeholder-[#8E8E93]/50 bg-white/50" placeholder="Paste Maps Link OR Raw GPS Coords" />
                                    </div>
                                </div>

                                <div className="glass-panel p-4">
                                    <div className="flex justify-between items-center mb-4">
                                        <span className="text-[14px] font-bold text-[#8E8E93] uppercase tracking-wide ml-1">Photos</span>
                                        <label className="text-[13px] font-bold bg-[#1D1D1F] text-white px-3 py-1.5 rounded-full cursor-pointer active:scale-95 transition-transform shadow-md">
                                            <i className="fa-solid fa-plus mr-1"></i> Add
                                            <input type="file" multiple accept="image/*" className="hidden" onChange={handleFiles} disabled={isSaving} />
                                        </label>
                                    </div>
                                    {photos.length > 0 ? (
                                        <div className="flex overflow-x-auto space-x-3 pb-2 scrollbar-hide snap-x">
                                            {photos.map((p, i) => (
                                                <div key={i} className="relative w-24 h-24 flex-shrink-0 snap-start rounded-[16px] overflow-hidden border border-white/60 shadow-sm">
                                                    <img src={p} className="w-full h-full object-cover" alt="Preview" onError={handleImgErr} />
                                                    <button type="button" onClick={() => removePhoto(i)} className="absolute top-1.5 right-1.5 bg-black/60 backdrop-blur-md text-white w-6 h-6 rounded-full flex items-center justify-center text-[10px]"><i className="fa-solid fa-xmark"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="h-24 w-full rounded-[16px] bg-black/5 flex items-center justify-center text-[#8E8E93] shadow-inner border border-black/5">
                                            <i className="fa-solid fa-images text-xl opacity-40"></i>
                                        </div>
                                    )}
                                </div>

                                <button type="submit" disabled={!user || isSaving} className="w-full py-4 bg-[#1D1D1F] disabled:bg-[#1D1D1F]/50 text-white font-bold tracking-wide text-[16px] rounded-[18px] active:scale-[0.98] transition-all mt-4 shadow-lg shadow-black/10">
                                    {isSaving ? <i className="fa-solid fa-spinner fa-spin"></i> : editId ? 'Save Changes' : 'Create Place'}
                                </button>
                            </form>
                        )}

                        {/* ========================================================= */}
                        {/* MAIN VIEWS - ITINERARY PLANNER                            */}
                        {/* ========================================================= */}

                        {/* VIEW: ITINERARIES LIST */}
                        {view === 'itineraries' && (
                            <div className="pb-6 space-y-4">
                                <div className="px-2 mb-6">
                                    <h2 className="text-[34px] font-art font-bold text-[#1D1D1F] leading-tight tracking-tight">Itineraries</h2>
                                    <p className="text-[#8E8E93] font-bold tracking-wide uppercase text-[12px] mt-1">Planned Days</p>
                                </div>

                                {itineraries.length === 0 ? (
                                    <div className="glass-panel flex flex-col items-center justify-center py-16 px-6 text-center">
                                        <div className="w-16 h-16 rounded-full bg-black/5 flex items-center justify-center mb-4">
                                            <i className="fa-regular fa-calendar text-2xl text-[#8E8E93]"></i>
                                        </div>
                                        <h3 className="text-[18px] font-bold text-[#1D1D1F] mb-1">No Plans Yet</h3>
                                        <p className="text-[#8E8E93] font-medium text-[14px]">Tap the + icon to plan a new day.</p>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        {itineraries.map((itin, index) => (
                                            <div 
                                                key={itin.id} 
                                                className="glass-panel p-4 flex items-center justify-between cursor-pointer active:scale-[0.98] transition-transform" 
                                                onClick={() => { setActiveItinId(itin.id); setView('itinerary_detail'); }}
                                            >
                                                <div className="flex items-center flex-1 min-w-0">
                                                    <div className="w-14 h-14 rounded-[16px] bg-[var(--ios-accent)]/10 flex flex-col items-center justify-center shrink-0 mr-4 border border-[var(--ios-accent)]/20 shadow-inner text-[var(--ios-accent)]">
                                                        <span className="text-[9px] font-bold uppercase tracking-widest mb-[-2px] opacity-80">Day</span>
                                                        <span className="text-[22px] font-art font-bold leading-none">{index + 1}</span>
                                                    </div>
                                                    <div className="pr-2 min-w-0 flex-1">
                                                        <h3 className="text-[18px] font-bold text-[#1D1D1F] mb-0.5 leading-tight truncate">{itin.title}</h3>
                                                        <p className="text-[13px] text-[#8E8E93] font-medium truncate">
                                                            {itin.date || 'Unscheduled'} <span className="opacity-50 mx-1">&bull;</span> {(itin.items || []).length} events
                                                        </p>
                                                    </div>
                                                </div>
                                                <div className="flex flex-col space-y-2 shrink-0 ml-2">
                                                    <button onClick={(e) => { e.stopPropagation(); deleteItinerary(itin.id); }} className="w-8 h-8 rounded-full bg-[var(--ios-red)]/10 text-[var(--ios-red)] flex items-center justify-center active:bg-[var(--ios-red)]/20 transition-colors">
                                                        <i className="fa-solid fa-trash text-[10px]"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* VIEW: ITINERARY DETAIL (TIMESHEET) */}
                        {view === 'itinerary_detail' && (
                            <div className="pb-6">
                                {(() => {
                                    const itin = itineraries.find(i => i.id === activeItinId);
                                    if (!itin) return null;
                                    const totalDayCost = (itin.items || []).reduce((sum, item) => sum + (parseFloat(item.billTotal) || 0), 0);
                                    return (
                                        <>
                                            <div className="px-2 mb-8 flex justify-between items-end">
                                                <div className="min-w-0 pr-4">
                                                    <h2 className="text-[34px] font-art font-bold text-[#1D1D1F] leading-tight tracking-tight break-words">{itin.title}</h2>
                                                    <p className="text-[#8E8E93] font-bold tracking-wide uppercase text-[12px] mt-1 truncate">{itin.date || 'Unscheduled'}</p>
                                                    {totalDayCost > 0 && (
                                                        <div className="mt-3 inline-flex items-center px-3 py-1 bg-[var(--ios-accent)]/10 rounded-full border border-[var(--ios-accent)]/20 shadow-sm max-w-full">
                                                            <i className="fa-solid fa-wallet text-[var(--ios-accent)] text-[12px] mr-1.5 shrink-0"></i>
                                                            <span className="text-[13px] font-bold text-[var(--ios-accent)] truncate">Day Total: ${totalDayCost.toFixed(2)}</span>
                                                        </div>
                                                    )}
                                                </div>
                                                <button onClick={() => openItineraryForm(itin)} className="w-10 h-10 rounded-full glass-panel flex items-center justify-center text-[#1D1D1F] active:bg-black/10 transition-colors shadow-sm mb-1 shrink-0">
                                                    <i className="fa-solid fa-pen text-[12px]"></i>
                                                </button>
                                            </div>
                                            
                                            {(itin.items || []).length === 0 ? (
                                                <div className="glass-panel flex flex-col items-center justify-center py-12 px-6 text-center">
                                                    <p className="text-[#8E8E93] font-medium text-[15px]">Timesheet is empty.</p>
                                                </div>
                                            ) : (
                                                <div className="relative before:absolute before:inset-0 before:ml-[42px] before:-translate-x-px before:h-full before:w-[2px] before:bg-gradient-to-b before:from-black/5 before:via-black/20 before:to-black/5 space-y-6 mt-4">
                                                    {(itin.items || []).map((item) => {
                                                        const loc = locations.find(l => l.id === item.locationId);
                                                        return (
                                                            <div key={item.id} className="relative z-10 flex items-start pl-4">
                                                                <div className="w-16 shrink-0 pt-2 text-right pr-4">
                                                                    <div className="text-[13px] font-bold text-[#8E8E93] truncate">{item.time}</div>
                                                                </div>
                                                                
                                                                <div className="w-3.5 h-3.5 rounded-full border-2 border-white bg-[#1D1D1F] shadow-sm shrink-0 mt-1.5 relative z-20"></div>
                                                                
                                                                <div className="ml-5 flex-1 min-w-0 glass-panel p-4 active:scale-[0.98] transition-transform border border-[var(--ios-accent)]/20">
                                                                    <div className="flex justify-between items-start mb-2">
                                                                        <span className="text-[10px] font-bold text-white bg-[#1D1D1F] uppercase tracking-wider px-2 py-0.5 rounded-md shadow-sm truncate max-w-[120px]">{item.label}</span>
                                                                        <div className="flex space-x-1.5 bg-black/5 rounded-full px-1.5 py-1 shrink-0 ml-2">
                                                                            <button onClick={() => openItineraryItemForm(item)} className="w-7 h-7 rounded-full text-[#8E8E93] flex items-center justify-center hover:text-[#1D1D1F] active:bg-black/10 transition-colors"><i className="fa-solid fa-pen text-[10px]"></i></button>
                                                                            <button onClick={() => deleteItineraryItem(item.id)} className="w-7 h-7 rounded-full text-[var(--ios-red)] flex items-center justify-center hover:text-[var(--ios-red)]/80 active:bg-[var(--ios-red)]/10 transition-colors"><i className="fa-solid fa-xmark text-[12px]"></i></button>
                                                                        </div>
                                                                    </div>
                                                                    
                                                                    {loc ? (
                                                                        <div className="flex items-center space-x-3 mt-1 cursor-pointer group" onClick={() => { setLocationReturnView('itinerary_detail'); setSelectedLocId(loc.id); setView('location_detail'); }}>
                                                                            {Array.isArray(loc.photos) && loc.photos.length > 0 ? (
                                                                                <img src={loc.photos} className="w-12 h-12 rounded-[12px] object-cover border border-black/5 shadow-sm shrink-0 bg-[#e5e5ea]" alt="Preview" onError={handleImgErr} />
                                                                            ) : (
                                                                                <div className="w-12 h-12 rounded-[12px] bg-black/5 border border-black/5 flex items-center justify-center text-[#8E8E93] shadow-inner shrink-0"><i className="fa-solid fa-map-pin"></i></div>
                                                                            )}
                                                                            <div className="flex-1 min-w-0">
                                                                                <p className="font-bold text-[#1D1D1F] text-[16px] leading-tight mb-0.5 group-active:text-[var(--ios-accent)] transition-colors truncate">{loc.name}</p>
                                                                                <p className="text-[12px] font-medium text-[#8E8E93] truncate">{loc.category}</p>
                                                                            </div>
                                                                            <i className="fa-solid fa-chevron-right text-[#1D1D1F]/20 text-[12px] mr-1 shrink-0"></i>
                                                                        </div>
                                                                    ) : item.locationId ? (
                                                                        <p className="text-[12px] text-[var(--ios-red)] font-bold bg-[var(--ios-red)]/10 inline-block px-2 py-1 rounded-md mt-1 border border-[var(--ios-red)]/20">Location deleted</p>
                                                                    ) : null}
                                                                    
                                                                    {item.notes && (
                                                                        <div className="mt-3 pt-3 border-t border-black/5">
                                                                            <div 
                                                                                className="text-[13px] font-medium text-[#1D1D1F] leading-relaxed break-words [&>img]:max-w-full [&>img]:rounded-[8px] [&>img]:my-2 [&>img]:shadow-sm"
                                                                                dangerouslySetInnerHTML={renderHTML(item.notes)}
                                                                            />
                                                                        </div>
                                                                    )}
                                                                    
                                                                    {/* Left-Aligned Touch-Friendly Calculator Button */}
                                                                    <div className="mt-4 pt-3 border-t border-black/5 flex justify-start">
                                                                        <button onClick={() => handleOpenSplitBill(item)} className="flex items-center bg-white/60 hover:bg-white/90 border border-white/80 shadow-sm rounded-full pr-4 p-1 active:scale-95 transition-all max-w-full">
                                                                            <div className="w-8 h-8 rounded-full bg-[var(--ios-accent)] flex items-center justify-center text-white shadow-md mr-2.5 shrink-0">
                                                                                <i className="fa-solid fa-calculator text-[13px]"></i>
                                                                            </div>
                                                                            {item.billTotal > 0 ? (
                                                                                <div className="flex flex-col text-left justify-center min-w-0 overflow-hidden">
                                                                                    <span className="text-[14px] font-bold text-[#1D1D1F] leading-tight truncate">${(parseFloat(item.billTotal) / (parseInt(item.billSplit)||1)).toFixed(2)}</span>
                                                                                    <span className="text-[9px] font-bold text-[#8E8E93] uppercase tracking-wider leading-tight mt-0.5 truncate">{item.billSplit} {item.billSplit > 1 ? 'people' : 'person'}</span>
                                                                                </div>
                                                                            ) : (
                                                                                <span className="text-[13px] font-bold text-[#1D1D1F] pr-1 shrink-0">Split Bill</span>
                                                                            )}
                                                                        </button>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            )}
                                        </>
                                    );
                                })()}
                            </div>
                        )}

                        {/* VIEW: ITINERARY DAY FORM */}
                        {view === 'itinerary_form' && (
                            <form onSubmit={handleSaveItinerary} className="space-y-5 pb-6">
                                <div className="px-2 mb-4">
                                    <h2 className="text-[34px] font-art font-bold text-[#1D1D1F] leading-tight tracking-tight">{editId ? 'Edit Day' : 'Plan Day'}</h2>
                                </div>

                                {saveError && (
                                    <div className="p-3 bg-[var(--ios-red)]/10 text-[var(--ios-red)] text-[13px] font-medium rounded-[16px] border border-[var(--ios-red)]/20 flex items-center">
                                        <i className="fa-solid fa-circle-exclamation mr-2"></i>{saveError}
                                    </div>
                                )}
                                
                                <div className="glass-panel p-5 space-y-4">
                                    <div>
                                        <label className="block text-[12px] font-bold text-[#8E8E93] mb-2 uppercase tracking-wide ml-1">Title</label>
                                        <input type="text" required value={itinTitle} onChange={e => setItinTitle(e.target.value)} className="w-full px-4 py-3.5 glass-input text-[16px] font-medium placeholder-[#8E8E93]/50 bg-white/50" placeholder="Day 1: City Tour" />
                                    </div>
                                    <div>
                                        <label className="block text-[12px] font-bold text-[#8E8E93] mb-2 uppercase tracking-wide ml-1">Date</label>
                                        <input type="date" value={itinDate} onChange={e => setItinDate(e.target.value)} className="w-full px-4 py-3.5 glass-input text-[16px] font-medium bg-white/50" />
                                    </div>
                                </div>
                                <button type="submit" disabled={isSaving} className="w-full py-4 bg-[#1D1D1F] disabled:bg-[#1D1D1F]/50 text-white font-bold tracking-wide text-[16px] rounded-[18px] active:scale-[0.98] transition-all mt-4 shadow-lg shadow-black/10">
                                    {isSaving ? <i className="fa-solid fa-spinner fa-spin"></i> : 'Save Day'}
                                </button>
                            </form>
                        )}

                        {/* VIEW: SELECT LOCATION FOR ITINERARY */}
                        {view === 'itinerary_select_location' && (
                            <div className="space-y-5 pb-6">
                                <div className="px-2 mb-2 flex justify-between items-center">
                                    <h2 className="text-[28px] font-art font-bold text-[#1D1D1F] leading-tight tracking-tight">Pick Place</h2>
                                    <button onClick={() => handleSelectLocationForItinerary('')} className="text-[#8E8E93] font-bold text-[14px] active:opacity-50 px-2 py-1">
                                        Skip
                                    </button>
                                </div>

                                <div className="glass-panel p-1.5">
                                    <div className="relative flex items-center glass-input px-3 py-3 bg-white/50">
                                        <i className="fa-solid fa-magnifying-glass text-[#8E8E93] mr-2.5 shrink-0"></i>
                                        <input 
                                            type="text" placeholder="Search saved places..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)}
                                            className="flex-1 min-w-0 bg-transparent focus:outline-none text-[16px] font-medium placeholder-[#8E8E93]/60"
                                        />
                                    </div>
                                </div>
                                
                                {filteredAndGroupedLocations.sortedCategories.length === 0 ? (
                                    <div className="text-center p-8 text-[#8E8E93] font-medium">No saved places found.</div>
                                ) : (
                                    <div className="space-y-4">
                                        {filteredAndGroupedLocations.sortedCategories.map(cat => (
                                            <div key={cat} className="space-y-2">
                                                <h3 className="text-[12px] font-bold text-[#8E8E93] uppercase tracking-wide pl-2">{cat}</h3>
                                                <div className="glass-panel overflow-hidden">
                                                    {filteredAndGroupedLocations.grouped[cat].map((loc, index, arr) => (
                                                        <div 
                                                            key={loc.id} 
                                                            className={`flex items-center justify-between p-3 pl-4 cursor-pointer active:bg-black/5 transition-colors ${index !== arr.length - 1 ? 'border-b border-black/5' : ''}`}
                                                            onClick={() => handleSelectLocationForItinerary(loc.id)}
                                                        >
                                                            <div className="flex items-center flex-1 min-w-0 overflow-hidden">
                                                                {Array.isArray(loc.photos) && loc.photos.length > 0 ? (
                                                                    <img src={loc.photos} className="w-12 h-12 rounded-[12px] object-cover shrink-0 mr-3 border border-white/60 shadow-sm bg-[#e5e5ea]" alt="" onError={handleImgErr} />
                                                                ) : (
                                                                    <div className="w-12 h-12 rounded-[12px] bg-black/5 flex items-center justify-center text-[#8E8E93] shrink-0 mr-3 border border-black/5 shadow-inner"><i className="fa-solid fa-map-pin"></i></div>
                                                                )}
                                                                <div className="truncate pr-2 min-w-0 flex-1">
                                                                    <h4 className="text-[16px] font-bold text-[#1D1D1F] truncate">{loc.name}</h4>
                                                                    <p className="text-[12px] font-medium text-[#8E8E93] truncate mt-0.5">{loc.city || 'City'}</p>
                                                                </div>
                                                            </div>
                                                            <span className={`text-[11px] font-bold shrink-0 px-2 py-1 rounded-md border flex items-center ${getDistanceBgColor(loc.currentDistance)}`}>
                                                                {loc.isRealRoute && <i className="fa-solid fa-car text-[9px] mr-1 opacity-70"></i>}
                                                                {formatDistance(loc.currentDistance)} {loc.currentDuration !== null && `• ${loc.isRealRoute ? '' : '~'}${formatDuration(loc.currentDuration)}`}
                                                            </span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* VIEW: ITINERARY ITEM FORM */}
                        {view === 'itinerary_item_form' && (
                            <form onSubmit={handleSaveItineraryItem} className="space-y-5 pb-6">
                                <div className="px-2 mb-4">
                                    <h2 className="text-[34px] font-art font-bold text-[#1D1D1F] leading-tight tracking-tight">{editItinItemId ? 'Edit Event' : 'Add Event'}</h2>
                                </div>

                                {saveError && <div className="p-3 bg-[var(--ios-red)]/10 text-[var(--ios-red)] text-[13px] font-medium rounded-[16px] border border-[var(--ios-red)]/20 flex items-center"><i className="fa-solid fa-circle-exclamation mr-2"></i>{saveError}</div>}
                                
                                <div className="glass-panel p-5 space-y-5">
                                    <div>
                                        <div className="flex justify-between items-center mb-2 ml-1">
                                            <label className="block text-[12px] font-bold text-[#8E8E93] uppercase tracking-wide">Location</label>
                                            <button type="button" onClick={() => setView('itinerary_select_location')} className="text-white text-[12px] font-bold bg-[#1D1D1F] px-3 py-1 rounded-full shadow-md active:scale-95 transition-transform shrink-0 ml-2">Change</button>
                                        </div>
                                        <div className="w-full px-4 py-3.5 glass-input text-[16px] text-[#1D1D1F] truncate font-bold bg-white/50 flex items-center">
                                            {itinItemLocId ? (locations.find(l => l.id === itinItemLocId)?.name || 'Unknown') : 'No location attached'}
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="min-w-0">
                                            <label className="block text-[12px] font-bold text-[#8E8E93] mb-2 uppercase tracking-wide ml-1">Time</label>
                                            <input type="time" required value={itinItemTime} onChange={e => setItinItemTime(e.target.value)} className="w-full px-3 py-3.5 glass-input text-[15px] font-mono font-medium bg-white/50" />
                                        </div>
                                        <div className="min-w-0">
                                            <label className="block text-[12px] font-bold text-[#8E8E93] mb-2 uppercase tracking-wide ml-1">Type</label>
                                            <div className="relative">
                                                <select value={itinItemLabel} onChange={e => setItinItemLabel(e.target.value)} className="w-full pl-3 pr-8 py-3.5 glass-input text-[14px] appearance-none font-bold bg-white/50 truncate">
                                                    <option value="Breakfast">Breakfast</option>
                                                    <option value="Lunch">Lunch</option>
                                                    <option value="Dinner">Dinner</option>
                                                    <option value="Tourist Attraction">Attraction</option>
                                                    <option value="Other">Other</option>
                                                </select>
                                                <i className="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-[10px] text-[#8E8E93] pointer-events-none"></i>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="pt-2">
                                        <RichEditor 
                                            value={itinItemNotes} 
                                            onChange={setItinItemNotes} 
                                            placeholder="Optional notes, schedule details... (Paste images directly here!)" 
                                            disabled={isSaving} 
                                        />
                                    </div>
                                </div>

                                <button type="submit" disabled={isSaving} className="w-full py-4 bg-[#1D1D1F] disabled:bg-[#1D1D1F]/50 text-white font-bold tracking-wide text-[16px] rounded-[18px] active:scale-[0.98] transition-all mt-4 shadow-lg shadow-black/10">
                                    {isSaving ? <i className="fa-solid fa-spinner fa-spin"></i> : 'Save Event'}
                                </button>
                            </form>
                        )}

                        {/* VIEW: SPLIT BILL CALCULATOR PAGE */}
                        {view === 'split_bill' && splitBillItem && (
                            <div className="space-y-6 pb-6">
                                <div className="px-2 mb-4">
                                    <h2 className="text-[34px] font-art font-bold text-[#1D1D1F] leading-tight tracking-tight">Split Bill</h2>
                                    <p className="text-[#8E8E93] font-bold tracking-wide uppercase text-[12px] mt-1">{splitBillItem.label}</p>
                                </div>

                                <div className="glass-panel p-6 space-y-8">
                                    <div className="text-center">
                                        <label className="block text-[12px] font-bold text-[#8E8E93] uppercase tracking-widest mb-3">Total Bill</label>
                                        <div className="flex items-center justify-center text-[#1D1D1F]">
                                            <span className="text-[36px] font-medium text-[#8E8E93] mr-2">$</span>
                                            <input type="number" step="any" min="0" value={tempBillTotal} onChange={e => setTempBillTotal(e.target.value)} className="w-[180px] text-center bg-transparent focus:outline-none text-[52px] font-bold transition-colors placeholder-[#8E8E93]/30" placeholder="0" autoFocus />
                                        </div>
                                    </div>

                                    <div className="h-px bg-black/5 mx-4"></div>

                                    <div className="flex items-center justify-between px-2">
                                        <button type="button" onClick={() => setTempBillSplit(Math.max(1, parseInt(tempBillSplit) - 1))} className="w-14 h-14 rounded-[20px] bg-white/60 shadow-sm border border-white/80 flex items-center justify-center text-[#1D1D1F] active:scale-95 transition-transform"><i className="fa-solid fa-minus"></i></button>
                                        <div className="text-center">
                                            <span className="block text-[28px] font-bold text-[#1D1D1F] leading-none">{tempBillSplit}</span>
                                            <span className="block text-[11px] font-bold text-[#8E8E93] uppercase tracking-wider mt-1.5">People</span>
                                        </div>
                                        <button type="button" onClick={() => setTempBillSplit(parseInt(tempBillSplit) + 1)} className="w-14 h-14 rounded-[20px] bg-white/60 shadow-sm border border-white/80 flex items-center justify-center text-[#1D1D1F] active:scale-95 transition-transform"><i className="fa-solid fa-plus"></i></button>
                                    </div>
                                </div>

                                {tempBillTotal > 0 && (
                                    <div className="glass-panel p-6 text-center border-[var(--ios-accent)]/30 shadow-[0_8px_30px_rgba(198,142,88,0.15)] bg-gradient-to-b from-white/80 to-[var(--ios-accent)]/10">
                                        <span className="text-[12px] font-bold text-[#8E8E93] uppercase tracking-wider">Per Person</span>
                                        <div className="text-[44px] font-bold text-[var(--ios-accent)] leading-none mt-2">
                                            ${(parseFloat(tempBillTotal) / (parseInt(tempBillSplit) || 1)).toFixed(2)}
                                        </div>
                                    </div>
                                )}

                                <button onClick={handleSaveSplitBill} className="w-full py-4 bg-[#1D1D1F] text-white font-bold tracking-wide text-[16px] rounded-[18px] active:scale-[0.98] transition-all mt-6 shadow-lg shadow-black/10">
                                    Save Calculator
                                </button>
                            </div>
                        )}

                        {/* ========================================================= */}
                        {/* MAIN VIEWS - DISTANCE & ROUTE CALCULATOR                  */}
                        {/* ========================================================= */}

                        {/* VIEW: ROUTE CALCULATOR */}
                        {view === 'route_calculator' && (
                            <div className="pb-6 space-y-4">
                                <div className="px-2 mb-6 flex justify-between items-end">
                                    <div>
                                        <h2 className="text-[34px] font-art font-bold text-[#1D1D1F] leading-tight tracking-tight break-words">Route</h2>
                                        <p className="text-[#8E8E93] font-bold tracking-wide uppercase text-[12px] mt-1">Distance & Duration</p>
                                    </div>
                                    {routePoints.length > 0 && (
                                        <button onClick={() => setRoutePoints([])} className="text-[var(--ios-red)] text-[12px] font-bold bg-[var(--ios-red)]/10 px-3 py-1.5 rounded-full active:scale-95 transition-transform mb-1">
                                            Clear All
                                        </button>
                                    )}
                                </div>

                                {routePoints.length === 0 ? (
                                    <div className="glass-panel flex flex-col items-center justify-center py-12 px-6 text-center">
                                        <div className="w-16 h-16 rounded-full bg-black/5 flex items-center justify-center mb-4">
                                            <i className="fa-solid fa-route text-2xl text-[#8E8E93]"></i>
                                        </div>
                                        <h3 className="text-[18px] font-bold text-[#1D1D1F] mb-1">Map Your Journey</h3>
                                        <p className="text-[#8E8E93] font-medium text-[14px]">Select locations to calculate travel time.</p>
                                    </div>
                                ) : (
                                    <div className="relative before:absolute before:inset-0 before:ml-[28px] before:translate-x-[0.5px] before:h-full before:w-[2px] before:bg-gradient-to-b before:from-black/10 before:via-black/20 before:to-transparent space-y-2 mt-4 pb-4">
                                        {routePoints.map((loc, index) => (
                                            <React.Fragment key={`${loc.id}-${index}`}>
                                                <div className="relative z-10 flex items-center pl-2 pr-2">
                                                    <div className="w-10 h-10 rounded-full border-[3px] border-white bg-[#1D1D1F] text-white flex items-center justify-center shadow-md shrink-0 z-20 text-[13px] font-bold">
                                                        {index + 1}
                                                    </div>
                                                    
                                                    <div 
                                                        className="ml-4 flex-1 min-w-0 glass-panel p-3 flex items-center justify-between shadow-sm border border-white/60 cursor-pointer active:scale-[0.98] transition-transform"
                                                        onClick={() => { setLocationReturnView('route_calculator'); setSelectedLocId(loc.id); setView('location_detail'); }}
                                                    >
                                                        <div className="flex items-center flex-1 min-w-0 overflow-hidden">
                                                            {Array.isArray(loc.photos) && loc.photos.length > 0 ? (
                                                                <img src={loc.photos} className="w-10 h-10 rounded-[10px] object-cover shrink-0 mr-3 border border-black/5 shadow-sm bg-[#e5e5ea]" alt="Cover" onError={handleImgErr} />
                                                            ) : (
                                                                <div className="w-10 h-10 rounded-[10px] bg-black/5 border border-black/5 flex items-center justify-center text-[#8E8E93] shadow-inner shrink-0 mr-3"><i className="fa-solid fa-map-pin"></i></div>
                                                            )}
                                                            <div className="min-w-0 flex-1 pr-2">
                                                                <h4 className="text-[15px] font-bold text-[#1D1D1F] truncate">{loc.name}</h4>
                                                                <p className="text-[12px] font-medium text-[#8E8E93] truncate">{loc.city}</p>
                                                            </div>
                                                        </div>
                                                        <button 
                                                            onClick={(e) => { e.stopPropagation(); setRoutePoints(prev => prev.filter((_, i) => i !== index)); }} 
                                                            className="w-8 h-8 rounded-full bg-black/5 text-[#8E8E93] flex items-center justify-center active:bg-black/10 hover:text-[var(--ios-red)] transition-colors shrink-0"
                                                        >
                                                            <i className="fa-solid fa-xmark text-[12px]"></i>
                                                        </button>
                                                    </div>
                                                </div>
                                                
                                                {index < routePoints.length - 1 && routeCalculations[index] && (
                                                    <div className="flex items-center pl-[52px] py-1.5 opacity-90">
                                                        <div className={`px-2.5 py-1 rounded-md text-[11px] font-bold tracking-wide border shadow-sm flex items-center ${getDistanceBgColor(routeCalculations[index].distance)}`}>
                                                            <i className={`fa-solid ${routeCalculations[index].isReal ? 'fa-car' : 'fa-location-arrow'} text-[9px] mr-1.5 opacity-80`}></i>
                                                            {formatDistance(routeCalculations[index].distance)}
                                                            {routeCalculations[index].duration !== null && ` • ${routeCalculations[index].isReal ? '' : '~'}${formatDuration(routeCalculations[index].duration)}`}
                                                        </div>
                                                    </div>
                                                )}
                                            </React.Fragment>
                                        ))}
                                    </div>
                                )}
                                
                                {routePoints.length >= 2 && routeCalculations.length === routePoints.length - 1 && (
                                    <div className="glass-panel p-4 mb-4 bg-[#1D1D1F] text-white flex justify-between items-center shadow-lg border-none">
                                        <div className="font-bold text-[14px] uppercase tracking-wider text-white/70">Total Trip</div>
                                        <div className="text-right">
                                            <div className="font-bold text-[18px] text-[var(--ios-accent)]">
                                                {formatDistance(routeCalculations.reduce((acc, curr) => acc + curr.distance, 0))}
                                            </div>
                                            <div className="text-[13px] font-medium text-white/80 mt-0.5">
                                                {formatDuration(routeCalculations.reduce((acc, curr) => acc + curr.duration, 0))}
                                            </div>
                                        </div>
                                    </div>
                                )}

                                <button onClick={() => { setSearchQuery(''); setView('route_select_location'); }} className="w-full py-3.5 bg-white/80 border border-white backdrop-blur-md text-[#1D1D1F] font-bold tracking-wide text-[16px] rounded-[18px] active:scale-[0.98] transition-all mt-2 shadow-[0_4px_20px_rgba(0,0,0,0.05)] flex items-center justify-center">
                                    <i className="fa-solid fa-plus mr-2 opacity-70"></i> Add Stop
                                </button>
                            </div>
                        )}

                        {/* VIEW: SELECT LOCATION FOR ROUTE */}
                        {view === 'route_select_location' && (
                            <div className="space-y-5 pb-6">
                                <div className="px-2 mb-2 flex justify-between items-start">
                                    <div className="min-w-0 pr-4">
                                        <h2 className="text-[28px] font-art font-bold text-[#1D1D1F] leading-tight tracking-tight">Pick Place</h2>
                                        <p className="text-[#8E8E93] font-bold tracking-wide uppercase text-[12px] mt-1 truncate">
                                            Dist. from: <span className="text-[#1D1D1F]">{routeSelectionData.refLocName}</span>
                                        </p>
                                    </div>
                                    <button onClick={() => setView('route_calculator')} className="text-[#8E8E93] font-bold text-[14px] active:opacity-50 px-2 py-1 shrink-0">
                                        Cancel
                                    </button>
                                </div>

                                <div className="glass-panel p-1.5">
                                    <div className="relative flex items-center glass-input px-3 py-3 bg-white/50">
                                        <i className="fa-solid fa-magnifying-glass text-[#8E8E93] mr-2.5 shrink-0"></i>
                                        <input 
                                            type="text" placeholder="Search saved places..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)}
                                            className="flex-1 min-w-0 bg-transparent focus:outline-none text-[16px] font-medium placeholder-[#8E8E93]/60"
                                        />
                                    </div>
                                </div>
                                
                                {routeSelectionData.sortedCategories.length === 0 ? (
                                    <div className="text-center p-8 text-[#8E8E93] font-medium">No saved places found.</div>
                                ) : (
                                    <div className="space-y-4">
                                        {routeSelectionData.sortedCategories.map(cat => (
                                            <div key={cat} className="space-y-2">
                                                <h3 className="text-[12px] font-bold text-[#8E8E93] uppercase tracking-wide pl-2">{cat}</h3>
                                                <div className="glass-panel overflow-hidden">
                                                    {routeSelectionData.grouped[cat].map((loc, index, arr) => (
                                                        <div 
                                                            key={loc.id} 
                                                            className={`flex items-center justify-between p-3 pl-4 transition-colors ${loc.lat == null ? 'opacity-50' : 'cursor-pointer active:bg-black/5'} ${index !== arr.length - 1 ? 'border-b border-black/5' : ''}`}
                                                            onClick={() => {
                                                                if (loc.lat != null && loc.lng != null) {
                                                                    setRoutePoints(prev => [...prev, loc]);
                                                                    setSearchQuery('');
                                                                    setView('route_calculator');
                                                                }
                                                            }}
                                                        >
                                                            <div className="flex items-center flex-1 min-w-0 overflow-hidden">
                                                                {Array.isArray(loc.photos) && loc.photos.length > 0 ? (
                                                                    <img src={loc.photos} className="w-12 h-12 rounded-[12px] object-cover shrink-0 mr-3 border border-white/60 shadow-sm bg-[#e5e5ea]" alt="" onError={handleImgErr} />
                                                                ) : (
                                                                    <div className="w-12 h-12 rounded-[12px] bg-black/5 flex items-center justify-center text-[#8E8E93] shrink-0 mr-3 border border-black/5 shadow-inner"><i className="fa-solid fa-map-pin"></i></div>
                                                                )}
                                                                <div className="truncate pr-2 min-w-0 flex-1">
                                                                    <h4 className="text-[16px] font-bold text-[#1D1D1F] truncate">{loc.name}</h4>
                                                                    <p className="text-[12px] font-medium text-[#8E8E93] truncate mt-0.5">{loc.city || 'City'}</p>
                                                                </div>
                                                            </div>
                                                            {loc.lat == null ? (
                                                                <span className="text-[10px] text-[var(--ios-red)] font-bold uppercase tracking-wider">No GPS</span>
                                                            ) : (
                                                                <span className={`text-[11px] font-bold shrink-0 px-2 py-1 rounded-md border flex items-center ${getDistanceBgColor(loc.currentDistance)}`}>
                                                                    {loc.isRealRoute && <i className="fa-solid fa-car text-[9px] mr-1 opacity-70"></i>}
                                                                    {formatDistance(loc.currentDistance)} {loc.currentDuration !== null && `• ${loc.isRealRoute ? '' : '~'}${formatDuration(loc.currentDuration)}`}
                                                                </span>
                                                            )}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                    </main>

                    {/* FLOATING LIGHT GLASS NAV PILL */}
                    <div className="fixed bottom-6 left-6 right-6 z-40 safe-bottom pointer-events-none flex justify-center">
                        <div className="glass-pill w-full max-w-[400px] h-16 flex justify-around items-center px-2 pointer-events-auto">
                            <button 
                                onClick={() => setView('cities')} 
                                className={`flex flex-col items-center justify-center w-full h-full rounded-full transition-colors active:bg-black/5 ${activeTab === 'places' ? 'text-[#1D1D1F]' : 'text-[#8E8E93] hover:text-[#1D1D1F]'}`}
                            >
                                <i className="fa-solid fa-map-location-dot text-[18px] mb-1"></i>
                                <span className="text-[10px] font-bold tracking-wider uppercase">Places</span>
                            </button>
                            <button 
                                onClick={() => setView('route_calculator')} 
                                className={`flex flex-col items-center justify-center w-full h-full rounded-full transition-colors active:bg-black/5 ${activeTab === 'route' ? 'text-[#1D1D1F]' : 'text-[#8E8E93] hover:text-[#1D1D1F]'}`}
                            >
                                <i className="fa-solid fa-route text-[18px] mb-1"></i>
                                <span className="text-[10px] font-bold tracking-wider uppercase">Route</span>
                            </button>
                            <button 
                                onClick={() => setView('notifications')} 
                                className={`flex flex-col items-center justify-center w-full h-full rounded-full transition-colors active:bg-black/5 relative ${activeTab === 'notifications' ? 'text-[#1D1D1F]' : 'text-[#8E8E93] hover:text-[#1D1D1F]'}`}
                            >
                                <div className="relative">
                                    <i className={unreadCount > 0 ? "fa-solid fa-bell text-[18px] mb-1" : "fa-regular fa-bell text-[18px] mb-1"}></i>
                                    {unreadCount > 0 && (
                                        <span className="absolute -top-1.5 -right-2 bg-[var(--ios-red)] text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full min-w-[16px] text-center shadow-sm border border-white">
                                            {unreadCount}
                                        </span>
                                    )}
                                </div>
                                <span className="text-[10px] font-bold tracking-wider uppercase">Radar</span>
                            </button>
                            <button 
                                onClick={() => setView('itineraries')} 
                                className={`flex flex-col items-center justify-center w-full h-full rounded-full transition-colors active:bg-black/5 ${activeTab === 'itineraries' ? 'text-[#1D1D1F]' : 'text-[#8E8E93] hover:text-[#1D1D1F]'}`}
                            >
                                <i className="fa-solid fa-calendar-day text-[18px] mb-1"></i>
                                <span className="text-[10px] font-bold tracking-wider uppercase">Itinerary</span>
                            </button>
                        </div>
                    </div>
                    
                    {/* CUSTOM iOS CONFIRM MODAL */}
                    {confirmDialog && (
                        <div className="fixed inset-0 z-50 bg-black/20 flex items-center justify-center p-4 backdrop-blur-md animate-fade-in" style={{ zIndex: 130 }}>
                            <div className="bg-white/95 backdrop-blur-3xl rounded-[20px] w-[280px] flex flex-col overflow-hidden animate-pop-in shadow-2xl border border-white" style={{animationDuration: '0.3s'}}>
                                <div className="p-5 text-center">
                                    <h3 className="text-[17px] font-bold text-[#1D1D1F] mb-1.5">Confirm</h3>
                                    <p className="text-[13px] font-medium text-[#8E8E93] leading-relaxed">{confirmDialog.message}</p>
                                </div>
                                <div className="flex border-t border-black/5">
                                    <button onClick={() => setConfirmDialog(null)} className="flex-1 py-3 text-[16px] text-[#1D1D1F] font-bold border-r border-black/5 active:bg-black/5 transition-colors">Cancel</button>
                                    <button onClick={() => { confirmDialog.onConfirm(); setConfirmDialog(null); }} className="flex-1 py-3 text-[16px] text-[var(--ios-red)] font-bold active:bg-[var(--ios-red)]/10 transition-colors">Delete</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
