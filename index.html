<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- This meta tag ensures the app looks native on iOS and Android without awkward zooming -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WanderTracker Live</title>
    
    <!-- Apple/iOS Web App settings for adding to Home Screen -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Globe_icon.svg/1024px-Globe_icon.svg.png">

    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for in-browser JSX compiling -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        /* iOS Safe Area paddings to avoid notch and home indicator */
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .media-preview-container {
            width: 100%;
            height: 120px;
            border-radius: 12px;
            overflow: hidden;
            background: #f1f5f9;
            margin-top: 10px;
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .media-preview-container img, .media-preview-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo } = React;

        // --- FIREBASE SETUP ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyDUdgQdMPAUVHSIHmbfIpSEYwQNWdFM578",
                authDomain: "trip-navigation-b0f21.firebaseapp.com",
                projectId: "trip-navigation-b0f21",
                storageBucket: "trip-navigation-b0f21.firebasestorage.app",
                messagingSenderId: "841186283877",
                appId: "1:841186283877:web:7551e6f5f33dfe6d3e118c"
            };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'my-wander-tracker-app';

        // Haversine formula to calculate straight-line distance between two coordinates
        function calculateDistance(lat1, lon1, lat2, lon2) {
            if (lat1 == null || lon1 == null || lat2 == null || lon2 == null) return null;
            const R = 6371; // Earth's radius in km
            const dLat = (lat2 - lat1) * (Math.PI / 180);
            const dLon = (lon2 - lon1) * (Math.PI / 180);
            const a =
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * (Math.PI / 180)) * Math.cos(lat2 * (Math.PI / 180)) *
                Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function formatDistance(distInKm) {
            if (distInKm === null) return "Unknown";
            if (distInKm < 1) return `${Math.round(distInKm * 1000)}m`;
            return `${distInKm.toFixed(1)}km`;
        }

        function App() {
            // --- STATE ---
            const [user, setUser] = useState(null);
            const [authError, setAuthError] = useState('');
            const [liveLocation, setLiveLocation] = useState(null);
            const [geoError, setGeoError] = useState('');
            const [locations, setLocations] = useState([]);
            const [viewMode, setViewMode] = useState('list'); // 'grid' or 'list'
            
            // Form State
            const [editingId, setEditingId] = useState(null);
            const [name, setName] = useState('');
            const [category, setCategory] = useState('');
            const [coordinates, setCoordinates] = useState('');
            const [mapLink, setMapLink] = useState('');
            
            // Media State
            const [mediaMode, setMediaMode] = useState('upload'); // 'upload' or 'url'
            const [mediaUrl, setMediaUrl] = useState('');
            const [urlMediaType, setUrlMediaType] = useState('image');
            const [mediaFile, setMediaFile] = useState(null); // base64 string
            const [mediaType, setMediaType] = useState('image');
            
            const [saveError, setSaveError] = useState('');

            // --- EFFECTS ---
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {
                        console.error("Firebase Auth Error", err);
                        setAuthError(err.message);
                    }
                };
                initAuth();

                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;

                const locationsRef = collection(db, 'artifacts', appId, 'public', 'data', 'locations');
                const unsubscribe = onSnapshot(locationsRef, (snapshot) => {
                    const fetchedLocations = [];
                    snapshot.forEach(doc => {
                        fetchedLocations.push({ id: doc.id, ...doc.data() });
                    });
                    setLocations(fetchedLocations);
                }, (error) => {
                    console.error("Firestore Error:", error);
                });

                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                if (!("geolocation" in navigator)) {
                    setGeoError("GPS not supported.");
                    return;
                }
                const watchId = navigator.geolocation.watchPosition(
                    (position) => {
                        setLiveLocation({
                            lat: position.coords.latitude,
                            lng: position.coords.longitude
                        });
                        setGeoError('');
                    },
                    (err) => {
                        console.warn("Geolocation blocked.", err);
                        setGeoError("GPS Signal Blocked");
                        setLiveLocation({ lat: 11.5564, lng: 104.9282 }); // Phnom Penh
                    },
                    { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
                );
                return () => navigator.geolocation.clearWatch(watchId);
            }, []);

            // --- HANDLERS ---
            const handleMapLinkChange = (e) => {
                const link = e.target.value;
                setMapLink(link);
                const regex = /@(-?\d+\.\d+),(-?\d+\.\d+)/;
                const match = link.match(regex);
                if (match) {
                    setCoordinates(`${match}, ${match}`);
                }
            };

            const handleFileChange = (e) => {
                const file = e.target.files; 
                if (!file) return;
                const type = file.type.startsWith('video') ? 'video' : 'image';
                setMediaType(type);
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    if (type === 'video') {
                        if (file.size > 800 * 1024) {
                            setSaveError("Video too large (Max 800KB).");
                            e.target.value = null;
                            return;
                        }
                        setMediaFile(event.target.result);
                    } else {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 800;
                            const MAX_HEIGHT = 800;
                            let width = img.width;
                            let height = img.height;
                            if (width > height) {
                                if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                            } else {
                                if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                            }
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            setMediaFile(canvas.toDataURL('image/jpeg', 0.6));
                        };
                        img.src = event.target.result;
                    }
                };
                reader.readAsDataURL(file);
            };

            const useCurrentLocation = () => {
                if (liveLocation) {
                    setCoordinates(`${liveLocation.lat.toFixed(6)}, ${liveLocation.lng.toFixed(6)}`);
                } else {
                    alert("GPS not ready.");
                }
            };

            const handleEdit = (loc) => {
                setEditingId(loc.id);
                setName(loc.name);
                setCategory(loc.category);
                setCoordinates(`${loc.lat}, ${loc.lng}`);
                setMapLink(loc.mapLink || '');
                setSaveError('');
                
                if (loc.media) {
                    if (loc.media.startsWith('http') && !loc.media.startsWith('data:')) {
                        setMediaMode('url');
                        setMediaUrl(loc.media);
                        setUrlMediaType(loc.mediaType || 'image');
                        setMediaFile(null);
                    } else {
                        setMediaMode('upload');
                        setMediaFile(loc.media);
                        setMediaType(loc.mediaType || 'image');
                        setMediaUrl('');
                    }
                } else {
                    setMediaMode('upload');
                    setMediaFile(null);
                    setMediaUrl('');
                }
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const cancelEdit = () => {
                setEditingId(null);
                setName('');
                setCategory('');
                setCoordinates('');
                setMapLink('');
                setMediaUrl('');
                setMediaFile(null);
                setSaveError('');
                const fileInput = document.querySelector('input[type=\"file\"]');
                if (fileInput) fileInput.value = "";
            };

            const handleSaveLocation = async (e) => {
                e.preventDefault();
                setSaveError('');
                let parsedLat = null; let parsedLng = null;
                if (coordinates) {
                    const coordsMatch = coordinates.match(/(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)/);
                    if (coordsMatch) {
                        parsedLat = parseFloat(coordsMatch);
                        parsedLng = parseFloat(coordsMatch);
                    }
                }
                if (!name || !category || parsedLat === null || parsedLng === null) {
                    setSaveError("Missing fields or invalid coordinates.");
                    return;
                }
                const locationData = {
                    name, category, lat: parsedLat, lng: parsedLng, mapLink,
                    media: (mediaMode === 'url' ? mediaUrl : mediaFile),
                    mediaType: (mediaMode === 'url' ? urlMediaType : mediaType),
                    timestamp: Date.now()
                };
                try {
                    if (editingId) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', editingId), locationData);
                    } else {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', Date.now().toString()), locationData);
                    }
                    cancelEdit(); 
                } catch (err) {
                    setSaveError("Storage Error: File might be too large.");
                }
            };

            const deleteLocation = async (id) => {
                if (window.confirm("Delete this location?")) {
                    try {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'locations', id));
                        if (editingId === id) cancelEdit(); 
                    } catch (err) {
                        alert("Delete failed.");
                    }
                }
            };

            const groupedAndSortedLocations = useMemo(() => {
                const groups = {};
                locations.forEach(loc => {
                    const cat = loc.category || 'Uncategorized';
                    if (!groups[cat]) groups[cat] = [];
                    const dist = liveLocation ? calculateDistance(liveLocation.lat, liveLocation.lng, loc.lat, loc.lng) : null;
                    groups[cat].push({ ...loc, currentDistance: dist });
                });
                Object.keys(groups).forEach(cat => {
                    groups[cat].sort((a, b) => (a.currentDistance ?? Infinity) - (b.currentDistance ?? Infinity));
                });
                return groups;
            }, [locations, liveLocation]);

            const uniqueCategories = useMemo(() => {
                return [...new Set(locations.map(l => l.category))].filter(Boolean);
            }, [locations]);

            return (
                <div className="min-h-screen pb-20 safe-bottom">
                    <header className="bg-white shadow-sm sticky top-0 z-50 border-b border-slate-200 safe-top">
                        <div className="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
                            <div className="flex items-center space-x-3">
                                <div className="bg-indigo-600 w-8 h-8 rounded-lg flex items-center justify-center shadow-sm">
                                    <i className="fa-solid fa-globe text-white"></i>
                                </div>
                                <h1 className="text-xl font-bold text-slate-800 tracking-tight">WanderTracker</h1>
                            </div>
                            <div className="flex items-center space-x-3">
                                {liveLocation ? (
                                    <div className="flex items-center space-x-2 bg-emerald-50 px-3 py-1.5 rounded-full border border-emerald-100">
                                        <span className="relative flex h-2 w-2">
                                            <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                            <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                                        </span>
                                        <span className="text-xs font-bold text-emerald-700 uppercase tracking-widest">Live</span>
                                    </div>
                                ) : (
                                    <i className="fa-solid fa-satellite-dish text-slate-400 animate-pulse"></i>
                                )}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 mt-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* FORM COLUMN */}
                        <div className="lg:col-span-4 space-y-6">
                            <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                                <h2 className="text-sm font-bold text-slate-500 uppercase tracking-wider mb-3">Live Position</h2>
                                {liveLocation ? (
                                    <div className="font-mono text-slate-800 font-bold text-sm bg-slate-50 p-3 rounded-lg border border-slate-100">
                                        {liveLocation.lat.toFixed(6)}, {liveLocation.lng.toFixed(6)}
                                    </div>
                                ) : (
                                    <div className="text-xs text-slate-500 italic">Waiting for GPS...</div>
                                )}
                            </div>

                            <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-lg font-bold text-slate-800">
                                        {editingId ? 'Edit Location' : 'New Location'}
                                    </h2>
                                    {editingId && (
                                        <button onClick={cancelEdit} className="text-xs text-indigo-600 font-bold bg-indigo-50 px-2 py-1 rounded">Cancel</button>
                                    )}
                                </div>
                                
                                {saveError && <div className="mb-4 p-3 bg-red-50 text-red-700 rounded-lg text-xs border border-red-100">{saveError}</div>}

                                <form onSubmit={handleSaveLocation} className="space-y-4">
                                    <div>
                                        <label className="block text-[10px] font-black text-slate-400 mb-1 uppercase tracking-widest">Name</label>
                                        <input type="text" required value={name} onChange={e => setName(e.target.value)} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Location name" />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-black text-slate-400 mb-1 uppercase tracking-widest">Category</label>
                                        <input type="text" required list="cats" value={category} onChange={e => setCategory(e.target.value)} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl outline-none" placeholder="e.g. Park, Cafe" />
                                        <datalist id="cats">{uniqueCategories.map(cat => <option key={cat} value={cat} />)}</datalist>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-black text-slate-400 mb-1 uppercase tracking-widest">Coordinates</label>
                                        <div className="flex space-x-2">
                                            <input type="text" required value={coordinates} onChange={e => setCoordinates(e.target.value)} className="flex-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm" placeholder="Lat, Lng" />
                                            <button type="button" onClick={useCurrentLocation} className="p-2 bg-indigo-50 text-indigo-600 rounded-xl border border-indigo-100 hover:bg-indigo-100 transition-colors"><i className="fa-solid fa-location-crosshairs"></i></button>
                                        </div>
                                    </div>

                                    <div className="pt-4 border-t border-slate-100">
                                        <label className="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Media</label>
                                        <div className="flex bg-slate-100 p-1 rounded-xl mb-3">
                                            <button type="button" onClick={() => setMediaMode('upload')} className={`flex-1 py-1 text-xs font-bold rounded-lg ${mediaMode === 'upload' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500'}`}>Upload</button>
                                            <button type="button" onClick={() => setMediaMode('url')} className={`flex-1 py-1 text-xs font-bold rounded-lg ${mediaMode === 'url' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500'}`}>URL</button>
                                        </div>
                                        {mediaMode === 'upload' ? (
                                            <input type="file" accept="image/*,video/*" onChange={handleFileChange} className="w-full text-xs" />
                                        ) : (
                                            <input type="url" value={mediaUrl} onChange={e => setMediaUrl(e.target.value)} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl text-xs" placeholder="https://..." />
                                        )}
                                        {(mediaFile || (mediaMode === 'url' && mediaUrl)) && (
                                            <div className="media-preview-container mt-4">
                                                {(mediaMode === 'upload' ? mediaType : urlMediaType) === 'video' ? 
                                                    <video src={mediaMode === 'upload' ? mediaFile : mediaUrl} className="object-cover" /> : 
                                                    <img src={mediaMode === 'upload' ? mediaFile : mediaUrl} className="object-cover" />
                                                }
                                            </div>
                                        )}
                                    </div>
                                    <button type="submit" disabled={!user} className={`w-full py-3 text-white font-bold rounded-xl transition-all shadow-lg ${editingId ? 'bg-amber-500 shadow-amber-100' : 'bg-indigo-600 shadow-indigo-100 active:scale-95'}`}>
                                        {editingId ? 'Update Location' : 'Save to Cloud'}
                                    </button>
                                </form>
                            </div>
                        </div>

                        {/* LIST COLUMN */}
                        <div className="lg:col-span-8 space-y-6">
                            <div className="flex justify-between items-center mb-2">
                                <h2 className="text-lg font-bold text-slate-800">Saved Wanderings</h2>
                                <div className="flex bg-slate-200 p-1 rounded-lg">
                                    <button onClick={() => setViewMode('grid')} className={`p-1.5 px-3 rounded-md transition-all ${viewMode === 'grid' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500'}`}><i className="fa-solid fa-table-cells-large"></i></button>
                                    <button onClick={() => setViewMode('list')} className={`p-1.5 px-3 rounded-md transition-all ${viewMode === 'list' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500'}`}><i className="fa-solid fa-list"></i></button>
                                </div>
                            </div>

                            {Object.keys(groupedAndSortedLocations).length === 0 ? (
                                <div className="bg-white p-12 text-center rounded-2xl border-2 border-dashed border-slate-200 text-slate-400">Empty wanderlust.</div>
                            ) : (
                                Object.keys(groupedAndSortedLocations).sort().map(cat => (
                                    <div key={cat} className="space-y-4">
                                        <div className="flex items-center space-x-3">
                                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">{cat}</span>
                                            <div className="h-px bg-slate-200 flex-1"></div>
                                            <span className="text-[10px] font-bold text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full">{groupedAndSortedLocations[cat].length}</span>
                                        </div>
                                        
                                        <div className={viewMode === 'grid' ? "grid grid-cols-1 sm:grid-cols-2 gap-4" : "space-y-2"}>
                                            {groupedAndSortedLocations[cat].map(loc => (
                                                viewMode === 'grid' ? (
                                                    <div key={loc.id} className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden group">
                                                        <div className="h-44 bg-slate-100 relative">
                                                            {loc.media ? (
                                                                loc.mediaType === 'video' ? <video src={loc.media} className="w-full h-full object-cover" /> : <img src={loc.media} className="w-full h-full object-cover" />
                                                            ) : <div className="w-full h-full flex items-center justify-center text-slate-300"><i className="fa-solid fa-image text-3xl"></i></div>}
                                                            <div className="absolute top-3 right-3 flex space-x-2">
                                                                <button onClick={() => handleEdit(loc)} className="w-8 h-8 bg-white/90 backdrop-blur rounded-full shadow-lg flex items-center justify-center text-slate-600 hover:text-indigo-600 transition-colors"><i className="fa-solid fa-pen text-xs"></i></button>
                                                                <button onClick={() => deleteLocation(loc.id)} className="w-8 h-8 bg-white/90 backdrop-blur rounded-full shadow-lg flex items-center justify-center text-slate-600 hover:text-red-600 transition-colors"><i className="fa-solid fa-trash text-xs"></i></button>
                                                            </div>
                                                        </div>
                                                        <div className="p-4">
                                                            <h4 className="font-bold text-slate-800 text-base mb-1">{loc.name}</h4>
                                                            <div className="flex items-center text-indigo-600 text-[10px] font-black uppercase tracking-wider mb-2">
                                                                <i className="fa-solid fa-compass mr-1.5"></i> {formatDistance(loc.currentDistance)}
                                                            </div>
                                                            <div className="flex justify-between items-center pt-2 border-t border-slate-50">
                                                                <span className="text-[9px] font-mono text-slate-400">{loc.lat.toFixed(4)}, {loc.lng.toFixed(4)}</span>
                                                                {loc.mapLink && <a href={loc.mapLink} target="_blank" className="text-[10px] font-black text-slate-500 hover:text-indigo-600">MAP <i className="fa-solid fa-arrow-up-right-from-square ml-0.5"></i></a>}
                                                            </div>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <div key={loc.id} className="bg-white p-2 rounded-xl border border-slate-200 shadow-sm flex items-center group hover:border-indigo-200 transition-colors">
                                                        <div className="w-14 h-14 rounded-lg overflow-hidden bg-slate-100 flex-shrink-0 mr-4 border border-slate-100">
                                                            {loc.media ? (
                                                                loc.mediaType === 'video' ? <video src={loc.media} className="w-full h-full object-cover" /> : <img src={loc.media} className="w-full h-full object-cover" />
                                                            ) : <div className="w-full h-full flex items-center justify-center text-slate-300"><i className="fa-solid fa-image text-sm"></i></div>}
                                                        </div>
                                                        <div className="flex-1 min-w-0 pr-4">
                                                            <h4 className="font-bold text-slate-800 text-sm truncate">{loc.name}</h4>
                                                            <div className="flex items-center space-x-3 mt-0.5">
                                                                <span className="text-[10px] font-black text-indigo-600 uppercase tracking-tight flex items-center">
                                                                    <i className="fa-solid fa-compass mr-1"></i> {formatDistance(loc.currentDistance)}
                                                                </span>
                                                                <span className="text-[9px] font-mono text-slate-400">{loc.lat.toFixed(3)}, {loc.lng.toFixed(3)}</span>
                                                            </div>
                                                        </div>
                                                        <div className="flex items-center space-x-1">
                                                            {loc.mapLink && (
                                                                <a href={loc.mapLink} target="_blank" className="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-indigo-600 hover:bg-indigo-50" title="Open Map">
                                                                    <i className="fa-solid fa-map-location-dot text-sm"></i>
                                                                </a>
                                                            )}
                                                            <button onClick={() => handleEdit(loc)} className="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-amber-600 hover:bg-amber-50" title="Edit">
                                                                <i className="fa-solid fa-pen text-sm"></i>
                                                            </button>
                                                            <button onClick={() => deleteLocation(loc.id)} className="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-red-600 hover:bg-red-50" title="Delete">
                                                                <i className="fa-solid fa-trash text-sm"></i>
                                                            </button>
                                                        </div>
                                                    </div>
                                                )
                                            ))}
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </main>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
